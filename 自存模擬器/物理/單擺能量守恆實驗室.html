<script>
/**
 * DSE Physics Simulator Core
 * Developed by EdTech Physics Lead
 */

// --- Localization Config ---
const i18n = {
    'en': {
        'title': 'Pendulum Energy Lab',
        'time': 'Time',
        'height': 'Height',
        'velocity': 'Speed',
        'mass': 'Mass (Bob)',
        'length': 'String Length',
        'angle': 'Initial Angle',
        'air_resistance': 'Air Resistance (Loss)',
        'energy_conservation': 'Energy Analysis',
        'realtime_data': 'Instantaneous Data',
    },
    'zh-HK': {
        'title': '擺錘能量守恆實驗室',
        'time': '時間',
        'height': '高度',
        'velocity': '速率',
        'mass': '擺錘質量',
        'length': '擺繩長度',
        'angle': '初始角度',
        'air_resistance': '空氣阻力 (能量損耗)',
        'energy_conservation': '能量分析',
        'realtime_data': '即時數據',
    }
};

// --- Physics Engine State ---
const physics = {
    g: 9.81,
    mass: 1.0,
    length: 1.5,
    angle: Math.PI / 4, // radians (0 is vertical down)
    omega: 0,           // angular velocity
    alpha: 0,           // angular accel
    time: 0,
    damping: 0,         // c coefficient
    initAngleDeg: 45,
    PE: 0,
    KE: 0,
    TE: 0,
    maxTE_initial: 0    // For graph scaling
};

// --- View State ---
let isRunning = false;
let lastFrameTime = 0;
let currentLang = 'zh-HK';

// --- Graph Data Buffers ---
const MAX_POINTS = 500;
let history = []; // Stores {t, ke, pe, te, h}

// --- DOM References ---
const dom = {
    canvas: {
        sim: document.getElementById('simCanvas'),
        height: document.getElementById('graphHeight')
    },
    ctx: {},
    inputs: {
        mass: document.getElementById('slider-mass'),
        length: document.getElementById('slider-length'),
        angle: document.getElementById('slider-angle'),
        air: document.getElementById('check-air')
    },
    display: {
        mass: document.getElementById('disp-mass'),
        length: document.getElementById('disp-length'),
        angle: document.getElementById('disp-angle'),
        time: document.getElementById('val-time'),
        height: document.getElementById('val-height'),
        vel: document.getElementById('val-vel'),
        keTxt: document.getElementById('text-ke'),
        peTxt: document.getElementById('text-pe'),
        teTxt: document.getElementById('text-te'),
        keBar: document.getElementById('bar-ke'),
        peBar: document.getElementById('bar-pe'),
        teBar: document.getElementById('bar-te')
    },
    controls: {
        play: document.getElementById('play-btn'),
        reset: document.getElementById('reset-btn'),
        iconPlay: document.getElementById('icon-play'),
        iconPause: document.getElementById('icon-pause')
    }
};

// Initialize Contexts
Object.keys(dom.canvas).forEach(key => {
    dom.ctx[key] = dom.canvas[key].getContext('2d', { alpha: false }); 
});

// --- Initialization ---
function init() {
    // Event Listeners
    window.addEventListener('resize', handleResize);
    
    dom.inputs.mass.addEventListener('input', (e) => {
        physics.mass = parseFloat(e.target.value);
        dom.display.mass.textContent = physics.mass.toFixed(1);
        updateStaticCalculations();
        computeState(); // Recalculate based on new mass
        updateHUD();    // Update visual immediately
        render(); 
    });

    dom.inputs.length.addEventListener('input', (e) => {
        physics.length = parseFloat(e.target.value);
        dom.display.length.textContent = physics.length.toFixed(1);
        updateStaticCalculations();
        computeState();
        updateHUD();
        render();
    });

    dom.inputs.angle.addEventListener('input', (e) => {
        if(isRunning) togglePlay(); 
        physics.initAngleDeg = parseFloat(e.target.value);
        dom.display.angle.textContent = physics.initAngleDeg;
        resetSimulation();
    });

    dom.inputs.air.addEventListener('change', (e) => {
        physics.damping = e.target.checked ? 0.3 : 0;
    });

    dom.controls.play.addEventListener('click', togglePlay);
    dom.controls.reset.addEventListener('click', resetSimulation);

    // Initial Setup
    handleResize();
    setLang('zh-HK');
    resetSimulation();
    requestAnimationFrame(gameLoop);
}

// --- Logic ---

function setLang(lang) {
    currentLang = lang;
    const t = i18n[lang];
    
    // Header & Titles
    document.getElementById('title-text').textContent = t.title;
    
    // Toggle Button Styles
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    document.getElementById('lang-zh').classList.toggle('active', lang === 'zh-HK');

    // Data Attributes Text replacement
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if(t[key]) el.textContent = t[key];
    });
}

function handleResize() {
    Object.values(dom.canvas).forEach(cvs => {
        const rect = cvs.parentElement.getBoundingClientRect();
        cvs.width = rect.width * window.devicePixelRatio;
        cvs.height = rect.height * window.devicePixelRatio;
    });
    render();
}

function updateStaticCalculations() {
    const rad = physics.initAngleDeg * (Math.PI / 180);
    const h = physics.length * (1 - Math.cos(rad));
    physics.maxTE_initial = physics.mass * physics.g * h;
    if(physics.maxTE_initial < 0.01) physics.maxTE_initial = 0.01; 
}

function resetSimulation() {
    physics.angle = physics.initAngleDeg * (Math.PI / 180);
    physics.omega = 0;
    physics.alpha = 0;
    physics.time = 0;
    history = [];
    
    updateStaticCalculations();
    computeState(); // Initial calculation
    updateHUD();
    
    isRunning = false;
    dom.controls.iconPlay.classList.remove('hidden');
    dom.controls.iconPause.classList.add('hidden');
    
    render();
}

function togglePlay() {
    isRunning = !isRunning;
    if (isRunning) {
        lastFrameTime = performance.now();
        dom.controls.iconPlay.classList.add('hidden');
        dom.controls.iconPause.classList.remove('hidden');
    } else {
        dom.controls.iconPlay.classList.remove('hidden');
        dom.controls.iconPause.classList.add('hidden');
    }
}

// Separate state computation from DOM update for performance and clarity
function computeState() {
    const h = physics.length * (1 - Math.cos(physics.angle));
    const v = physics.length * physics.omega;
    
    physics.PE = physics.mass * physics.g * h;
    physics.KE = 0.5 * physics.mass * v * v;
    physics.TE = physics.PE + physics.KE;
}

function updateHUD() {
    const h = physics.length * (1 - Math.cos(physics.angle));
    const v = physics.length * physics.omega;

    // Update DOM texts
    dom.display.time.textContent = physics.time.toFixed(2) + ' s';
    dom.display.height.textContent = h.toFixed(2) + ' m';
    dom.display.vel.textContent = Math.abs(v).toFixed(2) + ' m/s';
    
    dom.display.keTxt.textContent = physics.KE.toFixed(1) + 'J';
    dom.display.peTxt.textContent = physics.PE.toFixed(1) + 'J';
    dom.display.teTxt.textContent = physics.TE.toFixed(1) + 'J';
    
    // Update Bars
    const max = physics.maxTE_initial; 
    dom.display.keBar.style.height = Math.min((physics.KE/max)*100, 100) + '%';
    dom.display.peBar.style.height = Math.min((physics.PE/max)*100, 100) + '%';
    dom.display.teBar.style.height = Math.min((physics.TE/max)*100, 100) + '%';
}

function physicsStep(dt) {
    const airResistance = physics.omega * (physics.damping / physics.mass);
    physics.alpha = -(physics.g / physics.length) * Math.sin(physics.angle) - airResistance;
    
    physics.omega += physics.alpha * dt;
    physics.angle += physics.omega * dt;
    physics.time += dt;
    
    computeState();
    
    // Record history
    if (history.length > MAX_POINTS) history.shift();
    history.push({
        t: physics.time,
        ke: physics.KE,
        pe: physics.PE,
        te: physics.TE,
        h: physics.length * (1 - Math.cos(physics.angle))
    });
}

function gameLoop(timestamp) {
    if (isRunning) {
        let dt = (timestamp - lastFrameTime) / 1000;
        lastFrameTime = timestamp;
        
        if (dt > 0.05) dt = 0.05;
        
        const subSteps = 4;
        const subDt = dt / subSteps;
        for(let i=0; i<subSteps; i++) {
            physicsStep(subDt);
        }
    }
    
    updateHUD(); // Sync UI with physics state once per frame
    render();
    requestAnimationFrame(gameLoop);
}

// --- Rendering Core ---

/**
 * Draws a precise vector arrow with scalable head.
 */
function drawArrow(ctx, fromX, fromY, toX, toY, color, width) {
    const dx = toX - fromX;
    const dy = toY - fromY;
    const len = Math.sqrt(dx*dx + dy*dy);
    
    // If vector is too small, don't draw it to avoid visual noise
    if(len < 2) return;

    // Head size proportional to line length, but clamped
    const headLen = Math.min(12, Math.max(6, len * 0.2)); 
    
    const angle = Math.atan2(dy, dx);
    const lineEndX = toX - headLen * Math.cos(angle);
    const lineEndY = toY - headLen * Math.sin(angle);
    
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.moveTo(fromX, fromY);
    ctx.lineTo(lineEndX, lineEndY);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.fillStyle = color;
    ctx.moveTo(toX, toY);
    ctx.lineTo(toX - headLen * Math.cos(angle - Math.PI / 6), toY - headLen * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(toX - headLen * Math.cos(angle + Math.PI / 6), toY - headLen * Math.sin(angle + Math.PI / 6));
    ctx.fill();
}

function render() {
    const dpr = window.devicePixelRatio;
    
    // --- 1. Main Simulation ---
    const ctx = dom.ctx.sim;
    const w = dom.canvas.sim.width / dpr;
    const h = dom.canvas.sim.height / dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); 
    
    // Clean Background (Flat 2D)
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, w, h);
    
    // Grid Lines (Subtle)
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<w; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,h); }
    for(let i=0; i<h; i+=40) { ctx.moveTo(0,i); ctx.lineTo(w,i); }
    ctx.stroke();

    const originX = w / 2;
    const originY = h * 0.15;
    const pxScale = Math.min(w, h) * 0.25; 
    
    // Coordinate System: Angle 0 is DOWN (Y+)
    const bobX = originX + Math.sin(physics.angle) * physics.length * pxScale;
    const bobY = originY + Math.cos(physics.angle) * physics.length * pxScale;
    
    // Ceiling (Flat line, no shadow)
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 4;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(originX - 60, originY);
    ctx.lineTo(originX + 60, originY);
    ctx.stroke();
    
    // String (Simple line)
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(originX, originY);
    ctx.lineTo(bobX, bobY);
    ctx.stroke();
    
    // Pivot
    ctx.fillStyle = '#475569';
    ctx.beginPath();
    ctx.arc(originX, originY, 4, 0, Math.PI*2);
    ctx.fill();

    // Equilibrium Reference (Dotted Vertical)
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(originX, originY);
    ctx.lineTo(originX, originY + physics.length * pxScale + 50);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Bob
    const radius = 12 + physics.mass * 3;
    ctx.beginPath();
    ctx.arc(bobX, bobY, radius, 0, Math.PI*2);
    ctx.fillStyle = '#2563eb'; 
    ctx.fill();
    // Simple highlight
    ctx.beginPath();
    ctx.arc(bobX - radius*0.3, bobY - radius*0.3, radius*0.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();

    // --- Height Indicator (Flat) ---
    const lowestY = originY + physics.length * pxScale;
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    
    // Ground level line
    ctx.beginPath();
    ctx.moveTo(originX - 70, lowestY);
    ctx.lineTo(originX + 70, lowestY);
    ctx.stroke();
    
    // Current level dashed line
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(bobX, bobY);
    // Draw line to the side relative to bob position to avoid clutter
    const hLineEnd = originX + 60;
    ctx.lineTo(hLineEnd, bobY);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // h arrow
    drawArrow(ctx, hLineEnd - 10, lowestY, hLineEnd - 10, bobY, '#3b82f6', 1.5);
    drawArrow(ctx, hLineEnd - 10, bobY, hLineEnd - 10, lowestY, '#3b82f6', 1.5);
    ctx.fillStyle = '#2563eb';
    ctx.font = 'italic 14px "Times New Roman"';
    ctx.fillText('h', hLineEnd, (lowestY + bobY)/2);

    // --- Graphs ---
    drawGraphHeight(dpr);
}

function drawGraphHeight(dpr) {
    const ctx = dom.ctx.height;
    const w = dom.canvas.height.width / dpr;
    const h = dom.canvas.height.height / dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,w,h);
    
    // Increased Top and Bottom margins to prevent overlapping/cutoff
    const margin = { t: 40, b: 40, l: 30, r: 15 };
    const gw = w - margin.l - margin.r;
    const gh = h - margin.t - margin.b;

    const maxY = physics.maxTE_initial * 1.2;
    const maxH = (physics.maxTE_initial / (physics.mass * physics.g)) * 1.2;

    const mapX = (hVal) => margin.l + (hVal / maxH) * gw;
    const mapY = (eVal) => margin.t + gh - (eVal / maxY) * gh;

    // Grid
    ctx.strokeStyle = '#f1f5f9';
    ctx.lineWidth = 1;
    ctx.beginPath();
    // Horizontal lines
    for(let i=0; i<=4; i++) {
        const y = margin.t + (gh * i)/4;
        ctx.moveTo(margin.l, y);
        ctx.lineTo(w - margin.r, y);
    }
    // Vertical lines
    for(let i=0; i<=4; i++) {
        const x = margin.l + (gw * i)/4;
        ctx.moveTo(x, margin.t);
        ctx.lineTo(x, margin.t + gh);
    }
    ctx.stroke();

    // Traces
    const drawTrace = (key, color) => {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        // Show recent history for phase effect
        let startIdx = physics.damping > 0 ? 0 : Math.max(0, history.length - 300);
        
        for(let i=startIdx; i<history.length; i++) {
            const pt = history[i];
            const x = mapX(pt.h);
            const y = mapY(pt[key]);
            if(i===startIdx) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        }
        ctx.stroke();
    };

    ctx.save();
    ctx.beginPath();
    ctx.rect(margin.l, margin.t, gw, gh);
    ctx.clip();
    
    drawTrace('pe', '#3b82f6');
    drawTrace('ke', '#10b981');
    drawTrace('te', '#f59e0b');
    
    // Dot
    if(history.length > 0) {
        const curr = history[history.length-1];
        const dotX = mapX(curr.h);
        [ {v:curr.pe, c:'#3b82f6'}, {v:curr.ke, c:'#10b981'}, {v:curr.te, c:'#f59e0b'} ].forEach(d => {
            ctx.beginPath();
            ctx.fillStyle = d.c;
            ctx.arc(dotX, mapY(d.v), 4, 0, Math.PI*2);
            ctx.fill();
        });
    }

    ctx.restore();
    
    // Axes
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(margin.l, margin.t); ctx.lineTo(margin.l, margin.t + gh);
    ctx.moveTo(margin.l, margin.t + gh); ctx.lineTo(w - margin.r, margin.t + gh);
    ctx.stroke();

    // Labels
    ctx.fillStyle = '#64748b';
    ctx.font = '11px Inter';
    ctx.textAlign = 'right';
    // Adjusted Y position to avoid clipping at the top
    ctx.fillText(maxY.toFixed(1) + 'J', margin.l - 4, margin.t + 4);
    
    ctx.textAlign = 'center';
    // Adjusted Y position to avoid clipping at the bottom
    ctx.fillText(maxH.toFixed(2) + 'm', margin.l + gw, margin.t + gh + 16);
}

// Start
init();

</script>
