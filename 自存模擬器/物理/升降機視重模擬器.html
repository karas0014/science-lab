                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>

                    注意！視重 ($R$) 只與「加速度方向」有關，與「移動方向」無關！「向上減速」等同於「向下加速」，兩者皆會處於失重狀態 ($R < mg$)。

    <script>
        // --- 1. State Management ---
        const state = {
            lang: 'zh',
            mass: 50,
            accelMag: 2.0,
            velDir: 1,      // 1: Up, -1: Down
            speedState: 1,  // 1: Speeding up, 0: Constant, -1: Slowing down
            g: 9.81
        };

        // --- 2. i18n Dictionary ---
        const dict = {
            zh: {
                title: "升降機視重模擬器",
                subtitle: "DSE 物理力學核心概念",
                fbdTitle: "隔離體圖 (Free Body Diagram)",
                mass: "質量 (<span class='italic font-serif'>m</span>)",
                accel: "加速度 (<span class='italic font-serif'>a</span>)",
                motion: "運動狀態",
                btnUp: "⬆️ 向上",
                btnStop: "⏸️ 靜止",
                btnDown: "⬇️ 向下",
                btnSpeedUp: "🚀 加速",
                btnConst: "➡️ 勻速",
                btnSpeedDown: "🐢 減速",
                calc: "實時計算",
                tipTitle: "Teacher's Tip (DSE 伏位)",
                tipContent: "注意！視重 (\\(R\\)) 只與「加速度方向」有關，與「移動方向」無關！「向上減速」等同於「向下加速」，兩者皆會處於失重狀態 (\\(R < mg\\))。",
                stateOver: "超重 (Apparent Weight > True Weight)",
                stateUnder: "失重 (Apparent Weight < True Weight)",
                stateNormal: "視重 = 真實重量",
                accelDirUp: "加速度方向：向上 (+)",
                accelDirDown: "加速度方向：向下 (-)",
                accelDirZero: "加速度：零 (0)"
            },
            en: {
                title: "Apparent Weight Simulator",
                subtitle: "HKDSE Physics Mechanics Core Concept",
                fbdTitle: "Free Body Diagram (FBD)",
                mass: "Mass (<span class='italic font-serif'>m</span>)",
                accel: "Acceleration (<span class='italic font-serif'>a</span>)",
                motion: "State of Motion",
                btnUp: "⬆️ Up",
                btnStop: "⏸️ Stationary",
                btnDown: "⬇️ Down",
                btnSpeedUp: "🚀 Speeding Up",
                btnConst: "➡️ Constant Vel.",
                btnSpeedDown: "🐢 Slowing Down",
                calc: "Live Calculation",
                tipTitle: "Teacher's Tip (DSE Trap)",
                tipContent: "Beware! Apparent weight (\\(R\\)) depends ONLY on the direction of acceleration, NOT velocity! 'Moving up & slowing down' implies downward acceleration, resulting in weightlessness (\\(R < mg\\)).",
                stateOver: "Heavier (Apparent Weight > True Weight)",
                stateUnder: "Lighter (Apparent Weight < True Weight)",
                stateNormal: "Apparent Weight = True Weight",
                accelDirUp: "Accel. Direction: Upwards (+)",
                accelDirDown: "Accel. Direction: Downwards (-)",
                accelDirZero: "Acceleration: Zero (0)"
            }
        };

        // --- 3. DOM Elements ---
        const els = {
            langBtn: document.getElementById('lang-btn'),
            sliderMass: document.getElementById('slider-mass'),
            sliderAccel: document.getElementById('slider-accel'),
            valMass: document.getElementById('val-mass'),
            valAccel: document.getElementById('val-accel'),
            radiosDir: document.getElementsByName('dir'),
            radiosSpeed: document.getElementsByName('speed'),
            mathContent: document.getElementById('math-content'),
            
            // SVG Vectors
            vecV: document.getElementById('vec-v'),
            vecA: document.getElementById('vec-a'),
            vecR: document.getElementById('vec-R'),
            vecW: document.getElementById('vec-W')
        };

        // --- 4. Core Logic & Physics ---
        function updatePhysics() {
            let a_dir = 0;
            let activeAccel = 0;
            const speedControls = document.getElementById('speed-controls');

            if (state.velDir === 0) {
                // Stationary: override speed change and accel
                activeAccel = 0;
                a_dir = 0;
                els.radiosSpeed.forEach(r => r.disabled = true);
                speedControls.style.opacity = '0.5';
                els.sliderAccel.disabled = true;
                els.sliderAccel.parentElement.style.opacity = '0.5';
            } else {
                // Moving
                els.radiosSpeed.forEach(r => r.disabled = false);
                speedControls.style.opacity = '1';

                if (state.speedState !== 0) {
                    a_dir = state.velDir * state.speedState;
                }
                
                activeAccel = (state.speedState === 0) ? 0 : state.accelMag;
                els.sliderAccel.disabled = (state.speedState === 0);
                els.sliderAccel.parentElement.style.opacity = (state.speedState === 0) ? '0.5' : '1';
            }

            // Calculate Forces
            const W = state.mass * state.g;
            // Net Force F = ma.  Taking UP as positive: R - mg = m * (a_dir * a)  => R = m(g + a_dir * a)
            const R = state.mass * (state.g + (a_dir * activeAccel));

            renderSVG(W, R, activeAccel, a_dir);
            renderMath(W, R, activeAccel, a_dir);
        }

        // --- 5. SVG Rendering ---
        function renderSVG(W, R, activeAccel, a_dir) {
            // Scaling factors for visuals
            const forceScale = 0.15; // px per Newton
            const accelScale = 6;    // px per m/s^2
            const minArrowLen = 20;

            // Update Velocity Vector (Green)
            if (state.velDir === 0) {
                els.vecV.style.opacity = '0';
            } else {
                els.vecV.style.opacity = '1';
                const vLen = 60; 
                updateArrowPath(els.vecV, state.velDir, vLen, 'v');
            }

            // Update Acceleration Vector (Orange)
            if (activeAccel === 0) {
                els.vecA.style.opacity = '0';
            } else {
                els.vecA.style.opacity = '1';
                const aLen = Math.max(minArrowLen, activeAccel * accelScale);
                updateArrowPath(els.vecA, a_dir, aLen, 'a');
            }

            // Update FBD Weight (W) - Always Down
            const wLen = W * forceScale;
            updateArrowPath(els.vecW, -1, wLen, 'W', true);

            // Update FBD Reaction Force (R) - Always Up
            const rLen = R * forceScale;
            updateArrowPath(els.vecR, 1, rLen, 'R', true);
        }

        function updateArrowPath(groupElement, directionSign, length, labelStr, isFBD = false) {
            const line = groupElement.querySelector('line');
            const use = groupElement.querySelector('use');
            const text = groupElement.querySelector('text');
            
            // Base offset so it doesn't overlap the dot in FBD
            const offset = isFBD ? 8 : 0;
            const endY = (offset + length) * (directionSign > 0 ? -1 : 1);
            const startY = offset * (directionSign > 0 ? -1 : 1);

            line.setAttribute('y1', startY);
            line.setAttribute('y2', endY);

            // Position arrowhead at the end
            use.setAttribute('y', endY);
            use.setAttribute('href', directionSign > 0 ? '#arrow-head-up' : '#arrow-head-down');

            // Position text label gracefully
            text.setAttribute('y', endY + (directionSign > 0 ? 15 : -15));
        }

        // --- 6. MathJax & UI Rendering ---
        function renderMath(W, R, activeAccel, a_dir) {
            const t = dict[state.lang];
            let mathHTML = ``;
            let eq1, eq2, stateText, aText;

            const R_formatted = R.toFixed(1);
            const W_formatted = W.toFixed(1);

            if (a_dir > 0) {
                aText = t.accelDirUp;
                eq1 = `R - mg = ma`;
                eq2 = `R = ${state.mass}(${state.g} + ${activeAccel.toFixed(1)}) = \\mathbf{${R_formatted} \\text{ N}}`;
                stateText = `<span class="text-red-600 font-bold">${t.stateOver}</span>`;
            } else if (a_dir < 0) {
                aText = t.accelDirDown;
                eq1 = `mg - R = ma`;
                eq2 = `R = ${state.mass}(${state.g} - ${activeAccel.toFixed(1)}) = \\mathbf{${R_formatted} \\text{ N}}`;
                stateText = `<span class="text-blue-600 font-bold">${t.stateUnder}</span>`;
            } else {
                aText = t.accelDirZero;
                eq1 = `a = 0 \\implies R = mg`;
                eq2 = `R = ${state.mass}(${state.g}) = \\mathbf{${R_formatted} \\text{ N}}`;
                stateText = `<span class="text-green-600 font-bold">${t.stateNormal}</span>`;
            }

            mathHTML = `
                <div class="mb-1 font-semibold border-b border-indigo-300/60 dark:border-indigo-400/30 pb-1">${aText}</div>
                <div class="mb-2">\\( W = mg = ${state.mass}(${state.g}) = ${W_formatted} \\text{ N} \\)</div>
                <div class="mb-2">\\( ${eq1} \\)</div>
                <div class="mb-2 text-lg">\\( ${eq2} \\)</div>
                <div class="mt-2 pt-2 border-t border-indigo-300/60 dark:border-indigo-400/30">${stateText}</div>
            `;

            els.mathContent.innerHTML = mathHTML;
            
            // Trigger MathJax re-render
            if (window.MathJax) {
                MathJax.typesetPromise([els.mathContent]).catch((err) => console.log('MathJax error:', err));
            }
        }

        // --- 7. Internationalization (i18n) ---
        function updateLanguage() {
            const t = dict[state.lang];
            document.getElementById('ui-title').innerHTML = t.title;
            document.getElementById('ui-subtitle').innerHTML = t.subtitle;
            document.getElementById('fbd-title').innerHTML = t.fbdTitle;
            document.getElementById('lbl-mass').innerHTML = t.mass;
            document.getElementById('lbl-accel').innerHTML = t.accel;
            document.getElementById('lbl-motion').innerHTML = t.motion;
            
            document.getElementById('btn-up').innerHTML = t.btnUp;
            document.getElementById('btn-stop').innerHTML = t.btnStop;
            document.getElementById('btn-down').innerHTML = t.btnDown;
            document.getElementById('btn-speedup').innerHTML = t.btnSpeedUp;
            document.getElementById('btn-const').innerHTML = t.btnConst;
            document.getElementById('btn-speeddown').innerHTML = t.btnSpeedDown;
            
            document.getElementById('lbl-calc').innerHTML = t.calc;
            document.getElementById('tip-title').innerHTML = t.tipTitle;
            
            // Re-render MathJax explicitly to translate physics text
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('tip-content')]).then(() => {
                     document.getElementById('tip-content').innerHTML = t.tipContent;
                     MathJax.typesetPromise([document.getElementById('tip-content')]);
                });
            } else {
                document.getElementById('tip-content').innerHTML = t.tipContent;
            }

            updatePhysics();
        }

        // --- 8. Event Listeners ---
        els.sliderMass.addEventListener('input', (e) => {
            state.mass = parseFloat(e.target.value);
            els.valMass.innerText = state.mass;
            updatePhysics();
        });

        els.sliderAccel.addEventListener('input', (e) => {
            state.accelMag = parseFloat(e.target.value);
            els.valAccel.innerText = state.accelMag.toFixed(1);
            updatePhysics();
        });

        els.radiosDir.forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.velDir = parseInt(e.target.value);
                updatePhysics();
            });
        });

        els.radiosSpeed.forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.speedState = parseInt(e.target.value);
                updatePhysics();
            });
        });

        els.langBtn.addEventListener('click', () => {
            state.lang = state.lang === 'zh' ? 'en' : 'zh';
            updateLanguage();
        });

        // --- 9. Animation Loop ---
        let animOffset = 0;
        let currentVisualV = 0;
        
        function animateLoop() {
            // Target visual velocity depends on lift direction
            let targetV = 0;
            if (state.velDir === 1) targetV = 6; // Lift goes up -> background goes down
            else if (state.velDir === -1) targetV = -6; // Lift goes down -> background goes up
            
            // Smooth transition for visual velocity
            currentVisualV += (targetV - currentVisualV) * 0.1;
            animOffset += currentVisualV;
            
            // Move Grid (Creates the illusion of moving past wall joints)
            const grid = document.getElementById('grid');
            if(grid) grid.setAttribute('patternTransform', `translate(0, ${animOffset % 40})`);
            
            // Move Cable (Animates dashed line to simulate cable pulling/releasing)
            const cable = document.getElementById('lift-cable');
            if(cable) cable.setAttribute('stroke-dashoffset', -animOffset);
            
            requestAnimationFrame(animateLoop);
        }

        // Initialize
        window.onload = () => {
            updateLanguage();
            // Fallback render if MathJax loaded late
            setTimeout(updatePhysics, 500); 
            requestAnimationFrame(animateLoop);
        };

    </script>
</body>
</html>
