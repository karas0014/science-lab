<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫倫定律模擬器 · Coulomb's Law Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Fonts: Serif (CJK titles) · Sans (body) · Mono (technical labels) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           BLUEPRINT SKIN — shared across all Science-Panel simulators
           surface · panels · fonts · technical labels · accent ·
           dark/light theme · zh/en language toggle
           ============================================================ */
        :root{ color-scheme: light dark; --ac:#10b981; }
        body{ font-family:'Noto Sans HK',sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; transition:background-color .3s; }
        .serif-font{ font-family:'Noto Serif HK',serif; }
        .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; }

        /* Graph-paper surface */
        .bp-surface{
            background-color:#eaeef3;
            background-image:
                linear-gradient(rgba(37,99,235,.05) 1px,transparent 1px),
                linear-gradient(90deg,rgba(37,99,235,.05) 1px,transparent 1px),
                linear-gradient(rgba(37,99,235,.10) 1px,transparent 1px),
                linear-gradient(90deg,rgba(37,99,235,.10) 1px,transparent 1px);
            background-size:26px 26px,26px 26px,130px 130px,130px 130px;
        }
        body.dark .bp-surface{
            background-color:#0a1626;
            background-image:
                linear-gradient(rgba(56,189,248,.06) 1px,transparent 1px),
                linear-gradient(90deg,rgba(56,189,248,.06) 1px,transparent 1px),
                linear-gradient(rgba(56,189,248,.11) 1px,transparent 1px),
                linear-gradient(90deg,rgba(56,189,248,.11) 1px,transparent 1px);
            background-size:26px 26px,26px 26px,130px 130px,130px 130px;
        }

        /* Technical-drawing panel */
        .bp-panel{
            position:relative;border:1px solid #c3ccd8;border-radius:3px;
            background:linear-gradient(rgba(255,255,255,.78),rgba(255,255,255,.78));
        }
        body.dark .bp-panel{ border-color:#2c3e57; background:linear-gradient(rgba(13,25,43,.6),rgba(13,25,43,.6)); }

        /* Corner registration ticks */
        .tk{ position:absolute;width:10px;height:10px;color:var(--ac);opacity:.6;pointer-events:none; }
        .tk.tl{ top:6px;left:6px;border-top:1.5px solid;border-left:1.5px solid; }
        .tk.tr{ top:6px;right:6px;border-top:1.5px solid;border-right:1.5px solid; }
        .tk.bl{ bottom:6px;left:6px;border-bottom:1.5px solid;border-left:1.5px solid; }
        .tk.br{ bottom:6px;right:6px;border-bottom:1.5px solid;border-right:1.5px solid; }

        /* Fixed top control bar (back-link + theme + language) */
        .bp-bar{ position:fixed;top:12px;z-index:2147483647;display:inline-flex;align-items:center;gap:8px; }
        .bp-btn{
            display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:6px;
            border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;
            font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;
            text-decoration:none;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
            box-shadow:0 2px 10px rgba(2,6,23,.12);transition:border-color .2s,color .2s;
        }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }

        /* Reading chip */
        .bp-chip{
            font-family:'JetBrains Mono',ui-monospace,monospace;
            border:1px solid #c3ccd8;border-radius:4px;background:rgba(255,255,255,.7);
        }
        body.dark .bp-chip{ border-color:#2c3e57;background:rgba(13,25,43,.5); }

        /* Theme-aware SVG neutrals */
        .svg-grid{ stroke:rgba(37,99,235,.14); }
        body.dark .svg-grid{ stroke:rgba(56,189,248,.16); }
        .svg-dim{ stroke:#64748b; }
        .svg-dim-fill{ fill:#475569; }
        body.dark .svg-dim-fill{ fill:#94a3b8; }

        /* ---- Sliders (blueprint-reskinned, per-charge accents kept) ---- */
        input[type=range]{ -webkit-appearance:none;width:100%;background:transparent; }
        input[type=range]::-webkit-slider-thumb{
            -webkit-appearance:none;height:18px;width:18px;border-radius:3px;background:#fff;
            border:2px solid #64748b;cursor:pointer;margin-top:-7px;box-shadow:0 1px 3px rgba(2,6,23,.35);
        }
        input[type=range]::-webkit-slider-runnable-track{ width:100%;height:4px;cursor:pointer;background:#c3ccd8;border-radius:2px; }
        body.dark input[type=range]::-webkit-slider-runnable-track{ background:#2c3e57; }
        #q1-slider::-webkit-slider-thumb{ border-color:#ef4444; }
        #q1-slider::-webkit-slider-runnable-track{ background:#fecaca; }
        #q2-slider::-webkit-slider-thumb{ border-color:#3b82f6; }
        #q2-slider::-webkit-slider-runnable-track{ background:#bfdbfe; }
        #r-slider::-webkit-slider-thumb{ border-color:#10b981; }
        #r-slider::-webkit-slider-runnable-track{ background:#a7f3d0; }

        .math-font{ font-family:'Times New Roman',Times,serif;font-style:italic; }
    </style>
</head>

    <!-- Blueprint chrome: theme + language (shared pattern) -->
    <script>
        let __isDark = true;
        let __lang = 'zh';
        function applyLang(){
            document.querySelectorAll('.lang-zh').forEach(el=>el.classList.toggle('hidden', __lang!=='zh'));
            document.querySelectorAll('.lang-en').forEach(el=>el.classList.toggle('hidden', __lang!=='en'));
        }
        function toggleTheme(){
            __isDark = !__isDark;
            document.body.classList.toggle('dark', __isDark);
            document.getElementById('theme-ic').innerHTML = `<i data-lucide="${__isDark?'sun':'moon'}" width="16" height="16"></i>`;
            if(window.lucide) lucide.createIcons();
        }
        function toggleLang(){
            __lang = __lang==='zh' ? 'en' : 'zh';
            document.getElementById('lang-label').textContent = __lang==='zh' ? 'EN' : '中';
            applyLang();
        }
    </script>

    <script>
        // 使用 IIFE 來避免全域變數污染
        (function() {
            const K = 8.99e9;
            const CENTER_Y = 200;
            const Q1_X = 150;
            const PIXELS_PER_METER = 55;

            const q1Slider = document.getElementById('q1-slider');
            const q2Slider = document.getElementById('q2-slider');
            const rSlider = document.getElementById('r-slider');
            const q1Display = document.getElementById('q1-display');
            const q2Display = document.getElementById('q2-display');
            const rDisplay = document.getElementById('r-display');
            const q1ValSvg = document.getElementById('q1-val-svg');
            const q2ValSvg = document.getElementById('q2-val-svg');
            const sphereQ1 = document.getElementById('sphere-q1');
            const sphereQ2 = document.getElementById('sphere-q2');
            const forceArrowQ1 = document.getElementById('force-arrow-q1');
            const forceArrowQ2 = document.getElementById('force-arrow-q2');
            const forceLabelQ1 = document.getElementById('force-label-q1');
            const forceLabelQ2 = document.getElementById('force-label-q2');
            const distLine = document.getElementById('dist-line');
            const distTick2 = document.getElementById('dist-tick-2');
            const distText = document.getElementById('dist-text');
            const calcTop = document.getElementById('calc-formula-top');
            const calcBot = document.getElementById('calc-formula-bot');
            const resultForce = document.getElementById('result-force');
            const forceTypeLabel = document.getElementById('force-type-label');

            // Bilingual status text (zh + en spans, applyLang() handles visibility)
            function statusHTML(zh, en, cls){
                return `<span class="lang-zh">狀態: <span class="${cls}">${zh}</span></span>`+
                       `<span class="lang-en hidden">Status: <span class="${cls}">${en}</span></span>`;
            }

            function updateSimulation() {
                const q1_micro = parseFloat(q1Slider.value);
                const q2_micro = parseFloat(q2Slider.value);
                const r_meters = parseFloat(rSlider.value);

                const q1 = q1_micro * 1e-6;
                const q2 = q2_micro * 1e-6;
                const force = (K * Math.abs(q1 * q2)) / (r_meters * r_meters);

                const isRepulsive = (q1_micro * q2_micro) > 0;
                const isNeutral = q1_micro === 0 || q2_micro === 0;

                q1Display.textContent = (q1_micro > 0 ? "+" : "") + q1_micro;
                q2Display.textContent = (q2_micro > 0 ? "+" : "") + q2_micro;
                rDisplay.textContent = r_meters.toFixed(1);
                q1ValSvg.textContent = q1Display.textContent + " µC";
                q2ValSvg.textContent = q2Display.textContent + " µC";

                const currentDistPixels = r_meters * PIXELS_PER_METER;
                const q2_x = Q1_X + currentDistPixels;
                sphereQ2.setAttribute('transform', `translate(${q2_x}, ${CENTER_Y})`);
                distLine.setAttribute('x2', q2_x);
                distTick2.setAttribute('x1', q2_x);
                distTick2.setAttribute('x2', q2_x);
                distText.setAttribute('x', Q1_X + currentDistPixels / 2);
                distText.textContent = `r = ${r_meters.toFixed(1)} m`;

                if (isNeutral) {
                    forceArrowQ1.setAttribute('opacity', 0);
                    forceArrowQ2.setAttribute('opacity', 0);
                    forceLabelQ1.setAttribute('opacity', 0);
                    forceLabelQ2.setAttribute('opacity', 0);
                    forceTypeLabel.innerHTML = statusHTML('無作用力','No Force','text-slate-500 dark:text-slate-400');
                    resultForce.textContent = "0 N";
                } else {
                    forceArrowQ1.setAttribute('opacity', 1);
                    forceArrowQ2.setAttribute('opacity', 1);
                    forceLabelQ1.setAttribute('opacity', 1);
                    forceLabelQ2.setAttribute('opacity', 1);

                    const ARROW_HEAD_PIXELS = 36;
                    let baseArrowLength = 0;
                    if (force > 0) {
                        baseArrowLength = Math.min(150, Math.max(55, force * 2000));
                    }
                    const totalVisualLength = baseArrowLength * 0.7;
                    const rodLength = Math.max(0, totalVisualLength - ARROW_HEAD_PIXELS);

                    if (isRepulsive) {
                        forceArrowQ1.setAttribute('x1', Q1_X - 35);
                        forceArrowQ1.setAttribute('x2', Q1_X - 35 - rodLength);
                        forceLabelQ1.setAttribute('x', Q1_X - 35 - totalVisualLength - 25);
                        forceArrowQ2.setAttribute('x1', q2_x + 35);
                        forceArrowQ2.setAttribute('x2', q2_x + 35 + rodLength);
                        forceLabelQ2.setAttribute('x', q2_x + 35 + totalVisualLength + 25);
                        forceTypeLabel.innerHTML = statusHTML('相斥 (Repulsion)','Repulsion','text-red-600 dark:text-red-400');
                    } else {
                        forceArrowQ1.setAttribute('x1', Q1_X + 35);
                        forceArrowQ1.setAttribute('x2', Q1_X + 35 + rodLength);
                        forceLabelQ1.setAttribute('x', Q1_X + 35 + totalVisualLength + 20);
                        forceArrowQ2.setAttribute('x1', q2_x - 35);
                        forceArrowQ2.setAttribute('x2', q2_x - 35 - rodLength);
                        forceLabelQ2.setAttribute('x', q2_x - 35 - totalVisualLength - 20);
                        forceTypeLabel.innerHTML = statusHTML('相吸 (Attraction)','Attraction','text-purple-600 dark:text-purple-400');
                    }

                    if(force >= 1000) {
                        resultForce.textContent = (force).toExponential(2) + " N";
                    } else if (force < 0.001) {
                        resultForce.textContent = (force).toExponential(2) + " N";
                    } else {
                        resultForce.textContent = force.toFixed(4) + " N";
                    }
                }

                const q1Text = Math.abs(q1_micro);
                const q2Text = Math.abs(q2_micro);
                calcTop.innerHTML = `<span class="text-red-700 dark:text-red-400">|${q1Text}|</span> × <span class="text-blue-700 dark:text-blue-400">|${q2Text}|</span> × 10<sup>-12</sup>`;
                calcBot.innerHTML = `(${r_meters.toFixed(1)})<sup>2</sup>`;

                const opacity1 = 0.3 + (Math.abs(q1_micro) / 10) * 0.7;
                const opacity2 = 0.3 + (Math.abs(q2_micro) / 10) * 0.7;
                sphereQ1.querySelector('circle').setAttribute('fill-opacity', opacity1);
                sphereQ2.querySelector('circle').setAttribute('fill-opacity', opacity2);

                applyLang(); // keep JS-injected status in the active language
            }

            q1Slider.addEventListener('input', updateSimulation);
            q2Slider.addEventListener('input', updateSimulation);
            rSlider.addEventListener('input', updateSimulation);

            updateSimulation();
            if(window.lucide) lucide.createIcons();
        })();
    </script>
</body>
</html>
