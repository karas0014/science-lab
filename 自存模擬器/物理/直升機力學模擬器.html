<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直升機力學模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{ --ac:#10b981; }
        body{ font-family:'Noto Sans HK',sans-serif; }
        .bp-btn{
            position:fixed;z-index:2147483647;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:6px;
            border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;
            font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;
            text-decoration:none;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
            box-shadow:0 2px 10px rgba(2,6,23,.12);transition:border-color .2s,color .2s;
        }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }
    </style>
</head>
<body class="dark m-0 p-0 overflow-hidden text-slate-800 dark:text-slate-200">
<a href="../../physics.html" class="bp-btn" style="top:12px;left:12px" aria-label="返回索引 / Back to index">
    <i data-lucide="home" width="15" height="15"></i><span>INDEX</span>
</a>
<button onclick="toggleTheme()" class="bp-btn" style="top:12px;left:118px" title="切換深淺色模式 / Toggle theme" aria-label="切換深淺色模式">
    <span id="theme-ic"><i data-lucide="sun" width="16" height="16"></i></span>
</button>
<script>
    function toggleTheme(){
        const dark = !document.body.classList.contains('dark');
        document.body.classList.toggle('dark', dark);
        document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="16" height="16"></i>`;
        if(window.lucide) lucide.createIcons();
    }
</script>
    <div class="h-screen w-full bg-slate-50 dark:bg-[#0a1626] flex flex-col md:flex-row">

                    </div>
                    <div class="absolute top-0 bottom-0 w-[800px]" style="left: 0px">
                        <div class="absolute top-10 left-[10%] w-32 h-32 bg-white/40 rounded-full blur-sm"></div>
                        <div class="absolute top-40 left-[60%] w-24 h-24 bg-white/30 rounded-full blur-sm"></div>
                        <div class="absolute bottom-32 left-[30%] w-40 h-40 bg-white/40 rounded-full blur-sm"></div>
                        <div class="absolute bottom-20 left-[80%] w-20 h-20 bg-white/50 rounded-full blur-sm"></div>
                    </div>
                    <div class="absolute top-0 bottom-0 w-[800px]" style="left: 800px">
                        <div class="absolute top-10 left-[10%] w-32 h-32 bg-white/40 rounded-full blur-sm"></div>
                        <div class="absolute top-40 left-[60%] w-24 h-24 bg-white/30 rounded-full blur-sm"></div>
                        <div class="absolute bottom-32 left-[30%] w-40 h-40 bg-white/40 rounded-full blur-sm"></div>
                        <div class="absolute bottom-20 left-[80%] w-20 h-20 bg-white/50 rounded-full blur-sm"></div>

                </div>

                <div class="p-4 md:p-8 pt-0 flex-1 min-h-0 flex flex-col">

                        <svg width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" class="overflow-visible max-h-full">

                            <polygon points="392,505 408,505 400,525" fill="#ef4444" />

                                <polygon id="fbd-Ly-head" fill="#f97316" />
                                <text id="fbd-Ly-text" x="420" fill="#f97316" font-weight="bold" dominant-baseline="middle" class="font-serif italic text-2xl">L<tspan dy="6" font-size="16" class="not-italic">y</tspan></text>

    <!-- 核心 JS 邏輯 (完全使用 Vanilla JS，零相依套件) -->
    <script>
        // === State Management ===
        let state = {
            lang: 'zh',
            theta: 15,
            lift: 10156,
            isLocked: true,
            showVectors: true,
            showFBD: false,
            resolveL: false
        };

        // === Physics Constants ===
        const M = 1000;
        const g = 9.81;
        const W = M * g;

        // === Dictionary ===
        const i18n = {
            zh: {
                title: "直升機力學模擬器",
                subtitle: "HKDSE 物理 - 力與運動",
                angle: "傾斜夾角 (θ)",
                liftForce: "升力 (L)",
                lockHorizontal: "鎖定水平飛行 (<span class='font-serif italic text-sm'>a<sub>y</sub> = 0</span>)",
                showVectors: "顯示受力向量",
                fbdBtn: "獨立顯示隔離體圖 (FBD)",
                calcPanel: "實時運算面板",
                vertical: "垂直受力平衡",
                horizontal: "水平淨力",
                fbdTitle: "隔離體圖 (FBD)",
                fbdDesc: "將物體簡化為點質量進行受力分析",
                resolveL: "顯示升力分解 (Resolve L)",
                note: "注意：在 DSE 理想化模型中，若題目未提及空氣阻力，通常將其忽略。"
            },
            en: {
                title: "Helicopter Mechanics Simulator",
                subtitle: "HKDSE Physics - Force and Motion",
                angle: "Tilt Angle (θ)",
                liftForce: "Lift (L)",
                lockHorizontal: "Lock Horizontal (<span class='font-serif italic text-sm'>a<sub>y</sub> = 0</span>)",
                showVectors: "Show Force Vectors",
                fbdBtn: "Show Free Body Diagram (FBD)",
                calcPanel: "Real-time Calculation Panel",
                vertical: "Vertical Equilibrium",
                horizontal: "Horizontal Net Force",
                fbdTitle: "Free Body Diagram (FBD)",
                fbdDesc: "Simplifying the object as a point mass for force analysis",
                resolveL: "Resolve Lift (Resolve L)",
                note: "Note: In DSE idealized models, air resistance is usually ignored unless stated."
            }
        };

        // 全域變數用於動畫
        let globalAx = 0;

        // === Update UI Engine ===
        function updateUI() {
            const rad = (state.theta * Math.PI) / 180;
            
            // Auto Calculate Lift if Locked
            if (state.isLocked) {
                state.lift = W / Math.cos(rad);
            }
            
            const Ly = state.lift * Math.cos(rad);
            const Lx = state.lift * Math.sin(rad);
            const netForceY = Ly - W;
            const netForceX = Lx;
            
            const ay = netForceY / M;
            const ax = netForceX / M;
            globalAx = ax; // Update global for animation

            // Update Dictionary Texts
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[state.lang][key]) el.innerHTML = i18n[state.lang][key];
            });

            // Update Language Buttons Styling
            document.getElementById('btn-zh').className = `px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${state.lang === 'zh' ? 'bg-blue-100 text-blue-600' : 'text-slate-500 hover:text-slate-700'}`;
            document.getElementById('btn-en').className = `px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${state.lang === 'en' ? 'bg-blue-100 text-blue-600' : 'text-slate-500 hover:text-slate-700'}`;

            // Update Helicopter Rotation
            document.getElementById('heli-rotation').style.transform = `rotate(${-state.theta}deg)`;

            // Update Vectors in Main Screen
            const vecContainer = document.getElementById('vectors-container');
            if (state.showVectors) {
                vecContainer.style.display = 'block';
                const lLength = 110;
                const lx = 150 - lLength * Math.sin(rad);
                const ly = 150 - lLength * Math.cos(rad);
                
                document.getElementById('vec-L-line').setAttribute('x2', lx);
                document.getElementById('vec-L-line').setAttribute('y2', ly);
                document.getElementById('vec-L-head').style.transform = `translate(${lx}px, ${ly}px) rotate(${-state.theta}deg)`;
                document.getElementById('vec-L-text').setAttribute('x', lx - 15);
                document.getElementById('vec-L-text').setAttribute('y', ly - 10);
            } else {
                vecContainer.style.display = 'none';
            }

            // Update Input Values
            document.getElementById('val-theta').innerText = `${state.theta.toFixed(0)}°`;
            document.getElementById('input-theta').value = state.theta;

            document.getElementById('val-lift').innerText = `${state.lift.toFixed(0)} N`;
            const inputLift = document.getElementById('input-lift');
            inputLift.value = state.lift;
            inputLift.disabled = state.isLocked;
            inputLift.className = `w-full h-2 rounded-lg appearance-none ${state.isLocked ? 'bg-slate-100 accent-emerald-300 cursor-not-allowed' : 'bg-slate-200 accent-emerald-500 cursor-pointer'}`;

            // Update Toggle Switches
            syncToggleUI('toggle-lock', state.isLocked);
            syncToggleUI('toggle-vectors', state.showVectors);
            syncToggleUI('toggle-resolve', state.resolveL);

            // Update Real-time Calc Panel
            document.getElementById('calc-eq-y').innerHTML = `${state.lift.toFixed(0)} cos(${state.theta}°) - 9810 = 1000 <span class="font-serif italic">a<sub>y</sub></span>`;
            document.getElementById('calc-res-y').innerHTML = `<span class="font-serif italic">a<sub>y</sub></span> = <strong class="text-white">${ay.toFixed(2)}</strong> m s⁻²`;
            
            document.getElementById('calc-eq-x').innerHTML = `${state.lift.toFixed(0)} sin(${state.theta}°) = 1000 <span class="font-serif italic">a<sub>x</sub></span>`;
            document.getElementById('calc-res-x').innerHTML = `<span class="font-serif italic">a<sub>x</sub></span> = <strong class="text-white">${Math.abs(ax).toFixed(2)}</strong> m s⁻²`;

            // Update Legends
            document.getElementById('legend-L').innerHTML = `<span class="font-serif italic font-bold">L</span>: ${state.lang === 'zh' ? '升力' : 'Lift'}`;
            document.getElementById('legend-W').innerHTML = `<span class="font-serif italic font-bold">mg</span>: ${state.lang === 'zh' ? '重量' : 'Weight'}`;
            document.getElementById('legend-A').innerHTML = `<span class="font-serif italic font-bold">a</span>: ${state.lang === 'zh' ? '加速度' : 'Acceleration'}`;

            // Update FBD Modal
            const fbdModal = document.getElementById('fbd-modal');
            if (state.showFBD) {
                fbdModal.classList.remove('hidden');
                fbdModal.classList.add('flex');

                const fbdLLength = 240;
                const fbdLx = 400 - fbdLLength * Math.sin(rad);
                const fbdLy = 300 - fbdLLength * Math.cos(rad);

                document.getElementById('fbd-L-line').setAttribute('x2', fbdLx);
                document.getElementById('fbd-L-line').setAttribute('y2', fbdLy);
                document.getElementById('fbd-L-head').style.transform = `translate(${fbdLx}px, ${fbdLy}px) rotate(${-state.theta}deg)`;
                document.getElementById('fbd-L-text').setAttribute('x', fbdLx - 25);
                document.getElementById('fbd-L-text').setAttribute('y', fbdLy - 20);

                // Angle Arc
                const arcGroup = document.getElementById('fbd-arc-group');
                if (state.theta > 0) {
                    arcGroup.style.display = 'block';
                    document.getElementById('fbd-arc-path').setAttribute('d', `M 400 200 A 100 100 0 0 0 ${400 - 100 * Math.sin(rad)} ${300 - 100 * Math.cos(rad)}`);
                    document.getElementById('fbd-arc-text').setAttribute('x', 400 - 125 * Math.sin(rad/2));
                    document.getElementById('fbd-arc-text').setAttribute('y', 300 - 125 * Math.cos(rad/2));
                } else {
                    arcGroup.style.display = 'none';
                }

                // Accel Vector
                const accGroup = document.getElementById('fbd-acc-group');
                if (state.theta > 0) {
                    accGroup.style.display = 'block';
                    accGroup.style.transform = `translate(${fbdLx - 120}px, 180px)`;
                } else {
                    accGroup.style.display = 'none';
                }

                // Resolve Components
                const resolveGroup = document.getElementById('fbd-resolve-group');
                if (state.resolveL && state.theta > 0) {
                    resolveGroup.style.display = 'block';
                    // Projections
                    const pY = document.getElementById('fbd-proj-y');
                    pY.setAttribute('x1', fbdLx); pY.setAttribute('y1', 300); pY.setAttribute('x2', fbdLx); pY.setAttribute('y2', fbdLy);
                    
                    const pX = document.getElementById('fbd-proj-x');
                    pX.setAttribute('x1', 400); pX.setAttribute('y1', fbdLy); pX.setAttribute('x2', fbdLx); pX.setAttribute('y2', fbdLy);

                    // Vectors Ly
                    document.getElementById('fbd-Ly-line').setAttribute('x1', 400);
                    document.getElementById('fbd-Ly-line').setAttribute('y1', 300);
                    document.getElementById('fbd-Ly-line').setAttribute('x2', 400);
                    document.getElementById('fbd-Ly-line').setAttribute('y2', fbdLy + 18);
                    document.getElementById('fbd-Ly-head').setAttribute('points', `392,${fbdLy + 20} 408,${fbdLy + 20} 400,${fbdLy}`);
                    document.getElementById('fbd-Ly-text').setAttribute('y', (300 + fbdLy) / 2);

                    // Vectors Lx
                    document.getElementById('fbd-Lx-line').setAttribute('x1', 400);
                    document.getElementById('fbd-Lx-line').setAttribute('y1', 300);
                    document.getElementById('fbd-Lx-line').setAttribute('x2', fbdLx + 18);
                    document.getElementById('fbd-Lx-line').setAttribute('y2', 300);
                    document.getElementById('fbd-Lx-head').setAttribute('points', `${fbdLx + 20},292 ${fbdLx + 20},308 ${fbdLx},300`);
                    document.getElementById('fbd-Lx-text').setAttribute('x', (400 + fbdLx) / 2);
                    document.getElementById('fbd-Lx-text').setAttribute('y', 340);
                } else {
                    resolveGroup.style.display = 'none';
                }

            } else {
                fbdModal.classList.add('hidden');
                fbdModal.classList.remove('flex');
            }
        }

        // Helper function for Toggle Switches
        function syncToggleUI(id, isChecked) {
            const btn = document.getElementById(id);
            const knob = document.getElementById(`${id}-knob`);
            if (isChecked) {
                btn.classList.remove('bg-slate-300'); btn.classList.add('bg-blue-600');
                knob.classList.remove('translate-x-0'); knob.classList.add('translate-x-5');
                btn.setAttribute('aria-checked', 'true');
            } else {
                btn.classList.remove('bg-blue-600'); btn.classList.add('bg-slate-300');
                knob.classList.remove('translate-x-5'); knob.classList.add('translate-x-0');
                btn.setAttribute('aria-checked', 'false');
            }
        }

        // === Event Listeners Setup ===
        document.getElementById('btn-zh').addEventListener('click', () => { state.lang = 'zh'; updateUI(); });
        document.getElementById('btn-en').addEventListener('click', () => { state.lang = 'en'; updateUI(); });
        
        document.getElementById('input-theta').addEventListener('input', (e) => { state.theta = Number(e.target.value); updateUI(); });
        document.getElementById('input-lift').addEventListener('input', (e) => { 
            if(!state.isLocked) { state.lift = Number(e.target.value); updateUI(); } 
        });

        document.getElementById('toggle-lock').addEventListener('click', () => { state.isLocked = !state.isLocked; updateUI(); });
        document.getElementById('toggle-vectors').addEventListener('click', () => { state.showVectors = !state.showVectors; updateUI(); });
        document.getElementById('toggle-resolve').addEventListener('click', () => { state.resolveL = !state.resolveL; updateUI(); });
        
        document.getElementById('btn-fbd').addEventListener('click', () => { state.showFBD = true; updateUI(); });
        document.getElementById('btn-close-fbd').addEventListener('click', () => { state.showFBD = false; updateUI(); });

        // === Cloud Parallax Animation Loop ===
        let bgOffset = 0;
        let vel = 0;
        let lastTime = performance.now();
        const cloudsLayer = document.getElementById('clouds-layer');

        function animate(time) {
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            vel += globalAx * dt;
            vel *= 0.99; // Air friction damping
            bgOffset += vel * dt * 40;

            if (bgOffset > 800) bgOffset -= 800;
            if (bgOffset < 0) bgOffset += 800;

            cloudsLayer.style.transform = `translateX(${bgOffset}px)`;
            requestAnimationFrame(animate);
        }

        // Initialize App
        updateUI();
        requestAnimationFrame(animate);
        if(window.lucide) lucide.createIcons();

    </script>
</body>
</html>
