<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSE Physics: Two-Source Interference Simulator</title>

    

    <!-- Three.js CDN (Essential for 3D View) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a; /* Slate 900 */
            --bg-panel: #1e293b; /* Slate 800 */
            --text-primary: #e2e8f0; /* Slate 200 */
            --text-secondary: #94a3b8; /* Slate 400 */
            --accent: #38bdf8; /* Sky 400 */
            --accent-hover: #0ea5e9; /* Sky 500 */
            --border: #334155; /* Slate 700 */
            --danger: #f43f5e; /* Rose 500 */
            --success: #22c55e; /* Green 500 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden; /* Prevent body scroll */
            height: 100vh;
            width: 100vw;
        }

        /* Physics Math Font */
        .math-var {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
        }

        #root {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Layout */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0;
            line-height: 1.4;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-value {
            font-family: 'Courier New', monospace;
            color: var(--accent);
        }

        /* Custom Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border);
            border-radius: 2px;
        }

        /* iOS Toggle - Fixed */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 4px 0;
        }

        .toggle-label {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 32px;
            flex-shrink: 0;
        }

        .toggle-checkbox { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-switch {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: .4s;
            border-radius: 34px;
        }

        .toggle-switch:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .toggle-checkbox:checked + .toggle-switch {
            background-color: var(--accent); /* Blue */
        }

        .toggle-checkbox:checked + .toggle-switch:before {
            transform: translateX(20px);
        }
        
        .toggle-checkbox:checked + .toggle-switch.blue-switch {
            background-color: var(--accent);
        }

        /* Lang Switch Container - Top Left */
        .lang-container-top {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .lang-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 20px; 
            height: 36px;
            padding: 0 12px;
            width: fit-content;
        }

        .lang-label {
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        /* Play/Pause Button - Professional Minimalist Design */
        .btn-pause-container {
            display: flex;
            justify-content: center;
            margin-top: 32px; /* Spacing from controls */
            padding-bottom: 10px;
        }

        .btn-pause-control {
            width: 64px;
            height: 64px;
            
            /* Transparent bg with accent border to match the theme */
            background: rgba(56, 189, 248, 0.1); 
            border: 2px solid var(--accent); 
            color: var(--accent);
            
            border-radius: 50%;
            cursor: pointer;
            
            display: flex;
            align-items: center;
            justify-content: center;
            
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* Soft shadow */
        }
        
        .btn-pause-control svg {
            fill: currentColor;
            display: block; /* Removes inline spacing issues */
        }
        
        /* Hover: Glow effect */
        .btn-pause-control:hover {
            background: rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); /* Blue glow */
            transform: scale(1.05);
        }

        /* Active: Slightly pressed look */
        .btn-pause-control:active {
            transform: scale(0.95);
            background: rgba(56, 189, 248, 0.3);
        }
        
        /* Main Viewport */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #000;
        }

        .view-panel {
            position: relative;
            width: 100%;
            border-bottom: 1px solid var(--border);
        }

        #view-3d {
            height: 55%;
            width: 100%;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        #view-2d {
            height: 45%;
            width: 100%;
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        .panel-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            pointer-events: none;
            z-index: 5;
            border: 1px solid var(--border);
        }

        /* Legend for View 2 */
        .legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .line-swatch { width: 20px; height: 2px; }
        .swatch-red { background: #f43f5e; }
        .swatch-grey { background: #64748b; border-bottom: 1px dashed #64748b; height: 0; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                max-height: 280px; 
                padding: 15px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-header { border-bottom: none; padding-bottom: 0; }
            .title { font-size: 1.1rem; }
            .control-group { gap: 4px; margin-bottom: 8px; }
            #view-3d { height: 50%; }
            #view-2d { height: 50%; }
        }
    </style>
</head>

    <div id="root">
        <div class="app-container">
            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Lang Switch -->
                <div class="lang-container-top">
                    <div class="lang-control">
                        <span class="lang-label" id="lang-zh-btn">中</span>
                        <label class="toggle-label" style="transform: scale(0.7)">

        </div>

    <!-- Vanilla JavaScript Implementation -->
    <script>
        // --- 1. State Management & Constants ---
        const PI = Math.PI;

        const DICT = {
            en: {
                title: "Water Wave Interference",
                subtitle: "Two Coherent Sources (HKDSE Physics)",
                separation: "Separation",
                wavelength: "Wavelength",
                lines: "Show Nodal/Antinodal Lines",
                view1: "3D View (Upward Propagation)",
                view2: "Top-Down View (Interference Pattern)",
                node: "Nodal Line (Destructive)",
                antinode: "Antinodal Line (Constructive)",
                pause: "Pause",
                play: "Play"
            },
            zh: {
                title: "水波干涉現象",
                subtitle: "雙相干波源 (HKDSE 物理)",
                separation: "波源距離",
                wavelength: "波長",
                lines: "顯示節線及腹線",
                view1: "3D 模型 (向上傳播)",
                view2: "俯視圖 (干涉圖樣)",
                node: "節線 (相消干涉)",
                antinode: "腹線 (相長干涉)",
                pause: "暫停",
                play: "播放"
            }
        };

        const state = {
            lang: 'zh',
            isPaused: false,
            params: {
                separation: 4.0,
                wavelength: 1.5,
                showLines: true
            }
        };

        // --- 2. DOM Elements Mapping ---
        const elements = {
            langZhBtn: document.getElementById('lang-zh-btn'),
            langEnBtn: document.getElementById('lang-en-btn'),
            langCheckbox: document.getElementById('lang-toggle-checkbox'),
            textTitle: document.getElementById('text-title'),
            textSubtitle: document.getElementById('text-subtitle'),
            textSeparation: document.getElementById('text-separation'),
            textWavelength: document.getElementById('text-wavelength'),
            textLines: document.getElementById('text-lines'),
            textView2: document.getElementById('text-view2'),
            textNode: document.getElementById('text-node'),
            textAntinode: document.getElementById('text-antinode'),
            valSeparation: document.getElementById('val-separation'),
            valWavelength: document.getElementById('val-wavelength'),
            sliderSeparation: document.getElementById('slider-separation'),
            sliderWavelength: document.getElementById('slider-wavelength'),
            checkboxLines: document.getElementById('checkbox-lines'),
            btnPlayPause: document.getElementById('btn-play-pause'),
            iconPlay: document.getElementById('icon-play'),
            iconPause: document.getElementById('icon-pause'),
            legendBox: document.getElementById('legend-box')
        };

        // --- 3. UI Update Logic ---
        function updateLocalization() {
            const t = DICT[state.lang];
            
            // Texts
            elements.textTitle.textContent = t.title;
            elements.textSubtitle.textContent = t.subtitle;
            elements.textSeparation.textContent = t.separation;
            elements.textWavelength.textContent = t.wavelength;
            elements.textLines.textContent = t.lines;
            elements.textView2.textContent = t.view2;
            elements.textNode.textContent = t.node;
            elements.textAntinode.textContent = t.antinode;
            elements.btnPlayPause.title = state.isPaused ? t.play : t.pause;

            // Language Switcher Styles
            elements.langZhBtn.style.color = state.lang === 'zh' ? 'var(--accent)' : 'var(--text-secondary)';
            elements.langEnBtn.style.color = state.lang === 'en' ? 'var(--accent)' : 'var(--text-secondary)';
            elements.langCheckbox.checked = state.lang === 'en';
        }

        function updateValues() {
            elements.valSeparation.textContent = state.params.separation.toFixed(1) + ' cm';
            elements.valWavelength.textContent = state.params.wavelength.toFixed(1) + ' cm';
            elements.legendBox.style.display = state.params.showLines ? 'flex' : 'none';
        }

        function togglePlayPause() {
            state.isPaused = !state.isPaused;
            if (state.isPaused) {
                elements.btnPlayPause.classList.add('active');
                elements.iconPlay.style.display = 'block';
                elements.iconPause.style.display = 'none';
            } else {
                elements.btnPlayPause.classList.remove('active');
                elements.iconPlay.style.display = 'none';
                elements.iconPause.style.display = 'block';
            }
            elements.btnPlayPause.title = state.isPaused ? DICT[state.lang].play : DICT[state.lang].pause;
        }

        function setLanguage(langCode) {
            state.lang = langCode;
            updateLocalization();
        }

        // --- 4. Event Listeners ---
        elements.langZhBtn.addEventListener('click', () => setLanguage('zh'));
        elements.langEnBtn.addEventListener('click', () => setLanguage('en'));
        elements.langCheckbox.addEventListener('change', (e) => setLanguage(e.target.checked ? 'en' : 'zh'));
        
        elements.sliderSeparation.addEventListener('input', (e) => {
            state.params.separation = parseFloat(e.target.value);
            updateValues();
        });

        elements.sliderWavelength.addEventListener('input', (e) => {
            state.params.wavelength = parseFloat(e.target.value);
            updateValues();
        });

        elements.checkboxLines.addEventListener('change', (e) => {
            state.params.showLines = e.target.checked;
            updateValues();
        });

        elements.btnPlayPause.addEventListener('click', togglePlayPause);

        // --- 5. Three.js 3D View ---
        function init3D() {
            const mount = document.getElementById('view-3d');
            let width = mount.clientWidth;
            let height = mount.clientHeight;
            const sourceY = -12.0;
            let time = 0;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 200);
            camera.position.set(0, -28, 28); 
            camera.lookAt(0, 5, 0); 

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            mount.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(0, -10, 20);
            scene.add(dirLight);

            const vertexShader = `
                uniform float uTime;
                uniform float uSep;
                uniform float uLambda;
                uniform float uSourceY;
                varying float vElevation;
                varying vec2 vUv;
                varying vec3 vPos;
                const float PI = 3.14159265359;
                void main() {
                    vUv = uv; 
                    vec3 pos = position; 
                    vPos = position;
                    
                    vec3 s1 = vec3(-uSep/2.0, uSourceY, 0.0);
                    vec3 s2 = vec3(uSep/2.0, uSourceY, 0.0);
                    
                    float d1 = distance(pos, s1);
                    float d2 = distance(pos, s2);
                    
                    float k = 2.0 * PI / uLambda;
                    float omega = 5.0;
                    
                    float att1 = 1.0 / (1.0 + d1 * 0.15);
                    float att2 = 1.0 / (1.0 + d2 * 0.15);
                    
                    float amp1 = sin(k * d1 - uTime * omega) * att1;
                    float amp2 = sin(k * d2 - uTime * omega) * att2;
                    
                    float totalWave = amp1 + amp2;
                    
                    if (pos.y < uSourceY) {
                        totalWave = 0.0;
                    }
                    
                    pos.z = totalWave * 0.6; 
                    vElevation = totalWave;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `;

            const fragmentShader = `
                uniform bool uShowLines;
                uniform float uSep;
                uniform float uLambda;
                uniform float uSourceY;
                varying float vElevation;
                varying vec3 vPos;
                void main() {
                    vec3 waterDeep = vec3(0.05, 0.2, 0.4);
                    vec3 waterHigh = vec3(0.2, 0.6, 1.0);
                    
                    vec3 color = mix(waterDeep, waterHigh, smoothstep(-0.5, 0.5, vElevation));
                    
                    float peak = smoothstep(0.4, 0.6, vElevation);
                    color = mix(color, vec3(1.0), peak * 0.5);
                    
                    if (uShowLines) {
                        float d1 = distance(vPos, vec3(-uSep/2.0, uSourceY, 0.0));
                        float d2 = distance(vPos, vec3(uSep/2.0, uSourceY, 0.0));
                        float pathDiff = abs(d1 - d2);
                        float n = pathDiff / uLambda;
                        float distToAntinode = abs(n - round(n));
                        float distToNode = abs(n - (floor(n) + 0.5));
                        
                        if (vPos.y > uSourceY) {
                            if (distToAntinode < 0.04) {
                                color = mix(color, vec3(1.0, 0.2, 0.2), 0.7); 
                            }
                            if (distToNode < 0.04) {
                                color = mix(color, vec3(0.1, 0.1, 0.1), 0.7);
                            }
                        }
                    }
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            const material = new THREE.ShaderMaterial({
                vertexShader, fragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uSep: { value: state.params.separation },
                    uLambda: { value: state.params.wavelength },
                    uSourceY: { value: sourceY },
                    uShowLines: { value: state.params.showLines }
                },
                side: THREE.DoubleSide
            });

            const plane = new THREE.Mesh(new THREE.PlaneGeometry(60, 60, 400, 400), material);
            scene.add(plane);

            const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const s1 = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            const s2 = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            scene.add(s1); scene.add(s2);

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                if (!state.isPaused) {
                    time += dt;
                    material.uniforms.uTime.value = time;
                }
                
                // Sync properties
                material.uniforms.uSep.value = state.params.separation;
                material.uniforms.uLambda.value = state.params.wavelength;
                material.uniforms.uShowLines.value = state.params.showLines;
                
                s1.position.set(-state.params.separation / 2, sourceY, 0.2);
                s2.position.set(state.params.separation / 2, sourceY, 0.2);

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                if (!mount) return;
                width = mount.clientWidth;
                height = mount.clientHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });
        }

        // --- 6. Canvas 2D View ---
        function init2D() {
            const canvas = document.getElementById('canvas-2d');
            const ctx = canvas.getContext('2d');
            let time = 0;
            let lastTime = Date.now();

            function resizeCanvas() {
                const parent = canvas.parentElement;
                canvas.width = parent.clientWidth;
                canvas.height = parent.clientHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function draw() {
                requestAnimationFrame(draw);
                const now = Date.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;

                if (!state.isPaused) {
                    time += dt;
                }

                const width = canvas.width;
                const height = canvas.height;
                
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, width, height);
                
                const scale = 25; // px per cm
                const sourceY = height - 30; // 30px from bottom
                const s1x = width/2 - (state.params.separation/2 * scale);
                const s2x = width/2 + (state.params.separation/2 * scale);
                
                ctx.lineWidth = 2;
                const maxRadius = Math.sqrt(width*width + height*height);
                const lambdaPx = state.params.wavelength * scale;
                const rOffset = (time * 5 / (2*PI)) * lambdaPx; 
                
                const numRings = Math.ceil(maxRadius / lambdaPx) + 2;
                
                const drawRings = (sx, sy) => {
                    for(let i=0; i<numRings; i++) {
                        let r = (i * lambdaPx) + (rOffset % lambdaPx);
                        if (r < 0) continue;
                        const alpha = Math.max(0, 1 - r/(maxRadius*0.8));
                        ctx.strokeStyle = `rgba(56, 189, 248, ${alpha})`; 
                        ctx.beginPath();
                        ctx.arc(sx, sy, r, 0, 2*PI);
                        ctx.stroke();
                    }
                };
                
                drawRings(s1x, sourceY);
                drawRings(s2x, sourceY);
                
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(s1x, sourceY, 6, 0, 2*PI);
                ctx.arc(s2x, sourceY, 6, 0, 2*PI);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'italic 16px Times New Roman';
                ctx.fillText("S", s1x - 32, sourceY + 5);
                ctx.font = '10px Arial';
                ctx.fillText("1", s1x - 24, sourceY + 9);

                ctx.font = 'italic 16px Times New Roman';
                ctx.fillText("S", s2x + 12, sourceY + 5);
                ctx.font = '10px Arial';
                ctx.fillText("2", s2x + 20, sourceY + 9);

                if (state.params.showLines) {
                    const midX = width / 2;
                    const dPx = state.params.separation * scale;
                    const maxN = Math.floor(state.params.separation / state.params.wavelength);
                    
                    // Antinodal (Red)
                    ctx.strokeStyle = '#f43f5e'; 
                    ctx.lineWidth = 2;
                    
                    for (let n = 0; n <= maxN; n++) {
                        [n, -n].forEach(order => {
                            if (order === 0 && n !== 0) return; 
                            const K = order * state.params.wavelength * scale;
                            
                            if (K === 0) {
                                ctx.beginPath();
                                ctx.moveTo(midX, sourceY);
                                ctx.lineTo(midX, 0);
                                ctx.stroke();
                                return;
                            }

                            const a = Math.abs(K) / 2;
                            const c = dPx / 2;
                            if (a >= c) return;
                            const b = Math.sqrt(c*c - a*a);
                            
                            ctx.beginPath();
                            for(let v=0; v<3.0; v+=0.05) {
                                let x_mod = a * Math.cosh(v);
                                let y_mod = b * Math.sinh(v);
                                let plotX = midX + x_mod * Math.sign(order);
                                let plotY = sourceY - y_mod; 
                                
                                if (v===0) ctx.moveTo(plotX, plotY);
                                else ctx.lineTo(plotX, plotY);
                            }
                            ctx.stroke();
                        });
                    }

                    // Nodal (Grey)
                    ctx.strokeStyle = '#64748b'; 
                    ctx.setLineDash([5, 5]);
                    for (let n = 0; n <= maxN; n++) {
                        const val = n + 0.5;
                        [val, -val].forEach(order => {
                            const K = order * state.params.wavelength * scale;
                            const a = Math.abs(K) / 2;
                            const c = dPx / 2;
                            if (a >= c) return;
                            const b = Math.sqrt(c*c - a*a);
                            
                            ctx.beginPath();
                            for(let v=0; v<3.5; v+=0.05) {
                                let x_mod = a * Math.cosh(v);
                                let y_mod = b * Math.sinh(v);
                                let plotX = midX + x_mod * Math.sign(order);
                                let plotY = sourceY - y_mod;
                                
                                if (v===0) ctx.moveTo(plotX, plotY);
                                else ctx.lineTo(plotX, plotY);
                            }
                            ctx.stroke();
                        });
                    }
                    ctx.setLineDash([]);
                }
            }
            draw();
        }

        // --- 7. Initialization ---
        window.onload = function() {
            updateLocalization();
            updateValues();
            init3D();
            init2D();
        };

    </script>
</body>
