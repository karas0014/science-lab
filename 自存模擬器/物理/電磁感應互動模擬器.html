<!DOCTYPE html>
<html lang="zh-HK" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faraday's & Lenz's Law Simulator | 電磁感應模擬器</title>
    
    <!-- Google Tag -->

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root{ --ac:#10b981; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Noto Sans HK', sans-serif; }
        .serif-font{ font-family:'Noto Serif HK',serif; }
        .bp-btn{
            position:fixed;z-index:2147483647;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:6px;
            border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;
            font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;
            text-decoration:none;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
            box-shadow:0 2px 10px rgba(2,6,23,.12);transition:border-color .2s,color .2s;
        }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        html.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        html.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .math-var { font-family: 'Times New Roman', Times, serif; font-style: italic; }
        .panel-transition { transition: height 0.3s ease, opacity 0.3s ease; }
        
        /* 讓被 resize 的視窗右下角出現明顯的拖拉游標 */
        .resizable-panel { resize: both; overflow: auto; }
        .resizable-panel::-webkit-resizer { background-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 w-screen h-screen">
<a href="../../physics.html" class="bp-btn" style="bottom:12px;left:12px" aria-label="返回索引 / Back to index">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>INDEX</span>
</a>
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- SVG Icons ---
        const IconSun = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const IconGear = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="transform hover:rotate-90 transition-transform duration-300"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="transform hover:scale-110 transition-transform duration-300"><polyline points="3 3 3 21 21 21"></polyline><polyline points="3 14 8 9 13 14 21 5"></polyline></svg>;
        const IconMinimize = ({ collapsed }) => collapsed ? <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> : <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconPause = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;

        // --- MathJax Component ---
        const MathText = ({ content, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.MathJax && window.MathJax.typesetPromise) {
                    containerRef.current.innerHTML = content;
                    window.MathJax.typesetPromise([containerRef.current]).catch((err) => console.error(err));
                }
            }, [content]);
            return <span ref={containerRef} className={className} dangerouslySetInnerHTML={{ __html: content }} />;
        };

        // --- Draggable Panel Hook ---
        const useDraggable = (initialPos) => {
            const [pos, setPos] = useState(initialPos);
            const [isDragging, setIsDragging] = useState(false);
            const dragRef = useRef({ startX: 0, startY: 0, initX: 0, initY: 0 });

            const onPointerDown = (e) => {
                if (e.target.closest('.no-drag')) return;
                setIsDragging(true);
                dragRef.current = { startX: e.clientX, startY: e.clientY, initX: pos.x, initY: pos.y };
                e.target.setPointerCapture(e.pointerId);
            };

            const onPointerMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragRef.current.startX;
                const dy = e.clientY - dragRef.current.startY;
                setPos({ x: dragRef.current.initX + dx, y: dragRef.current.initY + dy });
            };

            const onPointerUp = (e) => {
                setIsDragging(false);
                e.target.releasePointerCapture(e.pointerId);
            };

            return { pos, onPointerDown, onPointerMove, onPointerUp, isDragging };
        };

        // UI 組件：已移除從外部動態調用 useState() 作為 prop 造成的 React #300 錯誤
        const DraggableWindow = ({ title, children, initPos, resizable = false, defaultWidth = 360, minWidth = 320, minHeight = 450 }) => {
            const drag = useDraggable(initPos);
            const [collapsed, setCollapsed] = useState(false); 

            if (resizable) {
                return (
                    <div 
                        className={`absolute z-40 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl flex flex-col ${drag.isDragging ? 'cursor-grabbing' : 'cursor-grab'} ${collapsed ? '' : 'resizable-panel'}`}
                        style={{ 
                            left: drag.pos.x, top: drag.pos.y, 
                            width: defaultWidth, 
                            height: collapsed ? 'auto' : '550px',
                            minWidth: minWidth,
                            minHeight: collapsed ? 'auto' : minHeight
                        }}
                    >
                        <div 
                            className="shrink-0 bg-slate-100 dark:bg-slate-700 px-4 py-2 flex justify-between items-center select-none rounded-t-xl"
                            onPointerDown={drag.onPointerDown} onPointerMove={drag.onPointerMove} onPointerUp={drag.onPointerUp}
                        >
                            <h3 className="font-bold text-sm text-slate-700 dark:text-slate-200">{title}</h3>
                            <button onClick={() => setCollapsed(!collapsed)} className="no-drag p-1 text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">
                                <IconMinimize collapsed={collapsed} />
                            </button>
                        </div>
                        <div className={`flex-1 flex flex-col min-h-0 overflow-hidden no-drag ${collapsed ? 'hidden' : 'flex'}`}>
                            {children}
                        </div>
                    </div>
                );
            }

            // Default Non-resizable Window (Control Panel)
            return (
                <div 
                    className={`absolute z-40 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl overflow-hidden flex flex-col ${drag.isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                    style={{ left: drag.pos.x, top: drag.pos.y, width: defaultWidth }}
                >
                    <div 
                        className="bg-slate-100 dark:bg-slate-700 px-4 py-2 flex justify-between items-center select-none"
                        onPointerDown={drag.onPointerDown} onPointerMove={drag.onPointerMove} onPointerUp={drag.onPointerUp}
                    >
                        <h3 className="font-bold text-sm text-slate-700 dark:text-slate-200">{title}</h3>
                        <button onClick={() => setCollapsed(!collapsed)} className="no-drag p-1 text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">
                            <IconMinimize collapsed={collapsed} />
                        </button>
                    </div>
                    <div className={`panel-transition overflow-hidden ${collapsed ? 'h-0' : 'h-auto max-h-[85vh] overflow-y-auto no-drag'}`}>
                        <div className="p-4">{children}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            // --- State ---
            const [lang, setLang] = useState('zh');
            const [isDark, setIsDark] = useState(true);
            const [showControl, setShowControl] = useState(true);
            const [showGraph, setShowGraph] = useState(true); // 獨立控制圖表顯示
            
            // Physics State
            const [sliderPos, setSliderPos] = useState(-300); 
            const [magnetPos, setMagnetPos] = useState(-300); 
            const targetPosRef = useRef(-300);
            
            const [isAutoMove, setIsAutoMove] = useState(false);
            const [autoSpeed, setAutoSpeed] = useState(150); 
            const [simSpeed, setSimSpeed] = useState(1); 
            const [turns, setTurns] = useState(500); 
            const [polarity, setPolarity] = useState(1);
            const [swapTerminals, setSwapTerminals] = useState(false); 
            
            // Graph States
            const [graphZoom, setGraphZoom] = useState(1);
            const [isGraphPaused, setIsGraphPaused] = useState(false);
            const [pausedHistory, setPausedHistory] = useState([]);
            const [pauseTime, setPauseTime] = useState(0);
            
            const [history, setHistory] = useState([]);
            const [currentData, setCurrentData] = useState({ phi: 0, emf: 0, physicalEmf: 0, time: 0 });
            
            const requestRef = useRef();
            const timeRef = useRef(0);
            const lastPosRef = useRef(magnetPos);

            const dict = {
                zh: {
                    title: "電磁感應互動模擬器", desc: "法拉第定律與楞次定律",
                    controls: "控制面板 (Control Panel)", graphs: "實時圖表 (Graphs) - 可拉右下角放大",
                    toggleControl: "顯示/隱藏控制面板", toggleGraph: "顯示/隱藏實時圖表",
                    galvanometer: "檢流計",
                    magnetPos: "磁鐵位置 (手動拖曳)", autoMove: "自動運動", play: "開始", pause: "暫停",
                    speed: "運動速率", simSpeed: "模擬速率 (Sim Speed)", turns: "線圈匝數", polarity: "磁極朝向",
                    nFace: "N極向右", sFace: "S極向右", reset: "重置 (Reset)",
                    swapTerminals: "檢流計接線", normalWire: "平行", swappedWire: "交叉 (反相)",
                    phiGraph: "磁通量 \\(\\Phi\\) - 時間 \\(t\\)", emfGraph: "測量電動勢 \\(\\varepsilon\\) - 時間 \\(t\\)",
                    law1: "法拉第定律：\\[ \\varepsilon = -N \\frac{d\\Phi}{dt} \\]",
                    law2: "楞次定律：<br/>感應電流產生磁場以反抗原磁通量的改變。",
                    zoomIn: "放大", zoomOut: "縮小", pauseGraph: "暫停", resumeGraph: "繼續"
                },
                en: {
                    title: "Electromagnetic Induction", desc: "Faraday's & Lenz's Law",
                    controls: "Control Panel", graphs: "Real-time Graphs (Resizable)",
                    toggleControl: "Toggle Control Panel", toggleGraph: "Toggle Graphs",
                    galvanometer: "Galvanometer",
                    magnetPos: "Magnet Position (Drag)", autoMove: "Auto Move", play: "Play", pause: "Pause",
                    speed: "Speed", simSpeed: "Sim Speed", turns: "No. of Turns", polarity: "Polarity",
                    nFace: "N-pole Right", sFace: "S-pole Right", reset: "Reset",
                    swapTerminals: "Galvanometer Conn.", normalWire: "Parallel", swappedWire: "Crossed",
                    phiGraph: "Magnetic Flux \\(\\Phi\\) - Time \\(t\\)", emfGraph: "Measured EMF \\(\\varepsilon\\) - Time \\(t\\)",
                    law1: "Faraday's Law:\\[ \\varepsilon = -N \\frac{d\\Phi}{dt} \\]",
                    law2: "Lenz's Law:<br/>Induced current opposes the change in magnetic flux.",
                    zoomIn: "Zoom In", zoomOut: "Zoom Out", pauseGraph: "Pause", resumeGraph: "Resume"
                }
            };
            const t = dict[lang];

            useEffect(() => {
                const userLang = navigator.language || navigator.userLanguage;
                if (!userLang.startsWith('zh')) setLang('en');
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            // --- Physics Engine ---
            const updatePhysics = useCallback(() => {
                const dt = 1/60; 
                const scaledDt = dt * simSpeed;
                timeRef.current += scaledDt;

                let newPos;
                if (isAutoMove) {
                    newPos = lastPosRef.current + autoSpeed * scaledDt;
                    if (newPos > 300) setAutoSpeed(-Math.abs(autoSpeed));
                    if (newPos < -300) setAutoSpeed(Math.abs(autoSpeed));
                    setSliderPos(newPos);
                    targetPosRef.current = newPos;
                } else {
                    const diff = targetPosRef.current - lastPosRef.current;
                    if (Math.abs(diff) < 0.1) {
                        newPos = targetPosRef.current;
                    } else {
                        newPos = lastPosRef.current + diff * Math.min(1, 15 * scaledDt);
                    }
                }
                
                setMagnetPos(newPos);

                const sigma = 80; 
                const A = 10; 
                
                const phiRaw = A * Math.exp(-(newPos * newPos) / (2 * sigma * sigma));
                const phi = phiRaw * polarity;

                const dPhi_dx = phiRaw * (-newPos / (sigma * sigma)) * polarity;
                const v = scaledDt > 0 ? (newPos - lastPosRef.current) / scaledDt : 0;
                
                const scale = 0.05;
                const physicalEmf = -turns * dPhi_dx * v * scale; 
                const measuredEmf = swapTerminals ? -physicalEmf : physicalEmf; 

                setCurrentData({ phi, emf: measuredEmf, physicalEmf: physicalEmf, time: timeRef.current, v });
                lastPosRef.current = newPos;

                setHistory(prev => {
                    const newHist = [...prev, { time: timeRef.current, phi, emf: measuredEmf }];
                    if (newHist.length > 600) newHist.shift(); 
                    return newHist;
                });

                requestRef.current = requestAnimationFrame(updatePhysics);
            }, [isAutoMove, autoSpeed, turns, polarity, simSpeed, swapTerminals]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(updatePhysics);
                return () => cancelAnimationFrame(requestRef.current);
            }, [updatePhysics]);

            // Handlers
            const handleManualDrag = (e) => {
                setIsAutoMove(false);
                const val = parseFloat(e.target.value);
                setSliderPos(val);
                targetPosRef.current = val;
            };

            const resetSim = () => {
                setIsAutoMove(false);
                targetPosRef.current = -300;
                setSliderPos(-300);
                setMagnetPos(-300);
                lastPosRef.current = -300;
                setHistory([]);
                timeRef.current = 0;
                setGraphZoom(1);
                setIsGraphPaused(false);
            };

            const toggleGraphPause = () => {
                if (isGraphPaused) {
                    setIsGraphPaused(false);
                } else {
                    setIsGraphPaused(true);
                    setPausedHistory([...history]);
                    setPauseTime(timeRef.current);
                }
            };

            // --- Dynamic Graph Helpers ---
            const getGraphParams = (defaultMax) => {
                const maxAbs = defaultMax / graphZoom; 
                return { yMin: -maxAbs, yMax: maxAbs };
            };

            const phiParams = getGraphParams(15);
            const emfParams = getGraphParams(500);

            const getPolyline = (dataKey, params, widthBase = 320, heightBase = 80) => {
                const activeHistory = isGraphPaused ? pausedHistory : history;
                if (activeHistory.length === 0) return "";
                const maxT = isGraphPaused ? pauseTime : timeRef.current;
                const minT = Math.max(0, maxT - 5); 
                
                return activeHistory.filter(p => p.time >= minT).map(pt => {
                    const x = ((pt.time - minT) / 5) * widthBase;
                    const val = Math.max(params.yMin, Math.min(params.yMax, pt[dataKey]));
                    const y = heightBase - ((val - params.yMin) / (params.yMax - params.yMin)) * heightBase;
                    return `${x},${y}`;
                }).join(' ');
            };

            return (
                <div className="w-full h-full relative overflow-hidden flex flex-col">
                    {/* Header */}
                    <div className="absolute top-0 w-full p-4 flex justify-between items-start z-50 pointer-events-none">
                        <div className="flex items-center gap-3 pointer-events-auto">
                            {/* Gear Icon controls Control Panel exclusively */}
                            <button onClick={() => setShowControl(!showControl)} className={`p-2 backdrop-blur border rounded-full transition shadow-sm ${showControl ? 'bg-blue-500/20 border-blue-400 text-blue-600 dark:text-blue-300' : 'bg-white/10 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-500'}`} title={t.toggleControl}>
                                <IconGear />
                            </button>
                            {/* Chart Icon controls Graph Panel exclusively */}
                            <button onClick={() => setShowGraph(!showGraph)} className={`p-2 backdrop-blur border rounded-full transition shadow-sm ${showGraph ? 'bg-emerald-500/20 border-emerald-400 text-emerald-600 dark:text-emerald-300' : 'bg-white/10 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:text-emerald-500'}`} title={t.toggleGraph}>
                                <IconChart />
                            </button>
                            <div>
                                <h1 className="text-xl md:text-2xl font-bold drop-shadow-sm serif-font">{t.title}</h1>
                                <p className="text-xs md:text-sm text-slate-500 dark:text-slate-400">{t.desc}</p>
                            </div>
                        </div>
                        
                        <div className="flex gap-2 pointer-events-auto">
                            <div className="flex bg-slate-200 dark:bg-slate-700 rounded-full p-1 shadow-inner">
                                <button onClick={() => setLang('zh')} className={`px-3 py-1 rounded-full text-sm font-bold transition-colors ${lang === 'zh' ? 'bg-white dark:bg-slate-600 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>中</button>
                                <button onClick={() => setLang('en')} className={`px-3 py-1 rounded-full text-sm font-bold transition-colors ${lang === 'en' ? 'bg-white dark:bg-slate-600 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>EN</button>
                            </div>
                            <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full shadow-sm text-amber-500 hover:bg-amber-50 dark:hover:bg-slate-700 transition">
                                <IconSun />
                            </button>
                        </div>
                    </div>

                    {/* Central Display Items (Always Visible & Independent) */}
                    <div className="flex-1 w-full h-full flex items-center justify-center relative touch-none bg-slate-100 dark:bg-slate-900">
                        <div className="absolute inset-0 opacity-40 dark:opacity-30 pointer-events-none" style={{ backgroundImage: 'linear-gradient(rgba(37,99,235,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.18) 1px,transparent 1px)', backgroundSize: '40px 40px' }}></div>

                        <svg viewBox="-500 -300 1000 600" className="w-full h-full max-w-6xl drop-shadow-xl">
                            <defs>
                                <linearGradient id="wireGrad" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stopColor="#d97706" />
                                    <stop offset="50%" stopColor="#f59e0b" />
                                    <stop offset="100%" stopColor="#b45309" />
                                </linearGradient>
                                <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                                    <polygon points="0 0, 6 3, 0 6" fill="#ef4444" />
                                </marker>
                            </defs>

                            {/* Solenoid Background */}
                            <g>
                                {[...Array(8)].map((_, i) => (
                                    <path key={`back-${i}`} d={`M ${-70 + i*20} 80 A 40 80 0 0 1 ${-70 + i*20} -80`} fill="none" stroke="url(#wireGrad)" strokeWidth="6" strokeLinecap="round" opacity="0.4" />
                                ))}
                            </g>

                            {/* Galvanometer */}
                            <g transform="translate(0, -220)">
                                {/* Outer Casing */}
                                <rect x="-75" y="-55" width="150" height="95" rx="8" fill="#f1f5f9" stroke="#94a3b8" strokeWidth="2" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))" />
                                <rect x="-65" y="-50" width="130" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" strokeWidth="1" />
                                
                                {/* Labels */}
                                <text x="0" y="25" textAnchor="middle" className="text-[12px] font-bold fill-slate-700 tracking-wider">{t.galvanometer}</text>
                                <text x="0" y="34" textAnchor="middle" className="text-[8px] font-bold fill-slate-400 tracking-widest">GALVANOMETER</text>

                                {/* Dial Scale */}
                                <path d="M -45 0 A 48 48 0 0 1 45 0" fill="none" stroke="#cbd5e1" strokeWidth="3" />
                                
                                {/* Ticks */}
                                {[ -40, -30, -20, -10, 0, 10, 20, 30, 40 ].map(angle => (
                                    <line 
                                        key={angle}
                                        x1={0} y1={15} 
                                        x2={0} y2={angle % 20 === 0 ? -28 : -25} 
                                        stroke={angle === 0 ? "#64748b" : "#94a3b8"} 
                                        strokeWidth={angle === 0 ? "2" : "1.5"}
                                        transform={`rotate(${angle} 0 15)`}
                                    />
                                ))}
                                
                                <text x="0" y="-32" textAnchor="middle" className="text-[9px] font-bold fill-slate-600">0</text>
                                <text x="-48" y="10" textAnchor="middle" className="text-[14px] font-bold fill-slate-700">-</text>
                                <text x="48" y="10" textAnchor="middle" className="text-[14px] font-bold fill-slate-700">+</text>

                                {/* Terminals */}
                                <circle cx="-50" cy="30" r="4" fill="#0f172a" />
                                <circle cx="-50" cy="30" r="2" fill="#475569" />
                                <circle cx="50" cy="30" r="4" fill="#ef4444" />
                                <circle cx="50" cy="30" r="2" fill="#fca5a5" />

                                {/* Needle */}
                                <g transform={`rotate(${Math.max(-45, Math.min(45, currentData.emf / 20))} 0 15)`}>
                                    <line x1="1" y1="15" x2="1" y2="-28" stroke="rgba(0,0,0,0.1)" strokeWidth="3" strokeLinecap="round" />
                                    <line x1="0" y1="15" x2="0" y2="-28" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" />
                                    <polygon points="-2,5 2,5 0,-28" fill="#ef4444" />
                                    <circle cx="0" cy="15" r="5" fill="#334155" />
                                    <circle cx="0" cy="15" r="2" fill="#e2e8f0" />
                                </g>
                                
                                {/* Connection Wires from Galvanometer to Coil (Handling Swapped State) */}
                                {swapTerminals ? (
                                    <g>
                                        <path d="M -50 34 L -50 45 L 70 75 L 70 280" fill="none" stroke="#334155" strokeWidth="4" />
                                        <path d="M 50 34 L 50 45 L -70 75 L -70 280" fill="none" stroke="#334155" strokeWidth="4" />
                                    </g>
                                ) : (
                                    <g>
                                        <path d="M -50 34 L -50 60 L -70 60 L -70 280" fill="none" stroke="#334155" strokeWidth="4" />
                                        <path d="M 50 34 L 50 60 L 70 60 L 70 280" fill="none" stroke="#334155" strokeWidth="4" />
                                    </g>
                                )}
                            </g>

                            {/* Moving Magnet */}
                            <g transform={`translate(${magnetPos}, 0)`}>
                                <path d="M 70 0 Q 150 -100 0 -150" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="5" opacity={polarity===1?0.6:0} />
                                <path d="M 70 0 Q 150 100 0 150" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="5" opacity={polarity===1?0.6:0} />
                                <path d="M -70 0 Q -150 -100 0 -150" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="5" opacity={polarity===-1?0.6:0} />
                                <path d="M -70 0 Q -150 100 0 150" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="5" opacity={polarity===-1?0.6:0} />
                                
                                <rect x="-60" y="-30" width="60" height="60" rx="4" fill={polarity === 1 ? "#3b82f6" : "#ef4444"} />
                                <rect x="0" y="-30" width="60" height="60" rx="4" fill={polarity === 1 ? "#ef4444" : "#3b82f6"} />
                                <text x="-30" y="8" textAnchor="middle" className="text-2xl font-bold fill-white pointer-events-none">{polarity === 1 ? "S" : "N"}</text>
                                <text x="30" y="8" textAnchor="middle" className="text-2xl font-bold fill-white pointer-events-none">{polarity === 1 ? "N" : "S"}</text>
                                
                                <path d="M -15 -45 L 0 -55 L 15 -45 M -15 45 L 0 55 L 15 45" fill="none" stroke="#94a3b8" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                            </g>

                            {/* Solenoid Foreground */}
                            <g>
                                {[...Array(8)].map((_, i) => {
                                    const x = -70 + i*20;
                                    return (
                                        <g key={`front-${i}`}>
                                            <path d={`M ${x} -80 A 40 80 0 0 1 ${x} 80`} fill="none" stroke="url(#wireGrad)" strokeWidth="6" strokeLinecap="round" />
                                            {Math.abs(currentData.physicalEmf) > 5 && (i === 2 || i === 4 || i === 6) && (
                                                <path d={`M ${x+38} 0 L ${x+40} ${currentData.physicalEmf > 0 ? 10 : -10}`} fill="none" stroke="#ef4444" strokeWidth="4" markerEnd="url(#arrow)" />
                                            )}
                                        </g>
                                    );
                                })}
                                {/* Coil Terminal Wires */}
                                <line x1="-70" y1="80" x2="-70" y2="120" stroke="#d97706" strokeWidth="6" strokeLinecap="round" />
                                <line x1="70" y1="80" x2="70" y2="120" stroke="#d97706" strokeWidth="6" strokeLinecap="round" />
                                
                                {/* Coil Terminals (+ and - labels) */}
                                <text x="-85" y="115" textAnchor="middle" className="text-[20px] font-bold fill-slate-700 dark:fill-slate-300 pointer-events-none">-</text>
                                <text x="85" y="115" textAnchor="middle" className="text-[20px] font-bold fill-slate-700 dark:fill-slate-300 pointer-events-none">+</text>
                            </g>
                        </svg>
                    </div>

                    {/* Draggable Control Panel (Left) */}
                    {showControl && (
                        <DraggableWindow title={t.controls} initPos={{ x: 20, y: 80 }} resizable={false} defaultWidth={340}>
                            <div className="space-y-5">
                                <div>
                                    <label className="flex justify-between text-xs font-bold mb-2 text-slate-600 dark:text-slate-400">
                                        <span>{t.magnetPos}</span>
                                        <span className="font-mono">{magnetPos.toFixed(0)}</span>
                                    </label>
                                    <input type="range" min="-400" max="400" value={sliderPos} onChange={handleManualDrag} className="no-drag w-full accent-blue-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                                </div>
                                
                                <div>
                                    <label className="flex justify-between text-xs font-bold mb-2 text-slate-600 dark:text-slate-400">
                                        <span>{t.simSpeed}</span>
                                        <span className="font-mono">{simSpeed.toFixed(1)}x</span>
                                    </label>
                                    <input type="range" min="0.1" max="2" step="0.1" value={simSpeed} onChange={e => setSimSpeed(parseFloat(e.target.value))} className="no-drag w-full accent-purple-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                                </div>

                                <div className="p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg border border-slate-100 dark:border-slate-600">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm font-bold">{t.autoMove}</span>
                                        <button onClick={() => setIsAutoMove(!isAutoMove)} className={`no-drag flex items-center gap-1 px-3 py-1 rounded text-xs font-bold ${isAutoMove ? 'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-400' : 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-400'}`}>
                                            {isAutoMove ? <IconPause /> : <IconPlay />} {isAutoMove ? t.pause : t.play}
                                        </button>
                                    </div>
                                    <label className="flex justify-between text-xs text-slate-500 mt-2">{t.speed}</label>
                                    <input type="range" min="50" max="400" value={Math.abs(autoSpeed)} onChange={(e) => setAutoSpeed(autoSpeed > 0 ? Number(e.target.value) : -Number(e.target.value))} className="no-drag w-full accent-emerald-500 h-1.5 bg-slate-200 rounded-lg appearance-none" disabled={!isAutoMove}/>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold mb-1 text-slate-600 dark:text-slate-400">{t.turns} (<span className="math-var">N</span>)</label>
                                        <input type="number" value={turns} onChange={e => setTurns(Number(e.target.value))} className="no-drag w-full px-2 py-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded text-sm focus:outline-none focus:border-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold mb-1 text-slate-600 dark:text-slate-400">{t.polarity}</label>
                                        <select value={polarity} onChange={e => setPolarity(Number(e.target.value))} className="no-drag w-full px-2 py-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded text-sm focus:outline-none focus:border-blue-500">
                                            <option value={1}>{t.nFace}</option>
                                            <option value={-1}>{t.sFace}</option>
                                        </select>
                                    </div>
                                    <div className="col-span-2">
                                        <label className="block text-xs font-bold mb-1 text-slate-600 dark:text-slate-400">{t.swapTerminals}</label>
                                        <button 
                                            onClick={() => setSwapTerminals(!swapTerminals)}
                                            className={`no-drag w-full px-2 py-1.5 border rounded text-sm transition-colors ${swapTerminals ? 'bg-amber-100 border-amber-300 text-amber-700 dark:bg-amber-900/60 dark:border-amber-700 dark:text-amber-400 font-bold' : 'bg-white border-slate-300 dark:bg-slate-800 dark:border-slate-600 text-slate-700 dark:text-slate-300 font-bold'}`}
                                        >
                                            {swapTerminals ? t.swappedWire : t.normalWire}
                                        </button>
                                    </div>
                                </div>

                                <button onClick={resetSim} className="no-drag w-full py-2 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 text-sm font-bold rounded transition-colors">
                                    {t.reset}
                                </button>
                            </div>
                        </DraggableWindow>
                    )}

                    {/* Draggable & Resizable Graph Panel (Right) */}
                    {showGraph && (
                        <DraggableWindow title={t.graphs} initPos={{ x: window.innerWidth > 800 ? window.innerWidth - 420 : 20, y: 80 }} resizable={true} defaultWidth={380} minHeight={480}>
                            <div className="flex flex-col h-full p-4 space-y-4">
                                
                                {/* Enhanced Graph Controls: Pause & Zoom */}
                                <div className="shrink-0 flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-2 rounded-lg border border-slate-200 dark:border-slate-600">
                                    <button 
                                        onClick={toggleGraphPause} 
                                        className={`no-drag flex items-center gap-1 px-3 py-1.5 rounded text-xs font-bold transition-colors shadow-sm border ${isGraphPaused ? 'bg-amber-100 border-amber-300 text-amber-700 dark:bg-amber-900/60 dark:border-amber-700 dark:text-amber-400' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-600'}`}
                                    >
                                        {isGraphPaused ? <IconPlay /> : <IconPause />} {isGraphPaused ? t.resumeGraph : t.pauseGraph}
                                    </button>

                                    <div className="flex items-center gap-1">
                                        <div className="flex items-center bg-white dark:bg-slate-700 rounded shadow-sm border border-slate-200 dark:border-slate-600 overflow-hidden">
                                            <button onClick={() => setGraphZoom(z => Math.max(z / 1.5, 0.1))} className="no-drag text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-600 px-3 py-1.5 text-xs font-bold transition-colors border-r border-slate-200 dark:border-slate-600">{t.zoomOut}</button>
                                            <span className="text-[10px] font-mono w-10 text-center text-slate-700 dark:text-slate-300">{graphZoom.toFixed(1)}x</span>
                                            <button onClick={() => setGraphZoom(z => Math.min(z * 1.5, 10))} className="no-drag text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-600 px-3 py-1.5 text-xs font-bold transition-colors border-l border-slate-200 dark:border-slate-600">{t.zoomIn}</button>
                                        </div>
                                    </div>
                                </div>

                                {/* Phi Graph (Responsive Height) */}
                                <div className="flex-1 flex flex-col min-h-[80px]">
                                    <h4 className="text-xs font-bold text-center mb-1 text-slate-600 dark:text-slate-400"><MathText content={t.phiGraph} /></h4>
                                    <div className="relative w-full flex-1">
                                        <svg viewBox="0 0 320 80" preserveAspectRatio="none" className="absolute inset-0 w-full h-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded shadow-inner">
                                            <line x1="0" y1="40" x2="320" y2="40" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3" vectorEffect="non-scaling-stroke" />
                                            <polyline points={getPolyline('phi', phiParams, 320, 80)} fill="none" stroke="#3b82f6" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                                        </svg>
                                        <div className="absolute top-1 left-1 text-[9px] text-slate-400 font-mono bg-white/80 dark:bg-slate-900/80 px-1 rounded pointer-events-none">{phiParams.yMax.toFixed(1)}</div>
                                        <div className="absolute bottom-1 left-1 text-[9px] text-slate-400 font-mono bg-white/80 dark:bg-slate-900/80 px-1 rounded pointer-events-none">{phiParams.yMin.toFixed(1)}</div>
                                    </div>
                                </div>
                                
                                {/* EMF Graph (Responsive Height) */}
                                <div className="flex-1 flex flex-col min-h-[80px]">
                                    <h4 className="text-xs font-bold text-center mb-1 text-slate-600 dark:text-slate-400"><MathText content={t.emfGraph} /></h4>
                                    <div className="relative w-full flex-1">
                                        <svg viewBox="0 0 320 80" preserveAspectRatio="none" className="absolute inset-0 w-full h-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded shadow-inner">
                                        <line x1="0" y1="40" x2="320" y2="40" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3" vectorEffect="non-scaling-stroke" />
                                            <polyline points={getPolyline('emf', emfParams, 320, 80)} fill="none" stroke="#ef4444" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                                        </svg>
                                        <div className="absolute top-1 left-1 text-[9px] text-slate-400 font-mono bg-white/80 dark:bg-slate-900/80 px-1 rounded pointer-events-none">{emfParams.yMax.toFixed(0)}</div>
                                        <div className="absolute bottom-1 left-1 text-[9px] text-slate-400 font-mono bg-white/80 dark:bg-slate-900/80 px-1 rounded pointer-events-none">{emfParams.yMin.toFixed(0)}</div>
                                    </div>
                                </div>

                                {/* Laws (Textbook Display Math Format) */}
                                <div className="shrink-0 bg-blue-50 dark:bg-slate-800/80 p-3 rounded-lg border border-blue-100 dark:border-slate-600 flex flex-col justify-center items-center">
                                    <div className="text-sm font-bold text-slate-800 dark:text-slate-200 border-b border-blue-200 dark:border-slate-600 pb-2 mb-2 w-full text-center">
                                        <MathText content={t.law1} />
                                    </div>
                                    <div className="text-xs text-slate-600 dark:text-slate-300 text-center leading-relaxed">
                                        <MathText content={t.law2} />
                                    </div>
                                </div>
                                
                            </div>
                        </DraggableWindow>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
