<script>
/* ==========================================================================

   ========================================================================== */
const I18N = {

        type: 'Type:', val: 'Value:', current: 'Current (I):', voltage: 'Voltage (V):', power: 'Power (P):',
        comps: {
            wire: 'Wire', battery: 'Battery', resistor: 'Resistor', variable: 'Rheostat',
            bulb: 'Light Bulb', switch: 'Switch', ammeter: 'Ammeter', voltmeter: 'Voltmeter',
            fuse: 'Fuse', fan: 'Motor Fan', buzzer: 'Buzzer'
        },
        actions: { toggle_sw: 'Toggle Switch', reset_fuse: 'Replace Fuse' },
        units: { battery: 'V', resistor: 'Ω', variable: 'Ω', fuse: 'A' },
        broken: 'Blown', open: 'Open', closed: 'Closed'
    }
};

/* ==========================================================================
   State Management & Audio
   ========================================================================== */
let sysLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
let isDark = false;
let panelOpen = false;
let panelContentVisible = true;
let audioStarted = false; 

const GRID_SIZE = 40;
let components = [];
let nodes = [];
let selectedTool = 'select';
let selectedComponent = null;

let isDragging = false;
let startGridX = 0, startGridY = 0;
let currentGridX = 0, currentGridY = 0;

let offsetX = 0, offsetY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;

let animationTime = 0;

// Short Circuit Variables
let shortTimer = 0;
let isBurning = false;
let warnOsc = null;
let fireNoise = null;
const SHORT_CURRENT_THRESHOLD = 50; // Ampere

// Draggable Panel Variables
let isDraggingPanel = false;
let panelDragStartX, panelDragStartY;
let panelInitialLeft, panelInitialTop;

// Undo Stack
let undoStack = [];
const MAX_UNDO = 30;

/* Component Definitions */
const COMP_DEFS = {
    wire: { icon: 'M4 12h16' },
    battery: { icon: 'M8 6v12 M16 9v6 M8 12h8', options: [1.5, 3, 6, 9], defVal: 9 },
    resistor: { icon: 'M4 12 l3 -4 l4 8 l4 -8 l4 8 l2 -4', options: [1, 5, 10, 20, 50, 100, 1000], defVal: 10 },
    variable: { icon: 'M4 12 l3 -4 l4 8 l4 -8 l4 8 l2 -4 M12 6 v-4 l-2 2 M12 2 l2 2', min: 0, max: 100, defVal: 50 },
    bulb: { icon: 'M12 18a6 6 0 100-12 6 6 0 000 12z M9 9l6 6 M15 9l-6 6' },
    switch: { icon: 'M4 12h4 l6 -4 h6' },
    ammeter: { icon: 'M12 18a6 6 0 100-12 6 6 0 000 12z M10 14l2-5 2 5 M10.5 12h3' },
    voltmeter: { icon: 'M12 18a6 6 0 100-12 6 6 0 000 12z M10 10l2 5 2-5' },
    fuse: { icon: 'M6 10h12v4H6z M4 12h16', options: [10, 15], defVal: 10 },
    fan: { icon: 'M12 18a6 6 0 100-12 6 6 0 000 12z M12 12 l-3 -3 M12 12 l4 0 M12 12 l-1 4' },
    buzzer: { icon: 'M8 8v8h4l4 4V4l-4 4H8z M18 9a4 4 0 010 6' }
};

/* ==========================================================================
   Initialization
   ========================================================================== */
function init() {
    buildPalette();
    initLangUI(); 
    
    const canvas = document.getElementById('circuitCanvas');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    window.addEventListener('mousedown', initAudio);
    window.addEventListener('touchstart', initAudio, {passive: true});

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    
    canvas.addEventListener('touchstart', (e) => { 
        if(e.touches.length === 1) { e.preventDefault(); handleMouseDown(e.touches[0]); }
    }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { 
        if(e.touches.length === 1) { e.preventDefault(); handleMouseMove(e.touches[0]); }
    }, {passive: false});
    window.addEventListener('touchend', handleMouseUp);

    const panelHeader = document.getElementById('panel-header');
    panelHeader.addEventListener('mousedown', onPanelDragStart);
    panelHeader.addEventListener('touchstart', onPanelDragStart, {passive: false});

    offsetX = canvas.width / 2;
    offsetY = canvas.height / 2;

    requestAnimationFrame(renderLoop);
}

async function initAudio() {
    if (!audioStarted && typeof Tone !== 'undefined') {
        await Tone.start();
        audioStarted = true;
    }
}

function resizeCanvas() {
    const container = document.getElementById('canvas-container');
    const canvas = document.getElementById('circuitCanvas');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}

/* ==========================================================================
   Undo System
   ========================================================================== */
function saveState() {
    let state = components.map(c => ({
        id: c.id, type: c.type,
        x1: c.x1, y1: c.y1, x2: c.x2, y2: c.y2,
        val: c.val, closed: c.closed, broken: c.broken
    }));
    undoStack.push(state);
    if(undoStack.length > MAX_UNDO) undoStack.shift();
    
    const btnUndo = document.getElementById('btn-undo');
    if(btnUndo) {
        btnUndo.disabled = false;
        btnUndo.classList.remove('opacity-50', 'cursor-not-allowed');
    }
}

function performUndo() {
    if (undoStack.length === 0) return;
    let prevState = undoStack.pop();
    
    components.forEach(c => {
        if (c.osc) { c.osc.stop(); c.osc.dispose(); c.osc = null; }
    });
    if (warnOsc) { warnOsc.stop(); warnOsc.dispose(); warnOsc = null; }
    if (fireNoise) { fireNoise.stop(); fireNoise.dispose(); fireNoise = null; }
    
    components = prevState.map(c => ({
        ...c, i: 0, v: 0, p: 0, phase: 0, osc: null
    }));
    
    selectedComponent = null;
    shortTimer = 0;
    isBurning = false;
    document.getElementById('warning-banner').classList.add('hidden');
    updatePropertiesPanel();
    
    const btnUndo = document.getElementById('btn-undo');
    if(btnUndo && undoStack.length === 0) {
        btnUndo.disabled = true;
        btnUndo.classList.add('opacity-50', 'cursor-not-allowed');
    }
}

function onPanelDragStart(e) {
    if (e.target.closest('button')) return;
    isDraggingPanel = true;
    const panel = document.getElementById('infoPanel');
    panel.classList.add('dragging-panel');
    
    const rect = panel.getBoundingClientRect();
    panelInitialLeft = rect.left;
    panelInitialTop = rect.top;
    panel.style.left = panelInitialLeft + 'px';
    panel.style.top = panelInitialTop + 'px';
    panel.style.right = 'auto';
    panel.style.bottom = 'auto';

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    panelDragStartX = clientX;
    panelDragStartY = clientY;

    document.addEventListener('mousemove', onPanelDrag);
    document.addEventListener('touchmove', onPanelDrag, {passive: false});
    document.addEventListener('mouseup', onPanelDragEnd);
    document.addEventListener('touchend', onPanelDragEnd);
}

function onPanelDrag(e) {
    if (!isDraggingPanel) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    const panel = document.getElementById('infoPanel');
    let newLeft = panelInitialLeft + (clientX - panelDragStartX);
    let newTop = panelInitialTop + (clientY - panelDragStartY);
    
    newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - panel.offsetWidth));
    newTop = Math.max(0, Math.min(newTop, window.innerHeight - panel.offsetHeight));

    panel.style.left = newLeft + 'px';
    panel.style.top = newTop + 'px';
}

function onPanelDragEnd() {
    isDraggingPanel = false;
    document.getElementById('infoPanel').classList.remove('dragging-panel');
    document.removeEventListener('mousemove', onPanelDrag);
    document.removeEventListener('touchmove', onPanelDrag);
    document.removeEventListener('mouseup', onPanelDragEnd);
    document.removeEventListener('touchend', onPanelDragEnd);
}

/* ==========================================================================
   Interaction & Canvas Logic
   ========================================================================== */
function getGridPos(clientX, clientY) {
    const rect = document.getElementById('circuitCanvas').getBoundingClientRect();
    const x = clientX - rect.left - offsetX;
    const y = clientY - rect.top - offsetY;
    return {
        x: Math.round(x / GRID_SIZE) * GRID_SIZE,
        y: Math.round(y / GRID_SIZE) * GRID_SIZE
    };
}

function dist(x1, y1, x2, y2) { return Math.hypot(x2-x1, y2-y1); }

function handleMouseDown(e) {
    if (e.button === 1 || (selectedTool === 'select' && !getClickedComponent(e.clientX, e.clientY))) {
        isPanning = true;
        panStartX = e.clientX - offsetX;
        panStartY = e.clientY - offsetY;
        document.getElementById('circuitCanvas').style.cursor = 'grabbing';
        return;
    }

    if(selectedTool === 'select') {
        selectedComponent = getClickedComponent(e.clientX, e.clientY);
        if(!panelOpen && selectedComponent) togglePanel('infoPanel');
        updatePropertiesPanel();
        return;
    }

    const pos = getGridPos(e.clientX, e.clientY);
    isDragging = true;
    startGridX = pos.x;
    startGridY = pos.y;
    currentGridX = pos.x;
    currentGridY = pos.y;
}

function handleMouseMove(e) {
    if (isPanning) {
        offsetX = e.clientX - panStartX;
        offsetY = e.clientY - panStartY;
        return;
    }
    if(!isDragging) return;
    const pos = getGridPos(e.clientX, e.clientY);
    currentGridX = pos.x;
    currentGridY = pos.y;
}

function handleMouseUp(e) {
    if (isPanning) {
        isPanning = false;
        document.getElementById('circuitCanvas').style.cursor = 'crosshair';
        return;
    }
    if(!isDragging) return;
    isDragging = false;
    
    if(startGridX !== currentGridX || startGridY !== currentGridY) {
        addComponent(selectedTool, startGridX, startGridY, currentGridX, currentGridY);
    }
}

function getClickedComponent(clientX, clientY) {
    const rect = document.getElementById('circuitCanvas').getBoundingClientRect();
    const x = clientX - rect.left - offsetX;
    const y = clientY - rect.top - offsetY;
    
    for(let c of components) {
        const l2 = dist(c.x1, c.y1, c.x2, c.y2)**2;
        if(l2 === 0) continue;
        let t = ((x - c.x1)*(c.x2 - c.x1) + (y - c.y1)*(c.y2 - c.y1)) / l2;
        t = Math.max(0, Math.min(1, t));
        const px = c.x1 + t*(c.x2 - c.x1);
        const py = c.y1 + t*(c.y2 - c.y1);
        if(dist(x, y, px, py) < 20) return c;
    }
    return null;
}

// 核心修復：當元件接在連續導線中間時，自動將導線切成兩段 (T型結點)
function normalizeWires() {
    let changed = true;
    while(changed) {
        changed = false;
        let pts = [];
        components.forEach(c => {
            pts.push({x: c.x1, y: c.y1});
            pts.push({x: c.x2, y: c.y2});
        });
        
        for(let i = 0; i < components.length; i++) {
            let c = components[i];
            if (c.type !== 'wire') continue; // 只允許從中間切斷電線
            
            let splitPt = null;
            for(let p of pts) {
                let d1 = dist(c.x1, c.y1, p.x, p.y);
                let d2 = dist(p.x, p.y, c.x2, c.y2);
                let dTotal = dist(c.x1, c.y1, c.x2, c.y2);
                // 若節點正好在導線上，且不是該導線的端點
                if (d1 > 1 && d2 > 1 && Math.abs(d1 + d2 - dTotal) < 1) {
                    splitPt = p;
                    break;
                }
            }
            
            if (splitPt) {
                let w1 = { ...c, id: Date.now() + Math.random(), x2: splitPt.x, y2: splitPt.y };
                let w2 = { ...c, id: Date.now() + Math.random(), x1: splitPt.x, y1: splitPt.y };
                components.splice(i, 1, w1, w2);
                // 確保原選取狀態不丟失
                if (selectedComponent === c) selectedComponent = w1;
                changed = true;
                break;
            }
        }
    }
}

function addComponent(type, x1, y1, x2, y2) {
    if(components.some(c => (c.x1===x1&&c.y1===y1&&c.x2===x2&&c.y2===y2) || (c.x1===x2&&c.y1===y2&&c.x2===x1&&c.y2===y1))) return;

    saveState(); // 紀錄 Undo 狀態
    
    let def = COMP_DEFS[type];
    let comp = {
        id: Date.now() + Math.random(),
        type: type,
        x1: x1, y1: y1, x2: x2, y2: y2,
        val: def.defVal || 0,
        i: 0, v: 0, p: 0,
        closed: true, broken: false, osc: null 
    };
    components.push(comp);
    selectedComponent = comp;
    
    normalizeWires(); // 自動處理 T 型結點
    
    selectedTool = 'select';
    selectTool('select');
    if(!panelOpen) togglePanel('infoPanel');
    updatePropertiesPanel();
}

function resetCircuit() {
    if (components.length === 0) return;
    saveState();
    
    components.forEach(c => {
        if (c.osc) { c.osc.stop(); c.osc.dispose(); c.osc = null; }
    });
    if (warnOsc) { warnOsc.stop(); warnOsc.dispose(); warnOsc = null; }
    if (fireNoise) { fireNoise.stop(); fireNoise.dispose(); fireNoise = null; }
    
    components = [];
    selectedComponent = null;
    shortTimer = 0;
    isBurning = false;
    document.getElementById('warning-banner').classList.add('hidden');
    updatePropertiesPanel();
}

            btn.innerText = d.actions.reset_fuse;
            btn.onclick = () => { saveState(); c.broken = false; updatePropertiesPanel(); };
            actSec.appendChild(btn);

            display.classList.add('text-red-500');

        saveState();
        if (c.osc) { c.osc.stop(); c.osc.dispose(); c.osc = null; }
        components = components.filter(x => x !== c);
        selectedComponent = null;
        updatePropertiesPanel();
    };
}

function formatVal(v) {
    if(Math.abs(v) > 999) return "> 999"; 
    if(Math.abs(v) < 1e-4) return "0.00";
    return v.toFixed(2);
}

/* ==========================================================================
   Physics Engine (Nodal Analysis)
   ========================================================================== */
function solveMatrix(A, b) {
    let n = b.length;
    for (let i = 0; i < n; i++) {
        let maxEl = Math.abs(A[i][i]), maxRow = i;
        for (let k = i + 1; k < n; k++) {
            if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
        }
        for (let k = i; k < n; k++) { let tmp = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = tmp; }
        let tmpB = b[maxRow]; b[maxRow] = b[i]; b[i] = tmpB;

        if (Math.abs(A[i][i]) < 1e-12) return Array(n).fill(0);

        for (let k = i + 1; k < n; k++) {
            let c = -A[k][i] / A[i][i];
            for (let j = i; j < n; j++) {
                if (i === j) A[k][j] = 0; else A[k][j] += c * A[i][j];
            }
            b[k] += c * b[i];
        }
    }
    let x = new Array(n).fill(0);
    for (let i = n - 1; i >= 0; i--) {
        x[i] = b[i] / A[i][i];
        for (let k = i - 1; k >= 0; k--) b[k] -= A[k][i] * x[i];
    }
    return x;
}

function simulatePhysics() {
    if(components.length === 0) {
        handleShortCircuitState(false);
        return;
    }

    nodes = [];
    components.forEach(c => {
        let p1 = `${c.x1},${c.y1}`, p2 = `${c.x2},${c.y2}`;
        if(nodes.indexOf(p1) === -1) nodes.push(p1);
        if(nodes.indexOf(p2) === -1) nodes.push(p2);
    });

    let N = nodes.length;
    let G = Array(N).fill(0).map(() => Array(N).fill(0));
    let I_src = Array(N).fill(0);

    // 提高精確度：避免 1e7 (10MΩ) 的伏特計被微小對地導納影響
    for(let i=0; i<N; i++) G[i][i] += 1e-9; 

    components.forEach(c => {
        let n1 = nodes.indexOf(`${c.x1},${c.y1}`);
        let n2 = nodes.indexOf(`${c.x2},${c.y2}`);
        
        let R = 1e-3; 
        if(c.type === 'switch') R = c.closed ? 1e-3 : 1e9;
        else if(c.type === 'fuse') R = c.broken ? 1e9 : 1e-3;
        else if(c.type === 'voltmeter') R = 1e7; 
        else if(c.type === 'resistor' || c.type === 'variable') R = Math.max(1e-3, c.val);
        else if(c.type === 'bulb') R = 10;
        else if(c.type === 'fan') R = 15;
        else if(c.type === 'buzzer') R = 20;

        if(c.type === 'battery') {
            R = 1e-3; 
            let I = c.val / R;
            I_src[n1] -= I;
            I_src[n2] += I;
        }

        let g = 1 / R;
        G[n1][n1] += g; G[n2][n2] += g;
        G[n1][n2] -= g; G[n2][n1] -= g;
    });

    for(let i=0; i<N; i++) { G[0][i] = 0; G[i][0] = 0; }
    G[0][0] = 1; I_src[0] = 0;

    let V_nodes = solveMatrix(G, I_src);
    let hasShortCircuit = false;

    components.forEach(c => {
        let n1 = nodes.indexOf(`${c.x1},${c.y1}`);
        let n2 = nodes.indexOf(`${c.x2},${c.y2}`);
        let v1 = V_nodes[n1], v2 = V_nodes[n2];
        
        let R = 1e-3;
        if(c.type === 'switch') R = c.closed ? 1e-3 : 1e9;
        else if(c.type === 'fuse') R = c.broken ? 1e9 : 1e-3;
        else if(c.type === 'voltmeter') R = 1e7;
        else if(c.type === 'resistor' || c.type === 'variable') R = Math.max(1e-3, c.val);
        else if(c.type === 'bulb') R = 10;
        else if(c.type === 'fan') R = 15;
        else if(c.type === 'buzzer') R = 20;

        if(c.type === 'battery') {
            R = 1e-3;
            c.v = v2 - v1; 
            c.i = (v1 - v2 + c.val) / R; 
        } else {
            c.v = v1 - v2;
            c.i = c.v / R;
        }
        
        c.p = Math.abs(c.v * c.i);

        if (Math.abs(c.i) > SHORT_CURRENT_THRESHOLD && c.type !== 'voltmeter' && (!c.broken || c.type!=='fuse')) {
            hasShortCircuit = true;
        }

        if(c.type === 'fuse' && !c.broken && Math.abs(c.i) > c.val) {
            c.broken = true;
            if(selectedComponent === c) updatePropertiesPanel();
        }

        if (c.type === 'buzzer') {
            if (c.p > 0.1) {
                if (audioStarted && typeof Tone !== 'undefined') {
                    if (!c.osc) {
                        c.osc = new Tone.Oscillator({ type: "sawtooth", volume: -15 }).toDestination();
                        c.osc.start();
                    }
                    let targetFreq = 300 + Math.abs(c.v) * 50;
                    c.osc.frequency.rampTo(targetFreq, 0.1); 
                }
            } else {
                if (c.osc) { c.osc.stop(); c.osc.dispose(); c.osc = null; }
            }
        }

        if(!c.phase) c.phase = 0;
        c.phase += c.i * 0.1;
    });

    handleShortCircuitState(hasShortCircuit);

    if(selectedComponent) {
        document.getElementById('prop-i-val').innerText = formatVal(Math.abs(selectedComponent.i)) + " A";
        document.getElementById('prop-v-val').innerText = formatVal(Math.abs(selectedComponent.v)) + " V";
        document.getElementById('prop-p-val').innerText = formatVal(selectedComponent.p) + " W";
        if(selectedComponent.type === 'switch' && document.getElementById('prop-val-display')) {
             document.getElementById('prop-val-display').innerText = selectedComponent.closed ? I18N[sysLang].closed : I18N[sysLang].open;
        }
    }
}

// Global Short Circuit Logic & Audio
function handleShortCircuitState(hasShort) {
    const banner = document.getElementById('warning-banner');
    if (hasShort) {
        shortTimer++;
        if (shortTimer > 150) { 
            isBurning = true;
            banner.innerText = I18N[sysLang].warn_fire;
            banner.classList.remove('hidden');
            
            if (audioStarted && typeof Tone !== 'undefined') {
                if (warnOsc) { warnOsc.stop(); warnOsc.dispose(); warnOsc = null; } 
                if (!fireNoise) {
                    fireNoise = new Tone.Noise("brown").toDestination();
                    fireNoise.volume.value = -10;
                    fireNoise.start();
                }
            }
        } else {
            isBurning = false;
            banner.innerText = I18N[sysLang].warn_short;
            banner.classList.remove('hidden');
            
            if (audioStarted && typeof Tone !== 'undefined') {
                if (!warnOsc) {
                    warnOsc = new Tone.Oscillator(800, "square").toDestination();
                    warnOsc.volume.value = -20;
                    warnOsc.start();
                }
                warnOsc.frequency.value = (animationTime % 30 < 15) ? 800 : 1200;
            }
        }
    } else {
        shortTimer = 0;
        isBurning = false;
        banner.classList.add('hidden');
        if (warnOsc) { warnOsc.stop(); warnOsc.dispose(); warnOsc = null; }
        if (fireNoise) { fireNoise.stop(); fireNoise.dispose(); fireNoise = null; }
    }
}

/* ==========================================================================
   Rendering
   ========================================================================== */
function renderLoop() {
    simulatePhysics();
    
    const canvas = document.getElementById('circuitCanvas');
    const ctx = canvas.getContext('2d');
    const cw = canvas.width;
    const ch = canvas.height;
    
    ctx.clearRect(0, 0, cw, ch);
    animationTime++;

    let shakeX = 0, shakeY = 0;
    if (isBurning) {
        shakeX = (Math.random() - 0.5) * 4;
        shakeY = (Math.random() - 0.5) * 4;
    }
    ctx.translate(shakeX, shakeY);

    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    let startX = offsetX % GRID_SIZE;
    let startY = offsetY % GRID_SIZE;
    for(let x = startX; x < cw; x += GRID_SIZE) { ctx.moveTo(x, 0); ctx.lineTo(x, ch); }
    for(let y = startY; y < ch; y += GRID_SIZE) { ctx.moveTo(0, y); ctx.lineTo(cw, y); }
    ctx.stroke();

    if(isDragging) {
        ctx.strokeStyle = isDark ? 'rgba(96, 165, 250, 0.5)' : 'rgba(59, 130, 246, 0.5)';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(startGridX + offsetX, startGridY + offsetY);
        ctx.lineTo(currentGridX + offsetX, currentGridY + offsetY);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    components.forEach(c => {
        let cx1 = c.x1 + offsetX, cy1 = c.y1 + offsetY;
        let cx2 = c.x2 + offsetX, cy2 = c.y2 + offsetY;
        let angle = Math.atan2(cy2 - cy1, cx2 - cx1);
        let midX = (cx1 + cx2)/2, midY = (cy1 + cy2)/2;
        let len = dist(cx1, cy1, cx2, cy2);
        
        ctx.save();
        ctx.translate(midX, midY);
        ctx.rotate(angle);

        let color = isDark ? '#94a3b8' : '#334155';
        if(selectedComponent === c) {
            ctx.shadowColor = '#3b82f6';
            ctx.shadowBlur = 12;
            color = '#3b82f6';
        }

        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.beginPath();
        ctx.moveTo(-len/2, 0);
        ctx.lineTo(len/2, 0);
        ctx.stroke();

        ctx.fillStyle = isDark ? '#0b1120' : '#f1f5f9';
        
        if(c.type === 'battery') {
            ctx.fillRect(-10, -15, 20, 30);
            ctx.beginPath();
            ctx.moveTo(-5, -15); ctx.lineTo(-5, 15);
            ctx.moveTo(5, -25); ctx.lineTo(5, 25);
            ctx.stroke();
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(12, -10); ctx.lineTo(18, -10); ctx.moveTo(15, -13); ctx.lineTo(15, -7); ctx.stroke();
        }
        else if(c.type === 'resistor' || c.type === 'variable') {
            ctx.fillRect(-15, -10, 30, 20);
            ctx.beginPath();
            ctx.moveTo(-15, 0);
            ctx.lineTo(-10, -10); ctx.lineTo(-5, 10);
            ctx.lineTo(0, -10); ctx.lineTo(5, 10);
            ctx.lineTo(10, -10); ctx.lineTo(15, 0);
            ctx.stroke();
            if(c.type === 'variable') {
                ctx.beginPath();
                ctx.moveTo(-15, 15); ctx.lineTo(10, -15);
                ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, -15); ctx.lineTo(2, -15); ctx.lineTo(10, -7); ctx.fill();
            }
        }
        else if(c.type === 'bulb') {
            ctx.fillRect(-15, -15, 30, 30);
            if(c.p > 0.1) {
                let glow = Math.min(1, c.p / 10);
                ctx.shadowColor = 'yellow';
                ctx.shadowBlur = 10 + glow * 20;
                ctx.fillStyle = `rgba(255, 255, 0, ${glow*0.8})`;
                ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = isDark ? '#0b1120' : '#f1f5f9';
            }
            ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-10, -10); ctx.lineTo(10, 10); ctx.moveTo(10, -10); ctx.lineTo(-10, 10); ctx.stroke();
        }
        else if(c.type === 'switch') {
            ctx.fillRect(-15, -10, 30, 20);
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(-15, 0, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(15, 0, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-15, 0);
            if(c.closed) ctx.lineTo(15, 0);
            else ctx.lineTo(10, -15);
            ctx.stroke();
        }
        else if(c.type === 'fuse') {
            ctx.fillRect(-18, -10, 36, 20);
            ctx.strokeRect(-18, -8, 36, 16);
            ctx.beginPath();
            if(!c.broken) { ctx.moveTo(-18, 0); ctx.lineTo(18, 0); ctx.stroke(); }
        }
        else if(c.type === 'ammeter' || c.type === 'voltmeter') {
            ctx.fillRect(-16, -16, 32, 32);
            ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = color;
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(c.type === 'ammeter' ? 'A' : 'V', 0, 1);
            
            ctx.font = '10px monospace';
            let dispVal = Math.abs(c.type==='ammeter'? c.i : c.v);
            ctx.fillText(dispVal > 999 ? ">999" : formatVal(dispVal), 0, 25);
        }
        else if(c.type === 'fan') {
            ctx.fillRect(-15, -15, 30, 30);
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.stroke();
            ctx.save();
            ctx.rotate(c.phase * 5);
            ctx.fillStyle = color;
            for(let i=0; i<3; i++) {
                ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, 12, 0, 0.5); ctx.lineTo(0,0); ctx.fill();
                ctx.rotate(Math.PI*2/3);
            }
            ctx.restore();
        }
        else if(c.type === 'buzzer') {
            ctx.fillRect(-15, -15, 30, 30);
            ctx.beginPath(); ctx.moveTo(-10, -10); ctx.lineTo(-10, 10); ctx.lineTo(5, 10); ctx.lineTo(5, -10); ctx.closePath(); ctx.stroke();
            if(c.p > 0.1) {
                let r1 = 8 + (animationTime%30)/3;
                let r2 = 12 + ((animationTime+15)%30)/3;
                ctx.beginPath(); ctx.arc(5, 0, r1, -1, 1); ctx.stroke();
                ctx.beginPath(); ctx.arc(5, 0, r2, -1, 1); ctx.stroke();
            }
        }

        ctx.restore();

        if(Math.abs(c.i) > 0.01 && c.type !== 'voltmeter' && (!c.broken || c.type!=='fuse')) {
            let flowDir = Math.sign(c.i);
            let numDots = Math.floor(len / 20);
            ctx.fillStyle = '#ef4444';
            for(let j=0; j<=numDots; j++) {
                let t = (j / numDots + c.phase * flowDir) % 1;
                if(t < 0) t += 1;
                let px = cx1 + (cx2 - cx1) * t;
                let py = cy1 + (cy2 - cy1) * t;
                ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();
            }
        }

        if(isBurning && Math.abs(c.i) > SHORT_CURRENT_THRESHOLD && (!c.broken || c.type!=='fuse')) {
            let numFlames = Math.floor(len / 15) + 1;
            for(let j=0; j<=numFlames; j++) {
                let t = (j / numFlames);
                let px = cx1 + (cx2 - cx1) * t;
                let py = cy1 + (cy2 - cy1) * t;
                
                for(let f=0; f<3; f++) {
                    let oX = (Math.random()-0.5)*20;
                    let oY = (Math.random()-0.5)*20 - 5;
                    ctx.fillStyle = Math.random() > 0.4 ? 'rgba(239, 68, 68, 0.8)' : 'rgba(250, 204, 21, 0.9)';
                    ctx.beginPath();
                    ctx.arc(px + oX, py + oY, Math.random()*6 + 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        ctx.fillStyle = isDark ? '#64748b' : '#94a3b8';
        ctx.beginPath(); ctx.arc(cx1, cy1, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2, cy2, 4, 0, Math.PI*2); ctx.fill();
    });

    ctx.translate(-shakeX, -shakeY);
    requestAnimationFrame(renderLoop);
}

window.onload = init;

</script>
</body>
</html>
