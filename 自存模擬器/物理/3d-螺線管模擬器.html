<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==================== State ====================
const state = {
  magnetType: 'solenoid', // Only solenoid now
  strength: 0.6,
  current: 0.6,
  numLines: 8,
  showFieldLines: true,
  showCompasses: true,
  showArrows: false,
  showCurrentArrows: false,
  animSpeed: 1.0,
  isDark: true,
  lang: 'zh'
};

let scene, camera, renderer, controls, clock;
let magnetGroup, fieldLinesGroup, compassesGroup, currentArrowsGroup;
let gridHelper, floorMesh;
let currentPoles = [];
let solenoidCurve = null;

// Current Arrows System
let currentMarkers = [];

// Flow Arrow System
let flowArrows = [];
const FLOW_ARROW_COUNT = 180;
// Reduced flow arrows size to 70% of original (0.05 -> 0.035, 0.18 -> 0.126)
const flowArrowGeo = new THREE.ConeGeometry(0.035, 0.126, 5);
let activeFieldLines = []; // Store closed loop points

// ==================== Init ====================
function init() {
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1420);
  scene.fog = new THREE.Fog(0x0a1420, 12, 28);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(3.8, 2.8, 4.8);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 2;
  controls.maxDistance = 14;
  controls.target.set(0, 0, 0);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
  dirLight.position.set(5, 9, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.left = -5;
  dirLight.shadow.camera.right = 5;
  dirLight.shadow.camera.top = 5;
  dirLight.shadow.camera.bottom = -5;
  dirLight.shadow.bias = -0.001;
  scene.add(dirLight);
  scene.add(new THREE.HemisphereLight(0x88aaff, 0x443322, 0.35));

  // Floor for shadows
  const floorGeo = new THREE.PlaneGeometry(20, 20);
  const floorMat = new THREE.ShadowMaterial({ opacity: 0.28 });
  floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.y = -1.5;
  floorMesh.receiveShadow = true;
  scene.add(floorMesh);

  // Grid
  gridHelper = new THREE.GridHelper(10, 20, 0x2a4a6a, 0x1a3040);
  gridHelper.position.y = -1.499;
  scene.add(gridHelper);

  // Groups
  magnetGroup = new THREE.Group();
  scene.add(magnetGroup);
  fieldLinesGroup = new THREE.Group();
  scene.add(fieldLinesGroup);
  compassesGroup = new THREE.Group();
  scene.add(compassesGroup);
  currentArrowsGroup = new THREE.Group();
  scene.add(currentArrowsGroup);

  clock = new THREE.Clock();

  // Build scene
  initFlowArrows();
  rebuildMagnet();
  initCurrentArrows();
  rebuildFieldLines();

  // Auto-detect language
  const userLang = (navigator.language || 'zh-HK').toLowerCase();
  state.lang = userLang.startsWith('zh') ? 'zh' : 'en';
  applyLang();

  // Make info window draggable
  makeDraggable(document.getElementById('info-window'), document.querySelector('.drag-handle'));

  animate();
  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  controls.update();

  if (state.showCompasses) {
    updateFlowArrows(dt);
  }
  if (state.showCurrentArrows) {
    updateCurrentArrows(dt);
  }

  renderer.render(scene, camera);
}

// ==================== Magnet Models ====================
function createLabelSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = 'bold 88px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 6;
  ctx.fillText(text, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.renderOrder = 10;
  return sprite;
}

function createSolenoidModel() {
  const group = new THREE.Group();
  const matCoil = new THREE.MeshStandardMaterial({ color: 0xb87333, roughness: 0.4, metalness: 0.6 }); // Copper color
  const matCore = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.1, transparent: true, opacity: 0.15 });

  const len = 1.4;
  const rad = 0.4;

  // Inner transparent core
  const core = new THREE.Mesh(new THREE.CylinderGeometry(rad * 0.9, rad * 0.9, len, 24), matCore);
  core.rotation.x = Math.PI / 2;
  group.add(core);

  // Coil (Helix)
  const turns = 12;
  const helixPoints = [];
  for (let i = 0; i <= 200; i++) {
    const t = i / 200;
    const angle = turns * Math.PI * 2 * t;
    const z = (t - 0.5) * len * 1.05;
    helixPoints.push(new THREE.Vector3(Math.cos(angle) * rad, Math.sin(angle) * rad, z));
  }
  const helixCurve = new THREE.CatmullRomCurve3(helixPoints);
  solenoidCurve = helixCurve; // Store globally for current arrows
  const tubeGeo = new THREE.TubeGeometry(helixCurve, 200, 0.04, 8, false);
  const coilMesh = new THREE.Mesh(tubeGeo, matCoil);
  coilMesh.castShadow = true;
  group.add(coilMesh);

  // Labels
  const labelN = createLabelSprite('N');
  labelN.position.set(0, rad + 0.3, len / 2 + 0.1);
  labelN.scale.set(0.28, 0.28, 1);
  group.add(labelN);

  const labelS = createLabelSprite('S');
  labelS.position.set(0, rad + 0.3, -len / 2 - 0.1);
  labelS.scale.set(0.28, 0.28, 1);
  group.add(labelS);

  return group;
}

// ==================== Pole Definitions ====================
function getSolenoidPoles(strength) {
  const poles = [];
  const len = 1.4;
  const rad = 0.38; // Match visual radius closely
  const rings = 4; // Dense grid for uniform internal field
  
  // Create dense circular arrangement of poles on both faces
  for (let r = 0; r <= rings; r++) {
    const ringRad = (r / rings) * rad;
    const numPoints = r === 0 ? 1 : r * 6;
    const qEach = strength / ( (rings+1) * (rings+1) * 2 ); 
    
    for (let i = 0; i < numPoints; i++) {
      const angle = (i / numPoints) * Math.PI * 2;
      const x = Math.cos(angle) * ringRad;
      const y = Math.sin(angle) * ringRad;
      poles.push({ pos: new THREE.Vector3(x, y, len / 2 - 0.02), q: qEach });     // N face
      poles.push({ pos: new THREE.Vector3(x, y, -len / 2 + 0.02), q: -qEach });   // S face
    }
  }
  return poles;
}

function isInsideMagnet(pos) {
  // Solenoid
  const len = 1.4;
  const rad = 0.4;
  if (Math.abs(pos.z) < len / 2 && pos.x * pos.x + pos.y * pos.y < rad * rad) return true;
  return false;
}

// ==================== Field Calculation ====================
function fieldAt(pos, poles) {
  const B = new THREE.Vector3(0, 0, 0);
  const tmp = new THREE.Vector3();
  for (const pole of poles) {
    tmp.subVectors(pos, pole.pos);
    const r2 = tmp.lengthSq();
    if (r2 < 0.012) continue;
    const r = Math.sqrt(r2);
    const factor = pole.q / (r2 * r);
    B.addScaledVector(tmp, factor);
  }
  return B;
}

// ==================== Field Line Tracing (RK4) ====================
function traceFieldLine(startPos, poles, direction = 1, maxSteps = 500, stepSize = 0.06) {
  const points = [startPos.clone()];
  const pos = startPos.clone();
  const k1 = new THREE.Vector3(), k2 = new THREE.Vector3(), k3 = new THREE.Vector3(), k4 = new THREE.Vector3();
  const tmp = new THREE.Vector3();

  for (let i = 0; i < maxSteps; i++) {
    const B1 = fieldAt(pos, poles);
    if (B1.lengthSq() < 1e-24) break;
    k1.copy(B1).multiplyScalar(direction * stepSize / B1.length());

    tmp.copy(pos).addScaledVector(k1, 0.5);
    const B2 = fieldAt(tmp, poles);
    if (B2.lengthSq() < 1e-24) break;
    k2.copy(B2).multiplyScalar(direction * stepSize / B2.length());

    tmp.copy(pos).addScaledVector(k2, 0.5);
    const B3 = fieldAt(tmp, poles);
    if (B3.lengthSq() < 1e-24) break;
    k3.copy(B3).multiplyScalar(direction * stepSize / B3.length());

    tmp.copy(pos).add(k3);
    const B4 = fieldAt(tmp, poles);
    if (B4.lengthSq() < 1e-24) break;
    k4.copy(B4).multiplyScalar(direction * stepSize / B4.length());

    pos.addScaledVector(k1, 1/6).addScaledVector(k2, 1/3).addScaledVector(k3, 1/3).addScaledVector(k4, 1/6);
    points.push(pos.clone());

    // Termination: near opposite-sign pole
    let done = false;
    for (const pole of poles) {
      if ((direction > 0 && pole.q < 0) || (direction < 0 && pole.q > 0)) {
        if (pos.distanceToSquared(pole.pos) < 0.02) {
          points.push(pole.pos.clone());
          done = true;
          break;
        }
      }
    }
    if (done) break;

    // Bounds
    if (pos.lengthSq() > 120) break;
  }
  return points;
}

// ==================== Starting Points (Strictly Symmetrical) ====================
function generateStartPoints(poles, count) {
  const nPoles = poles.filter(p => p.q > 0);
  if (nPoles.length === 0) return [];

  const points = [];
  const pointsPerLayer = 6; // 6 lines per layer for perfect 60-degree rotational symmetry
  const layers = Math.max(1, Math.round(count / pointsPerLayer));
  const r = 0.15; // Starting sphere radius around N pole

  for (const pole of nPoles) {
    for (let l = 0; l < layers; l++) {
      const theta = (l + 0.5) / layers * (Math.PI / 2); // Distribute across hemispheres
      for (let p = 0; p < pointsPerLayer; p++) {
        const phi = (p / pointsPerLayer) * Math.PI * 2;
        
        const x = r * Math.sin(theta) * Math.cos(phi);
        const y = r * Math.sin(theta) * Math.sin(phi);
        const z = r * Math.cos(theta); // Pointing outwards from N pole
        
        const startPos = new THREE.Vector3(
          pole.pos.x + x,
          pole.pos.y + y,
          pole.pos.z + z 
        );
        
        if (!isInsideMagnet(startPos)) {
          points.push(startPos);
        }
      }
    }
  }
  
  return points;
}

// ==================== Field Line Rendering ====================
function createFieldLineObject(points, color, showArrows) {
  const group = new THREE.Group();

  // Main line
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.72
  });
  const line = new THREE.Line(geometry, material);
  group.add(line);

  // Direction arrows
  if (showArrows && points.length > 8) {
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const numArrows = Math.max(1, Math.min(4, Math.floor(points.length / 35)));
    for (let a = 1; a <= numArrows; a++) {
      const t = a / (numArrows + 1);
      const idx = Math.floor(t * (points.length - 2));
      const idxNext = Math.min(idx + 1, points.length - 1);
      const pos = points[idx];
      const dir = new THREE.Vector3().subVectors(points[idxNext], points[idx]);
      if (dir.lengthSq() < 1e-10) continue;
      dir.normalize();

      // Reduced direction arrows size to 70% of original (0.055 -> 0.0385, 0.16 -> 0.112)
      const cone = new THREE.Mesh(new THREE.ConeGeometry(0.0385, 0.112, 6), mat);
      cone.position.copy(pos);
      cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      group.add(cone);
    }
  }
  return group;
}

function rebuildFieldLines() {
  // Clear
  while (fieldLinesGroup.children.length > 0) {
    const child = fieldLinesGroup.children[0];
    fieldLinesGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  activeFieldLines = []; // Reset for flow arrows
  
  fieldLinesGroup.visible = state.showFieldLines;
  if (!state.showFieldLines) {
    rebuildFlowArrows(); // Rebuild arrows even if lines hidden
    return;
  }

  const startPoints = generateStartPoints(currentPoles, state.numLines);
  const lineColor = state.isDark ? 0xf59e0b : 0xd97706;

  for (const start of startPoints) {
    const externalPoints = traceFieldLine(start, currentPoles, 1, 500, 0.06);
    if (externalPoints.length < 5) continue;

    // Form closed loop: External (N->S) + Internal straight line (S->N)
    const closedPoints = [...externalPoints];
    if (closedPoints.length > 0) {
      closedPoints.push(start.clone()); // Connect end (S pole) back to start (N pole)
    }

    const lineObj = createFieldLineObject(closedPoints, lineColor, state.showArrows);
    fieldLinesGroup.add(lineObj);
    activeFieldLines.push(closedPoints);
  }

  rebuildFlowArrows(); // Assign arrows to the newly generated lines
}

// ==================== 3D Flowing Vectors (Compasses) ====================
function initFlowArrows() {
  for(let i=0; i<FLOW_ARROW_COUNT; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: 0x14b8a6, transparent: true, opacity: 0.85 });
    const mesh = new THREE.Mesh(flowArrowGeo, mat);
    mesh.visible = false;
    compassesGroup.add(mesh);
    flowArrows.push({
      mesh: mesh,
      lineIdx: 0,
      progress: Math.random()
    });
  }
  compassesGroup.visible = state.showCompasses;
}

function rebuildFlowArrows() {
  if (activeFieldLines.length === 0) {
    flowArrows.forEach(a => a.mesh.visible = false);
    return;
  }
  
  for (let i = 0; i < flowArrows.length; i++) {
    const arrow = flowArrows[i];
    arrow.lineIdx = i % activeFieldLines.length;
    arrow.progress = Math.random();
    arrow.mesh.visible = state.showCompasses;
  }
}

function updateFlowArrows(dt) {
  if (activeFieldLines.length === 0) return;
  
  const speed = state.animSpeed * 0.15;
  const tempDir = new THREE.Vector3(0, 1, 0);
  
  for (let arrow of flowArrows) {
    if (!arrow.mesh.visible) continue;
    
    arrow.progress += speed * dt;
    if (arrow.progress >= 1.0) arrow.progress -= 1.0;
    
    const line = activeFieldLines[arrow.lineIdx];
    if (!line || line.length < 2) continue;
    
    const totalSegments = line.length - 1;
    const exactSeg = arrow.progress * totalSegments;
    const idx = Math.floor(exactSeg);
    const t = exactSeg - idx;
    const idxNext = (idx + 1) % line.length;
    
    const p1 = line[idx];
    const p2 = line[idxNext];
    
    const pos = new THREE.Vector3().lerpVectors(p1, p2, t);
    const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
    
    arrow.mesh.position.copy(pos);
    arrow.mesh.quaternion.setFromUnitVectors(tempDir, dir);
    
    // Update color based on field strength at pos
    const B = fieldAt(pos, currentPoles);
    const mag = B.length();
    const t_color = Math.min(1, Math.log10(1 + mag * 30) / 1.8);
    const hue = 0.5 - 0.45 * t_color; // teal -> amber
    arrow.mesh.material.color.setHSL(hue, 0.72, 0.52);
  }
}

// ==================== Current Arrows System ====================
function initCurrentArrows() {
  const numArrows = 24; // 2 arrows per turn for 12 turns
  const mat = new THREE.MeshBasicMaterial({ color: 0xffea00 }); // Bright yellow
  const geo = new THREE.ConeGeometry(0.06, 0.16, 8);
  
  for (let i = 0; i < numArrows; i++) {
    const mesh = new THREE.Mesh(geo, mat);
    currentArrowsGroup.add(mesh);
    currentMarkers.push({
      mesh: mesh,
      t: i / numArrows
    });
  }
  currentArrowsGroup.visible = state.showCurrentArrows;
}

function updateCurrentArrows(dt) {
  if (!solenoidCurve) return;
  // Current direction: flowing from -z to +z wrapping counter-clockwise (t: 0 -> 1)
  const speed = state.current * state.animSpeed * 0.3; // Speed proportional to current
  
  for (let marker of currentMarkers) {
    marker.t += speed * dt;
    if (marker.t >= 1.0) marker.t -= 1.0;
    
    const pos = solenoidCurve.getPoint(marker.t);
    const tan = solenoidCurve.getTangent(marker.t);
    
    marker.mesh.position.copy(pos);
    marker.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tan);
  }
}

// ==================== Magnet Rebuild ====================
function rebuildMagnet() {
  while (magnetGroup.children.length > 0) {
    const child = magnetGroup.children[0];
    magnetGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  }

  // Solenoid only
  magnetGroup.add(createSolenoidModel());
  currentPoles = getSolenoidPoles(state.strength);
}

// ==================== Theme ====================
function applyTheme() {
  if (state.isDark) {
    document.body.classList.remove('light');
    scene.background = new THREE.Color(0x0a1420);
    scene.fog.color = new THREE.Color(0x0a1420);
    gridHelper.material.color = new THREE.Color(0x2a4a6a);
    if (gridHelper.material.opacity !== undefined) gridHelper.material.opacity = 0.5;
  } else {
    document.body.classList.add('light');
    scene.background = new THREE.Color(0xf5f1ea);
    scene.fog.color = new THREE.Color(0xf5f1ea);
    gridHelper.material.color = new THREE.Color(0xc4b89e);
    if (gridHelper.material.opacity !== undefined) gridHelper.material.opacity = 0.6;
  }
  rebuildFieldLines();
}

// ==================== Language ====================
function applyLang() {
  document.querySelectorAll('[data-zh]').forEach(el => {
    const text = el.getAttribute('data-' + state.lang);
    if (text) el.textContent = text;
  });
  document.getElementById('lang-zh').classList.toggle('active', state.lang === 'zh');
  document.getElementById('lang-en').classList.toggle('active', state.lang === 'en');
  document.documentElement.lang = state.lang === 'zh' ? 'zh-HK' : 'en';
}

// ==================== Draggable ====================
function makeDraggable(element, handle) {
  let isDragging = false;
  let offsetX = 0, offsetY = 0;

  function onStart(e) {
    isDragging = true;
    const touch = e.touches ? e.touches[0] : e;
    const rect = element.getBoundingClientRect();
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;
    element.style.left = rect.left + 'px';
    element.style.top = rect.top + 'px';
    element.style.right = 'auto';
    element.style.bottom = 'auto';
    if (e.cancelable) e.preventDefault();
  }

  function onMove(e) {
    if (!isDragging) return;
    const touch = e.touches ? e.touches[0] : e;
    let nx = touch.clientX - offsetX;
    let ny = touch.clientY - offsetY;
    nx = Math.max(0, Math.min(window.innerWidth - element.offsetWidth, nx));
    ny = Math.max(0, Math.min(window.innerHeight - 40, ny));
    element.style.left = nx + 'px';
    element.style.top = ny + 'px';
    if (e.cancelable) e.preventDefault();
  }

  function onEnd() { isDragging = false; }

  handle.addEventListener('mousedown', onStart);
  handle.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

// ==================== UI Handlers ====================
window.togglePanel = function(id) {
  const panel = document.getElementById(id);
  panel.classList.toggle('collapsed');
};

window.toggleInfoContent = function() {
  const content = document.getElementById('info-content');
  const icon = document.getElementById('info-collapse-icon');
  content.classList.toggle('collapsed');
  icon.textContent = content.classList.contains('collapsed') ? '+' : '−';
};

window.setLang = function(l) {
  state.lang = l;
  applyLang();
};

window.toggleDarkMode = function() {
  state.isDark = !state.isDark;
  applyTheme();
};

window.onCurrentChange = function(val) {
  state.current = parseFloat(val);
  document.getElementById('current-val').textContent = state.current.toFixed(1);
  state.strength = state.current;
  
  // Increase field lines count as current increases
  state.numLines = Math.round(6 + state.current * 4);
  
  rebuildMagnet();
  rebuildFieldLines();
};

window.onLinesToggle = function(checked) {
  state.showFieldLines = checked;
  rebuildFieldLines(); // Need to rebuild to update activeFieldLines for arrows
};

window.onCompassToggle = function(checked) {
  state.showCompasses = checked;
  compassesGroup.visible = checked;
  flowArrows.forEach(a => a.mesh.visible = checked);
};

window.onArrowsToggle = function(checked) {
  state.showArrows = checked;
  rebuildFieldLines();
};

window.onCurrentArrowsToggle = function(checked) {
  state.showCurrentArrows = checked;
  currentArrowsGroup.visible = checked;
};

window.onSpeedChange = function(val) {
  state.animSpeed = parseFloat(val);
  document.getElementById('speed-val').textContent = state.animSpeed.toFixed(1);
};

window.resetView = function() {
  camera.position.set(3.8, 2.8, 4.8);
  controls.target.set(0, 0, 0);
  controls.update();
  showToast(state.lang === 'zh' ? '視角已重置' : 'View reset');
};

window.resetAll = function() {
  state.current = 0.6;
  state.strength = 0.6;
  state.numLines = 8;
  state.showFieldLines = true;
  state.showCompasses = true;
  state.showArrows = false;
  state.showCurrentArrows = false;
  state.animSpeed = 1.0;

  document.getElementById('current-slider').value = 0.6;
  document.getElementById('current-val').textContent = '0.6';
  document.getElementById('lines-toggle').checked = true;
  document.getElementById('compass-toggle').checked = true;
  document.getElementById('arrows-toggle').checked = false;
  document.getElementById('current-arrows-toggle').checked = false;
  document.getElementById('speed-slider').value = 1.0;
  document.getElementById('speed-val').textContent = '1.0';
  
  fieldLinesGroup.visible = true;
  compassesGroup.visible = true;

  rebuildMagnet();
  rebuildFieldLines();
  camera.position.set(3.8, 2.8, 4.8);
  controls.target.set(0, 0, 0);
  controls.update();
  showToast(state.lang === 'zh' ? '已重置所有設定' : 'All settings reset');
};

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ==================== Start ====================
init();
</script>
