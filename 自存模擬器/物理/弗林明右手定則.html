<script>
/* ==========================================
   Language Dictionary
========================================== */
const dict = {
    zh: {
        title: "弗林明右手定則",
        subtitle: "3D 互動模擬器 | HKDSE Physics",
        ctrlTitle: "實驗控制面板",
        labelB: "磁場方向 (食指)",
        labelV: "運動方向 (拇指)",
        labelI: "感生電流 (中指)",
        labelShowLines: "顯示紅色磁場線",
        infoTitle: "DSE 重點提示",
        info1: "1. 弗林明右手定則用於判斷 <strong class='text-white'>發電機 (Generator)</strong> 中的感生電流方向。",
        info2: "2. 三指互相垂直：<br><span class='inline-block mt-1'>• <span class='text-green-400 font-bold bg-green-500/10 px-1 rounded'>拇指 (Thumb)</span>：運動 <span class='math-italic'>v</span></span><br><span class='inline-block mt-1'>• <span class='text-blue-400 font-bold bg-blue-500/10 px-1 rounded'>食指 (First finger)</span>：磁場 <span class='math-italic'>B</span> (N向S)</span><br><span class='inline-block mt-1'>• <span class='text-red-400 font-bold bg-red-500/10 px-1 rounded'>中指 (seCond)</span>：電流 <span class='math-italic'>I</span></span>",
        warningTitle: "常見陷阱：",
        warningText: "當運動方向與磁場方向平行時，導線沒有切割磁通量，因此感生電流為 0。",
        infoHint: "滑動畫面可旋轉 3D 視角",
        statusIn: "向內流入 ⊗",
        statusOut: "向外流出 ⊙",
        statusZero: "無切割磁通 (電流 = 0)",
        dragHint: "拖曳旋轉視角<br>滾輪縮放大小"
    },
    en: {
        title: "Fleming's Right-Hand Rule",
        subtitle: "3D Interactive Simulator | HKDSE Physics",
        ctrlTitle: "Control Panel",
        labelB: "B-Field (First Finger)",
        labelV: "Motion (Thumb)",
        labelI: "Induced Current (2nd)",
        labelShowLines: "Show Red Field Lines",
        infoTitle: "DSE Key Notes",
        info1: "1. Right-Hand Rule is used to determine the induced current in <strong class='text-white'>Generators</strong>.",
        info2: "2. Mutually perpendicular:<br><span class='inline-block mt-1'>• <span class='text-green-400 font-bold bg-green-500/10 px-1 rounded'>Thumb</span>: Motion <span class='math-italic'>v</span></span><br><span class='inline-block mt-1'>• <span class='text-blue-400 font-bold bg-blue-500/10 px-1 rounded'>First finger</span>: B-Field <span class='math-italic'>B</span> (N to S)</span><br><span class='inline-block mt-1'>• <span class='text-red-400 font-bold bg-red-500/10 px-1 rounded'>Second finger</span>: Current <span class='math-italic'>I</span></span>",
        warningTitle: "Common Trap:",
        warningText: "If motion is parallel to the magnetic field, no magnetic flux is cut, so Induced Current = 0.",
        infoHint: "Drag to rotate the 3D view",
        statusIn: "Inwards ⊗",
        statusOut: "Outwards ⊙",
        statusZero: "No flux cut (Current = 0)",
        dragHint: "Drag to rotate <br> Scroll to zoom"
    }
};

let currentLang = 'zh';

function setLanguage(lang) {
    currentLang = lang;
    const t = dict[lang];
    
    document.getElementById('title').innerHTML = t.title;
    document.getElementById('subtitle').innerHTML = t.subtitle;
    document.getElementById('ctrl-title').innerHTML = t.ctrlTitle;
    document.getElementById('label-b-field').innerHTML = t.labelB;
    document.getElementById('label-motion').innerHTML = t.labelV;
    document.getElementById('label-current').innerHTML = t.labelI;
    document.getElementById('label-show-lines').innerHTML = t.labelShowLines;
    document.getElementById('info-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400 drop-shadow-[0_0_5px_rgba(251,191,36,0.8)]"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg> ` + t.infoTitle;
    document.getElementById('info-1').innerHTML = t.info1;
    document.getElementById('info-2').innerHTML = t.info2;
    
    // Re-inject formatting
    document.getElementById('warning-title').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> ` + t.warningTitle;
    document.getElementById('warning-text').innerHTML = t.warningText;
    document.getElementById('info-hint').innerHTML = "✨ " + t.infoHint;
    document.getElementById('camera-hint').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="M5 15l7-7 7 7"></path></svg> <span class="leading-tight">${t.dragHint}</span>`;

    // Button Styling for Facebook Blue redesign
    document.getElementById('btn-zh').className = lang === 'zh' ? "px-5 py-1.5 text-sm rounded-full bg-[#1877F2] text-white shadow-md transition-all font-bold tracking-widest" : "px-5 py-1.5 text-sm rounded-full text-blue-200 hover:text-white transition-all font-bold tracking-widest";
    document.getElementById('btn-en').className = lang === 'en' ? "px-5 py-1.5 text-sm rounded-full bg-[#1877F2] text-white shadow-md transition-all font-bold tracking-widest" : "px-5 py-1.5 text-sm rounded-full text-blue-200 hover:text-white transition-all font-bold tracking-widest";

    updateUIState(); // Refresh result text
}

function togglePanel(id) {
    const el = document.getElementById(id);
    if(el.classList.contains('opacity-100')) {
        el.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
        el.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
    } else {
        el.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
        el.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
    }
}

function togglePanelContent(contentId, btnId) {
    const content = document.getElementById(contentId);
    const btn = document.getElementById(btnId);
    if(content.classList.contains('hidden')) {
        content.classList.remove('hidden');
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>'; // Minus
    } else {
        content.classList.add('hidden');
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>'; // Plus
    }
}

/* ==========================================
   Physics Simulation State
========================================== */
// Wire is along Z-axis. Vectors B and v are in XY plane.
let vecB = { x: 0, y: 1 };  // Default B up
let vecV = { x: 1, y: 0 };  // Default V right
let currentDir = 1; // +1 (Out), -1 (In), 0 (Zero)

function updatePhysics() {
    // Cross Product: I ∝ v × B
    // v = (vx, vy, 0), B = (Bx, By, 0)
    // v × B = (0, 0, vx*By - vy*Bx)
    const crossZ = (vecV.x * vecB.y) - (vecV.y * vecB.x);
    
    if (crossZ > 0) currentDir = 1;      // Out (+Z)
    else if (crossZ < 0) currentDir = -1; // In (-Z)
    else currentDir = 0;                 // Parallel

    updateUIState();
    updateSceneVectors();
}

function setVector(type, x, y) {
    if (type === 'B') {
        vecB = { x, y };
    } else if (type === 'v') {
        vecV = { x, y };
    }
    updatePhysics();
}

function updateUIState() {
    // Update Button styling
    const btnIds = ['btn-B-up', 'btn-B-down', 'btn-B-left', 'btn-B-right', 'btn-v-up', 'btn-v-down', 'btn-v-left', 'btn-v-right'];
    btnIds.forEach(id => document.getElementById(id).classList.remove('btn-active'));
    
    if(vecB.y === 1) document.getElementById('btn-B-up').classList.add('btn-active');
    if(vecB.y === -1) document.getElementById('btn-B-down').classList.add('btn-active');
    if(vecB.x === -1) document.getElementById('btn-B-left').classList.add('btn-active');
    if(vecB.x === 1) document.getElementById('btn-B-right').classList.add('btn-active');

    if(vecV.y === 1) document.getElementById('btn-v-up').classList.add('btn-active');
    if(vecV.y === -1) document.getElementById('btn-v-down').classList.add('btn-active');
    if(vecV.x === -1) document.getElementById('btn-v-left').classList.add('btn-active');
    if(vecV.x === 1) document.getElementById('btn-v-right').classList.add('btn-active');

    // Update Result Text
    const statusEl = document.getElementById('status-current');
    const indicatorEl = document.getElementById('indicator-I');
    
    if (currentDir === 1) {
        statusEl.innerHTML = dict[currentLang].statusOut;
        statusEl.className = "mt-2 text-center font-black text-xl text-red-400 tracking-wider bg-red-500/10 py-2 rounded-lg border border-red-500/20";
        indicatorEl.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse";
    } else if (currentDir === -1) {
        statusEl.innerHTML = dict[currentLang].statusIn;
        statusEl.className = "mt-2 text-center font-black text-xl text-red-400 tracking-wider bg-red-500/10 py-2 rounded-lg border border-red-500/20";
        indicatorEl.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse";
    } else {
        statusEl.innerHTML = dict[currentLang].statusZero;
        statusEl.className = "mt-2 text-center font-black text-lg text-amber-500 tracking-wider bg-amber-500/10 py-2 rounded-lg border border-amber-500/20";
        indicatorEl.className = "w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.8)] animate-pulse";
    }
}

/* ==========================================
   Three.js Initialization
========================================== */
let scene, camera, renderer, controls;
let wire, magnetN, magnetS;
let arrowB, arrowV, arrowI;
let particles = [];
let fieldLinesGroup;
let showFieldLines = false;
let clock = new THREE.Clock();

function toggleFieldLines() {
    showFieldLines = !showFieldLines;
    if(fieldLinesGroup) fieldLinesGroup.visible = showFieldLines;
    
    const btn = document.getElementById('btn-toggle-lines');
    const dot = document.getElementById('toggle-lines-dot');
    
    if (showFieldLines) {
        btn.classList.replace('bg-slate-600', 'bg-red-500');
        dot.classList.replace('translate-x-0', 'translate-x-5');
    } else {
        btn.classList.replace('bg-red-500', 'bg-slate-600');
        dot.classList.replace('translate-x-5', 'translate-x-0');
    }
}

function createTextTexture(text, bgColor, textColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, 256, 256);
    ctx.font = 'bold 120px sans-serif';
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 128);
    return new THREE.CanvasTexture(canvas);
}

function initThree() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0f172a, 0.02);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(12, 8, 15);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Grid
    const grid = new THREE.GridHelper(20, 20, 0xffffff, 0xffffff);
    grid.material.opacity = 0.1;
    grid.material.transparent = true;
    grid.position.y = -4;
    scene.add(grid);

    // 1. Wire (Conductor)
    const wireGeom = new THREE.CylinderGeometry(0.3, 0.3, 16, 32);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
    wire = new THREE.Mesh(wireGeom, wireMat);
    wire.rotation.x = Math.PI / 2; // Lie along Z-axis
    scene.add(wire);

    // 2. Magnets
    const magnetGeom = new THREE.BoxGeometry(4, 4, 4);
    
    // N Pole (Red) - 6 faces labeled
    const texN = createTextTexture('N', '#ef4444', '#ffffff');
    const matN = Array(6).fill(new THREE.MeshStandardMaterial({ map: texN, roughness: 0.3, metalness: 0.2 }));
    magnetN = new THREE.Mesh(magnetGeom, matN);
    scene.add(magnetN);

    // S Pole (Blue) - 6 faces labeled
    const texS = createTextTexture('S', '#3b82f6', '#ffffff');
    const matS = Array(6).fill(new THREE.MeshStandardMaterial({ map: texS, roughness: 0.3, metalness: 0.2 }));
    magnetS = new THREE.Mesh(magnetGeom, matS);
    scene.add(magnetS);

    // 3. Arrow Helpers
    const origin = new THREE.Vector3(0, 0, 0);
    arrowB = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), origin, 5, 0x3b82f6, 1, 0.5); // Blue B
    arrowV = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), origin, 4, 0x22c55e, 1, 0.5); // Green v
    arrowI = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), origin, 6, 0xef4444, 1.5, 0.6); // Red I

    scene.add(arrowB);
    scene.add(arrowV);
    scene.add(arrowI);

    // 4. Red Magnetic Field Lines
    fieldLinesGroup = new THREE.Group();
    scene.add(fieldLinesGroup);
    
    // Create 4 field lines arranged in a square around the center
    for(let i=0; i<4; i++) {
        // Red arrow (0xef4444) pointing from N to S. Length 8 units.
        let fieldLine = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), 8, 0xef4444, 1.2, 0.6);
        fieldLinesGroup.add(fieldLine);
    }
    fieldLinesGroup.visible = showFieldLines; // Initially hidden

    // Particles for current
    const partGeom = new THREE.SphereGeometry(0.35, 16, 16);
    const partMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
    for(let i=0; i<8; i++) {
        let p = new THREE.Mesh(partGeom, partMat);
        p.position.z = (i * 2) - 7;
        scene.add(p);
        particles.push(p);
    }

    updatePhysics(); // Initial sync
    animate();
}

function updateSceneVectors() {
    if(!scene) return;

    const bDist = 6;
    // B Vector setup
    const vec3B = new THREE.Vector3(vecB.x, vecB.y, 0).normalize();
    arrowB.setDirection(vec3B);

    // Position Magnets based on B field
    // N is source, S is sink. So B points from N to S.
    magnetN.position.copy(vec3B).multiplyScalar(-bDist);
    magnetS.position.copy(vec3B).multiplyScalar(bDist);
    
    // Rotate Magnets to face origin
    magnetN.lookAt(0,0,0);
    magnetS.lookAt(0,0,0);

    // V Vector setup
    const vec3V = new THREE.Vector3(vecV.x, vecV.y, 0).normalize();
    arrowV.setDirection(vec3V);

    // Update Field Lines Positioning
    const upAxis = new THREE.Vector3(0, 0, 1);
    const rightAxis = new THREE.Vector3().crossVectors(vec3B, upAxis).normalize();
    
    // Generate 4 offsets to place arrows in a 2x2 grid around the central main B-vector
    const offsetMag = 1.5; 
    const offsets = [
        new THREE.Vector3().addScaledVector(rightAxis, offsetMag).addScaledVector(upAxis, offsetMag),
        new THREE.Vector3().addScaledVector(rightAxis, offsetMag).addScaledVector(upAxis, -offsetMag),
        new THREE.Vector3().addScaledVector(rightAxis, -offsetMag).addScaledVector(upAxis, offsetMag),
        new THREE.Vector3().addScaledVector(rightAxis, -offsetMag).addScaledVector(upAxis, -offsetMag)
    ];

    fieldLinesGroup.children.forEach((arrow, index) => {
        arrow.setDirection(vec3B);
        // Start position is near the N pole face (-4 units along the B vector)
        let startPos = new THREE.Vector3().copy(vec3B).multiplyScalar(-4);
        startPos.add(offsets[index]);
        arrow.position.copy(startPos);
    });

    // I Vector setup
    if (currentDir !== 0) {
        arrowI.visible = true;
        arrowI.setDirection(new THREE.Vector3(0, 0, currentDir));
        // Reset particle visibility
        particles.forEach(p => p.visible = true);
    } else {
        arrowI.visible = false;
        particles.forEach(p => p.visible = false); // Hide current if 0
    }
}

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();

    // Animate Particles if there is current
    if (currentDir !== 0) {
        const speed = 5 * currentDir;
        particles.forEach(p => {
            p.position.z += speed * delta;
            // Loop back
            if (currentDir > 0 && p.position.z > 8) p.position.z -= 16;
            if (currentDir < 0 && p.position.z < -8) p.position.z += 16;
        });
    }

    // Pulse the motion vector slightly to imply movement
    const time = clock.getElapsedTime();
    arrowV.setLength(4 + Math.sin(time * 5) * 0.3, 1, 0.5);

    controls.update();
    renderer.render(scene, camera);
}

// Window resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Init on load
window.onload = () => {
    setLanguage('zh'); // Apply default language
    initThree();
};

</script>
