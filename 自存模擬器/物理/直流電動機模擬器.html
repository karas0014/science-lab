            <div class="bg-blue-50 dark:bg-blue-900/30 p-3 rounded-lg border border-blue-100 dark:border-blue-800/50">
                <h3 class="text-sm font-bold text-blue-800 dark:text-blue-300 mb-1" data-i18n="dseTips">DSE 觀念提示</h3>
                <p class="text-xs text-blue-700 dark:text-blue-200 leading-relaxed mb-2" id="infoText1">
                    留意雙色換向器（黃色及橙色半環）：每半轉它們會交換接觸的碳刷，令線圈內的電流方向反轉。根據弗萊明左手定則，線圈將維持單向順時針轉動。
                </p>
                <p class="text-xs text-blue-700 dark:text-blue-200 leading-relaxed mb-2" id="infoText2">
                    當線圈處於垂直位置，碳刷接觸換向器的絕緣縫隙，電流及磁力矩降為零，線圈僅靠慣性轉過死點。
                </p>
                <p class="text-xs text-emerald-700 dark:text-emerald-300 leading-relaxed font-semibold border-t border-blue-200 dark:border-blue-800 pt-2" id="graphTipText">
                    圖表重點：注意磁力矩（Torque）呈正弦變化（Sinusoidal Curve），在線圈水平（與磁場平行）時力矩最大，在死點位置（法線與磁場平行）時力矩為零。這與恆定的磁力(F)不同。
                </p>
            </div>

    <script>
        // --- 1. Language & Theme Management ---
        const i18n = {
            zh: {
                title: "直流電動機模擬器",
                controls: "控制面板",
                status: "狀態",
                play: "播放",
                pause: "暫停",
                reset: "重置視角",
                voltage: "電池極性",
                forward: "正向",
                reverse: "反向",
                speed: "輸入電壓 (轉速)",
                visuals: "視覺與向量 (弗萊明左手定則)",
                formulaTitle: "力矩公式 (Torque Formula)",
                showGraphBtn: "顯示力學圖表 (Torque Graph)",
                showNormal: "顯示法線 (Normal) & 角",
                abcdLabels: "顯示 A, B, C, D 標籤",
                dynCurrent: "動態電流動畫",
                magField: "磁場",
                current: "電流向量",
                force: "磁力",
                dseTips: "DSE 觀念提示",
                info1: "留意雙色換向器（黃色及橙色半環）：每半轉它們會交換接觸的碳刷，令線圈內的電流方向反轉。根據弗萊明左手定則，線圈將維持單向順時針轉動。",
                info2: "當線圈處於垂直位置，碳刷接觸換向器的絕緣縫隙，電流及磁力矩降為零，線圈僅靠慣性轉過死點。",
                graphTip: "圖表重點：注意磁力矩（Torque）呈正弦變化（Sinusoidal Curve），在線圈水平（與磁場平行）時力矩最大，在死點位置（法線與磁場平行）時力矩為零。這與恆定的磁力(F)不同。",
                graphTitle: "線圈力矩與角度 (法線與 B 磁場夾角)",
                themeBtn: "切換深淺色模式",
                axisX: "法線與水平磁場 B 夾角 (度)",
                axisY: "力矩 Torque (Nm)"
            },
            en: {
                title: "DC Motor Simulator",
                controls: "Control Panel",
                status: "Status",
                play: "Play",
                pause: "Pause",
                reset: "Reset View",
                voltage: "Battery Polarity",
                forward: "Forward",
                reverse: "Reverse",
                speed: "Input Voltage (Speed)",
                visuals: "Visuals & Vectors (Fleming's LHR)",
                formulaTitle: "Torque Formula",
                showGraphBtn: "Show Torque Graph",
                showNormal: "Show Normal Line & Angle",
                abcdLabels: "Show A, B, C, D Labels",
                dynCurrent: "Dynamic Current Animation",
                magField: "Magnetic Field",
                current: "Current Vector",
                force: "Force",
                dseTips: "DSE Concept Focus",
                info1: "Notice the two-tone commutator: they swap contact with brushes every half turn, reversing the coil's current. By Fleming's Left Hand Rule, this maintains clockwise rotation.",
                info2: "At vertical position, brushes align with gaps. Current & torque are zero. Coil passes the dead center by inertia.",
                graphTip: "Chart Highlight: Note that Torque varies sinusoidally. It is maximum when the coil is horizontal (parallel to B-field) and zero at dead center (Normal is parallel to B-field). This is different from the constant force F.",
                graphTitle: "Torque on Coil vs Angle (Normal & B-field)",
                themeBtn: "Toggle Dark/Light Mode",
                axisX: "Angle between Normal & Horizontal B-field (deg)",
                axisY: "Torque (Nm)"
            }
        };

        let lang = navigator.language.startsWith('zh') ? 'zh' : 'en';
        let isDark = true;
        let isPlaying = true;
        let polarity = 1; 
        let normalVisible = false; // Internal state for normal line visibility
        
        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });
            
            document.getElementById('lang-zh').className = lang === 'zh' 
                ? 'px-3 py-1 text-sm rounded-full bg-white dark:bg-slate-800 text-slate-800 dark:text-white shadow-sm transition-all font-medium'
                : 'px-3 py-1 text-sm rounded-full text-slate-500 dark:text-slate-400 transition-all cursor-pointer hover:bg-slate-300 dark:hover:bg-slate-600';
            document.getElementById('lang-en').className = lang === 'en' 
                ? 'px-3 py-1 text-sm rounded-full bg-white dark:bg-slate-800 text-slate-800 dark:text-white shadow-sm transition-all font-medium'
                : 'px-3 py-1 text-sm rounded-full text-slate-500 dark:text-slate-400 transition-all cursor-pointer hover:bg-slate-300 dark:hover:bg-slate-600';
                
            document.getElementById('playBtn').innerHTML = isPlaying ? i18n[lang].pause : i18n[lang].play;
            document.getElementById('polarityStatus').innerHTML = polarity === 1 ? i18n[lang].forward : i18n[lang].reverse;
            document.getElementById('polarityStatus').className = polarity === 1 ? "text-primary text-xs font-bold" : "text-red-500 text-xs font-bold";
            document.getElementById('themeBtn').title = i18n[lang].themeBtn;
            document.getElementById('infoText1').innerHTML = i18n[lang].info1;
            document.getElementById('infoText2').innerHTML = i18n[lang].info2;
            document.getElementById('graphTipText').innerHTML = i18n[lang].graphTip;

            if (torqueChart) {
                torqueChart.options.scales.x.title.text = i18n[lang].axisX;
                torqueChart.options.scales.y.title.text = i18n[lang].axisY;
                torqueChart.update();
            }
        }

        function toggleLanguage() {
            lang = lang === 'zh' ? 'en' : 'zh';
            updateUI();
        }

        // --- 2. Draggable Panels Setup ---
        function setupDraggable(panelId, headerId) {
            const panel = document.getElementById(panelId);
            const header = document.getElementById(headerId);
            let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

            header.addEventListener('mousedown', dragStart);
            header.addEventListener('touchstart', dragStart, {passive: false});
            window.addEventListener('mouseup', dragEnd);
            window.addEventListener('touchend', dragEnd);
            window.addEventListener('mousemove', drag);
            window.addEventListener('touchmove', drag, {passive: false});

            function dragStart(e) {
                if (e.target.closest('button')) return;
                initialX = e.type === 'touchstart' ? e.touches[0].clientX - xOffset : e.clientX - xOffset;
                initialY = e.type === 'touchstart' ? e.touches[0].clientY - yOffset : e.clientY - yOffset;
                isDragging = true;
            }
            function dragEnd() {
                initialX = currentX; initialY = currentY; isDragging = false;
            }
            function drag(e) {
                if (isDragging) {
                    e.preventDefault();
                    currentX = e.type === 'touchmove' ? e.touches[0].clientX - initialX : e.clientX - initialX;
                    currentY = e.type === 'touchmove' ? e.touches[0].clientY - initialY : e.clientY - initialY;
                    xOffset = currentX; yOffset = currentY;
                    panel.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                }
            }
        }

                rod.scale.set(1, rLen, 1);
                head.scale.set(1, hLen, 1);

            let total = 0;
            for(let i=1; i<points.length; i++) {
                total += points[i-1].distanceTo(points[i]);
                dists.push(total);
            }
            return { dists, total };
        }
        const coilPathData = calcDistances(coilPathPoints);

        const extParticlesGroup = new THREE.Group();
        scene.add(extParticlesGroup);
        const numExtParticles = 8;
        const extParticlesL = [], extParticlesR = [];
        for(let i=0; i<numExtParticles; i++) {
            const pl = new THREE.Mesh(particleGeo, particleMat);
            const pr = new THREE.Mesh(particleGeo, particleMat);
            extParticlesGroup.add(pl); extParticlesGroup.add(pr);
            extParticlesL.push(pl); extParticlesR.push(pr);
        }

        const extLeftData = calcDistances(leftWirePoints);
        const extRightData = calcDistances(rightWirePoints);

        function getPointOnPath(fraction, points, dists, total) {
            let d = fraction * total;
            for(let i=1; i<dists.length; i++) {
                if(d <= dists[i]) {
                    let segFrac = (d - dists[i-1]) / (dists[i] - dists[i-1]);
                    return new THREE.Vector3().lerpVectors(points[i-1], points[i], segFrac);
                }
            }
            return points[points.length-1];
        }

        let motorAngle = 0; // Starts at 0 
        let currentPhase = 0; 
        let extPhase = 0;     

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const speed = parseFloat(document.getElementById('speedSlider').value);
            const showABCD = document.getElementById('showABCD').checked;
            const showDyn = document.getElementById('showDynCurrent').checked;
            const showB = document.getElementById('showB').checked;
            const showI = document.getElementById('showI').checked;
            const showF = document.getElementById('showF').checked;

            if (isPlaying) {
                motorAngle -= speed * polarity;
                if(motorAngle < 0) {
                     motorAngle += Math.PI * 2;
                }
                motorAngle %= (Math.PI * 2);
                coilGroup.rotation.z = motorAngle;
            }

            batGroup.rotation.y = polarity === 1 ? 0 : Math.PI;

            abcdGroup.visible = showABCD;
            normalGroup.visible = normalVisible;
            bRefLine.visible = normalVisible;
            arcMesh.visible = normalVisible;

            const normalWorld = new THREE.Vector3(0, 1, 0).applyEuler(coilGroup.rotation);
            let thetaRad = Math.atan2(normalWorld.y, normalWorld.x);
            if (thetaRad < 0) thetaRad += 2 * Math.PI;
            
            if (normalVisible) {
                updateAngleArc(thetaRad);
            }

            let modAngle = motorAngle % Math.PI;
            let isDeadCenter = (modAngle > Math.PI/2 - 0.15 && modAngle < Math.PI/2 + 0.15);
            let rightSideIsRight = ((motorAngle % (Math.PI*2)) < Math.PI/2 || (motorAngle % (Math.PI*2)) > 3*Math.PI/2);

            if(torqueChart && document.getElementById('showGraphToggle').checked) {
                let thetaDeg = thetaRad * 180 / Math.PI;
                let currentTorque = (speed === 0 && isDeadCenter) ? 0 : 1.0 * Math.abs(Math.sin(thetaRad));
                
                if (thetaDeg >= 360) thetaDeg = 0;

                torqueChart.data.datasets[1].data[0] = {x: thetaDeg, y: currentTorque};
                torqueChart.update('none'); 
            }

            bArrows.forEach(a => a.visible = showB);

            if (isDeadCenter || speed === 0) {
                iArrowL.visible = false; iArrowR.visible = false;
                fArrowL.visible = false; fArrowR.visible = false;
            } else {
                iArrowL.visible = showI; iArrowR.visible = showI;
                fArrowL.visible = showF; fArrowR.visible = showF;
                
                const speedScale = speed / 0.1; 
                const currentArrowLength = 2.0 + speedScale * 3.0; 
                const forceArrowLength = 1.5 + speedScale * 2.5;   

                iArrowL.setLength(currentArrowLength, 0.6);
                iArrowR.setLength(currentArrowLength, 0.6);
                fArrowL.setLength(forceArrowLength, 0.6);
                fArrowR.setLength(forceArrowLength, 0.6);

                const leftPos = new THREE.Vector3(-width/2, 0, 0).applyEuler(coilGroup.rotation);
                const rightPos = new THREE.Vector3(width/2, 0, 0).applyEuler(coilGroup.rotation);

                let cDir = polarity; 
                
                let dirL = new THREE.Vector3(0, 0, leftPos.x < 0 ? cDir : -cDir);
                iArrowL.setDirection(dirL);
                iArrowL.position.copy(leftPos).addScaledVector(dirL, -currentArrowLength / 2);
                fArrowL.setDirection(new THREE.Vector3(0, dirL.z, 0));
                fArrowL.position.copy(leftPos);

                let dirR = new THREE.Vector3(0, 0, rightPos.x < 0 ? cDir : -cDir);
                iArrowR.setDirection(dirR);
                iArrowR.position.copy(rightPos).addScaledVector(dirR, -currentArrowLength / 2);
                fArrowR.setDirection(new THREE.Vector3(0, dirR.z, 0));
                fArrowR.position.copy(rightPos);
            }

            coilParticlesGroup.visible = showDyn;
            extParticlesGroup.visible = showDyn;

            if (showDyn) {
                if (isDeadCenter || speed === 0 || !isPlaying) {
                    particleMat.opacity = 0.2;
                    particleMat.transparent = true;
                } else {
                    particleMat.opacity = 1.0;
                    particleMat.transparent = false;
                    
                    let localCurrentDir = 1;
                    if (polarity === 1) {
                        localCurrentDir = rightSideIsRight ? 1 : -1;
                    } else {
                        localCurrentDir = rightSideIsRight ? -1 : 1;
                    }
                    
                    currentPhase += 0.015 * localCurrentDir;
                    if(currentPhase < 0) currentPhase += 1;
                    currentPhase %= 1;

                    extPhase += 0.015;
                    extPhase %= 1;
                }

                for(let i=0; i<numCoilParticles; i++) {
                    let frac = (currentPhase + i / numCoilParticles) % 1;
                    let pos = getPointOnPath(frac, coilPathPoints, coilPathData.dists, coilPathData.total);
                    coilParticles[i].position.copy(pos);
                }

                for(let i=0; i<numExtParticles; i++) {
                    let fR, fL;
                    if(polarity === 1) {
                        fR = (extPhase + i / numExtParticles) % 1;
                        fL = (extPhase + i / numExtParticles) % 1;
                    } else {
                        fR = 1 - ((extPhase + i / numExtParticles) % 1);
                        fL = 1 - ((extPhase + i / numExtParticles) % 1);
                    }

                    extParticlesR[i].position.copy(getPointOnPath(fR, rightWirePoints, extRightData.dists, extRightData.total));
                    extParticlesL[i].position.copy(getPointOnPath(fL, leftWirePoints, extLeftData.dists, extLeftData.total));
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize Everything
        // Explicitly set the normal checkbox state to false initially
        document.getElementById('showNormal').checked = false;
        
        updateUI();
        animate();
    </script>
</body>
</html>
