<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==================== State ====================
const state = {
  magnetType: 'bar', // Only bar magnet now
  strength: 1.0,
  numLines: 288,
  vectorDensity: 2,
  showFieldLines: true,
  showCompasses: true,
  showArrows: false,
  showMagnet2: false,
  showNeutralPoints: false,
  animSpeed: 1.0,
  isDark: true,
  lang: 'zh'
};

let scene, camera, renderer, controls, clock;
let magnet1, magnet2;
let fieldLinesGroup, compassesGroup;
let gridHelper, floorMesh;
let currentPoles = [];

// Interactions
let transformControl;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Flow Arrow System
let flowArrows = [];
const FLOW_ARROW_COUNT = 8000; // 擴大渲染池以應付高達 1152 條磁力線 * 6 倍密度
const flowArrowGeo = new THREE.ConeGeometry(0.035, 0.126, 5);
let activeFieldLines = []; // Store closed loop points

// ==================== Init ====================
function init() {
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1420);
  scene.fog = new THREE.Fog(0x0a1420, 12, 28);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(3.8, 4.8, 5.8);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 2;
  controls.maxDistance = 14;
  controls.target.set(0, 0, 0);

  // Transform Controls for dragging / rotating
  transformControl = new TransformControls(camera, renderer.domElement);
  transformControl.addEventListener('dragging-changed', function (event) {
    controls.enabled = !event.value;
    if (!event.value) {
      // Drag ended, recalculate the expensive field lines
      rebuildFieldLines();
    }
  });
  transformControl.addEventListener('change', function () {
    // Update poles continuously during drag so compasses reflect real-time changes
    updateDynamicPoles(); 
  });
  scene.add(transformControl);

  // Interaction click listener
  renderer.domElement.addEventListener('pointerdown', onPointerDown);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
  dirLight.position.set(5, 9, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.left = -5;
  dirLight.shadow.camera.right = 5;
  dirLight.shadow.camera.top = 5;
  dirLight.shadow.camera.bottom = -5;
  dirLight.shadow.bias = -0.001;
  scene.add(dirLight);
  scene.add(new THREE.HemisphereLight(0x88aaff, 0x443322, 0.35));

  // Floor for shadows
  const floorGeo = new THREE.PlaneGeometry(20, 20);
  const floorMat = new THREE.ShadowMaterial({ opacity: 0.28 });
  floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.y = -1.5;
  floorMesh.receiveShadow = true;
  scene.add(floorMesh);

  // Grid
  gridHelper = new THREE.GridHelper(10, 20, 0x2a4a6a, 0x1a3040);
  gridHelper.position.y = -1.499;
  scene.add(gridHelper);

  // Groups
  fieldLinesGroup = new THREE.Group();
  scene.add(fieldLinesGroup);
  compassesGroup = new THREE.Group();
  scene.add(compassesGroup);

  clock = new THREE.Clock();

  // Build scene
  initMagnets();
  initFlowArrows();
  rebuildFieldLines();

  // Auto-detect language
  const userLang = (navigator.language || 'zh-HK').toLowerCase();
  state.lang = userLang.startsWith('zh') ? 'zh' : 'en';
  applyLang();

  // Make info window draggable
  makeDraggable(document.getElementById('info-window'), document.querySelector('.drag-handle'));

  animate();
  window.addEventListener('resize', onResize);
}

function onPointerDown(event) {
  if (transformControl.dragging) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const activeMagnets = state.showMagnet2 ? [magnet1, magnet2] : [magnet1];
  const testMeshes = [];
  activeMagnets.forEach(m => m.children.forEach(c => {
    if (c.isMesh && c.geometry.type === 'BoxGeometry') testMeshes.push(c);
  }));

  const intersects = raycaster.intersectObjects(testMeshes);
  if (intersects.length > 0) {
    const selected = intersects[0].object.parent;
    transformControl.attach(selected);
    document.getElementById('interaction-mode').style.display = 'block';
  } else {
    // check if we clicked on TransformControls axis, if not detach
    if (!transformControl.axis) {
      transformControl.detach();
      document.getElementById('interaction-mode').style.display = 'none';
    }
  }
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  controls.update();

  if (state.showCompasses) {
    updateFlowArrows(dt);
  }

  renderer.render(scene, camera);
}

// ==================== Magnet Models & Dynamic Poles ====================
function createLabelSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = 'bold 88px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 6;
  ctx.fillText(text, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.renderOrder = 10;
  return sprite;
}

function createBarMagnetModel() {
  const group = new THREE.Group();
  
  const matN = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.4, metalness: 0.1 });
  const matS = new THREE.MeshStandardMaterial({ color: 0x2c5fa8, roughness: 0.4, metalness: 0.1 });

  const w = 0.4, h = 0.4, halfLen = 0.6;

  const N = new THREE.Mesh(new THREE.BoxGeometry(w, h, halfLen), matN);
  N.position.set(0, 0, halfLen / 2);
  N.castShadow = true;
  N.receiveShadow = true;
  group.add(N);

  const S = new THREE.Mesh(new THREE.BoxGeometry(w, h, halfLen), matS);
  S.position.set(0, 0, -halfLen / 2);
  S.castShadow = true;
  S.receiveShadow = true;
  group.add(S);

  const labelN = createLabelSprite('N');
  labelN.position.set(0, h/2 + 0.1, halfLen / 2);
  labelN.scale.set(0.3, 0.3, 1);
  group.add(labelN);

  const labelS = createLabelSprite('S');
  labelS.position.set(0, h/2 + 0.1, -halfLen / 2);
  labelS.scale.set(0.3, 0.3, 1);
  group.add(labelS);

  return group;
}

function initMagnets() {
  magnet1 = createBarMagnetModel();
  scene.add(magnet1);
  
  magnet2 = createBarMagnetModel();
  magnet2.visible = false;
  scene.add(magnet2);

  updateDynamicPoles();
}

function updateDynamicPoles() {
  currentPoles = [];
  const activeMagnets = state.showMagnet2 ? [magnet1, magnet2] : [magnet1];
  
  activeMagnets.forEach(mag => {
    // Update local matrices
    mag.updateMatrixWorld(true);
    
    // Pole physical centers in local space
    const nPosLocal = new THREE.Vector3(0, 0, 0.45);
    const sPosLocal = new THREE.Vector3(0, 0, -0.45);
    
    // Convert to world space
    const nPosWorld = nPosLocal.applyMatrix4(mag.matrixWorld);
    const sPosWorld = sPosLocal.applyMatrix4(mag.matrixWorld);
    
    currentPoles.push({ pos: nPosWorld, q: state.strength });
    currentPoles.push({ pos: sPosWorld, q: -state.strength });
  });
}

function isInsideMagnet(pos) {
  const activeMagnets = state.showMagnet2 ? [magnet1, magnet2] : [magnet1];
  for (let mag of activeMagnets) {
    const localPos = mag.worldToLocal(pos.clone());
    if (Math.abs(localPos.x) < 0.22 && Math.abs(localPos.y) < 0.22 && Math.abs(localPos.z) < 0.65) {
      return true;
    }
  }
  return false;
}

// ==================== Field Calculation ====================
function fieldAt(pos, poles) {
  const B = new THREE.Vector3(0, 0, 0);
  const tmp = new THREE.Vector3();
  for (const pole of poles) {
    tmp.subVectors(pos, pole.pos);
    const r2 = tmp.lengthSq();
    if (r2 < 0.012) continue;
    const r = Math.sqrt(r2);
    // Superposition: Vectors inherently add up correctly
    const factor = pole.q / (r2 * r);
    B.addScaledVector(tmp, factor);
  }
  return B;
}

// ==================== Field Line Tracing (RK4) ====================
function traceFieldLine(startPos, poles, direction = 1, maxSteps = 500, stepSize = 0.06) {
  const points = [startPos.clone()];
  const pos = startPos.clone();
  const k1 = new THREE.Vector3(), k2 = new THREE.Vector3(), k3 = new THREE.Vector3(), k4 = new THREE.Vector3();
  const tmp = new THREE.Vector3();

  for (let i = 0; i < maxSteps; i++) {
    const B1 = fieldAt(pos, poles);
    if (B1.lengthSq() < 1e-24) break;
    k1.copy(B1).multiplyScalar(direction * stepSize / B1.length());

    tmp.copy(pos).addScaledVector(k1, 0.5);
    const B2 = fieldAt(tmp, poles);
    if (B2.lengthSq() < 1e-24) break;
    k2.copy(B2).multiplyScalar(direction * stepSize / B2.length());

    tmp.copy(pos).addScaledVector(k2, 0.5);
    const B3 = fieldAt(tmp, poles);
    if (B3.lengthSq() < 1e-24) break;
    k3.copy(B3).multiplyScalar(direction * stepSize / B3.length());

    tmp.copy(pos).add(k3);
    const B4 = fieldAt(tmp, poles);
    if (B4.lengthSq() < 1e-24) break;
    k4.copy(B4).multiplyScalar(direction * stepSize / B4.length());

    pos.addScaledVector(k1, 1/6).addScaledVector(k2, 1/3).addScaledVector(k3, 1/3).addScaledVector(k4, 1/6);
    points.push(pos.clone());

    // Termination: near opposite-sign pole
    let done = false;
    for (const pole of poles) {
      if ((direction > 0 && pole.q < 0) || (direction < 0 && pole.q > 0)) {
        if (pos.distanceToSquared(pole.pos) < 0.02) {
          points.push(pole.pos.clone());
          done = true;
          break;
        }
      }
    }
    if (done) break;

    // Bounds
    if (pos.lengthSq() > 120) break;
  }
  return points;
}

// ==================== Starting Points (Strictly Symmetrical) ====================
function generateStartPoints(poles, count) {
  const nPoles = poles.filter(p => p.q > 0);
  if (nPoles.length === 0) return [];

  const points = [];
  const pointsPerLayer = 36; // 36 lines per layer for perfect 10-degree rotational symmetry
  
  // Distribute requested count evenly among all N-poles
  const countPerPole = Math.max(1, count / nPoles.length);
  const layers = Math.max(1, Math.round(countPerPole / pointsPerLayer));
  const r = 0.15; // Starting sphere radius around N pole

  const activeMagnets = state.showMagnet2 ? [magnet1, magnet2] : [magnet1];

  for (let mIdx = 0; mIdx < nPoles.length; mIdx++) {
    const pole = nPoles[mIdx];
    const parentMagnet = activeMagnets[mIdx];

    for (let l = 0; l < layers; l++) {
      const theta = (l + 0.5) / layers * (Math.PI / 2); // Distribute across hemispheres
      for (let p = 0; p < pointsPerLayer; p++) {
        const phi = (p / pointsPerLayer) * Math.PI * 2;
        
        // Direction in local space (N-pole points along +Z)
        const localDir = new THREE.Vector3(
          Math.sin(theta) * Math.cos(phi),
          Math.sin(theta) * Math.sin(phi),
          Math.cos(theta)
        );
        
        // Transform direction to world space rotation
        const worldDir = localDir.applyQuaternion(parentMagnet.quaternion);
        
        const startPos = new THREE.Vector3().copy(pole.pos).addScaledVector(worldDir, r);
        
        // Force the point outwards until it is strictly outside the magnet bounds
        let limit = 0;
        while (isInsideMagnet(startPos) && limit < 20) {
          startPos.addScaledVector(worldDir, 0.05);
          limit++;
        }
        
        points.push(startPos);
      }
    }
  }
  
  // Update the UI to reflect the actual symmetric count
  if (document.getElementById('lines-control').style.display !== 'none') {
      const linesVal = document.getElementById('lines-val');
      if (linesVal) linesVal.textContent = points.length;
  }
  
  return points;
}

// ==================== Field Line Rendering ====================
function createFieldLineObject(points, color, showArrows) {
  const group = new THREE.Group();

  // Main line
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.72
  });
  const line = new THREE.Line(geometry, material);
  group.add(line);

  // Direction arrows
  if (showArrows && points.length > 8) {
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const numArrows = Math.max(1, Math.min(4, Math.floor(points.length / 35)));
    for (let a = 1; a <= numArrows; a++) {
      const t = a / (numArrows + 1);
      const idx = Math.floor(t * (points.length - 2));
      const idxNext = Math.min(idx + 1, points.length - 1);
      const pos = points[idx];
      const dir = new THREE.Vector3().subVectors(points[idxNext], points[idx]);
      if (dir.lengthSq() < 1e-10) continue;
      dir.normalize();

      const cone = new THREE.Mesh(new THREE.ConeGeometry(0.0385, 0.112, 6), mat);
      cone.position.copy(pos);
      cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      group.add(cone);
    }
  }
  return group;
}

function rebuildFieldLines() {
  // Clear
  while (fieldLinesGroup.children.length > 0) {
    const child = fieldLinesGroup.children[0];
    fieldLinesGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  activeFieldLines = []; 
  
  fieldLinesGroup.visible = state.showFieldLines;
  if (!state.showFieldLines) {
    rebuildFlowArrows(); 
    return;
  }

  const startPoints = generateStartPoints(currentPoles, state.numLines);
  const lineColor = state.isDark ? 0xf59e0b : 0xd97706;

  for (const start of startPoints) {
    const externalPoints = traceFieldLine(start, currentPoles, 1, 500, 0.06);
    if (externalPoints.length < 5) continue;

    const closedPoints = [...externalPoints];
    
    // Draw straight line backward if it reached another pole to close the loop
    if (closedPoints.length > 0) {
       closedPoints.push(start.clone()); 
    }

    const lineObj = createFieldLineObject(closedPoints, lineColor, state.showArrows);
    fieldLinesGroup.add(lineObj);
    activeFieldLines.push(closedPoints);
  }

  rebuildFlowArrows();
}

// ==================== 3D Flowing Vectors (Compasses) ====================
function initFlowArrows() {
  for(let i=0; i<FLOW_ARROW_COUNT; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: 0x14b8a6, transparent: true, opacity: 0.85 });
    const mesh = new THREE.Mesh(flowArrowGeo, mat);
    mesh.visible = false;
    compassesGroup.add(mesh);
    flowArrows.push({
      mesh: mesh,
      lineIdx: 0,
      progress: 0 // 初始化進度
    });
  }
  compassesGroup.visible = state.showCompasses;
}

function rebuildFlowArrows() {
  if (activeFieldLines.length === 0) {
    flowArrows.forEach(a => a.mesh.visible = false);
    return;
  }
  
  // 為每條磁力線生成隨機的初始偏移量，避免所有箭嘴同步「脈衝」，營造連續水流感
  const lineOffsets = activeFieldLines.map(() => Math.random());
  
  // 根據滑桿設定取得每條線的箭嘴數量
  const arrowsPerLine = state.vectorDensity;
  const required = Math.min(activeFieldLines.length * arrowsPerLine, flowArrows.length);
  
  for (let i = 0; i < flowArrows.length; i++) {
    const arrow = flowArrows[i];
    if (i < required) {
      arrow.lineIdx = Math.floor(i / arrowsPerLine);
      const subIdx = i % arrowsPerLine;
      
      // 將箭嘴均勻分佈在同一條線上，並加上該線專屬的隨機偏移量
      arrow.progress = ((subIdx / arrowsPerLine) + lineOffsets[arrow.lineIdx]) % 1.0;
      arrow.mesh.visible = state.showCompasses;
    } else {
      arrow.mesh.visible = false;
    }
  }
}

function updateFlowArrows(dt) {
  if (activeFieldLines.length === 0) return;
  
  const baseSpeed = state.animSpeed * 15.0; // 統一的空間移動速度 (每秒走過多少個節點)
  const tempDir = new THREE.Vector3(0, 1, 0);
  
  for (let arrow of flowArrows) {
    if (!arrow.mesh.visible) continue;
    
    const line = activeFieldLines[arrow.lineIdx];
    if (!line || line.length < 2) continue;
    
    const totalSegments = line.length - 1;
    
    // 根據線的總長度調整進度增加量，確保所有箭嘴在 3D 空間中的「絕對移動速度」一致
    arrow.progress += (baseSpeed * dt) / Math.max(1, totalSegments);
    if (arrow.progress >= 1.0) arrow.progress -= 1.0;
    
    const exactSeg = arrow.progress * totalSegments;
    const idx = Math.floor(exactSeg);
    const t = exactSeg - idx;
    const idxNext = (idx + 1) % line.length;
    
    const p1 = line[idx];
    const p2 = line[idxNext];
    
    const pos = new THREE.Vector3().lerpVectors(p1, p2, t);
    const dir = new THREE.Vector3().subVectors(p2, p1);
    
    if (dir.lengthSq() > 1e-10) {
        dir.normalize();
        arrow.mesh.quaternion.setFromUnitVectors(tempDir, dir);
    }
    
    arrow.mesh.position.copy(pos);
    
    const B = fieldAt(pos, currentPoles);
    const mag = B.length();
    const t_color = Math.min(1, Math.log10(1 + mag * 30) / 1.8);
    const hue = 0.5 - 0.45 * t_color; 
    arrow.mesh.material.color.setHSL(hue, 0.72, 0.52);
  }
}

// ==================== Theme & Language ====================
function applyTheme() {
  if (state.isDark) {
    document.body.classList.remove('light');
    scene.background = new THREE.Color(0x0a1420);
    scene.fog.color = new THREE.Color(0x0a1420);
    gridHelper.material.color = new THREE.Color(0x2a4a6a);
    if (gridHelper.material.opacity !== undefined) gridHelper.material.opacity = 0.5;
  } else {
    document.body.classList.add('light');
    scene.background = new THREE.Color(0xf5f1ea);
    scene.fog.color = new THREE.Color(0xf5f1ea);
    gridHelper.material.color = new THREE.Color(0xc4b89e);
    if (gridHelper.material.opacity !== undefined) gridHelper.material.opacity = 0.6;
  }
  rebuildFieldLines();
}

function applyLang() {
  document.querySelectorAll('[data-zh]').forEach(el => {
    const text = el.getAttribute('data-' + state.lang);
    if (text) el.textContent = text;
  });
  document.getElementById('lang-zh').classList.toggle('active', state.lang === 'zh');
  document.getElementById('lang-en').classList.toggle('active', state.lang === 'en');
  document.documentElement.lang = state.lang === 'zh' ? 'zh-HK' : 'en';
}

function makeDraggable(element, handle) {
  let isDragging = false;
  let offsetX = 0, offsetY = 0;

  function onStart(e) {
    isDragging = true;
    const touch = e.touches ? e.touches[0] : e;
    const rect = element.getBoundingClientRect();
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;
    element.style.left = rect.left + 'px';
    element.style.top = rect.top + 'px';
    element.style.right = 'auto';
    element.style.bottom = 'auto';
    if (e.cancelable) e.preventDefault();
  }

  function onMove(e) {
    if (!isDragging) return;
    const touch = e.touches ? e.touches[0] : e;
    let nx = touch.clientX - offsetX;
    let ny = touch.clientY - offsetY;
    nx = Math.max(0, Math.min(window.innerWidth - element.offsetWidth, nx));
    ny = Math.max(0, Math.min(window.innerHeight - 40, ny));
    element.style.left = nx + 'px';
    element.style.top = ny + 'px';
    if (e.cancelable) e.preventDefault();
  }

  function onEnd() { isDragging = false; }

  handle.addEventListener('mousedown', onStart);
  handle.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

// ==================== UI Handlers ====================
window.togglePanel = function(id) {
  const panel = document.getElementById(id);
  panel.classList.toggle('collapsed');
};

window.toggleInfoContent = function() {
  const content = document.getElementById('info-content');
  const icon = document.getElementById('info-collapse-icon');
  content.classList.toggle('collapsed');
  icon.textContent = content.classList.contains('collapsed') ? '+' : '−';
};

window.setLang = function(l) {
  state.lang = l;
  applyLang();
};

window.toggleDarkMode = function() {
  state.isDark = !state.isDark;
  applyTheme();
};

window.onMagnet2Toggle = function(checked) {
  state.showMagnet2 = checked;
  magnet2.visible = checked;
  
  if (checked) {
    // Offset both magnets for cool interaction
    magnet1.position.set(-1.2, 0, 0);
    magnet1.rotation.set(0, 0, 0);
    
    magnet2.position.set(1.2, 0, 0);
    magnet2.rotation.set(0, Math.PI, 0); // Opposing poles face each other
  } else {
    // Reset to center
    magnet1.position.set(0, 0, 0);
    magnet1.rotation.set(0, 0, 0);
    if (transformControl.object === magnet2) {
      transformControl.detach();
      document.getElementById('interaction-mode').style.display = 'none';
    }
  }
  
  updateDynamicPoles();
  rebuildFieldLines();
};

window.setTransformMode = function(mode) {
  transformControl.setMode(mode);
  document.getElementById('mode-translate').classList.toggle('active', mode === 'translate');
  document.getElementById('mode-rotate').classList.toggle('active', mode === 'rotate');
};

window.alignMagnets = function() {
  // 將第一塊磁棒的 Y 軸高度設為 0，並重置傾斜角度使其平放
  magnet1.position.y = 0;
  magnet1.rotation.x = 0;
  magnet1.rotation.z = 0;
  
  if (state.showMagnet2) {
    // 將第二塊磁棒的 Y 軸高度設為 0，並重置傾斜角度
    magnet2.position.y = 0;
    magnet2.rotation.x = 0;
    magnet2.rotation.z = 0;
  }
  
  updateDynamicPoles();
  rebuildFieldLines();
  showToast(state.lang === 'zh' ? '磁棒已水平對齊' : 'Magnets aligned horizontally');
};

window.alignMagnetsSideBySide = function() {
  // 將磁棒的 Z 軸深度設為 0，並重置左右旋轉角度使其對齊
  magnet1.position.z = 0;
  magnet1.rotation.y = 0;
  
  if (state.showMagnet2) {
    magnet2.position.z = 0;
    magnet2.rotation.y = Math.PI; // 使兩塊磁棒極性相對
  }
  
  updateDynamicPoles();
  rebuildFieldLines();
  showToast(state.lang === 'zh' ? '磁棒已左右對齊' : 'Magnets aligned left-right');
};

window.alignMagnetsAxis = function() {
  // 將磁棒置於同一 Z 軸線上 (首尾相對)
  magnet1.position.set(0, 0, -1.0);
  magnet1.rotation.set(0, 0, 0);
  
  if (state.showMagnet2) {
    magnet2.position.set(0, 0, 1.0);
    magnet2.rotation.set(0, 0, 0); // N極對S極相吸排列
  }
  
  updateDynamicPoles();
  rebuildFieldLines();
  showToast(state.lang === 'zh' ? '磁棒已軸線對齊' : 'Magnets aligned on axis');
};

let linesDebounceTimer;
window.onLinesChange = function(val) {
  document.getElementById('lines-val').textContent = val;
  // Mobile/Tablet Optimization: Debounce heavy RK4 calculations during slider drag
  clearTimeout(linesDebounceTimer);
  linesDebounceTimer = setTimeout(() => {
    state.numLines = parseInt(val);
    rebuildFieldLines();
  }, 200); 
};

window.onVectorsChange = function(val) {
  state.vectorDensity = parseInt(val);
  document.getElementById('vectors-val').textContent = val;
  rebuildFlowArrows();
};

window.onLinesToggle = function(checked) {
  state.showFieldLines = checked;
  rebuildFieldLines(); 
};

window.onCompassToggle = function(checked) {
  state.showCompasses = checked;
  compassesGroup.visible = checked;
  flowArrows.forEach(a => a.mesh.visible = checked);
};

window.onArrowsToggle = function(checked) {
  state.showArrows = checked;
  rebuildFieldLines();
};

window.onSpeedChange = function(val) {
  state.animSpeed = parseFloat(val);
  document.getElementById('speed-val').textContent = state.animSpeed.toFixed(1);
};

window.resetView = function() {
  camera.position.set(3.8, 4.8, 5.8);
  controls.target.set(0, 0, 0);
  controls.update();
  showToast(state.lang === 'zh' ? '視角已重置' : 'View reset');
};

window.resetAll = function() {
  state.strength = 1.0;
  state.numLines = 288;
  state.vectorDensity = 2;
  state.showFieldLines = true;
  state.showCompasses = true;
  state.showArrows = false;
  state.showMagnet2 = false;
  state.showNeutralPoints = false;
  state.animSpeed = 1.0;

  document.getElementById('lines-slider').value = 288;
  document.getElementById('lines-val').textContent = '288';
  document.getElementById('vectors-slider').value = 2;
  document.getElementById('vectors-val').textContent = '2';
  document.getElementById('lines-toggle').checked = true;
  document.getElementById('compass-toggle').checked = true;
  document.getElementById('arrows-toggle').checked = false;
  
  // Guard against missing elements if features were conditionally removed
  const neutralToggle = document.getElementById('neutral-toggle');
  if (neutralToggle) neutralToggle.checked = false;
  
  const magnet2Toggle = document.getElementById('magnet2-toggle');
  if (magnet2Toggle) magnet2Toggle.checked = false;
  
  document.getElementById('speed-slider').value = 1.0;
  document.getElementById('speed-val').textContent = '1.0';
  
  fieldLinesGroup.visible = true;
  compassesGroup.visible = true;
  if (magnet2) magnet2.visible = false;
  
  magnet1.position.set(0, 0, 0);
  magnet1.rotation.set(0, 0, 0);
  
  if (transformControl) {
    transformControl.detach();
  }
  const interactionMode = document.getElementById('interaction-mode');
  if (interactionMode) interactionMode.style.display = 'none';

  updateDynamicPoles();
  rebuildFieldLines();
  camera.position.set(3.8, 4.8, 5.8);
  controls.target.set(0, 0, 0);
  controls.update();
  showToast(state.lang === 'zh' ? '已重置所有設定' : 'All settings reset');
};

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ==================== Start ====================
init();
</script>

</body>
</html>
