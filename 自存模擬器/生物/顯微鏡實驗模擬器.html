<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顯微鏡模擬器 · Microscope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{ --ac:#14b8a6; }
    body{ font-family:'Noto Sans HK', sans-serif; transition: background-color .3s, color .3s; }
    body.dark{ background-color:#0a1626 !important;
        background-image:
            linear-gradient(rgba(56,189,248,.06) 1px,transparent 1px),
            linear-gradient(90deg,rgba(56,189,248,.06) 1px,transparent 1px),
            linear-gradient(rgba(56,189,248,.11) 1px,transparent 1px),
            linear-gradient(90deg,rgba(56,189,248,.11) 1px,transparent 1px);
        background-size:26px 26px,26px 26px,130px 130px,130px 130px;
    }
    .serif-font{ font-family:'Noto Serif HK', serif; }
    .bp-btn{ display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:6px;border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;text-decoration:none;cursor:pointer;transition:border-color .2s,color .2s; }
    .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
    body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
    body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }

    /* Light-mode overrides (dark-first sim); the eyepiece view (bg-black) stays dark in both */
    body.light{ background-color:#eaeef3;
        background-image:
            linear-gradient(rgba(20,184,166,.05) 1px,transparent 1px),
            linear-gradient(90deg,rgba(20,184,166,.05) 1px,transparent 1px),
            linear-gradient(rgba(20,184,166,.09) 1px,transparent 1px),
            linear-gradient(90deg,rgba(20,184,166,.09) 1px,transparent 1px);
        background-size:26px 26px,26px 26px,130px 130px,130px 130px;
        color:#1e293b;
    }
    body.light .bg-slate-900{ background-color:#ffffff !important; }
    body.light .bg-slate-800{ background-color:#ffffff !important; }
    body.light .bg-slate-700{ background-color:#e2e8f0 !important; }
    body.light .bg-slate-600{ background-color:#cbd5e1 !important; }
    body.light .text-slate-100,body.light .text-slate-200,body.light .text-slate-300{ color:#1e293b !important; }
    body.light .text-slate-400{ color:#64748b !important; }
    body.light .border-slate-700,body.light .border-slate-600{ border-color:#cbd5e1 !important; }
  </style>
</head>
<body class="dark bg-slate-900 overflow-x-hidden text-slate-100 font-sans selection:bg-green-500 selection:text-white">
    <a href="../../biology.html" class="bp-btn" style="position:fixed;top:12px;left:12px;z-index:2147483647" aria-label="返回索引 / Back to index">
        <i data-lucide="home" width="14" height="14"></i><span>INDEX</span>
    </a>
    <div style="position:fixed;top:12px;right:12px;z-index:2147483647">
        <button onclick="toggleTheme()" class="bp-btn" title="切換深淺色模式 / Toggle theme" aria-label="切換深淺色模式" style="width:auto"><span id="theme-ic"><i data-lucide="sun" width="15" height="15"></i></span></button>
    </div>

  <!-- 課後評估 Modal 視窗 -->
  <div id="quiz-modal" class="hidden fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 md:p-8 backdrop-blur-sm">
    <div class="bg-slate-800 border border-slate-600 rounded-2xl p-6 md:p-8 max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
      <div class="sticky top-0 bg-slate-800 pb-4 mb-4 border-b border-slate-700 flex justify-between items-center z-10">
        <h2 id="quiz-title" class="text-xl md:text-2xl font-bold text-green-400"></h2>
        <button id="close-quiz-btn" class="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-4 py-2 rounded-lg transition"></button>
      </div>
      <div id="quiz-content" class="space-y-6"></div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto p-4 md:p-8" style="padding-top:3.25rem">
    <header class="mb-6 border-b border-slate-700 pb-4 flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="serif-font text-3xl font-bold text-green-400 flex items-center gap-3">
          <svg class="w-8 h-8 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
          <span id="txt-title"></span>
        </h1>
        <p id="txt-subtitle" class="text-slate-400 mt-2"></p>
      </div>
      
      <div class="flex flex-col md:flex-row items-end gap-3 shrink-0">
        <button id="open-quiz-btn" class="bg-amber-600 hover:bg-amber-500 text-white text-sm font-bold py-2 px-5 rounded-lg transition-colors shadow-lg border border-amber-400/30 animate-pulse"></button>
        <button id="lang-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-colors shadow-md">🌐 <span id="txt-langSwitch"></span></button>

        <div class="bg-slate-800 p-2 rounded-lg border border-slate-700 w-full md:w-auto mt-2 md:mt-0 shadow-md">
          <label id="txt-selectSlide" class="text-xs text-slate-400 block mb-1 ml-1"></label>
          <select id="slide-select" class="bg-slate-700 text-white font-bold py-2 px-4 rounded-md outline-none cursor-pointer focus:ring-2 focus:ring-blue-500 w-full md:w-auto"></select>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- 畫面顯示區 -->
      <div class="lg:col-span-7 flex flex-col items-center justify-start bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <div class="relative flex justify-center items-center w-full max-w-[450px] aspect-square bg-black rounded-full overflow-hidden border-8 border-slate-600 shadow-2xl">
          
          <svg viewBox="-500 -500 1000 1000" class="w-full h-full absolute inset-0" id="svg-viewport" style="transition: filter 0.1s ease-out;">
            <g id="svg-transform-layer" style="transition: transform 0.4s ease-out; transform-origin: 0 0;">
              <!-- 玻片內容將動態注入於此 -->
              <g id="svg-content-group"></g>
              <g id="svg-labels-group" style="transition: opacity 0.4s ease-in-out; pointer-events: none;"></g>
            </g>
          </svg>

          <div class="absolute inset-0 pointer-events-none rounded-full" style="box-shadow: inset 0 0 80px rgba(0,0,0,0.9)"></div>
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
            <div class="w-[1px] h-full bg-black"></div>
            <div class="w-full h-[1px] bg-black absolute"></div>
          </div>
        </div>

        <div class="mt-6 w-full max-w-[450px] bg-slate-900 rounded-lg p-4 border border-slate-700 flex justify-between items-center shadow-inner">
          <div class="text-center">
            <div id="txt-totalMag" class="text-xs text-slate-400"></div>
            <div id="val-totalMag" class="text-2xl font-mono text-blue-400 font-bold"></div>
          </div>
          
          <div class="text-center flex flex-col items-center justify-center border-l border-r border-slate-700 px-4">
            <div id="txt-labelStatus" class="text-xs text-slate-400 mb-1"></div>
            <label class="flex items-center cursor-pointer gap-2 bg-slate-800 py-1 px-3 rounded hover:bg-slate-700 transition">
              <input type="checkbox" id="label-toggle" class="w-4 h-4 text-green-500 bg-slate-700 border-slate-500 rounded cursor-pointer" />
              <span id="txt-showLabels" class="text-sm font-bold"></span>
            </label>
          </div>

          <div class="text-center">
            <div id="txt-imgStatus" class="text-xs text-slate-400"></div>
            <div id="val-imgStatus" class="text-lg font-bold"></div>
          </div>
        </div>
      </div>

      <!-- 操作面板區 -->
      <div class="lg:col-span-5 flex flex-col gap-4">
        
        <div id="tips-container" class="p-4 rounded-xl border-l-4 shadow-lg transition-colors">
          <h3 class="font-bold flex items-center gap-2 mb-2 text-slate-200">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span id="txt-tipsTitle"></span>
          </h3>
          <p id="txt-tipsContent" class="text-sm text-slate-300 leading-relaxed"></p>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
          <h2 class="text-sm font-semibold mb-3 text-slate-200 border-b border-slate-700 pb-1 flex justify-between">
            <span id="txt-lensSelect"></span>
            <span id="txt-lensMode" class="text-yellow-500"></span>
          </h2>
          
          <div class="mb-3">
            <label id="txt-eyepiece" class="block text-xs text-slate-400 mb-1"></label>
            <div class="flex gap-2" id="eyepiece-btns">
              <button data-val="5" class="ep-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors">5X</button>
              <button data-val="10" class="ep-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors">10X</button>
              <button data-val="15" class="ep-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors">15X</button>
            </div>
          </div>

          <div>
            <label id="txt-objective" class="block text-xs text-slate-400 mb-1"></label>
            <div class="flex gap-2" id="objective-btns">
              <button data-val="4" class="ob-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors">4X</button>
              <button data-val="10" class="ob-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors">10X</button>
              <button data-val="40" class="ob-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors">40X</button>
            </div>
          </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
          <h2 id="txt-focusKnob" class="text-sm font-semibold mb-3 text-slate-200 border-b border-slate-700 pb-1"></h2>
          
          <div class="mb-4">
            <label class="flex justify-between text-xs text-slate-400 mb-1"><span id="txt-coarse"></span> <span id="val-coarse"></span></label>
            <input type="range" id="slider-coarse" min="0" max="1000" step="10" class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500" />
          </div>

          <div>
            <label class="flex justify-between text-xs text-slate-400 mb-1"><span id="txt-fine"></span> <span id="val-fine"></span></label>
            <input type="range" id="slider-fine" min="-50" max="50" step="1" class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-teal-500" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
            <h2 id="txt-stage" class="text-sm font-semibold mb-2 text-slate-200 border-b border-slate-700 pb-1 flex justify-between items-end"></h2>
            <p id="txt-stageNote" class="text-[10px] text-yellow-500 mb-2 font-bold"></p>
            
            <div class="mb-3">
              <div class="flex justify-between text-[11px] text-slate-400 mb-1 font-bold">
                <span id="txt-stageXLeft"></span><span id="txt-stageXRight"></span>
              </div>
              <input type="range" id="slider-stageX" min="-200" max="200" step="5" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-purple-500" />
            </div>
            <div>
              <div class="flex justify-between text-[11px] text-slate-400 mb-1 font-bold">
                <span id="txt-stageYUp"></span><span id="txt-stageYDown"></span>
              </div>
              <input type="range" id="slider-stageY" min="-200" max="200" step="5" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-purple-500" />
            </div>
          </div>

          <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
            <h2 id="txt-light" class="text-sm font-semibold mb-3 text-slate-200 border-b border-slate-700 pb-1"></h2>
            <div class="mt-8">
              <input type="range" id="slider-light" min="20" max="100" step="1" class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-yellow-400" />
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // --- 字典庫與資料 ---
    const UI = {
      zh: {
        title: "多玻片顯微鏡模擬器 (內建評估版)", subtitle: "適用於生物科探究：可自由開關標註，並真實模擬光學原理。右上方可開啟課後評估。",
        selectSlide: "🗂️ 選擇玻片標本：", langSwitch: "切換至 English", assessmentBtn: "📝 課後評估", assessmentTitle: "顯微鏡操作與觀察：課後評估", showAnswer: "👁️ 顯示參考答案", close: "✖ 關閉",
        totalMag: "總放大倍率", showLabels: "顯示標註", labelStatus: "標註開關", imgStatus: "影像狀態", clear: "清晰", blurry: "失焦", tipsTitle: "教師廣播 / 觀測重點",
        blurWarning: "🔴 影像模糊：請轉動粗調節輪尋找影像，再用微調節輪至完全清晰，標註才會浮現。", lensSelect: "🔍 鏡頭選擇", highMode: "高倍率模式 (細胞細節)", lowMode: "低/中倍率模式 (組織分佈)",
        eyepiece: "目鏡 (Eyepiece)", objective: "物鏡 (Objective)", focusKnob: "🎯 聚焦旋鈕", coarse: "粗調節輪", fine: "微調節輪",
        stage: "🎛️ 載物台 X/Y", stageNote: "(教學提示: 影像的移動方向與載物台相反)", stageXLeft: "向左", stageXRight: "向右", stageYUp: "向前", stageYDown: "向後", light: "💡 光源亮度"
      },
      en: {
        title: "Microscope Simulator", subtitle: "For Biology: Toggle labels, simulate optics, and access built-in quizzes.",
        selectSlide: "🗂️ Select Specimen:", langSwitch: "切換至繁體中文", assessmentBtn: "📝 Assessment", assessmentTitle: "Microscope Operation Assessment", showAnswer: "👁️ Show Answer", close: "✖ Close",
        totalMag: "Total Magnification", showLabels: "Show Labels", labelStatus: "Labels Toggle", imgStatus: "Image Status", clear: "Clear", blurry: "Blurry", tipsTitle: "Teacher's Guide / Focus",
        blurWarning: "🔴 Blurry image: Use coarse focus to find image, then fine focus. Labels only show when focused.", lensSelect: "🔍 Lens Selection", highMode: "High Mag (Cell Details)", lowMode: "Low Mag (Tissue Dist.)",
        eyepiece: "Eyepiece", objective: "Objective", focusKnob: "🎯 Focus Knobs", coarse: "Coarse Focus", fine: "Fine Focus",
        stage: "🎛️ Stage X/Y", stageNote: "(Note: Image moves opposite to stage)", stageXLeft: "Left", stageXRight: "Right", stageYUp: "Fwd", stageYDown: "Back", light: "💡 Light Intensity"
      }
    };

    const QUIZ_QUESTIONS = {
      zh: [
        { q: "1. 物鏡轉換原則\n使用顯微鏡觀察植物表皮細胞時，為甚麼必須先使用最低倍數的物鏡（如 4X）找到焦點後，才轉換至高倍物鏡（如 40X）？", a: "1. 低倍物鏡的「視野較廣闊」，能較容易且快速地尋找目標標本，並將其移至視野中央。\n2. 低倍物鏡與載玻片之間的「工作距離較遠」，在轉動粗調節器作初步聚焦時，較不容易壓碎載玻片或損壞昂貴的物鏡鏡頭。" },
        { q: "2. 高倍鏡的聚焦技巧\n轉換至高倍物鏡後，影像變得模糊。此時應該只使用哪一個部件來聚焦？為甚麼絕對不能使用另一個聚焦部件？", a: "應該只使用「微調節輪」來聚焦。\n因為高倍物鏡非常貼近載玻片，且景深極淺。若使用粗調節器，升降的幅度會過大，不但容易使影像迅速失焦，更有極大風險會「直接撞擊並壓碎載玻片」。" },
        { q: "3. 影像移動與光學原理\n在觀察下表皮時，發現目標「氣孔」位於顯微鏡視野的「左上方」。若要將該氣孔移至「正中央」，你應該將載物台（載玻片）往哪一個方向移動？請解釋原理。", a: "應該將載玻片往「左上方」移動。\n因為複式光學顯微鏡所呈現的影像是「上下顛倒、左右相反」的。當你在視野左上方看到影像時，代表實際的標本是偏向載玻片的右下方，因此必須順著影像的方向推動載玻片。" },
        { q: "4. 視野亮度調節\n由中倍鏡轉換為高倍鏡觀察時，除了影像被放大外，視野的亮度和能看見的細胞數量會發生甚麼變化？應如何調整顯微鏡？", a: "轉換為高倍鏡後，視野會「變暗」，且能看見的「細胞數量會減少」。\n為了改善觀察效果，應該「打開光欄（光圈）」以增加進入聚光器的光量，或者直接調高顯微鏡的光源亮度。" },
        { q: "5. 總放大率與細胞構造\n使用 10X 目鏡與 40X 物鏡觀察雙子葉植物葉片橫切面。(a) 計算此時的總放大率。(b) 在此放大率下，除了細胞壁外，最可能清晰觀察到哪兩種細胞內的構造？", a: "(a) 總放大率 = 10 × 40 = 400X。\n(b) 在 400X 下，最可能清晰觀察到綠色的「葉綠體 (Chloroplast)」，以及將細胞質擠向邊緣的透亮「液泡 (Vacuole)」。" }
      ],
      en: [
        { q: "1. Objective Lens Rules\nWhy start with the lowest power objective (e.g., 4X) to find the focus before switching to a high power objective (e.g., 40X)?", a: "1. The low power objective has a 'wider field of view', making it easier to locate the specimen.\n2. It has a 'longer working distance', reducing the risk of crushing the slide." },
        { q: "2. High Power Focusing Techniques\nAfter switching to high power, the image is blurry. Which knob should you use? Why avoid the other?", a: "Use ONLY the 'Fine adjustment knob'.\nThe high power lens is very close to the slide. Using the coarse adjustment knob causes large movements, which can 'crush the glass slide'." },
        { q: "3. Image Movement\nThe target 'stoma' is at the 'top-left'. To center it, in which direction should you move the slide?", a: "Move the slide towards the 'top-left'.\nAn optical microscope produces an 'inverted and laterally reversed' image. You must move the slide in the same direction as the image appears." },
        { q: "4. Brightness Adjustment\nWhen switching from medium to high power, how do brightness and visible cells change?", a: "The field of view becomes 'darker' and the 'number of visible cells decreases'.\n'Open the iris diaphragm' or increase light intensity to improve brightness." },
        { q: "5. Magnification & Cell Structures\nUsing 10X eyepiece and 40X objective. (a) Total magnification? (b) Visible structures?", a: "(a) Total magnification = 400X.\n(b) At 400X, the green 'Chloroplasts' and the large 'Vacuole' are most clearly visible." }
      ]
    };

    const SLIDES = {
      stoma: {
        id: 'stoma', name: { zh: '🌿 植物下表皮 (氣孔)', en: '🌿 Lower Epidermis of Plant' }, baseScale: 1.4,
        tips: {
          low: { zh: '🟢 低倍鏡觀察：觀察表皮細胞的不規則輪廓，以及氣孔的分佈密度。', en: '🟢 Low mag: Observe the irregular shapes of epidermal cells and stomatal distribution.' },
          mid: { zh: '🔵 中倍鏡觀察：尋找成對的保衛細胞，觀察其與周圍表皮細胞的排列關係。', en: '🔵 Mid mag: Look for pairs of guard cells and their arrangement among epidermal cells.' },
          high: { zh: '🟣 高倍鏡觀察：仔細觀察保衛細胞內的「大液泡」、「細胞核」以及綠色的葉綠體。', en: '🟣 High mag: Observe the large vacuole, nucleus, and green chloroplasts.' }
        },
        getSVG: () => `
          <defs>
            <g id="stoma-detail">
              <path d="M -8,-20 C -22,-15 -22,15 -8,20 C -12,10 -12,-10 -8,-20 Z" fill="#6bb84b" stroke="#1f4211" stroke-width="2.5"/>

              <circle cx="20" cy="-35" r="5" fill="#e0f7e9" stroke="#20b2aa" stroke-width="1"/> <circle cx="27" cy="-30" r="1.5" fill="#004d00"/>
              <rect x="-42" y="-20" width="84" height="15" fill="#98fb98" stroke="#3cb371" stroke-width="1"/>
              <line x1="-42" y1="-15" x2="42" y2="-15" stroke="#3cb371" stroke-width="0.5"/>
              <line x1="-42" y1="-10" x2="42" y2="-10" stroke="#3cb371" stroke-width="0.5"/>
              <line x1="-42" y1="-5" x2="42" y2="-5" stroke="#3cb371" stroke-width="0.5"/>
              <path d="M -42,-5 L 42,-5 L 20,80 L -20,80 Z" fill="#fcf5f5" stroke="#cd5c5c" stroke-width="1" opacity="0.9"/>
              <circle cx="0" cy="15" r="13" fill="#ffffff" stroke="#e67373" stroke-width="1"/> <circle cx="0" cy="15" r="10" fill="none" stroke="#8b0000" stroke-width="4"/>
              <circle cx="-22" cy="30" r="11" fill="#ffffff" stroke="#e67373" stroke-width="1"/> <circle cx="-22" cy="30" r="8" fill="none" stroke="#8b0000" stroke-width="4"/>
              <circle cx="22" cy="30" r="11" fill="#ffffff" stroke="#e67373" stroke-width="1"/> <circle cx="22" cy="30" r="8" fill="none" stroke="#8b0000" stroke-width="4"/>
              <circle cx="-10" cy="55" r="8" fill="#ffffff" stroke="#e67373" stroke-width="1"/> <circle cx="-10" cy="55" r="6" fill="none" stroke="#8b0000" stroke-width="3"/>
              <circle cx="10" cy="55" r="8" fill="#ffffff" stroke="#e67373" stroke-width="1"/> <circle cx="10" cy="55" r="6" fill="none" stroke="#8b0000" stroke-width="3"/>
            </g>
          </defs>
          <rect width="5000" height="5000" x="-2000" y="-2000" fill="#f5fffa"></rect>
          <circle cx="0" cy="400" r="450" fill="#e0eee0" opacity="0.4" stroke="#9bcd9b" stroke-width="2" stroke-dasharray="10 10"/>
          <g transform="translate(0, 400)">
             ${Array.from({length: 12}).map((_, i) => `<use href="#vascular-bundle" transform="rotate(${i * 30}) translate(0, -350)"></use>`).join('')}
          </g>
        `,
        labels: {
          low: [{ x: -120, y: -180, text: { zh: "表皮與皮層", en: "Epidermis & cortex" }, lineTo: { x: 0, y: -200 } }, { x: 120, y: -100, text: { zh: "維管束", en: "Vascular bundle" }, lineTo: { x: 40, y: -30 } }],
          high: [{ x: -25, y: -80, text: { zh: "韌皮部", en: "Phloem" }, lineTo: { x: -15, y: -70 } }, { x: 55, y: -20, text: { zh: "形成層", en: "Cambium" }, lineTo: { x: 45, y: -10 } }, { x: -20, y: 25, text: { zh: "木質部導管", en: "Xylem vessel" }, lineTo: { x: -10, y: 15 } }]
        }
      }
    };

    // --- 狀態管理 ---
    let state = {
      lang: 'zh',
      labelsEnabled: true,
      currentSlideId: 'dicotLeaf',
      eyepiece: 10,
      objective: 4,
      coarseFocus: 300,
      fineFocus: 0,
      stageX: 0,
      stageY: 0,
      lightIntensity: 70
    };

    function setState(newState) {
      const slideChanged = newState.currentSlideId && newState.currentSlideId !== state.currentSlideId;
      state = { ...state, ...newState };

      if (slideChanged) {
        state.stageX = 0; state.stageY = 0;
        state.coarseFocus = 200; state.fineFocus = 0;
        state.objective = 4;
        renderSVGStructure(); // 切換玻片時才重繪主體結構
      }
      updateView();
    }

    // --- DOM 渲染與更新邏局 ---
    function renderSVGStructure() {
      const slide = SLIDES[state.currentSlideId];
      document.getElementById('svg-content-group').innerHTML = slide.getSVG();
    }

    function updateView() {
      const t = UI[state.lang];
      const slide = SLIDES[state.currentSlideId];

      // 1. 物理與光學計算
      const baseScale = slide.baseScale || 1.0;
      const totalMag = state.eyepiece * state.objective;
      const scale = (totalMag / 40) * baseScale;
      
      const TARGET_FOCUS = 500;
      const currentFocus = state.coarseFocus + state.fineFocus;
      const focusDiff = Math.abs(currentFocus - TARGET_FOCUS);
      const blurAmount = focusDiff * (state.objective / 150);
      const isFocused = blurAmount < 1.5;

      const currentLabels = totalMag >= 400 ? slide.labels.high : slide.labels.low;
      const showLabels = state.labelsEnabled && isFocused;

      // 2. 更新 SVG 樣式
      const viewport = document.getElementById('svg-viewport');
      viewport.style.filter = `blur(${blurAmount}px) brightness(${state.lightIntensity / 100})`;
      
      const transformLayer = document.getElementById('svg-transform-layer');
      transformLayer.style.transform = `scale(${scale}) translate(${-state.stageX}px, ${-state.stageY}px)`;

      // 3. 繪製並更新標籤
      const labelsGroup = document.getElementById('svg-labels-group');
      labelsGroup.style.opacity = showLabels ? "1" : "0";
      
      if (showLabels || labelsGroup.innerHTML === '') {
        labelsGroup.innerHTML = currentLabels.map(lbl => `
          <g>
            <line x1="${lbl.x}" y1="${lbl.y}" x2="${lbl.lineTo.x}" y2="${lbl.lineTo.y}" stroke="rgba(255,255,255,0.9)" stroke-width="${1.5 / scale}" stroke-dasharray="${4/scale} ${3/scale}"></line>
            <circle cx="${lbl.lineTo.x}" cy="${lbl.lineTo.y}" r="${3 / scale}" fill="white"></circle>
            <text x="${lbl.x}" y="${lbl.y - (6 / scale)}" text-anchor="middle" font-size="${16 / scale}" font-weight="900" style="fill: #ffffff; stroke: rgba(0,0,0,0.8); stroke-width: ${3.5 / scale}px; paint-order: stroke fill; text-shadow: 0 ${2/scale}px ${4/scale}px rgba(0,0,0,1);">
              ${lbl.text[state.lang]}
            </text>
          </g>
        `).join('');
      }

      // 4. 更新 UI 文本
      document.getElementById('txt-title').textContent = t.title;
      document.getElementById('txt-subtitle').textContent = t.subtitle;
      document.getElementById('open-quiz-btn').textContent = t.assessmentBtn;
      document.getElementById('txt-langSwitch').textContent = t.langSwitch;
      document.getElementById('txt-selectSlide').textContent = t.selectSlide;
      document.getElementById('txt-totalMag').textContent = t.totalMag;
      document.getElementById('val-totalMag').textContent = totalMag + 'X';
      document.getElementById('txt-labelStatus').textContent = t.labelStatus;
      document.getElementById('txt-showLabels').textContent = t.showLabels;
      document.getElementById('txt-imgStatus').textContent = t.imgStatus;
      document.getElementById('val-imgStatus').textContent = isFocused ? t.clear : t.blurry;
      document.getElementById('val-imgStatus').className = `text-lg font-bold ${isFocused ? 'text-green-400' : 'text-red-400'}`;
      document.getElementById('txt-showLabels').className = `text-sm font-bold ${state.labelsEnabled ? 'text-green-400' : 'text-slate-400'}`;
      
      let tipsText = t.blurWarning;
      if (isFocused) {
        if (totalMag <= 100) tipsText = slide.tips.low[state.lang];
        else if (totalMag < 400) tipsText = slide.tips.mid[state.lang];
        else tipsText = slide.tips.high[state.lang];
      }
      document.getElementById('txt-tipsTitle').textContent = t.tipsTitle;
      document.getElementById('txt-tipsContent').textContent = tipsText;
      document.getElementById('tips-container').className = `p-4 rounded-xl border-l-4 shadow-lg transition-colors ${isFocused ? 'bg-blue-900/30 border-blue-500' : 'bg-red-900/30 border-red-500'}`;

      document.getElementById('txt-lensSelect').textContent = t.lensSelect;
      document.getElementById('txt-lensMode').textContent = totalMag >= 400 ? t.highMode : t.lowMode;
      document.getElementById('txt-eyepiece').textContent = t.eyepiece;
      document.getElementById('txt-objective').textContent = t.objective;
      document.getElementById('txt-focusKnob').textContent = t.focusKnob;
      document.getElementById('txt-coarse').textContent = t.coarse;
      document.getElementById('val-coarse').textContent = state.coarseFocus;
      document.getElementById('txt-fine').textContent = t.fine;
      document.getElementById('val-fine').textContent = state.fineFocus;
      document.getElementById('txt-stage').textContent = t.stage;
      document.getElementById('txt-stageNote').textContent = t.stageNote;
      document.getElementById('txt-stageXLeft').textContent = t.stageXLeft;
      document.getElementById('txt-stageXRight').textContent = t.stageXRight;
      document.getElementById('txt-stageYUp').textContent = t.stageYUp;
      document.getElementById('txt-stageYDown').textContent = t.stageYDown;
      document.getElementById('txt-light').textContent = t.light;

      // 5. 更新按鈕選取狀態與輸入條值
      document.querySelectorAll('.ep-btn').forEach(btn => {
        const val = parseInt(btn.dataset.val);
        btn.className = `ep-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors ${state.eyepiece === val ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`;
      });
      document.querySelectorAll('.ob-btn').forEach(btn => {
        const val = parseInt(btn.dataset.val);
        const isActive = state.objective === val;
        const activeClass = val === 40 ? 'bg-purple-600 text-white shadow-lg' : 'bg-green-600 text-white shadow-lg';
        btn.className = `ob-btn flex-1 py-1.5 rounded text-sm font-mono transition-colors ${isActive ? activeClass : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`;
      });

      document.getElementById('slider-coarse').value = state.coarseFocus;
      document.getElementById('slider-fine').value = state.fineFocus;
      document.getElementById('slider-stageX').value = state.stageX;
      document.getElementById('slider-stageY').value = state.stageY;
      document.getElementById('slider-light').value = state.lightIntensity;
      document.getElementById('label-toggle').checked = state.labelsEnabled;

      // 6. 更新下拉選單
      const select = document.getElementById('slide-select');
      if(select.options.length === 0) {
        Object.values(SLIDES).forEach(s => {
          select.add(new Option(s.name[state.lang], s.id));
        });
      } else {
        Array.from(select.options).forEach(opt => {
          opt.text = SLIDES[opt.value].name[state.lang];
        });
      }
      select.value = state.currentSlideId;

      updateQuizModalContent(t);
    }

    function updateQuizModalContent(t) {
      document.getElementById('quiz-title').textContent = t.assessmentTitle;
      document.getElementById('close-quiz-btn').textContent = t.close;
      
      const quizContent = document.getElementById('quiz-content');
      quizContent.innerHTML = QUIZ_QUESTIONS[state.lang].map((item, index) => `
        <div class="bg-slate-700/40 p-5 rounded-xl border border-slate-600 shadow-md">
          <p class="font-bold text-[16px] text-slate-100 whitespace-pre-wrap leading-relaxed">${item.q}</p>
          <div class="mt-4">
             <button onclick="this.nextElementSibling.classList.remove('hidden'); this.classList.add('hidden')" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2 rounded shadow transition">${t.showAnswer}</button>
             <div class="hidden bg-slate-800 p-4 rounded border-l-4 border-green-500 text-green-300 whitespace-pre-wrap text-sm leading-relaxed shadow-inner">${item.a}</div>
          </div>
        </div>
      `).join('');
    }

    // --- 事件綁定 ---
    document.getElementById('lang-btn').addEventListener('click', () => setState({ lang: state.lang === 'zh' ? 'en' : 'zh' }));
    document.getElementById('slide-select').addEventListener('change', (e) => setState({ currentSlideId: e.target.value }));
    document.getElementById('label-toggle').addEventListener('change', (e) => setState({ labelsEnabled: e.target.checked }));
    
    document.querySelectorAll('.ep-btn').forEach(btn => btn.addEventListener('click', (e) => setState({ eyepiece: parseInt(e.target.dataset.val) })));
    document.querySelectorAll('.ob-btn').forEach(btn => btn.addEventListener('click', (e) => setState({ objective: parseInt(e.target.dataset.val) })));
    
    document.getElementById('slider-coarse').addEventListener('input', (e) => setState({ coarseFocus: Number(e.target.value) }));
    document.getElementById('slider-fine').addEventListener('input', (e) => setState({ fineFocus: Number(e.target.value) }));
    document.getElementById('slider-stageX').addEventListener('input', (e) => setState({ stageX: Number(e.target.value) }));
    document.getElementById('slider-stageY').addEventListener('input', (e) => setState({ stageY: Number(e.target.value) }));
    document.getElementById('slider-light').addEventListener('input', (e) => setState({ lightIntensity: Number(e.target.value) }));

    // Quiz Modal 邏輯
    const quizModal = document.getElementById('quiz-modal');
    document.getElementById('open-quiz-btn').addEventListener('click', () => quizModal.classList.remove('hidden'));
    document.getElementById('close-quiz-btn').addEventListener('click', () => quizModal.classList.add('hidden'));

    // --- 主題切換 (dark-first) ---
    window.toggleTheme = () => {
        const toLight = document.body.classList.contains('dark');
        document.body.classList.toggle('dark', !toLight);
        document.body.classList.toggle('light', toLight);
        document.getElementById('theme-ic').innerHTML = `<i data-lucide="${toLight?'moon':'sun'}" width="15" height="15"></i>`;
        if(window.lucide) lucide.createIcons();
    };

    // --- 初始化執行 ---
    renderSVGStructure();
    updateView();
    if(window.lucide) lucide.createIcons();

  </script>
</body>
</html>
