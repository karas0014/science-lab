<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然選擇與物種演化模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Noto Sans TC', 'Poppins', sans-serif; background-color: #f8fafc; }
        .svg-container { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); cursor: pointer; transition: all 0.3s ease; }
        .svg-container:hover { transform: scale(1.15) translateY(-5px); z-index: 10; }
        .env-preview { height: 180px; border-radius: 16px; transition: background-color 1s ease; position: relative; overflow: hidden; }
        .trait-bar { height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden; }
        .trait-fill { height: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-bug { background-color: rgba(255,255,255,0.3); border-radius: 50%; box-shadow: 0 0 0 4px #3b82f6; }
        
        /* 動畫效果 */
        @keyframes hop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes swim { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-3px) rotate(2deg); } }
        @keyframes sway { 0%, 100% { transform: rotate(-2deg); transform-origin: bottom center; } 50% { transform: rotate(2deg); transform-origin: bottom center; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes fly { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-6px) rotate(2deg); } }
        
        .anim-grasshopper { animation: hop 2s infinite ease-in-out; }
        .anim-fish { animation: swim 3s infinite ease-in-out; }
        .anim-plant { animation: sway 4s infinite ease-in-out; }
        .anim-lion { animation: breathe 3s infinite ease-in-out; }
        .anim-bird { animation: fly 1.5s infinite ease-in-out; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-teal-600 to-emerald-700 p-5 text-white flex flex-col md:flex-row justify-between items-center gap-4 shadow-md z-10">
            <div class="flex items-center gap-4">
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm">🧬</div>
                <div>
                    <h1 id="ui-title" class="text-2xl font-bold">自然選擇模擬器 (Natural Selection)</h1>
                    <p id="ui-subtitle" class="opacity-80 text-sm">探索不同物種的變異與環境壓力</p>
                </div>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <select id="speciesSelector" class="flex-1 md:w-auto bg-white text-emerald-800 font-bold py-2 px-4 rounded-full shadow-sm outline-none border-2 border-emerald-400 focus:ring-2 focus:ring-emerald-200">
                    <!-- Options populated by JS -->
                </select>
                <button id="quizBtn" onclick="document.getElementById('quizModal').classList.remove('hidden')" class="bg-amber-500 hover:bg-amber-600 px-4 py-2 rounded-full transition border border-amber-400 text-sm font-bold shadow-inner whitespace-nowrap text-white">
                    📝 <span id="ui-quizBtnText">思維挑戰</span>
                </button>
                <button id="langBtn" class="bg-emerald-800 hover:bg-emerald-900 px-4 py-2 rounded-full transition border border-emerald-500/50 text-sm font-bold shadow-inner whitespace-nowrap">
                    EN
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-0 flex-1">
            <!-- Left: Environment Controls (4 cols) -->
            <div class="lg:col-span-4 p-6 bg-gray-50 border-r border-gray-200 flex flex-col">
                <h2 id="ui-envHeader" class="text-xl font-bold mb-6 flex items-center text-gray-800 border-b pb-3">
                    <span class="mr-2">🌍</span> 選擇壓力設定
                </h2>
                
                <div id="controlsContainer" class="space-y-6 flex-1">
                    <!-- Dynamic Controls injected here -->
                </div>

                <div class="pt-6 mt-6 border-t border-gray-200">
                    <button id="nextGenBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl transition shadow-lg transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2">
                        <span id="ui-btnText">繁殖下一代 (1/5)</span>
                        <span class="text-xl">⚡</span>
                    </button>
                    <button id="resetBtn" class="w-full mt-3 text-gray-400 text-sm hover:text-red-500 transition font-bold py-2">
                        <span id="ui-resetText">↺ 重新開始</span>
                    </button>
                </div>
            </div>

            <!-- Right: Display & Analysis (8 cols) -->
            <div class="lg:col-span-8 p-6 flex flex-col gap-6 bg-white">
                
                <!-- Environment Area -->
                <div class="relative">
                    <div class="flex justify-between items-end mb-3 px-2">
                        <h2 class="text-lg font-bold text-gray-800 flex items-center">
                            <span class="mr-2">📊</span> <span id="ui-popHeader">當前種群</span> <span class="ml-2 text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-md text-sm">Gen <span id="genDisplay">0</span></span>
                        </h2>
                        <div class="text-xs font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full animate-pulse" id="ui-tipText">點擊生物查看基因</div>
                    </div>
                    
                    <div id="envPreview" class="env-preview w-full flex items-end pb-4 justify-around px-8 shadow-inner border-4 border-gray-100">
                        <!-- Organisms injected here -->
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                    <!-- Trait Analysis -->
                    <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200 shadow-sm flex flex-col">
                        <h3 id="ui-detailHeader" class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2">精確特徵分析</h3>
                        <div id="detailView" class="flex flex-col items-center flex-1 justify-center">
                            <div id="bigIconContainer" class="mb-6 bg-white p-6 rounded-full shadow-lg border-2 border-slate-100 h-32 w-32 flex items-center justify-center">
                                <!-- Big Preview -->
                            </div>
                            <div id="traitsList" class="w-full space-y-4 px-2">
                                <!-- Bars injected here -->
                            </div>
                        </div>
                    </div>

                    <!-- Log & Result -->
                    <div class="flex flex-col h-full">
                        <h3 id="ui-logHeader" class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">演化紀錄</h3>
                        
                        <!-- Log -->
                        <div id="simLog" class="bg-slate-900 rounded-2xl p-4 text-emerald-400 font-mono text-sm overflow-y-auto h-[220px] shadow-inner border-l-4 border-emerald-500 flex-1">
                            <div>> [SYSTEM READY]</div>
                        </div>

                        <!-- Result Panel (Hidden initially) -->
                        <div id="resultPanel" class="hidden mt-4 bg-blue-50/80 rounded-2xl p-4 border border-blue-200 backdrop-blur-sm">
                            <h3 id="ui-resTitle" class="text-sm font-bold text-blue-800 mb-3 text-center uppercase tracking-wide">物種形成趨勢 (Speciation)</h3>
                            <div class="flex justify-around items-center text-center">
                                <div class="bg-white p-2 rounded-xl shadow-sm w-5/12">
                                    <p id="ui-lblAnc" class="text-[10px] font-bold text-gray-500 mb-1">初始祖先</p>
                                    <div id="ancestorBox" class="flex justify-center h-16 items-center"></div>
                                </div>
                                <div class="text-blue-300 font-bold text-xl">➔</div>
                                <div class="bg-blue-100 p-2 rounded-xl shadow-sm border border-blue-200 w-5/12">
                                    <p id="ui-lblDes" class="text-[10px] font-bold text-blue-700 mb-1">第五代 (平均)</p>
                                    <div id="descendantBox" class="flex justify-center h-16 items-center"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quizModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-gradient-to-r from-amber-500 to-orange-500 p-5 flex justify-between items-center text-white shadow-md">
                <h2 class="text-2xl font-bold flex items-center gap-2">🧠 <span id="ui-quizTitle">高階思維挑戰 (DSE 程度)</span></h2>
                <button onclick="document.getElementById('quizModal').classList.add('hidden')" class="text-white hover:text-amber-200 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-6 bg-slate-50" id="quizContainer">
                <!-- Quiz questions injected here by JS -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // QUIZ DATA (Higher-Order Thinking)
        // ==========================================
        const QUIZ_DATA = {
            zh: [
                {
                    q: "在模擬器中，如果我們將環境的捕獵者強度設為極高，並持續5代，種群會發生明顯的外觀變化。這與下列哪個自然界現象的生物學原理最為相似？",
                    options: [
                        "細菌對抗生素產生多重抗藥性。",
                        "溫室效應導致全球氣溫上升。",
                        "運動員透過長期訓練增加肌肉量。",
                        "綠色植物在缺乏光照下變黃。"
                    ],
                    ans: 0,
                    exp: "這屬於「定向選擇 (Directional Selection)」。捕獵者（環境壓力）淘汰了不具備保護色的個體；正如抗生素（環境壓力）淘汰了無抗藥性的細菌。兩者都是環境篩選了具有生存優勢的遺傳變異。運動員增肌屬於後天獲得性狀，不能遺傳（拉馬克學說的錯誤）。"
                },
                {
                    q: "模擬器中的「初始祖先」能夠繁衍出特徵（如觸角長度、體型）各異的後代。在真實自然界中，同一物種個體間出現這些遺傳變異的最主要來源是甚麼？",
                    options: [
                        "環境壓力直接改變了生物的基因序列。",
                        "基因突變、減數分裂時的獨立分配及互換。",
                        "捕獵者的選擇性捕食活動。",
                        "生物為了適應新環境而主動產生的生理變化。"
                    ],
                    ans: 1,
                    exp: "遺傳變異的來源主要來自於：基因突變 (Mutation) 提供新的等位基因；而減數分裂 (Meiosis) 中的獨立分配和互換，以及配子的隨機受精，則產生了不同的基因組合。環境壓力只是「篩選」變異，並非「主動創造」變異。"
                },
                {
                    q: "達爾文雀（鳥類）在加拉巴哥群島上演化出多種不同喙部的品種。如果模擬器中的兩群鳥類被高山阻隔（地理隔離）並面對完全不同的食物來源，經歷數萬年後，生物學家如何判定牠們是否已演化成兩個「不同的物種 (Different Species)」？",
                    options: [
                        "觀察牠們的羽毛顏色和體型是否出現顯著差異。",
                        "測試牠們能否在自然情況下交配，並產生具繁殖能力的後代。",
                        "比較牠們在模擬器中的適應度分數是否相同。",
                        "檢查牠們是否擁有完全相同的基因序列。"
                    ],
                    ans: 1,
                    exp: "根據「生物學物種概念 (Biological Species Concept)」，判斷兩個族群是否屬於同一物種的關鍵在於是否有「生殖隔離 (Reproductive Isolation)」。如果牠們無法交配，或產下的後代不育（如騾子），則代表已形成新物種。"
                },
                {
                    q: "在植物的模擬中，當「主要傳粉媒介」設定為「強風」時，擁有巨大花瓣的個體適應度會下降並被淘汰。這說明了演化學上的一個重要概念是：",
                    options: [
                        "體型越大的生物，其生存機率永遠越高。",
                        "所有的基因突變對生物的生存都是有害的。",
                        "生物特徵是否具備適應性，完全取決於當下的環境條件。",
                        "無性生殖比有性生殖更有利於適應多變的環境。"
                    ],
                    ans: 2,
                    exp: "巨大花瓣在昆蟲傳粉時是優勢（吸引昆蟲），但在風媒傳粉時卻是劣勢（浪費生長能量且無助傳粉）。這證明了適應性是相對的，某個特徵是有利還是有害，完全取決於所處的自然環境。"
                },
                {
                    q: "若將獅子的「雌性喜好」設為偏好大鬃毛，即使在炎熱氣候下（大鬃毛會導致散熱困難），大鬃毛的基因仍可能在種群中保留甚至擴散。這反映了甚麼生態現象？",
                    options: [
                        "氣候變化對哺乳類動物的演化完全沒有影響。",
                        "獅子能夠隨意改變自己的遺傳特徵以吸引異性。",
                        "性選擇的壓力有時可以抗衡或超越環境氣候帶來的生存壓力。",
                        "在自然選擇的過程中，只有最長壽的個體才能留下後代。"
                    ],
                    ans: 2,
                    exp: "這展示了選擇壓力之間的平衡（Trade-off）。雖然大鬃毛會降低存活率（容易過熱），但因為極大地提升了交配成功率（繁殖力），所以該特徵仍能在演化中保留。孔雀的華麗尾羽也是相同的道理。"
                }
            ],
            en: [
                {
                    q: "In the simulator, if predator pressure is set to high for 5 generations, the population undergoes significant visual changes. Which natural phenomenon shares this biological principle?",
                    options: [
                        "Bacteria developing multiple resistance to antibiotics.",
                        "Global warming causing temperature rise.",
                        "Athletes gaining muscle mass through long-term training.",
                        "Green plants turning yellow in the absence of light."
                    ],
                    ans: 0,
                    exp: "This is 'Directional Selection'. Predators (environmental pressure) eliminate individuals without camouflage, just as antibiotics eliminate non-resistant bacteria. Both screen for advantageous genetic variations. Athlete's muscle gain is an acquired trait and is not inheritable (Lamarckian error)."
                },
                {
                    q: "The 'Ancestor' in the simulator produces offspring with varying traits (e.g., antenna length). In real nature, what is the primary source of these genetic variations?",
                    options: [
                        "Environmental pressure directly altering gene sequences.",
                        "Gene mutation, independent assortment and crossing over during meiosis.",
                        "Selective feeding behaviors by predators.",
                        "Physiological changes actively initiated by organisms to adapt."
                    ],
                    ans: 1,
                    exp: "Sources of genetic variation include Mutations (creating new alleles) and Meiosis (independent assortment & crossing over creating new combinations). Environmental pressure only 'selects' variations; it does not actively 'create' them to suit needs."
                },
                {
                    q: "If two populations of Darwin's Finches are separated by a mountain (geographical isolation) and face different diets for millennia, how do biologists determine if they have become two 'Different Species'?",
                    options: [
                        "Observe if there are significant differences in feather color.",
                        "Test if they can mate naturally and produce fertile offspring.",
                        "Compare if their fitness scores in the simulator are identical.",
                        "Check if they possess completely identical gene sequences."
                    ],
                    ans: 1,
                    exp: "According to the Biological Species Concept, the key criteria for speciation is 'Reproductive Isolation'. If they cannot mate naturally or produce fertile offspring (like a mule), they are considered different species."
                },
                {
                    q: "In the plant simulation, large-petaled individuals have lower fitness and are eliminated when the pollinator is 'Wind'. What key evolutionary concept does this illustrate?",
                    options: [
                        "Larger organisms always have a higher chance of survival.",
                        "All genetic mutations are harmful to an organism's survival.",
                        "Whether a trait is 'adaptive' (high fitness) depends entirely on current environmental conditions.",
                        "Asexual reproduction is more advantageous in changing environments."
                    ],
                    ans: 2,
                    exp: "Large petals are advantageous for insect pollination but a disadvantage for wind pollination (wastes energy). This proves that fitness is relative; a trait is only advantageous relative to the specific environment it operates in."
                },
                {
                    q: "If female lions prefer males with large manes, the large mane gene may spread even in hot climates where it hinders heat loss. What ecological phenomenon does this reflect?",
                    options: [
                        "Climate change has absolutely no effect on mammal evolution.",
                        "Lions can consciously alter their genetic traits to attract mates.",
                        "Sexual Selection pressure can sometimes counterbalance or override environmental survival pressure.",
                        "In natural selection, only the longest-living individuals leave offspring."
                    ],
                    ans: 2,
                    exp: "This demonstrates an evolutionary trade-off. Although a large mane reduces survival chances (overheating), it greatly increases reproductive success via female preference. Thus, the trait is selected for. Peacocks' elaborate tails are a classic example of this."
                }
            ]
        };

        // ==========================================
        // CONFIGURATION: Species & Environments
        // ==========================================
        const SPECIES = {
            grasshopper: {
                name: { zh: "草蜢 (昆蟲)", en: "Grasshopper (Insect)" },
                animClass: "anim-grasshopper",
                baseTraits: { hue: 120, lightness: 50, antenna: 30, wings: 40, size: 50, legs: 40 },
                traits: [
                    { id: 'hue', max: 360, color: 'auto', zh: '體色 (彩度)', en: 'Body Color (Hue)' },
                    { id: 'lightness', max: 100, color: '#94a3b8', zh: '明暗度', en: 'Lightness' },
                    { id: 'antenna', max: 100, color: '#8b5cf6', zh: '觸角長度', en: 'Antenna Length' },
                    { id: 'wings', max: 100, color: '#3b82f6', zh: '翅膀大小', en: 'Wing Size' },
                    { id: 'size', max: 100, color: '#10b981', zh: '體型大小', en: 'Body Size' },
                    { id: 'legs', max: 100, color: '#f43f5e', zh: '腿部長度', en: 'Leg Length' }
                ],
                envs: [
                    { id: 'rain', type: 'range', default: 80, zh: '降雨量 (影響背景隱蔽)', en: 'Rainfall (Camouflage)' },
                    { id: 'predator', type: 'range', default: 30, zh: '捕獵者數量 (鳥類)', en: 'Predators (Birds)' },
                    { id: 'sexual', type: 'select', default: 'none', zh: '雌性喜好 (性選擇)', en: 'Sexual Selection', 
                      options: [
                          { val: 'none', zh: '隨機交配', en: 'Random' },
                          { val: 'antenna', zh: '偏好長觸角', en: 'Long Antenna' },
                          { val: 'wings', zh: '偏好大翅膀', en: 'Large Wings' }
                      ]
                    }
                ],
                getBg: (envs) => {
                    const h = 35 + (envs.rain / 100) * (120 - 35);
                    const l = 60 - (envs.rain / 100) * 15;
                    return `hsl(${h}, 40%, ${l}%)`;
                },
                calcFitness: (t, envs) => {
                    let score = 100;
                    const targetHue = 35 + (envs.rain / 100) * (120 - 35);
                    score -= Math.abs(t.hue - targetHue) * (envs.predator / 40); // Camouflage
                    if (envs.rain < 30 && t.size > 65) score -= 20; // Drought impacts big bugs
                    if (envs.predator > 50 && t.legs < 50) score -= 25; // Need jump to escape
                    if (envs.sexual === 'antenna') score += t.antenna / 1.5;
                    if (envs.sexual === 'wings') score += t.wings / 1.5;
                    return score;
                },
                renderSVG: (t) => {
                    const c = `hsl(${t.hue}, 60%, ${t.lightness}%)`;
                    const s = t.size / 50;
                    const w = t.wings / 2;
                    return `
                    <svg viewBox="0 0 120 120" class="w-full h-full">
                        <path d="M40 70 L30 ${70+t.legs/3} L${30-t.legs/4} ${70+t.legs/1.5}" stroke="${c}" stroke-width="4" fill="none" stroke-linecap="round" />
                        <path d="M60 70 L70 ${70+t.legs/3} L${70+t.legs/4} ${70+t.legs/1.5}" stroke="${c}" stroke-width="4" fill="none" stroke-linecap="round" />
                        <ellipse cx="40" cy="60" rx="${15*s}" ry="${10*s}" fill="${c}" />
                        <ellipse cx="55" cy="60" rx="${18*s}" ry="${11*s}" fill="${c}" />
                        <circle cx="75" cy="55" r="${10*s}" fill="${c}" />
                        <circle cx="80" cy="52" r="${2.5*s}" fill="white" />
                        <circle cx="81" cy="52" r="${1*s}" fill="black" />
                        <path d="M78 48 C 85 30, 95 ${50-t.antenna}, 105 ${45-t.antenna/2}" stroke="#333" stroke-width="2" fill="none" />
                        <path d="M35 55 Q 50 ${55-w} 70 55 Q 50 ${55+w} 35 55" fill="rgba(255,255,255,0.6)" stroke="${c}" stroke-width="1" />
                    </svg>`;
                }
            },
            fish: {
                name: { zh: "魚類 (海洋生物)", en: "Fish (Marine)" },
                animClass: "anim-fish",
                baseTraits: { hue: 200, lightness: 60, streamline: 50, tail: 40, fins: 50, size: 50 },
                traits: [
                    { id: 'hue', max: 360, color: 'auto', zh: '鱗片顏色', en: 'Scale Color' },
                    { id: 'lightness', max: 100, color: '#94a3b8', zh: '明暗度', en: 'Lightness' },
                    { id: 'streamline', max: 100, color: '#0ea5e9', zh: '流線型 (低阻力)', en: 'Streamline' },
                    { id: 'tail', max: 100, color: '#8b5cf6', zh: '尾部推進力', en: 'Tail Power' },
                    { id: 'fins', max: 100, color: '#14b8a6', zh: '魚鰭大小', en: 'Fin Size' },
                    { id: 'size', max: 100, color: '#f59e0b', zh: '體型大小', en: 'Body Size' }
                ],
                envs: [
                    { id: 'clarity', type: 'range', default: 80, zh: '水質清澈度', en: 'Water Clarity' },
                    { id: 'current', type: 'range', default: 50, zh: '水流速度', en: 'Water Current' },

        // ==========================================
        // APP STATE
        // ==========================================
        let state = {
            lang: 'zh',
            speciesKey: 'grasshopper',
            generation: 0,
            population: [],
            ancestor: null,
            envValues: {}
        };

        // ==========================================
        // CORE LOGIC
        // ==========================================
        const rand = (m) => (Math.random() * m * 2) - m;

        function createOrganism(parentTraits, isMutation = true) {
            const config = SPECIES[state.speciesKey];
            const mFactor = isMutation ? 15 : 0;
            let newTraits = { id: Math.random().toString(36).substr(2, 9), fitness: 0 };
            
            config.traits.forEach(t => {
                let val = parentTraits[t.id] + rand(mFactor);
                // Adjust mutation constraint per trait
                if(t.id === 'hue') val = Math.max(0, Math.min(360, val));
                else val = Math.max(10, Math.min(100, val));
                newTraits[t.id] = val;
            });
            return newTraits;
        }

        function runGeneration() {
            if (state.generation >= 5) return;
            const config = SPECIES[state.speciesKey];
            const ui = UI_TEXT[state.lang];
            const log = document.getElementById('simLog');
            
            log.innerHTML += `<div class="mt-2 text-emerald-300 font-bold">${ui.msgGen(state.generation + 1)}</div>`;
            
            // 1. Read current environment values
            config.envs.forEach(e => {
                const el = document.getElementById(`env_${e.id}`);
                state.envValues[e.id] = e.type === 'range' ? parseInt(el.value) : el.value;
            });

            // 2. Breed (5 offspring per survivor)
            let pool = [];
            const parents = state.population.length > 0 ? state.population : [state.ancestor];
            parents.forEach(p => {
                for(let i=0; i<5; i++) pool.push(createOrganism(p));
            });

            // 3. Selection (Calculate fitness & sort)
            pool.forEach(org => org.fitness = config.calcFitness(org, state.envValues));
            pool.sort((a,b) => b.fitness - a.fitness);
            
            // Keep top 5
            state.population = pool.slice(0, 5);
            state.generation++;
            
            // Update UI
            log.innerHTML += `<div>${ui.msgResult(Math.round(state.population.reduce((sum,o)=>sum+o.fitness,0)/5))}</div>`;
            log.scrollTop = log.scrollHeight;
            
            updateVisuals();
            selectOrganism(state.population[0].id); // Auto select fittest

            if (state.generation === 5) {
                log.innerHTML += `<div class="mt-2 text-yellow-400 font-bold">${ui.msgEnd}</div>`;
                log.scrollTop = log.scrollHeight;
                showFinal();
            }
        }

        // ==========================================
        // UI RENDERING
        // ==========================================
        function initApp() {
            // Build Species Dropdown
            const sel = document.getElementById('speciesSelector');
            sel.innerHTML = Object.keys(SPECIES).map(k => 
                `<option value="${k}">${SPECIES[k].name[state.lang]}</option>`
            ).join('');
            
            sel.addEventListener('change', (e) => {
                state.speciesKey = e.target.value;
                resetSim();
            });

            document.getElementById('langBtn').addEventListener('click', toggleLang);
            document.getElementById('nextGenBtn').addEventListener('click', runGeneration);
            document.getElementById('resetBtn').addEventListener('click', resetSim);

            resetSim();
            renderQuiz(); // Initialize the Quiz content
        }

        function toggleLang() {
            state.lang = state.lang === 'zh' ? 'en' : 'zh';
            document.getElementById('langBtn').innerText = state.lang === 'zh' ? 'EN' : '中文';
            
            // Update static texts
            const ui = UI_TEXT[state.lang];
            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-subtitle').innerText = ui.sub;
            document.getElementById('ui-envHeader').innerHTML = `<span class="mr-2">🌍</span> ${ui.envHeader}`;
            document.getElementById('ui-resetText').innerText = ui.reset;
            document.getElementById('ui-popHeader').innerText = ui.pop;
            document.getElementById('ui-tipText').innerText = ui.tip;
            document.getElementById('ui-detailHeader').innerText = ui.detail;
            document.getElementById('ui-logHeader').innerText = ui.log;
            document.getElementById('ui-resTitle').innerText = ui.resTitle;
            document.getElementById('ui-lblAnc').innerText = ui.anc;
            document.getElementById('ui-lblDes').innerText = ui.des;
            document.getElementById('ui-quizBtnText').innerText = ui.quizBtn;

            // Rebuild dropdown
            const sel = document.getElementById('speciesSelector');
            const currentVal = sel.value;
            sel.innerHTML = Object.keys(SPECIES).map(k => 
                `<option value="${k}" ${k===currentVal?'selected':''}>${SPECIES[k].name[state.lang]}</option>`
            ).join('');

            renderControls();
            updateVisuals();
            renderQuiz(); // Re-render quiz in the new language
            if(state.population.length > 0) selectOrganism(state.population[0].id);
            else selectOrganism(state.ancestor.id);
        }

        function renderControls() {
            const config = SPECIES[state.speciesKey];
            const container = document.getElementById('controlsContainer');
            
            container.innerHTML = config.envs.map(env => {
                if (env.type === 'range') {
                    // Initialize state
                    if(state.envValues[env.id] === undefined) state.envValues[env.id] = env.default;
                    
                    return `
                    <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-bold text-gray-700">${env[state.lang]}</label>
                            <span id="val_${env.id}" class="text-xs font-mono text-emerald-600 bg-emerald-50 px-2 py-1 rounded">${state.envValues[env.id]}</span>
                        </div>
                        <input type="range" id="env_${env.id}" min="0" max="100" value="${state.envValues[env.id]}" 
                               class="w-full accent-emerald-500 cursor-pointer"
                               oninput="document.getElementById('val_${env.id}').innerText = this.value; updatePreviewBg()">
                    </div>`;
                } else if (env.type === 'select') {
                    if(state.envValues[env.id] === undefined) state.envValues[env.id] = env.default;
                    const opts = env.options.map(o => 
                        `<option value="${o.val}" ${state.envValues[env.id] === o.val ? 'selected' : ''}>${o[state.lang]}</option>`
                    ).join('');
                    
                    return `
                    <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                        <label class="block text-sm font-bold text-gray-700 mb-2">${env[state.lang]}</label>
                        <select id="env_${env.id}" class="w-full p-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-emerald-400 bg-gray-50"
                                onchange="state.envValues['${env.id}'] = this.value">
                            ${opts}
                        </select>
                    </div>`;
                }
            }).join('');
        }

        function updatePreviewBg() {
            const config = SPECIES[state.speciesKey];
            config.envs.forEach(e => {
                if(e.type === 'range') state.envValues[e.id] = parseInt(document.getElementById(`env_${e.id}`).value);
            });
            document.getElementById('envPreview').style.background = config.getBg(state.envValues);
        }

        function updateVisuals() {
            const config = SPECIES[state.speciesKey];
            updatePreviewBg();
            
            const container = document.getElementById('envPreview');
            container.innerHTML = '';
            
            const targets = state.population.length > 0 ? state.population : [state.ancestor];
            targets.forEach(org => {
                const div = document.createElement('div');
                div.className = `svg-container w-16 h-16 md:w-20 md:h-20 ${config.animClass}`;
                div.innerHTML = config.renderSVG(org);
                div.onclick = () => selectOrganism(org.id);
                div.id = `org_${org.id}`;
                container.appendChild(div);
            });

            document.getElementById('genDisplay').innerText = state.generation;
            const btn = document.getElementById('nextGenBtn');
            const btnText = document.getElementById('ui-btnText');
            const ui = UI_TEXT[state.lang];
            
            if (state.generation < 5) {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = `${ui.btnNext} (${state.generation + 1}/5)`;
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btnText.innerText = "Evolution Complete";
            }
        }

        function selectOrganism(id) {
            const config = SPECIES[state.speciesKey];
            const target = state.population.find(o => o.id === id) || (state.ancestor.id === id ? state.ancestor : null);
            if (!target) return;

            // Highlight
            document.querySelectorAll('.svg-container').forEach(el => el.classList.remove('active-bug'));
            const el = document.getElementById(`org_${id}`);
            if(el) el.classList.add('active-bug');

            // Render Big Icon
            document.getElementById('bigIconContainer').innerHTML = config.renderSVG(target);

            // Render Traits Bar
            const tHtml = config.traits.map(t => {
                const val = target[t.id];
                const barColor = t.color === 'auto' ? `hsl(${val}, 60%, 50%)` : t.color;
                const max = t.max;
                return `
                <div>
                    <div class="flex justify-between text-[11px] font-bold text-gray-500 mb-1">
                        <span>${t[state.lang]}</span>
                        <span class="font-mono text-gray-800">${Math.round(val)}</span>
                    </div>
                    <div class="trait-bar">
                        <div class="trait-fill shadow-sm" style="width: ${(val/max)*100}%; background-color: ${barColor}"></div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('traitsList').innerHTML = tHtml;
        }

        function showFinal() {
            const config = SPECIES[state.speciesKey];
            document.getElementById('resultPanel').classList.remove('hidden');
            document.getElementById('ancestorBox').innerHTML = `<div class="w-16 h-16">${config.renderSVG(state.ancestor)}</div>`;
            
            // Calculate Averages
            let avgTraits = { id: 'avg' };
            config.traits.forEach(t => {
                avgTraits[t.id] = state.population.reduce((sum, org) => sum + org[t.id], 0) / 5;
            });
            document.getElementById('descendantBox').innerHTML = `<div class="w-16 h-16">${config.renderSVG(avgTraits)}</div>`;
        }

        function resetSim() {
            const config = SPECIES[state.speciesKey];
            state.generation = 0;
            state.envValues = {};
            state.ancestor = createOrganism(config.baseTraits, false);
            state.ancestor.id = 'ancestor';
            state.population = [];
            
            renderControls();
            
            document.getElementById('resultPanel').classList.add('hidden');
            const log = document.getElementById('simLog');
            log.innerHTML = `<div>${UI_TEXT[state.lang].msgReady}</div>`;
            
            updateVisuals();
            selectOrganism('ancestor');
        }

        // ==========================================
        // QUIZ LOGIC
        // ==========================================
        function renderQuiz() {
            const data = QUIZ_DATA[state.lang];
            const container = document.getElementById('quizContainer');
            document.getElementById('ui-quizTitle').innerText = UI_TEXT[state.lang].quizTitle;

            container.innerHTML = data.map((q, qIndex) => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                    <h3 class="font-bold text-[15px] md:text-lg text-slate-800 mb-4 leading-relaxed">
                        <span class="text-amber-500 mr-1">Q${qIndex + 1}.</span> ${q.q}
                    </h3>
                    <div class="space-y-3">
                        ${q.options.map((opt, oIndex) => `
                            <button id="btn-q${qIndex}-o${oIndex}"
                                    onclick="checkAnswer(${qIndex}, ${oIndex})"
                                    class="w-full text-left p-4 rounded-xl border-2 border-slate-100 bg-slate-50 hover:border-amber-400 hover:bg-amber-50 transition duration-200 text-sm md:text-base">
                                <span class="font-bold mr-2 text-slate-400">${String.fromCharCode(65 + oIndex)}.</span> ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="exp-q${qIndex}" class="hidden mt-4 p-4 rounded-xl text-sm leading-relaxed"></div>
                </div>
            `).join('');
        }

        function checkAnswer(qIndex, oIndex) {
            const q = QUIZ_DATA[state.lang][qIndex];
            const isCorrect = (oIndex === q.ans);
            const btn = document.getElementById(`btn-q${qIndex}-o${oIndex}`);
            const exp = document.getElementById(`exp-q${qIndex}`);

            if (isCorrect) {
                // Style correct button
                btn.classList.remove('border-slate-100', 'hover:border-amber-400', 'hover:bg-amber-50', 'bg-slate-50');
                btn.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-900', 'font-semibold');
                
                // Show explanation
                exp.classList.remove('hidden', 'bg-red-50', 'text-red-800', 'border-red-200');
                exp.classList.add('bg-emerald-50', 'text-emerald-900', 'border', 'border-emerald-200');
                exp.innerHTML = `<div class="flex items-start gap-2">
                                    <span class="text-xl">✅</span> 
                                    <div><span class="font-bold block mb-1">${state.lang === 'zh' ? '正確！' : 'Correct!'}</span>${q.exp}</div>
                                 </div>`;
                
                // Disable all options for this question to prevent further clicks
                q.options.forEach((_, idx) => {
                    const otherBtn = document.getElementById(`btn-q${qIndex}-o${idx}`);
                    otherBtn.onclick = null;
                    otherBtn.classList.remove('cursor-pointer', 'hover:border-amber-400', 'hover:bg-amber-50');
                    if (idx !== oIndex) otherBtn.classList.add('opacity-50', 'bg-slate-100');
                });
            } else {
                // Style incorrect button
                btn.classList.remove('border-slate-100', 'hover:border-amber-400', 'hover:bg-amber-50', 'bg-slate-50');
                btn.classList.add('border-red-400', 'bg-red-50', 'text-red-900');
                
                // Show hint/wrong message
                exp.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-900', 'border-emerald-200');
                exp.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
                exp.innerHTML = `<div class="flex items-center gap-2">
                                    <span class="text-xl">❌</span> 
                                    <b>${state.lang === 'zh' ? '不正確，請思考其他選項。' : 'Incorrect, try thinking about other options.'}</b>
                                 </div>`;
            }
        }

        // Start
        window.onload = initApp;
    </script>
</body>
</html>
