              40% { d: path('M 340 70 C 340 70, 340 210, 340 210 C 370 210, 390 210, 420 210 C 420 210, 420 70, 420 70 C 370 70, 390 70, 340 70 Z'); }
              60% { d: path('M 340 70 C 340 70, 340 210, 340 210 C 370 210, 390 210, 420 210 C 420 210, 420 70, 420 70 C 370 70, 390 70, 340 70 Z'); }
              100% { d: path('M 340 70 C 340 70, 340 210, 340 210 C 360 180, 400 180, 420 210 C 420 210, 420 70, 420 70 C 400 100, 360 100, 340 70 Z'); }
            }
            @keyframes active-shape {
              0% { d: path('M 540 70 C 540 70, 540 210, 540 210 C 560 180, 600 180, 620 210 C 620 210, 620 70, 620 70 C 600 100, 560 100, 540 70 Z'); } 
              30% { d: path('M 540 70 C 540 70, 540 210, 540 210 C 570 210, 590 210, 620 210 C 620 210, 620 70, 620 70 C 570 70, 590 70, 540 70 Z'); }
              40% { d: path('M 540 70 C 540 70, 540 210, 540 210 C 570 210, 590 210, 620 210 C 620 210, 620 70, 620 70 C 570 70, 590 70, 540 70 Z'); } 
              60% { d: path('M 540 70 C 540 70, 540 210, 540 210 C 560 180, 600 180, 620 210 C 620 210, 620 70, 620 70 C 570 70, 590 70, 540 70 Z'); } 
              100% { d: path('M 540 70 C 540 70, 540 210, 540 210 C 560 180, 600 180, 620 210 C 620 210, 620 70, 620 70 C 600 100, 560 100, 540 70 Z'); } 
            }
          `;

          const ui = uiText[lang];

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-16">
              <style>{animationStyles}</style>
              
              {/* 標題與簡介 */}
              <header className="bg-emerald-600 text-white p-6 shadow-md relative">
                <div className="max-w-5xl mx-auto flex justify-between items-center">
                  <div>
                    <h1 className="serif-font text-3xl font-bold mb-2">{ui.title}</h1>
                    <p className="text-emerald-100">{ui.subtitle}</p>
                  </div>
                  <button 
                    onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')}
                    className="bg-emerald-800 hover:bg-emerald-900 text-white px-4 py-2 rounded-lg font-bold shadow-sm transition-colors"
                  >
                    {lang === 'zh' ? 'English' : '繁體中文'}
                  </button>
                </div>
              </header>

              <main className="max-w-5xl mx-auto mt-8 px-4">
                
                {/* 控制面板與說明 */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 col-span-1 md:col-span-1">
                    <h2 className="text-lg font-bold mb-4 flex items-center">
                      <span className="bg-emerald-100 text-emerald-700 w-8 h-8 rounded-full flex items-center justify-center mr-2">1</span>
                      {ui.step1}
                    </h2>
                    <div className="flex flex-col gap-2">
                      {Object.values(moleculeData).map(mol => (
                        <button
                          key={mol.id}
                          onClick={() => { setSelectedMolId(mol.id); setAnimating(false); }}
                          className={`px-4 py-3 rounded-lg text-left font-medium transition-colors border-l-4 ${
                            selectedMolId === mol.id 
                              ? 'bg-slate-100 border-emerald-500 shadow-inner' 
                              : 'bg-white border-transparent hover:bg-slate-50 border-slate-200 border'
                          }`}
                        >
                          <span className="inline-block w-3 h-3 rounded-full mr-2" style={{ backgroundColor: mol.color }}></span>
                          {mol.name[lang]}
                        </button>
                      ))}
                    </div>
                    <button
                      onClick={handlePlayAnimation}
                      disabled={animating}
                      className={`mt-6 w-full py-3 rounded-lg font-bold text-white transition-all ${
                        animating ? 'bg-emerald-300 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 shadow-md hover:shadow-lg'
                      }`}
                    >
                      {animating ? ui.playing : ui.play}
                    </button>
                  </div>

                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 col-span-1 md:col-span-2 flex flex-col justify-center">
                    <div className="flex items-start mb-4">
                       <span className="bg-emerald-100 text-emerald-700 w-8 h-8 rounded-full flex items-center justify-center mr-3 shrink-0">2</span>
                       <div>
                          <h3 className="text-xl font-bold text-slate-800 mb-2">{ui.step2}</h3>
                          <div className="flex items-center mb-2">
                            <span className="inline-block w-4 h-4 rounded-full mr-2 shadow-sm" style={{ backgroundColor: activeMolecule.color }}></span>
                            <span className="font-semibold text-emerald-600 text-lg">{activeMolecule.name[lang]}</span>
                          </div>
                          <p className="text-slate-600 leading-relaxed text-lg">
                            {activeMolecule.description[lang]}
                          </p>
                       </div>
                    </div>
                  </div>
                </div>

                {/* 動畫展示區 */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-12 overflow-hidden relative">
                  <div className="absolute top-4 left-6 text-sm font-bold text-slate-400 uppercase tracking-widest">
                    {ui.extracellular} {
                      (activeMolecule.type === 'active' || activeMolecule.type === 'simple-out') ? ui.lowConc : 
                      (activeMolecule.type === 'both' ? ui.mixedConc : ui.highConc)
                    }
                  </div>
                  <div className="absolute bottom-4 left-6 text-sm font-bold text-slate-400 uppercase tracking-widest">
                    {ui.intracellular} {
                      (activeMolecule.type === 'active' || activeMolecule.type === 'simple-out') ? ui.highConc : 
                      (activeMolecule.type === 'both' ? ui.mixedConc : ui.lowConc)
                    }
                  </div>
                  
                  <svg viewBox="0 0 700 300" className="w-full max-w-4xl mx-auto bg-slate-50 rounded-lg">
                    <rect width="700" height="300" fill="#f8fafc" />

                    <text x="170" y="50" fontSize="12" fill="#64748b" textAnchor="middle">{ui.channelProtein}</text>
                    <text x="380" y="40" fontSize="12" fill="#64748b" textAnchor="middle">{ui.carrierProtein}</text>
                    <text x="380" y="55" fontSize="10" fill="#64748b" textAnchor="middle">{ui.carrierFacilitated}</text>
                    <text x="580" y="40" fontSize="12" fill="#64748b" textAnchor="middle">{ui.carrierProtein}</text>
                    <text x="580" y="55" fontSize="10" fill="#64748b" textAnchor="middle">{ui.carrierActive}</text>
                    <text x="70" y="50" fontSize="12" fill="#64748b" textAnchor="middle">{ui.phospholipid}</text>
                    
                    {/* 磷脂雙層 */}
                    {renderPhospholipids(20, 4)}
                    
                    {/* 通道蛋白 */}
                    <g>
                      <rect x="140" y="70" width="20" height="140" rx="10" fill="#818cf8" />
                      <rect x="180" y="70" width="20" height="140" rx="10" fill="#818cf8" />
                      <rect x="150" y="60" width="40" height="15" fill="#818cf8" opacity="0.3"/>
                    </g>

                    {renderPhospholipids(220, 4)}

                    {/* 載體蛋白 1 */}
                    <g>
                      <path 
                        className={
                          animating && (activeMolecule.type === 'carrier' || activeMolecule.type === 'both') 
                            ? 'protein-carrier-activate' : ''
                        }
                        d="M 340 70 C 340 70, 340 210, 340 210 C 360 180, 400 180, 420 210 C 420 210, 420 70, 420 70 C 400 100, 360 100, 340 70 Z" 
                        fill="#a78bfa" 
                      />
                    </g>

                    {renderPhospholipids(440, 3)}

                    {/* 載體蛋白 2 */}
                    <g>
                      <path 
                        className={
                          animating && (activeMolecule.type === 'active' || activeMolecule.type === 'both') 
                            ? 'protein-active-activate' : ''
                        }
                        d="M 540 70 C 540 70, 540 210, 540 210 C 560 180, 600 180, 620 210 C 620 210, 620 70, 620 70 C 600 100, 560 100, 540 70 Z" 
                        fill="#f43f5e" 
                      />
                    </g>

                    {renderPhospholipids(640, 2)}

                    {/* 動畫分子 */}
                    {animating && (
                      <g key={animKey}>
                        {activeMolecule.type === 'both' ? (
                          <>
                            <g className="anim-carrier">
                              <circle cx="0" cy="0" r="12" fill={activeMolecule.color} stroke="#fff" strokeWidth="2" />
                              <text x="0" y="4" fontSize="10" fill="#fff" textAnchor="middle" fontWeight="bold">
                                {activeMolecule.id === 'AminoAcid' ? 'AA' : activeMolecule.id}
                              </text>
                            </g>
                            <g className="anim-active">
                              <circle cx="0" cy="0" r="12" fill={activeMolecule.color} stroke="#fff" strokeWidth="2" />
                              <text x="0" y="4" fontSize="10" fill="#fff" textAnchor="middle" fontWeight="bold">
                                {activeMolecule.id === 'AminoAcid' ? 'AA' : activeMolecule.id}
                              </text>
                            </g>
                            <g className="anim-atp">
                              <rect x="-15" y="-10" width="30" height="20" rx="4" fill="#fbbf24" stroke="#d97706" strokeWidth="2"/>
                              <text x="0" y="4" fontSize="10" fill="#92400e" textAnchor="middle" fontWeight="bold">ATP</text>
                            </g>
                            <g className="anim-adp">
                              <rect x="-18" y="-10" width="36" height="20" rx="4" fill="#cbd5e1" stroke="#64748b" strokeWidth="2"/>
                              <text x="0" y="3" fontSize="8" fill="#1e293b" textAnchor="middle" fontWeight="bold">ADP+Pi</text>
                            </g>
                            <g className="anim-flash">
                              <path d="M 0 -20 L 5 -5 L 20 0 L 5 5 L 0 20 L -5 5 L -20 0 L -5 -5 Z" fill="#fde047" opacity="0.8"/>
                            </g>
                          </>
                        ) : (
                          <>
                            <g className={`anim-${activeMolecule.type}`}>
                              <circle cx="0" cy="0" r="12" fill={activeMolecule.color} stroke="#fff" strokeWidth="2" />
                              <text x="0" y="4" fontSize="10" fill="#fff" textAnchor="middle" fontWeight="bold">
                                {activeMolecule.id === 'AminoAcid' ? 'AA' : (activeMolecule.id === 'Ion' ? 'Mg²⁺' : activeMolecule.id)}
                              </text>
                            </g>
                            
                            {activeMolecule.type === 'active' && (
                              <>
                                <g className="anim-atp">
                                  <rect x="-15" y="-10" width="30" height="20" rx="4" fill="#fbbf24" stroke="#d97706" strokeWidth="2"/>
                                  <text x="0" y="4" fontSize="10" fill="#92400e" textAnchor="middle" fontWeight="bold">ATP</text>
                                </g>
                                <g className="anim-adp">
                                  <rect x="-18" y="-10" width="36" height="20" rx="4" fill="#cbd5e1" stroke="#64748b" strokeWidth="2"/>
                                  <text x="0" y="3" fontSize="8" fill="#1e293b" textAnchor="middle" fontWeight="bold">ADP+Pi</text>
                                </g>
                                <g className="anim-flash">
                                  <path d="M 0 -20 L 5 -5 L 20 0 L 5 5 L 0 20 L -5 5 L -20 0 L -5 -5 Z" fill="#fde047" opacity="0.8"/>
                                </g>
                              </>
                            )}
                          </>
                        )}
                      </g>
                    )}

                    <g stroke="#cbd5e1" strokeWidth="1" strokeDasharray="4">
                       <line x1="15" y1="140" x2="685" y2="140" />
                    </g>
                    <text x="680" y="135" fontSize="10" fill="#94a3b8" textAnchor="end">{ui.hydrophobic}</text>
                  </svg>
                </div>

                {/* 測驗區 */}
                <div className="bg-slate-800 text-white p-8 rounded-2xl shadow-lg mt-16">
                  <h2 className="text-3xl font-bold mb-6 text-emerald-400 flex items-center">
                    <svg className="w-8 h-8 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    {ui.quizTitle}
                  </h2>
                  <p className="mb-8 text-slate-300">{ui.quizDesc}</p>

                  <div className="space-y-8">
                    {quizQuestions.map((q, index) => {
                      const answeredId = quizAnswers[q.id];
                      const isAnswered = !!answeredId;

                      return (
                        <div key={q.id} className="bg-slate-700 rounded-xl p-6">
                          <h3 className="text-xl font-medium mb-4"><span className="text-emerald-400 font-bold mr-2">Q{index + 1}.</span>{q.question[lang]}</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {q.options.map(opt => {
                              let btnClass = "bg-slate-600 hover:bg-slate-500 border border-slate-500 text-left p-4 rounded-lg transition-colors";
                              
                              if (isAnswered) {
                                if (opt.isCorrect) {
                                  btnClass = "bg-emerald-600/50 border border-emerald-400 text-white font-medium p-4 rounded-lg";
                                } else if (answeredId === opt.id && !opt.isCorrect) {
                                  btnClass = "bg-red-500/50 border border-red-400 text-white font-medium p-4 rounded-lg";
                                } else {
                                  btnClass = "bg-slate-700 border border-slate-600 text-slate-400 p-4 rounded-lg opacity-50 cursor-not-allowed";
                                }
                              }

                              return (
                                <button
                                  key={opt.id}
                                  disabled={isAnswered}
                                  onClick={() => handleOptionSelect(q.id, opt.id)}
                                  className={btnClass}
                                >
                                  <span className="font-bold mr-2">{opt.id}.</span> {opt.text[lang]}
                                </button>
                              );
                            })}
                          </div>
                          
                          {isAnswered && (
                            <div className={`mt-4 p-4 rounded-lg flex items-start ${
                              q.options.find(o => o.id === answeredId)?.isCorrect 
                                ? 'bg-emerald-900/40 text-emerald-100 border-l-4 border-emerald-500' 
                                : 'bg-amber-900/40 text-amber-100 border-l-4 border-amber-500'
                            }`}>
                              <div className="mr-3 mt-1">
                                {q.options.find(o => o.id === answeredId)?.isCorrect ? '✅' : '💡'}
                              </div>
                              <div>
                                <p className="font-bold mb-1">
                                  {q.options.find(o => o.id === answeredId)?.isCorrect ? ui.correct : ui.incorrect + q.options.find(o=>o.isCorrect).id + '。'}
                                </p>
                                <p className="text-sm opacity-90">{q.explanation[lang]}</p>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </main>
            </div>
          );
        }

        // 將 React 元件渲染到畫面上
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
