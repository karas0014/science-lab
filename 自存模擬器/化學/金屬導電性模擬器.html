<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金屬導電性大冒險</title>
    <!-- 引入可愛的圓體字型 -->
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FFB7B2;
            --soft-blue: #A2E1DB;
            --soft-yellow: #FFF4BD;
            --soft-purple: #E2F0CB;
            --dark-text: #555;
            --border-radius: 20px;
        }

        body {
            font-family: 'M PLUS Rounded 1c', 'Kosugi Maru', sans-serif;
            background-color: #FFF9F9;
            background-image: radial-gradient(#FFDEE9 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 20px;
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #FF6F61;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px #FFB7B2;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }

        /* 控制面板 */
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 8px 8px 0px var(--soft-blue);
            border: 3px solid var(--soft-blue);
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4A90E2;
            margin-bottom: 5px;
            border-bottom: 2px dashed #A2E1DB;
            padding-bottom: 5px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }

        button {
            font-family: inherit;
            background: var(--soft-yellow);
            border: 3px solid #F4D03F;
            border-radius: 15px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #795548;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 #F4D03F;
        }

        button.active {
            background: #FF6F61;
            border-color: #D32F2F;
            color: white;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
            transform: translateY(0);
        }

        /* 模擬顯示區 */
        .simulation-area {
            position: relative;
            width: 100%;
            height: 350px;
            background: #2C3E50;
            border-radius: var(--border-radius);
            border: 4px solid #34495E;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 資訊看板 */
        .info-panel {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: var(--border-radius);
            border: 3px solid var(--primary-pink);
            box-shadow: 8px 8px 0px var(--primary-pink);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .stats-box {
            background: #FFF0F5;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 60%;
            height: 15px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #aaa;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 漫畫角色對話框 */
        .mascot-container {
            display: flex;
            align-items: flex-start;
            margin-top: auto;
        }

        .mascot-avatar {
            width: 80px;
            height: 80px;
            background: #FFD1DC;
            border-radius: 50%;
            border: 3px solid #FF6F61;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-right: 15px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .dialogue-box {
            background: #FFF;
            border: 2px solid #555;
            border-radius: 15px;
            padding: 15px;
            position: relative;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .dialogue-box:after {
            content: '';
            position: absolute;
            left: -12px;
            top: 20px;
            width: 0;
            height: 0;
            border: 12px solid transparent;
            border-right-color: #555;
            border-left: 0;
            margin-top: -12px;
        }
        
        .dialogue-box:before {
            content: '';
            position: absolute;
            left: -8px;
            top: 20px;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-right-color: #FFF;
            border-left: 0;
            margin-top: -10px;
            z-index: 1;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .simulation-area {
                height: 250px;
            }
        }
        
        .legend {
            font-size: 0.8rem;
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 5px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot-e { width: 10px; height: 10px; background: #FFF700; border-radius: 50%; box-shadow: 0 0 5px #FFF;}
        .dot-i { width: 15px; height: 15px; background: #FF9AA2; border-radius: 50%; border: 1px solid white;}

    </style>
</head>
<body>

    <h1>✨ 金屬導電性大冒險 ✨</h1>
    <p style="text-align: center; margin-top: -10px; color: #888;">Form 4 Chemistry - Metallic Bonding Simulator</p>

    <div class="main-container">
        <!-- 左側：控制與模擬 -->
        <div class="control-panel">
            <div class="section-title">⭐ 選擇金屬元素</div>
            
            <p style="margin:5px 0; font-size:0.9rem;">主族金屬 (Main Group):</p>
            <div class="btn-group">
                <button onclick="selectMetal('Na')" id="btn-Na">鈉 (Na)</button>
                <button onclick="selectMetal('Mg')" id="btn-Mg">鎂 (Mg)</button>
                <button onclick="selectMetal('Al')" id="btn-Al">鋁 (Al)</button>
            </div>

            <p style="margin:5px 0; font-size:0.9rem;">過渡金屬 (Transition):</p>
            <div class="btn-group">
                <button onclick="selectMetal('Fe')" id="btn-Fe">鐵 (Fe)</button>
                <button onclick="selectMetal('Cu')" id="btn-Cu">銅 (Cu)</button>
                <button onclick="selectMetal('Ag')" id="btn-Ag">銀 (Ag)</button>
            </div>

            <div class="section-title" style="margin-top: 10px;">📺 顯微鏡下的金屬晶格</div>
            <div class="simulation-area">
                <canvas id="simCanvas"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="dot-i"></div> <span>金屬陽離子</span></div>
                <div class="legend-item"><div class="dot-e"></div> <span>離域電子</span></div>
            </div>
        </div>

        <!-- 右側：數據與教學 -->
        <div class="info-panel">
            <div class="section-title">📊 屬性分析</div>
            
            <div class="stats-box">
                <h2 id="metal-name" style="margin: 0 0 10px 0; color: #FF6F61;">請選擇金屬</h2>
                
                <div class="stat-item">
                    <span>離域電子密度:</span>
                    <div class="progress-bar"><div class="progress-fill" id="bar-density"></div></div>
                </div>
                
                <div class="stat-item">
                    <span>導電能力:</span>
                    <div class="progress-bar"><div class="progress-fill" id="bar-conductivity"></div></div>
                </div>
                
                <div style="font-size: 0.9rem; color: #666; margin-top: 5px;">
                    電子組態: <span id="elec-config" style="font-family: monospace; font-weight: bold;">-</span>
                </div>
            </div>

            <div class="mascot-container">
                <div class="mascot-avatar">👩‍🔬</div>
                <div class="dialogue-box" id="dialogue-text">
                    你好！我是原子博士。<br>
                    點擊左邊的按鈕，我們來看看不同金屬內部的「電子海」長什麼樣子吧！
                </div>
            </div>
        </div>
    </div>

    <script>
        // 金屬數據庫
        const metals = {
            'Na': {
                name: '鈉 (Sodium)',
                color: '#FFDAC1', // 陽離子顏色
                valence: 1, // 每個原子的價電子數 (用於計算數量)
                densityRating: 20, // 視覺上的密度條
                conductRating: 30, // 導電性條
                electronSpeed: 2, // 電子移動速度基數
                config: '2, 8, 1',
                desc: '鈉是第 1 族金屬。每個鈉原子只提供 <b>1 個</b> 價電子給電子海。因為離域電子數量較少，所以導電性在金屬中算是普通的喔！'
            },
            'Mg': {
                name: '鎂 (Magnesium)',
                color: '#FF9AA2',
                valence: 2,
                densityRating: 45,
                conductRating: 55,
                electronSpeed: 3.5,
                config: '2, 8, 2',
                desc: '鎂是第 2 族金屬。每個原子貢獻 <b>2 個</b> 電子成為離域電子。電子海比鈉更濃密，所以導電性比鈉更好！'
            },
            'Al': {
                name: '鋁 (Aluminum)',
                color: '#E2F0CB',
                valence: 3,
                densityRating: 70,
                conductRating: 75,
                electronSpeed: 5,
                config: '2, 8, 3',
                desc: '鋁是第 3 族金屬。哇！每個原子貢獻 <b>3 個</b> 電子！電子海非常豐富，電荷密度高，這讓鋁成為非常優秀的導體。'
            },
            'Fe': {
                name: '鐵 (Iron)',
                color: '#C7CEEA',
                valence: 2, // 簡化模型
                densityRating: 50,
                conductRating: 20, // 鐵的電阻率其實比銅高很多
                electronSpeed: 2.5,
                config: '[Ar] 3d⁶ 4s²',
                desc: '鐵是過渡金屬。雖然它也有離域電子，但因為其晶格結構的振動和電子散射較嚴重（電阻較大），所以導電性不如銅或銀喔。'
            },
            'Cu': {
                name: '銅 (Copper)',
                color: '#FFB7B2',
                valence: 1.5, // 視覺模擬用，雖然主要是+1/+2，但銅導電性極佳，模擬上給予高活性
                densityRating: 85,
                conductRating: 95,
                electronSpeed: 7,
                config: '[Ar] 3d¹⁰ 4s¹',
                desc: '銅是導電之王（僅次於銀）！作為過渡金屬，它的電子結構讓電子能非常自由且快速地移動。這就是為什麼電線都用銅做的！'
            },
            'Ag': {
                name: '銀 (Silver)',
                color: '#E0E0E0',
                valence: 1.5,
                densityRating: 90,
                conductRating: 100,
                electronSpeed: 8,
                config: '[Kr] 4d¹⁰ 5s¹',
                desc: '銀是所有金屬中導電性最好的！電子流動幾乎不受阻礙。不過因為銀太貴了，所以我們很少拿來做普通的電線。'
            }
        };

        // Canvas 設定
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let ions = [];
        let animationId;
        let currentMetalKey = null;

        // 初始化 Canvas 尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            width = canvas.width;
            height = canvas.height;
            if (currentMetalKey) initSimulation(currentMetalKey);
        }
        window.addEventListener('resize', resizeCanvas);

        // 粒子類別 (電子)
        class Electron {
            constructor(speedBase) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 2; // 2-4px
                // 速度根據金屬導電性決定，增加隨機性
                let angle = Math.random() * Math.PI * 2;
                let speed = (Math.random() * 0.5 + 0.5) * speedBase;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 邊界反彈
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = "#FFF700"; // 電子黃色
                ctx.shadowBlur = 5;
                ctx.shadowColor = "white";
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.closePath();
            }
        }

        // 陽離子類別
        class Ion {
            constructor(x, y, color) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = 25;
                this.faceOffset = Math.random() * 100;
            }

            update(time) {
                // 模擬晶格震動
                this.x = this.baseX + Math.sin(time * 0.005 + this.faceOffset) * 1.5;
                this.y = this.baseY + Math.cos(time * 0.005 + this.faceOffset) * 1.5;
            }

            draw() {
                // 畫圓形主體
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.fill();
                ctx.stroke();
                ctx.closePath();

                // 畫可愛表情 (>_<) 或 (^_^)
                ctx.fillStyle = "#555";
                
                // 眼睛
                ctx.beginPath();
                if (this.faceOffset > 50) {
                    // 開心眼 ^ ^
                    ctx.moveTo(this.x - 8, this.y - 2);
                    ctx.lineTo(this.x - 4, this.y - 6);
                    ctx.lineTo(this.x, this.y - 2);
                    
                    ctx.moveTo(this.x + 2, this.y - 2);
                    ctx.lineTo(this.x + 6, this.y - 6);
                    ctx.lineTo(this.x + 10, this.y - 2);
                    ctx.stroke();
                } else {
                    // 圓眼
                    ctx.arc(this.x - 6, this.y - 2, 2, 0, Math.PI * 2);
                    ctx.arc(this.x + 6, this.y - 2, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 嘴巴
                ctx.beginPath();
                ctx.arc(this.x, this.y + 5, 4, 0, Math.PI, false);
                ctx.stroke();
                
                // 加上正電荷符號
                ctx.font = "10px Arial";
                ctx.fillStyle = "#D32F2F";
                ctx.fillText("+", this.x + 12, this.y - 12);
            }
        }

        function initSimulation(key) {
            const metal = metals[key];
            
            // 清空陣列
            particles = [];
            ions = [];

            // 1. 生成陽離子晶格
            const rows = 4;
            const cols = 6;
            const paddingX = width / (cols + 1);
            const paddingY = height / (rows + 1);

            for (let i = 1; i <= cols; i++) {
                for (let j = 1; j <= rows; j++) {
                    ions.push(new Ion(i * paddingX, j * paddingY, metal.color));
                }
            }

            // 2. 生成離域電子
            // 數量公式：基礎數量 * 價電子數 * 導電因子
            // 為了視覺效果，我們設定一個基礎倍率
            const baseCount = 15; 
            let electronCount = baseCount * metal.valence;
            
            // 特殊調整：過渡金屬給予更多電子以顯示其高密度電子雲
            if (key === 'Cu' || key === 'Ag') electronCount = 80; 
            if (key === 'Fe') electronCount = 60;
            if (key === 'Na') electronCount = 20;

            for (let i = 0; i < electronCount; i++) {
                particles.push(new Electron(metal.electronSpeed));
            }
        }

        function animate(time) {
            ctx.clearRect(0, 0, width, height);

            // 繪製背景網格線 (模擬晶格場)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.lineWidth = 1;
            // 簡單畫幾條線
            ctx.beginPath();
            for(let i=0; i<width; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,height); }
            for(let i=0; i<height; i+=40) { ctx.moveTo(0,i); ctx.lineTo(width,i); }
            ctx.stroke();

            // 先畫電子 (在離子後面或前面皆可，這裡設為在後面穿梭)
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 畫陽離子
            ions.forEach(ion => {
                ion.update(time);
                ion.draw();
            });

            animationId = requestAnimationFrame(animate);
        }

        // UI 互動功能
        function selectMetal(key) {
            currentMetalKey = key;
            const data = metals[key];

            // 1. 更新按鈕狀態
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');

            // 2. 更新文字資訊
            document.getElementById('metal-name').textContent = data.name;
            document.getElementById('elec-config').textContent = data.config;
            
            // 3. 打字機效果更新對話
            const dialogueBox = document.getElementById('dialogue-text');
            dialogueBox.innerHTML = data.desc;

            // 4. 更新進度條動畫
            setTimeout(() => {
                document.getElementById('bar-density').style.width = data.densityRating + '%';
                document.getElementById('bar-conductivity').style.width = data.conductRating + '%';
            }, 100);

            // 5. 重啟模擬
            if (animationId) cancelAnimationFrame(animationId);
            resizeCanvas(); // 確保尺寸正確
            initSimulation(key);
            animate(0);
        }

        // 初始載入
        window.onload = () => {
            resizeCanvas();
            // 預設選擇 鈉
            selectMetal('Na');
        };

    </script>
</body>
</html>
