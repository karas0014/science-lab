<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金屬導電性 · Metallic Conductivity</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ac:#3b82f6;
            --primary-pink: #FFB7B2;
            --soft-blue: #A2E1DB;
            --soft-yellow: #FFF4BD;
            --soft-purple: #E2F0CB;
            --dark-text: #555;
            --border-radius: 20px;
        }

        body {
            font-family: 'M PLUS Rounded 1c', 'Noto Sans HK', sans-serif;
            background-color: #FFF9F9;
            background-image: radial-gradient(#FFDEE9 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 20px;
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition:background-color .3s,color .3s;
        }
        body.dark{
            color:#cbd5e1;
            background-color:#0a1626;
            background-image:linear-gradient(rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(rgba(56,189,248,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.11) 1px,transparent 1px);
            background-size:26px 26px,26px 26px,130px 130px,130px 130px;
        }
        .serif-font{ font-family:'Noto Serif HK',serif; }
        .bp-btn{ display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:6px;border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;text-decoration:none;cursor:pointer;transition:border-color .2s,color .2s; }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }

        h1 {
            color: #FF6F61;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px #FFB7B2;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }
        body.dark h1{ text-shadow:2px 2px 0 #0a1626, 4px 4px 0 #334155; }

        .main-container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; width: 100%; justify-content: center; }

        .control-panel { background: white; padding: 20px; border-radius: var(--border-radius); box-shadow: 8px 8px 0px var(--soft-blue); border: 3px solid var(--soft-blue); flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        body.dark .control-panel{ background:#0d192b; border-color:#2c3e57; box-shadow:8px 8px 0 #172033; }

        .section-title { font-size: 1.2rem; font-weight: bold; color: #4A90E2; margin-bottom: 5px; border-bottom: 2px dashed #A2E1DB; padding-bottom: 5px; }
        body.dark .section-title{ color:#5eead4; border-color:#2c3e57; }

        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }

        button { font-family: inherit; background: var(--soft-yellow); border: 3px solid #F4D03F; border-radius: 15px; padding: 10px; font-size: 1rem; cursor: pointer; transition: all 0.2s; color: #795548; font-weight: bold; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 0 #F4D03F; }
        button.active { background: #FF6F61; border-color: #D32F2F; color: white; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); transform: translateY(0); }
        body.dark button{ background:#1e293b; border-color:#334155; color:#e2e8f0; }
        body.dark button.active{ background:#FF6F61; border-color:#D32F2F; color:#fff; }

        .simulation-area { position: relative; width: 100%; height: 350px; background: #2C3E50; border-radius: var(--border-radius); border: 4px solid #34495E; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; width: 100%; height: 100%; }

        .info-panel { flex: 1; min-width: 300px; background: white; border-radius: var(--border-radius); border: 3px solid var(--primary-pink); box-shadow: 8px 8px 0px var(--primary-pink); padding: 20px; display: flex; flex-direction: column; position: relative; }
        body.dark .info-panel{ background:#0d192b; border-color:#2c3e57; box-shadow:8px 8px 0 #172033; }

        .stats-box { background: #FFF0F5; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        body.dark .stats-box{ background:#131f33; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .progress-bar { width: 60%; height: 15px; background: #ddd; border-radius: 10px; overflow: hidden; border: 2px solid #aaa; }
        body.dark .progress-bar{ background:#334155; border-color:#475569; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%); width: 0%; transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .mascot-container { display: flex; align-items: flex-start; margin-top: auto; }
        .mascot-avatar { width: 80px; height: 80px; background: #FFD1DC; border-radius: 50%; border: 3px solid #FF6F61; display: flex; justify-content: center; align-items: center; font-size: 40px; margin-right: 15px; flex-shrink: 0; overflow: hidden; }
        .dialogue-box { background: #FFF; border: 2px solid #555; border-radius: 15px; padding: 15px; position: relative; font-size: 0.95rem; line-height: 1.5; }
        .dialogue-box:after { content: ''; position: absolute; left: -12px; top: 20px; width: 0; height: 0; border: 12px solid transparent; border-right-color: #555; border-left: 0; margin-top: -12px; }
        .dialogue-box:before { content: ''; position: absolute; left: -8px; top: 20px; width: 0; height: 0; border: 10px solid transparent; border-right-color: #FFF; border-left: 0; margin-top: -10px; z-index: 1; }
        body.dark .dialogue-box{ background:#1e293b; border-color:#475569; color:#e2e8f0; }
        body.dark .dialogue-box:after{ border-right-color:#475569; }
        body.dark .dialogue-box:before{ border-right-color:#1e293b; }

        @media (max-width: 768px) { .main-container { flex-direction: column; } .simulation-area { height: 250px; } }

        .legend { font-size: 0.8rem; display: flex; gap: 15px; justify-content: center; margin-top: 5px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot-e { width: 10px; height: 10px; background: #FFF700; border-radius: 50%; box-shadow: 0 0 5px #FFF;}
        .dot-i { width: 15px; height: 15px; background: #FF9AA2; border-radius: 50%; border: 1px solid white;}
    </style>
</head>
<body class="dark">

    <a href="../../chemistry.html" class="bp-btn" style="position:fixed;top:12px;left:12px;z-index:60" aria-label="返回索引 / Back to index">
        <i data-lucide="home" width="14" height="14"></i><span>INDEX</span>
    </a>
    <div style="position:fixed;top:12px;right:12px;z-index:60" class="mascot-nope" >
        <span style="display:inline-flex;gap:8px">
        <button onclick="toggleTheme()" class="bp-btn" title="切換深淺色模式 / Toggle theme" aria-label="切換深淺色模式"><span id="theme-ic"><i data-lucide="sun" width="15" height="15"></i></span></button>
        <button onclick="toggleLang()" class="bp-btn" aria-label="切換語言 / Switch language"><i data-lucide="languages" width="14" height="14"></i><span id="lang-label">EN</span></button>
        </span>
    </div>

    <h1 class="serif-font" data-zh="✨ 金屬導電性大冒險 ✨" data-en="✨ Metallic Conductivity Adventure ✨" style="margin-top:2.5rem">✨ 金屬導電性大冒險 ✨</h1>
    <p style="text-align: center; margin-top: -10px; color: #888;" data-zh="中四化學 - 金屬鍵模擬器" data-en="Form 4 Chemistry - Metallic Bonding Simulator">中四化學 - 金屬鍵模擬器</p>

    <div class="main-container">
        <!-- 左側：控制與模擬 -->
        <div class="control-panel">
            <div class="section-title" data-zh="⭐ 選擇金屬元素" data-en="⭐ Choose a metal">⭐ 選擇金屬元素</div>

            <p style="margin:5px 0; font-size:0.9rem;" data-zh="主族金屬 (Main Group):" data-en="Main Group metals:">主族金屬 (Main Group):</p>
            <div class="btn-group">
                <button onclick="selectMetal('Na')" id="btn-Na" data-zh="鈉 (Na)" data-en="Sodium (Na)">鈉 (Na)</button>
                <button onclick="selectMetal('Mg')" id="btn-Mg" data-zh="鎂 (Mg)" data-en="Magnesium (Mg)">鎂 (Mg)</button>
                <button onclick="selectMetal('Al')" id="btn-Al" data-zh="鋁 (Al)" data-en="Aluminium (Al)">鋁 (Al)</button>
            </div>

            <p style="margin:5px 0; font-size:0.9rem;" data-zh="過渡金屬 (Transition):" data-en="Transition metals:">過渡金屬 (Transition):</p>
            <div class="btn-group">
                <button onclick="selectMetal('Fe')" id="btn-Fe" data-zh="鐵 (Fe)" data-en="Iron (Fe)">鐵 (Fe)</button>
                <button onclick="selectMetal('Cu')" id="btn-Cu" data-zh="銅 (Cu)" data-en="Copper (Cu)">銅 (Cu)</button>
                <button onclick="selectMetal('Ag')" id="btn-Ag" data-zh="銀 (Ag)" data-en="Silver (Ag)">銀 (Ag)</button>
            </div>

            <div class="section-title" style="margin-top: 10px;" data-zh="📺 顯微鏡下的金屬晶格" data-en="📺 Metal lattice under the microscope">📺 顯微鏡下的金屬晶格</div>
            <div class="simulation-area">
                <canvas id="simCanvas"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="dot-i"></div> <span data-zh="金屬陽離子" data-en="Metal cation">金屬陽離子</span></div>
                <div class="legend-item"><div class="dot-e"></div> <span data-zh="離域電子" data-en="Delocalised electron">離域電子</span></div>
            </div>
        </div>

        <!-- 右側：數據與教學 -->
        <div class="info-panel">
            <div class="section-title" data-zh="📊 屬性分析" data-en="📊 Property analysis">📊 屬性分析</div>

            <div class="stats-box">
                <h2 id="metal-name" style="margin: 0 0 10px 0; color: #FF6F61;">請選擇金屬</h2>

                <div class="stat-item">
                    <span data-zh="離域電子密度:" data-en="Delocalised electron density:">離域電子密度:</span>
                    <div class="progress-bar"><div class="progress-fill" id="bar-density"></div></div>
                </div>

                <div class="stat-item">
                    <span data-zh="導電能力:" data-en="Conductivity:">導電能力:</span>
                    <div class="progress-bar"><div class="progress-fill" id="bar-conductivity"></div></div>
                </div>

                <div style="font-size: 0.9rem; color: #666; margin-top: 5px;">
                    <span data-zh="電子組態: " data-en="Electron config: ">電子組態: </span><span id="elec-config" style="font-family: monospace; font-weight: bold;">-</span>
                </div>
            </div>

            <div class="mascot-container">
                <div class="mascot-avatar">👩‍🔬</div>
                <div class="dialogue-box" id="dialogue-text"></div>
            </div>
        </div>
    </div>

    <script>
        let LANG = 'zh';
        const L = (o) => (o && typeof o === 'object') ? (o[LANG] ?? o.zh) : o;

        // 金屬數據庫（雙語）
        const metals = {
            'Na': { name: {zh:'鈉 (Sodium)',en:'Sodium (Na)'}, color: '#FFDAC1', valence: 1, densityRating: 20, conductRating: 30, electronSpeed: 2, config: '2, 8, 1',
                desc: {zh:'鈉是第 1 族金屬。每個鈉原子只提供 <b>1 個</b> 價電子給電子海。因為離域電子數量較少，所以導電性在金屬中算是普通的喔！', en:'Sodium is a Group 1 metal. Each atom donates only <b>1</b> valence electron to the sea of electrons. With fewer delocalised electrons, its conductivity is only average among metals!'} },
            'Mg': { name: {zh:'鎂 (Magnesium)',en:'Magnesium (Mg)'}, color: '#FF9AA2', valence: 2, densityRating: 45, conductRating: 55, electronSpeed: 3.5, config: '2, 8, 2',
                desc: {zh:'鎂是第 2 族金屬。每個原子貢獻 <b>2 個</b> 電子成為離域電子。電子海比鈉更濃密，所以導電性比鈉更好！', en:'Magnesium is a Group 2 metal. Each atom contributes <b>2</b> electrons to the delocalised sea. Its electron sea is denser than sodium\'s, so it conducts better!'} },
            'Al': { name: {zh:'鋁 (Aluminum)',en:'Aluminium (Al)'}, color: '#E2F0CB', valence: 3, densityRating: 70, conductRating: 75, electronSpeed: 5, config: '2, 8, 3',
                desc: {zh:'鋁是第 3 族金屬。哇！每個原子貢獻 <b>3 個</b> 電子！電子海非常豐富，電荷密度高，這讓鋁成為非常優秀的導體。', en:'Aluminium is a Group 3 metal. Wow — each atom gives <b>3</b> electrons! A very rich electron sea with high charge density makes aluminium an excellent conductor.'} },
            'Fe': { name: {zh:'鐵 (Iron)',en:'Iron (Fe)'}, color: '#C7CEEA', valence: 2, densityRating: 50, conductRating: 20, electronSpeed: 2.5, config: '[Ar] 3d⁶ 4s²',
                desc: {zh:'鐵是過渡金屬。雖然它也有離域電子，但因為其晶格結構的振動和電子散射較嚴重（電阻較大），所以導電性不如銅或銀喔。', en:'Iron is a transition metal. It has delocalised electrons too, but stronger lattice vibration and electron scattering (higher resistance) mean it conducts less well than copper or silver.'} },
            'Cu': { name: {zh:'銅 (Copper)',en:'Copper (Cu)'}, color: '#FFB7B2', valence: 1.5, densityRating: 85, conductRating: 95, electronSpeed: 7, config: '[Ar] 3d¹⁰ 4s¹',
                desc: {zh:'銅是導電之王（僅次於銀）！作為過渡金屬，它的電子結構讓電子能非常自由且快速地移動。這就是為什麼電線都用銅做的！', en:'Copper is the king of conductivity (after silver)! As a transition metal, its electron structure lets electrons move very freely and fast. That\'s why wires are made of copper!'} },
            'Ag': { name: {zh:'銀 (Silver)',en:'Silver (Ag)'}, color: '#E0E0E0', valence: 1.5, densityRating: 90, conductRating: 100, electronSpeed: 8, config: '[Kr] 4d¹⁰ 5s¹',
                desc: {zh:'銀是所有金屬中導電性最好的！電子流動幾乎不受阻礙。不過因為銀太貴了，所以我們很少拿來做普通的電線。', en:'Silver is the best conductor of all metals! Electrons flow almost unimpeded. But silver is expensive, so we rarely use it for ordinary wires.'} }
        };

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let ions = [];
        let animationId;
        let currentMetalKey = null;

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            width = canvas.width;
            height = canvas.height;
            if (currentMetalKey) initSimulation(currentMetalKey);
        }
        window.addEventListener('resize', resizeCanvas);

        class Electron {
            constructor(speedBase) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 2;
                let angle = Math.random() * Math.PI * 2;
                let speed = (Math.random() * 0.5 + 0.5) * speedBase;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = "#FFF700";
                ctx.shadowBlur = 5; ctx.shadowColor = "white";
                ctx.fill(); ctx.shadowBlur = 0; ctx.closePath();
            }
        }

        class Ion {
            constructor(x, y, color) {
                this.baseX = x; this.baseY = y; this.x = x; this.y = y;
                this.color = color; this.size = 25; this.faceOffset = Math.random() * 100;
            }
            update(time) {
                this.x = this.baseX + Math.sin(time * 0.005 + this.faceOffset) * 1.5;
                this.y = this.baseY + Math.cos(time * 0.005 + this.faceOffset) * 1.5;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.strokeStyle = "white"; ctx.lineWidth = 3;
                ctx.fill(); ctx.stroke(); ctx.closePath();
                ctx.fillStyle = "#555";
                ctx.beginPath();
                if (this.faceOffset > 50) {
                    ctx.moveTo(this.x - 8, this.y - 2); ctx.lineTo(this.x - 4, this.y - 6); ctx.lineTo(this.x, this.y - 2);
                    ctx.moveTo(this.x + 2, this.y - 2); ctx.lineTo(this.x + 6, this.y - 6); ctx.lineTo(this.x + 10, this.y - 2);
                    ctx.stroke();
                } else {
                    ctx.arc(this.x - 6, this.y - 2, 2, 0, Math.PI * 2);
                    ctx.arc(this.x + 6, this.y - 2, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y + 5, 4, 0, Math.PI, false);
                ctx.stroke();
                ctx.font = "10px Arial"; ctx.fillStyle = "#D32F2F";
                ctx.fillText("+", this.x + 12, this.y - 12);
            }
        }

        function initSimulation(key) {
            const metal = metals[key];
            particles = []; ions = [];
            const rows = 4, cols = 6;
            const paddingX = width / (cols + 1);
            const paddingY = height / (rows + 1);
            for (let i = 1; i <= cols; i++) {
                for (let j = 1; j <= rows; j++) { ions.push(new Ion(i * paddingX, j * paddingY, metal.color)); }
            }
            const baseCount = 15;
            let electronCount = baseCount * metal.valence;
            if (key === 'Cu' || key === 'Ag') electronCount = 80;
            if (key === 'Fe') electronCount = 60;
            if (key === 'Na') electronCount = 20;
            for (let i = 0; i < electronCount; i++) { particles.push(new Electron(metal.electronSpeed)); }
        }

        function animate(time) {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<width; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,height); }
            for(let i=0; i<height; i+=40) { ctx.moveTo(0,i); ctx.lineTo(width,i); }
            ctx.stroke();
            particles.forEach(p => { p.update(); p.draw(); });
            ions.forEach(ion => { ion.update(time); ion.draw(); });
            animationId = requestAnimationFrame(animate);
        }

        function selectMetal(key) {
            currentMetalKey = key;
            const data = metals[key];
            document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${key}`).classList.add('active');
            document.getElementById('metal-name').textContent = L(data.name);
            document.getElementById('elec-config').textContent = data.config;
            document.getElementById('dialogue-text').innerHTML = L(data.desc);
            setTimeout(() => {
                document.getElementById('bar-density').style.width = data.densityRating + '%';
                document.getElementById('bar-conductivity').style.width = data.conductRating + '%';
            }, 100);
            if (animationId) cancelAnimationFrame(animationId);
            resizeCanvas();
            initSimulation(key);
            animate(0);
        }

        // --- 主題 / 語言切換 ---
        function toggleTheme(){
            const dark = !document.body.classList.contains('dark');
            document.body.classList.toggle('dark', dark);
            document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="15" height="15"></i>`;
            if(window.lucide) lucide.createIcons();
        }
        function toggleLang(){
            LANG = LANG==='zh' ? 'en' : 'zh';
            document.getElementById('lang-label').textContent = LANG==='zh' ? 'EN' : '中';
            document.querySelectorAll('[data-zh][data-en]').forEach(el=>{
                el.textContent = el.getAttribute(LANG==='zh'?'data-zh':'data-en');
            });
            if(currentMetalKey){
                document.getElementById('metal-name').textContent = L(metals[currentMetalKey].name);
                document.getElementById('dialogue-text').innerHTML = L(metals[currentMetalKey].desc);
            }
        }

        // 初始載入
        window.onload = () => {
            resizeCanvas();
            selectMetal('Na');
            if(window.lucide) lucide.createIcons();
        };
    </script>
</body>
</html>
