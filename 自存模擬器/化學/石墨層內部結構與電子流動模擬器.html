            <strong><span data-zh="科學原理解析：" data-en="The science: ">科學原理解析：</span></strong>
            <span data-zh="在真實的單層石墨（石墨烯）中，碳原子以完美的「蜂窩狀（Honeycomb）」六角晶格排列。圖中每個碳原子都與相鄰的三個碳原子形成穩定的 sp² 共價鍵。剩下的第四個價電子並未被侷限在單一化學鍵中，而是形成遍佈整個網狀結構的離域軌域。正如動畫所示，藍色與綠色電子能沿著相連的碳原子軌道不受限制地「跨行、隨機但整體朝向正極」流動，這就是石墨能導電的根本原因。"
                  data-en="In a single graphite layer (graphene), carbon atoms sit in a perfect honeycomb hexagonal lattice, each forming stable sp² covalent bonds with three neighbours. The fourth valence electron is not confined to one bond — it forms a delocalised orbital spanning the whole network. As the animation shows, the blue and green electrons drift freely across rows — random locally, but net-directed toward the positive terminal — which is exactly why graphite conducts electricity.">在真實的單層石墨（石墨烯）中，碳原子以完美的「蜂窩狀（Honeycomb）」六角晶格排列。圖中每個碳原子都與相鄰的三個碳原子形成穩定的 sp² 共價鍵。剩下的第四個價電子並未被侷限在單一化學鍵中，而是形成遍佈整個網狀結構的離域軌域。正如動畫所示，藍色與綠色電子能沿著相連的碳原子軌道不受限制地「跨行、隨機但整體朝向正極」流動，這就是石墨能導電的根本原因。</span>

    <script>
        let __lang = 'zh';

                if(v!=null) el.textContent = v;
            });
        }
        function toggleLang(){
            __lang = __lang==='zh' ? 'en' : 'zh';
            document.getElementById('lang-label').textContent = __lang==='zh' ? 'EN' : '中';
            applyLang();
        }
        function toggleTheme(){
            const dark = !document.body.classList.contains('dark');
            document.body.classList.toggle('dark', dark);
            document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="15" height="15"></i>`;
            if(window.lucide) lucide.createIcons();
        }
