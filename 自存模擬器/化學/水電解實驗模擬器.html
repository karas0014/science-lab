<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水電解實驗 · Electrolysis of Water</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{ --ac:#3b82f6; }
        body { font-family: 'Zen Maru Gothic', 'Noto Sans HK', sans-serif; background-color: #FFF8E1; color: #5D4037; overflow: hidden; user-select: none; transition:background-color .3s,color .3s; }
        body.dark{ color:#cbd5e1; background-color:#0a1626; background-image:linear-gradient(rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(rgba(56,189,248,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.11) 1px,transparent 1px); background-size:26px 26px,26px 26px,130px 130px,130px 130px; }
        .serif-font{ font-family:'Noto Serif HK',serif; }
        .bp-btn{ display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:6px;border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;text-decoration:none;cursor:pointer;transition:border-color .2s,color .2s; }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }

        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .face { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; opacity: 0.8; pointer-events: none; z-index: 10; }
        .eyes { display: flex; gap: 12px; }
        .eye { width: 12px; height: 12px; background-color: #333; border-radius: 50%; animation: blink 4s infinite; }
        .mouth { width: 20px; height: 10px; border-bottom: 3px solid #333; border-radius: 50%; margin-top: 4px; transition: 0.3s; }
        .beaker { width: 280px; height: 200px; background: rgba(255, 255, 255, 0.4); border: 4px solid #4FC3F7; border-top: none; border-radius: 0 0 30px 30px; position: relative; margin: 0 auto; overflow: visible; transition: all 0.5s ease; z-index: 5; }
        body.dark .beaker{ background:rgba(79,195,247,0.1); }
        .water { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(to top, #4FC3F7, #B3E5FC); transition: height 1.5s ease-in-out, background-color 0.5s; z-index: 1; border-radius: 0 0 26px 26px; overflow: hidden; }
        .tube-container { position: absolute; bottom: 20px; width: 60px; height: 160px; border: 3px solid #CFD8DC; border-bottom: none; border-radius: 30px 30px 0 0; background: rgba(255, 255, 255, 0.2); z-index: 20; overflow: hidden; display: none; pointer-events: auto; transition: box-shadow 0.3s; }
        .tube-left { left: 40px; }
        .tube-right { right: 40px; }
        .tube-container.testing:hover { box-shadow: 0 0 15px #FFEB3B; border-color: #FFEB3B; cursor: pointer; }
        .tube-container.tested { opacity: 0.6; }
        .electrode { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 12px; height: 140px; background: #78909C; border-radius: 5px; z-index: 3; display: none; }
        .gas-pocket { position: absolute; top: 0; left: 0; width: 100%; height: 0px; background: rgba(255, 255, 255, 0.95); transition: height 0.2s linear; z-index: 4; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #333; font-weight: 800; text-align: center; line-height: 1.2; }
        @keyframes bubbleRise { 0% { bottom: 10px; opacity: 0; transform: translateX(0); } 50% { opacity: 1; transform: translateX(2px); } 100% { bottom: 140px; opacity: 0; transform: translateX(-2px); } }
        .bubble { position: absolute; background: white; border-radius: 50%; opacity: 0.7; pointer-events: none; z-index: 5; }
        .circuit-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; }
        .circuit-wire { fill: none; stroke: #424242; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s; }
        body.dark .circuit-wire{ stroke:#94a3b8; }
        .wire-active { stroke: #FF5722; }
        .connection-dot { fill: #333; }
        body.dark .connection-dot{ fill:#cbd5e1; }
        .battery-pack { position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 2px; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 30; }
        .battery-terminal { width: 20px; height: 20px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; position: relative; z-index: -1; }
        .battery-body { width: 140px; height: 70px; background: linear-gradient(135deg, #FF7043, #F4511E); border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; box-shadow: 0 6px 0 #BF360C; position: relative; border: 2px solid #FFF; }
        .battery-nipple { position: absolute; right: -8px; top: 20px; width: 8px; height: 30px; background: #555; border-radius: 0 4px 4px 0; }
        .ammeter { position: absolute; width: 70px; height: 70px; background: #ECEFF1; border: 4px solid #455A64; border-radius: 50%; top: 35%; right: 25%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; color: #455A64; z-index: 30; opacity: 0; transition: opacity 0.5s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .ammeter-needle { position: absolute; bottom: 50%; left: 50%; width: 3px; height: 28px; background: #D32F2F; transform-origin: bottom center; transform: rotate(-45deg); transition: transform 0.5s cubic-bezier(0.4, 2.5, 0.6, 0.8); z-index: 2; }
        .ammeter-center { position: absolute; width: 8px; height: 8px; background: #333; border-radius: 50%; z-index: 3; }
        .switch-container { position: absolute; bottom: 60px; right: 20%; left: auto; z-index: 30; opacity: 0; transition: opacity 0.5s; cursor: pointer; }
        .switch-base { width: 60px; height: 30px; background: #5D4037; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .switch-lever { width: 80px; height: 8px; background: #BCAAA4; position: absolute; left: 0; top: 10px; transform-origin: 5px center; transform: rotate(-30deg); transition: transform 0.2s; border-radius: 4px; border: 1px solid #8D6E63; }
        .switch-closed .switch-lever { transform: rotate(0deg); }
        .choice-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; border: 4px solid #FFB74D; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 50; text-align: center; display: none; width: 90%; max-width: 400px; }
        body.dark .choice-panel{ background:#0d192b; color:#e2e8f0; }
        .choice-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 2px solid #EEE; border-radius: 10px; background: #FAFAFA; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .choice-btn:hover { background: #FFF3E0; border-color: #FFB74D; transform: scale(1.02); }
        body.dark .choice-btn{ background:#131f33; border-color:#2c3e57; color:#e2e8f0; }
        body.dark .choice-btn:hover{ background:#1e293b; }
        .prop-item { position: absolute; cursor: pointer; transition: transform 0.2s; z-index: 30; }
        .prop-item:hover { transform: scale(1.1); }
        .prop-icon { font-size: 50px; }
        .prop-label { font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 4px; }
        body.dark .prop-label{ background:rgba(13,25,43,.9); }
        .bottom-ui { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border: 4px solid #B3E5FC; }
        body.dark .bottom-ui{ background:rgba(13,25,43,.85); border-color:#2c3e57; }
        .highlight { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 183, 77, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 183, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 183, 77, 0); } }
        .test-tool { width: 80px; height: 12px; background: #D7CCC8; position: absolute; border-radius: 5px; cursor: none; display: none; z-index: 100; transform-origin: left center; pointer-events: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .flame { width: 18px; height: 18px; background: orange; border-radius: 50% 50% 20% 20%; position: absolute; right: -5px; top: -6px; box-shadow: 0 0 10px yellow; animation: flicker 0.15s infinite alternate; }
        .glow { width: 12px; height: 12px; background: #FF5722; border-radius: 50%; position: absolute; right: -2px; top: 0; box-shadow: 0 0 8px red; animation: breathe 1s infinite alternate; }
        @keyframes flicker { from { transform: scale(1); opacity: 0.9; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes breathe { from { opacity: 0.6; } to { opacity: 1; } }
        body.dark .bottom-ui .bg-white{ background:#131f33 !important; border-color:#2c3e57 !important; }
        body.dark #dialogue-text{ color:#e2e8f0; }
        body.dark #principle-text{ color:#94a3b8; }
        body.dark header h1{ color:#7dd3fc; }
    </style>
</head>
<body class="dark h-screen w-screen flex flex-col items-center justify-center p-4">

    <a href="../../chemistry.html" class="bp-btn" style="position:fixed;top:12px;left:12px;z-index:60" aria-label="返回索引 / Back to index">
        <i data-lucide="home" width="14" height="14"></i><span>INDEX</span>
    </a>
    <div style="position:fixed;top:12px;right:12px;z-index:60;display:flex;gap:8px">
        <button onclick="toggleTheme()" class="bp-btn" title="切換深淺色模式 / Toggle theme" aria-label="切換深淺色模式"><span id="theme-ic"><i data-lucide="sun" width="15" height="15"></i></span></button>
        <button onclick="toggleLang()" class="bp-btn" aria-label="切換語言 / Switch language"><i data-lucide="languages" width="14" height="14"></i><span id="lang-label">EN</span></button>
    </div>

    <!-- 標題 -->
    <header class="absolute top-4 w-full text-center z-50">
        <h1 class="serif-font text-3xl md:text-4xl font-bold text-sky-600 tracking-wider drop-shadow-sm" data-zh="⚡ 水電解實驗模擬器 🧪" data-en="⚡ Electrolysis of Water Simulator 🧪">⚡ 水電解實驗模擬器 🧪</h1>
    </header>

    <!-- 實驗主區域 -->
    <div class="relative w-full max-w-4xl h-[500px] flex justify-center items-center mt-4">
        <svg class="circuit-layer" id="circuit-svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
            <path id="wire-negative" d="M 318 445 L 326 445 L 326 360" class="circuit-wire" />
            <circle cx="326" cy="360" r="4" class="connection-dot" />
            <path id="wire-positive" d="M 482 445 L 640 445 L 640 400" class="circuit-wire" />
            <path id="wire-switch-ammeter" d="M 640 370 L 640 200 L 600 200" class="circuit-wire" />
            <path id="wire-ammeter-electrode" d="M 530 200 L 530 360 L 478 360" class="circuit-wire" />
            <circle cx="478" cy="360" r="4" class="connection-dot" />
        </svg>

        <div class="beaker" id="beaker">
            <div class="water" id="water"></div>
            <div class="face">
                <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                <div class="mouth" id="beaker-mouth"></div>
            </div>
            <div class="tube-container tube-left" id="tube-left">
                <div class="gas-pocket" id="gas-h2"><span style="display:none">H₂</span></div>
            </div>
            <div class="tube-container tube-right" id="tube-right">
                <div class="gas-pocket" id="gas-o2"><span style="display:none">O₂</span></div>
            </div>
            <div class="electrode" id="electrode-left" style="left: 60px;"></div>
            <div class="electrode" id="electrode-right" style="left: 212px;"></div>
        </div>

        <div class="battery-pack" id="battery-pack">
            <div class="battery-terminal">-</div>
            <div class="battery-body">
                <span data-zh="DC 電源" data-en="DC power">DC 電源</span>
                <div class="battery-nipple"></div>
            </div>
            <div class="battery-terminal">+</div>
        </div>

        <div class="switch-container" id="switch">
            <div class="switch-base"></div>
            <div class="switch-lever" id="switch-lever"></div>
            <div class="text-center text-sm font-bold mt-2 text-gray-600" data-zh="開關" data-en="Switch">開關</div>
        </div>

        <div class="ammeter" id="ammeter">
            <span class="text-xs mt-8">Ammeter</span>
            <div class="ammeter-needle" id="ammeter-needle"></div>
            <div class="ammeter-center"></div>
        </div>

        <div id="prop-water" class="prop-item hidden" style="top: 20px; right: 20px;">
            <div class="prop-icon">🚰</div>
            <div class="prop-label text-sky-600" data-zh="加入純水" data-en="Add pure water">加入純水</div>
        </div>

        <div id="prop-tubes" class="prop-item hidden" style="top: 20px; right: 20px;">
            <div class="prop-icon">🧪</div>
            <div class="prop-label text-gray-600" data-zh="安裝裝置" data-en="Set up apparatus">安裝裝置</div>
        </div>

        <div id="electrolyte-panel" class="choice-panel">
            <h3 class="text-xl font-bold mb-4 text-orange-600" data-zh="🤔 該加入什麼才能導電？" data-en="🤔 What should we add to conduct?">🤔 該加入什麼才能導電？</h3>
            <button class="choice-btn" onclick="chooseElectrolyte('sugar')" data-zh="🍬 蔗糖 (Sucrose)" data-en="🍬 Sucrose">🍬 蔗糖 (Sucrose)</button>
            <button class="choice-btn" onclick="chooseElectrolyte('acid')" data-zh="⚗️ 稀硫酸 (H₂SO₄)" data-en="⚗️ Dilute H₂SO₄">⚗️ 稀硫酸 (H₂SO₄)</button>
            <button class="choice-btn" onclick="chooseElectrolyte('alcohol')" data-zh="🍷 酒精 (Alcohol)" data-en="🍷 Alcohol">🍷 酒精 (Alcohol)</button>
        </div>

        <div id="tool-splint" class="test-tool">
            <div class="glow" id="splint-tip"></div>
        </div>
    </div>

    <!-- 底部控制 -->
    <div class="bottom-ui w-full max-w-3xl flex flex-col md:flex-row items-center justify-between p-4 rounded-3xl mt-2 z-50 shadow-lg">
        <div class="flex items-center gap-4 md:w-3/4 w-full">
            <div class="mascot-img w-20 h-20 bg-sky-200 rounded-full flex items-center justify-center text-4xl border-4 border-white shadow-md">💡</div>
            <div class="bg-white p-4 rounded-r-2xl rounded-bl-2xl shadow-sm border-2 border-sky-100 flex-1">
                <p id="dialogue-text" class="text-lg font-bold text-gray-700"></p>
                <p id="principle-text" class="text-sm text-gray-500 mt-1"></p>
            </div>
        </div>
        <div class="md:w-1/4 w-full flex justify-end mt-4 md:mt-0">
            <button id="main-btn" class="bg-amber-400 hover:bg-amber-500 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform active:scale-95 w-full md:w-auto"></button>
        </div>
    </div>

    <script>
        let LANG = 'zh';
        const L = (o) => (o && typeof o === 'object') ? (o[LANG] ?? o.zh) : o;

        const D = {
            acidCorrect: {zh:'太棒了！稀硫酸 (Dilute H₂SO₄) 是強電解質。',en:'Great! Dilute sulfuric acid (H₂SO₄) is a strong electrolyte.'},
            wrongSugar: {zh:'蔗糖是分子化合物，溶於水不產生離子。',en:'Sucrose is a molecular compound; it produces no ions in water.'},
            wrongAlcohol: {zh:'酒精是非電解質，無法導電。',en:'Alcohol is a non-electrolyte and cannot conduct.'},
            noReact: {zh:'電路沒有反應... 檢查一下是不是選錯電解質了？',en:"The circuit doesn't respond... did you pick the wrong electrolyte?"},
            tubesFull: {zh:'試管滿了！電路自動斷開。',en:'The tubes are full! The circuit breaks automatically.'},
            testPrompt: {zh:'請「點擊」試管進行測試！(左邊：爆鳴聲，右邊：復燃)',en:'Click a test tube to test it! (left: squeaky pop, right: relight)'},
            testingH2: {zh:'測試負極氣體...',en:'Testing the cathode gas...'},
            resultH2: {zh:'聽到「波」的一聲 (爆鳴聲)！證明是氫氣 (H₂)。',en:'You hear a squeaky pop! It proves the gas is hydrogen (H₂).'},
            testingO2: {zh:'測試正極氣體...',en:'Testing the anode gas...'},
            resultO2: {zh:'帶火星的木條復燃了！證明是氧氣 (O₂)。',en:'The glowing splint relights! It proves the gas is oxygen (O₂).'},
            doneMsg: {zh:'恭喜你！成功完成了水電解實驗並驗證了產物。',en:'Congratulations! You completed the electrolysis of water and verified the products.'},
            donePrinciple: {zh:'負極產生氫氣，正極產生氧氣，比例 2:1。',en:'The cathode makes hydrogen and the anode makes oxygen, ratio 2:1.'},
            partialMsg: {zh:'做得好！但還有另一管氣體沒測試喔，快去試試看！',en:'Well done! But one tube of gas is still untested — go try it!'},
            restart: {zh:'重新開始實驗',en:'Restart experiment'},
            wrong: (msg)=>({zh:`哎呀！${msg.zh} 電路無法接通喔。再試一次！`, en:`Oops! ${msg.en} The circuit won't work. Try again!`})
        };

        const ui = {
            dialogue: document.getElementById('dialogue-text'),
            principle: document.getElementById('principle-text'),
            btn: document.getElementById('main-btn'),
            beaker: document.getElementById('beaker'),
            water: document.getElementById('water'),
            mouth: document.getElementById('beaker-mouth'),
            tubes: [document.getElementById('tube-left'), document.getElementById('tube-right')],
            electrodes: [document.getElementById('electrode-left'), document.getElementById('electrode-right')],
            battery: document.getElementById('battery-pack'),
            switch: document.getElementById('switch'),
            switchLever: document.getElementById('switch-lever'),
            ammeter: document.getElementById('ammeter'),
            needle: document.getElementById('ammeter-needle'),
            wires: document.querySelectorAll('.circuit-wire'),
            svg: document.getElementById('circuit-svg'),
            propWater: document.getElementById('prop-water'),
            propTubes: document.getElementById('prop-tubes'),
            choicePanel: document.getElementById('electrolyte-panel'),
            gasH2: document.getElementById('gas-h2'),
            gasO2: document.getElementById('gas-o2'),
            tool: document.getElementById('tool-splint'),
            toolTip: document.getElementById('splint-tip')
        };

        let state = { step: 0, electrolyte: null, isSwitchClosed: false, reactionInterval: null, h2: 0, o2: 0, testedGases: { h2: false, o2: false } };
        const MAX_GAS = 100;

        // 目前顯示的雙語文字狀態
        let _dialogue = null, _principle = null, _btnText = null;
        function setDialogue(o){ _dialogue = o; ui.dialogue.textContent = L(o); }
        function setPrinciple(o){ _principle = o; ui.principle.textContent = L(o); }
        function setBtn(o){ _btnText = o; ui.btn.textContent = L(o); }

        const steps = [
            { id:0, text:{zh:"實驗準備：首先，我們需要將純水加入燒杯中。",en:"Preparation: first, add pure water to the beaker."}, principle:{zh:"水 (H₂O) 是共價化合物，純水很難導電。",en:"Water (H₂O) is a covalent compound; pure water barely conducts."}, btnText:{zh:"加入純水",en:"Add pure water"},
                action: () => { ui.btn.style.display = 'none'; ui.propWater.classList.remove('hidden'); ui.propWater.classList.add('highlight');
                    ui.propWater.onclick = () => { ui.water.style.height = "70%"; ui.propWater.classList.add('hidden'); nextStep(); }; } },
            { id:1, text:{zh:"純水不導電，我們需要加入電解質。請選擇正確的物質！",en:"Pure water does not conduct — we need an electrolyte. Pick the right substance!"}, principle:{zh:"電解質在水中會解離出離子，幫助導電。",en:"An electrolyte dissociates into ions in water to help conduction."}, btnText:{zh:"選擇電解質",en:"Choose electrolyte"},
                action: () => { ui.btn.style.display = 'none'; ui.choicePanel.style.display = 'block'; } },
            { id:2, text:{zh:"選擇正確！稀硫酸會解離出離子(H⁺, SO₄²⁻)。現在架設裝置吧。",en:"Correct! Dilute sulfuric acid dissociates into ions (H⁺, SO₄²⁻). Now set up the apparatus."}, principle:{zh:"現在水溶液變成了導體。",en:"The solution is now a conductor."}, btnText:{zh:"架設裝置",en:"Set up apparatus"},
                action: () => { ui.choicePanel.style.display = 'none'; ui.water.style.background = "linear-gradient(to top, #81D4FA, #E1F5FE)"; ui.btn.style.display = 'none'; ui.propTubes.classList.remove('hidden'); ui.propTubes.classList.add('highlight');
                    ui.propTubes.onclick = () => { ui.propTubes.classList.add('hidden'); ui.tubes.forEach(t => t.style.display = 'block'); ui.electrodes.forEach(e => e.style.display = 'block'); ui.battery.style.opacity = 1; ui.battery.style.bottom = "20px"; ui.switch.style.opacity = 1; ui.ammeter.style.opacity = 1; nextStep(); }; } },
            { id:3, text:{zh:"電路連接完成！請注意電池正負極，按下開關接通電路。",en:"Circuit connected! Note the battery terminals and close the switch."}, principle:{zh:"觀察安培計指針和電極周圍的變化。",en:"Watch the ammeter needle and the changes around the electrodes."}, btnText:{zh:"等待操作...",en:"Waiting..."},
                action: () => { ui.btn.style.display = 'none'; ui.switch.classList.add('highlight'); ui.switch.onclick = toggleSwitch; } },
            { id:4, text:{zh:"正在電解中... 觀察兩極的氣泡速率！",en:"Electrolysing... watch the bubble rate at each electrode!"}, principle:{zh:"負極產生氫氣，正極產生氧氣。體積比約 2:1。",en:"The cathode makes hydrogen, the anode makes oxygen. Volume ratio ≈ 2:1."}, btnText:{zh:"觀察中...",en:"Observing..."},
                action: () => { ui.switch.classList.remove('highlight'); } },
            { id:5, text:{zh:"氣體收集完畢！讓我們來測試氣體的性質。",en:"Gases collected! Let's test their properties."}, principle:{zh:"點擊試管進行測試！氫氣有爆鳴聲，氧氣會助燃。",en:"Click a test tube! Hydrogen gives a squeaky pop; oxygen relights a glowing splint."}, btnText:{zh:"開始氣體測試",en:"Start gas test"},
                action: () => { ui.btn.style.display = 'block'; ui.btn.onclick = startGasTest; ui.switch.onclick = null; } }
        ];

        ui.btn.onclick = nextStep;

        function nextStep() { if (state.step < steps.length - 1) { state.step++; renderStep(); } }

        function renderStep() {
            const current = steps[state.step];
            setDialogue(current.text);
            setPrinciple(current.principle);
            setBtn(current.btnText);
            if(current.action) current.action();
        }

        window.chooseElectrolyte = function(type) {
            state.electrolyte = type;
            if (type === 'acid') {
                steps[2].text = D.acidCorrect;
                nextStep();
            } else {
                let msg = type === 'sugar' ? D.wrongSugar : D.wrongAlcohol;
                setDialogue(D.wrong(msg));
                ui.mouth.style.borderRadius = "50% 50% 0 0"; ui.mouth.style.borderBottom = "none"; ui.mouth.style.borderTop = "3px solid #333";
                setTimeout(() => { ui.mouth.style.borderRadius = "50%"; ui.mouth.style.borderBottom = "3px solid #333"; ui.mouth.style.borderTop = "none"; }, 2000);
            }
        };

        function toggleSwitch() {
            if (state.isSwitchClosed) return;
            state.isSwitchClosed = true;
            ui.switch.classList.add('switch-closed');
            if (state.electrolyte === 'acid') {
                ui.needle.style.transform = "rotate(30deg)";
                ui.wires.forEach(w => w.classList.add('wire-active'));
                ui.mouth.style.height = "15px";
                nextStep();
                startReaction();
            } else { setDialogue(D.noReact); }
        }

        function startReaction() {
            state.reactionInterval = setInterval(() => {
                if (state.h2 >= MAX_GAS) { stopReaction(); return; }
                state.h2 += 0.4; state.o2 += 0.2;
                ui.gasH2.style.height = `${state.h2}%`;
                ui.gasO2.style.height = `${state.o2}%`;
                if(state.h2 > 15) { ui.gasH2.querySelector('span').style.display = 'block'; ui.gasO2.querySelector('span').style.display = 'block'; }
                createBubble(ui.tubes[0], 2);
                createBubble(ui.tubes[1], 1);
            }, 50);
        }

        function createBubble(container, count) {
            if(Math.random() > 0.4) return;
            for(let i=0; i<count; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.random() * 5 + 3;
                b.style.width = size + 'px'; b.style.height = size + 'px';
                b.style.left = (Math.random() * 40 + 10) + 'px';
                b.style.animation = `bubbleRise ${Math.random() + 1.5}s linear forwards`;
                container.appendChild(b);
                setTimeout(() => b.remove(), 2500);
            }
        }

        function stopReaction() {
            clearInterval(state.reactionInterval);
            ui.wires.forEach(w => w.classList.remove('wire-active'));
            ui.switch.classList.remove('switch-closed');
            ui.needle.style.transform = "rotate(-45deg)";
            setDialogue(D.tubesFull);
            state.isSwitchClosed = false;
            nextStep();
        }

        function startGasTest() {
            ui.btn.style.display = 'none';
            setDialogue(D.testPrompt);
            ui.tool.style.display = 'block';
            document.body.addEventListener('mousemove', moveTool);
            ui.tubes[0].classList.add('testing');
            ui.tubes[1].classList.add('testing');
            ui.tubes[0].onclick = () => { if(!state.testedGases.h2) testGas('h2'); };
            ui.tubes[1].onclick = () => { if(!state.testedGases.o2) testGas('o2'); };
        }

        function moveTool(e) { ui.tool.style.left = (e.pageX + 10) + 'px'; ui.tool.style.top = (e.pageY + 10) + 'px'; }

        function testGas(type) {
            state.testedGases[type] = true;
            if(type === 'h2') {
                setToolType('flame');
                setDialogue(D.testingH2);
                ui.tubes[0].style.boxShadow = "0 0 20px #FF5722";
                setTimeout(() => {
                    ui.gasH2.style.background = "#FFCCBC";
                    ui.gasH2.innerHTML = "<span style='font-size:20px; color:red;'>💥 POP!</span>";
                    setDialogue(D.resultH2);
                    ui.tubes[0].classList.add('tested'); ui.tubes[0].classList.remove('testing');
                    checkCompletion();
                }, 600);
            } else {
                setToolType('glow');
                setDialogue(D.testingO2);
                ui.tubes[1].style.boxShadow = "0 0 20px #FFEB3B";
                setTimeout(() => {
                    setToolType('flame');
                    ui.gasO2.style.background = "#FFF9C4";
                    ui.gasO2.innerHTML = "<span style='font-size:20px; color:orange;'>🔥</span>";
                    setDialogue(D.resultO2);
                    ui.tubes[1].classList.add('tested'); ui.tubes[1].classList.remove('testing');
                    checkCompletion();
                }, 600);
            }
        }

        function checkCompletion() {
            if (state.testedGases.h2 && state.testedGases.o2) {
                setTimeout(() => { setDialogue(D.doneMsg); setPrinciple(D.donePrinciple); finishGame(); }, 1500);
            } else {
                setTimeout(() => { setDialogue(D.partialMsg); setToolType(''); }, 1500);
            }
        }

        function setToolType(type) {
            ui.toolTip.className = '';
            if(type === 'glow') ui.toolTip.classList.add('glow');
            if(type === 'flame') ui.toolTip.classList.add('flame');
        }

        function finishGame() {
            document.body.removeEventListener('mousemove', moveTool);
            ui.tool.style.display = 'none';
            ui.tubes[0].onclick = null; ui.tubes[1].onclick = null;
            ui.tubes[0].style.boxShadow = "none"; ui.tubes[1].style.boxShadow = "none";
            ui.btn.style.display = 'block';
            setBtn(D.restart);
            ui.btn.onclick = () => location.reload();
        }

        // --- 主題 / 語言切換 ---
        function toggleTheme(){
            const dark = !document.body.classList.contains('dark');
            document.body.classList.toggle('dark', dark);
            document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="15" height="15"></i>`;
            if(window.lucide) lucide.createIcons();
        }
        function toggleLang(){
            LANG = LANG==='zh' ? 'en' : 'zh';
            document.getElementById('lang-label').textContent = LANG==='zh' ? 'EN' : '中';
            document.querySelectorAll('[data-zh][data-en]').forEach(el=>{
                el.textContent = el.getAttribute(LANG==='zh'?'data-zh':'data-en');
            });
            if(_dialogue) ui.dialogue.textContent = L(_dialogue);
            if(_principle) ui.principle.textContent = L(_principle);
            if(_btnText) ui.btn.textContent = L(_btnText);
        }

        // Init
        renderStep();
        if(window.lucide) lucide.createIcons();
    </script>
</body>
</html>
