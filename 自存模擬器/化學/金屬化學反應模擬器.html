<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金屬化學反應 · Reactions of Metals</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ac:#3b82f6;
            --primary: #4A90E2;
            --secondary: #F5A623;
            --success: #7ED321;
            --danger: #D0021B;
            --bg-color: #f0f8ff;
            --panel-bg: #ffffff;
            --border-radius: 20px;
        }
        body { font-family: 'Noto Sans HK', "PingFang TC", sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; display: flex; flex-direction: column; align-items: center; transition:background-color .3s,color .3s; }
        body.dark{ color:#cbd5e1; background-color:#0a1626; background-image:linear-gradient(rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(rgba(56,189,248,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.11) 1px,transparent 1px); background-size:26px 26px,26px 26px,130px 130px,130px 130px; }
        h1, h2, h3 { color: #444; text-align: center; text-shadow: 2px 2px 0px #fff; }
        body.dark h1,body.dark h2,body.dark h3{ color:#e2e8f0; text-shadow:none; }
        .serif-font{ font-family:'Noto Serif HK',serif; }
        .bp-btn{ display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:6px;border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;text-decoration:none;cursor:pointer;transition:border-color .2s,color .2s; }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }

        .nav-tabs { display: flex; gap: 20px; margin-bottom: 20px; }
        .nav-btn { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; background: #ddd; font-weight: bold; transition: transform 0.2s, background 0.3s; box-shadow: 0 4px 0 #999; }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 0 #2a5c96; transform: translateY(2px); }
        .nav-btn:active { transform: translateY(4px); box-shadow: none; }
        body.dark .nav-btn{ background:#1e293b; color:#cbd5e1; box-shadow:0 4px 0 #0a1626; }
        body.dark .nav-btn.active{ background:var(--primary); color:#fff; }

        .container { display: none; width: 100%; max-width: 1000px; background: var(--panel-bg); border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; border: 5px solid #444; box-sizing: border-box; }
        .container.active { display: block; animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        body.dark .container{ background:#0d192b; border-color:#2c3e57; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .lab-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 768px) { .lab-layout { grid-template-columns: 1fr; } .nav-tabs { flex-direction: column; gap: 10px; } }
        .controls { background: #ffeaa7; padding: 20px; border-radius: 15px; border: 3px solid #fdcb6e; }
        body.dark .controls{ background:#131f33; border-color:#334155; }
        .control-group { margin-bottom: 20px; }
        .control-title { font-weight: bold; margin-bottom: 10px; display: block; font-size: 1.1rem; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }
        .chem-btn { padding: 8px; border: 2px solid #333; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: all 0.2s; }
        .chem-btn:hover { transform: scale(1.05); background: #eef; }
        .chem-btn.selected { background: var(--secondary); color: white; border-color: #d35400; box-shadow: 0 0 10px rgba(245, 166, 35, 0.5); }
        body.dark .chem-btn{ background:#0f1a2e; color:#e2e8f0; border-color:#334155; }
        body.dark .chem-btn:hover{ background:#1e293b; }
        .display-area { background: #dfe6e9; border-radius: 15px; border: 3px solid #b2bec3; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; min-height: 450px; }
        body.dark .display-area{ background:#0f1a2e; border-color:#334155; }
        .beaker-container { position: relative; width: 200px; height: 250px; margin-top: 50px; }
        .beaker { width: 150px; height: 200px; border-left: 5px solid #333; border-right: 5px solid #333; border-bottom: 5px solid #333; border-radius: 0 0 20px 20px; position: absolute; bottom: 0; left: 25px; background: rgba(255, 255, 255, 0.2); overflow: hidden; z-index: 2; }
        body.dark .beaker{ border-color:#94a3b8; }
        .liquid { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: #74b9ff; transition: height 1s, background-color 1s; z-index: 1; }
        .metal-piece { width: 40px; height: 40px; background: #95a5a6; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); border-radius: 5px; border: 2px solid #333; display: none; z-index: 3; transition: all 0.5s; }
        .bubble { position: absolute; background: rgba(255, 255, 255, 0.8); border-radius: 50%; border: 1px solid #fff; z-index: 2; animation: rise 2s infinite ease-in; }
        @keyframes rise { 0% { bottom: 0; transform: translateX(0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { bottom: 100%; transform: translateX(10px) scale(1.2); opacity: 0; } }
        .gas-cloud { position: absolute; top: -60px; left: 20px; font-size: 2rem; opacity: 0; }
        .gas-active { animation: floatUp 2s forwards; }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(-50px); } }
        .fire-effect { font-size: 3rem; position: absolute; bottom: 10px; left: 35%; display: none; animation: flicker 0.5s infinite; }
        @keyframes flicker { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .result-panel { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; width: 100%; box-sizing: border-box; border: 2px solid #333; }
        body.dark .result-panel{ background:#131f33; border-color:#334155; }
        .equation-box { font-family: 'JetBrains Mono', "Courier New", monospace; background: #333; color: #0f0; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 1.1rem; text-align: center; overflow-wrap: break-word; }
        .run-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--success); color: white; font-size: 1.5rem; border: none; border-radius: 10px; cursor: pointer; border-bottom: 5px solid #5c9c16; transition: all 0.1s; }
        .run-btn:active { transform: translateY(4px); border-bottom: 0px; }
        .quiz-start { text-align: center; padding: 40px; }
        .input-name { padding: 10px; font-size: 1.2rem; border-radius: 5px; border: 2px solid #ccc; margin-right: 10px; max-width: 200px; margin-bottom: 10px; }
        body.dark .input-name{ background:#0f1a2e; color:#e2e8f0; border-color:#334155; }
        .question-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        body.dark .question-card{ background:#0f1a2e; }
        .option-label { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border-radius: 5px; transition: background 0.2s; background: #f8f9fa; border: 1px solid #ddd; }
        .option-label:hover { background: #e9ecef; }
        body.dark .option-label{ background:#131f33; border-color:#334155; color:#e2e8f0; }
        body.dark .option-label:hover{ background:#1e293b; }
        .score-display { text-align: center; font-size: 2rem; font-weight: bold; margin-top: 20px; }
        .pass-stamp { color: var(--success); border: 5px solid var(--success); display: inline-block; padding: 10px 30px; transform: rotate(-10deg); margin-top: 20px; font-size: 2.5rem; font-weight: bold; }
        .fail-stamp { color: var(--danger); border: 5px solid var(--danger); display: inline-block; padding: 10px 30px; transform: rotate(-10deg); margin-top: 20px; font-size: 2.5rem; font-weight: bold; }
        .heat-icon { position: absolute; bottom: -40px; left: 50px; font-size: 2rem; display: none; }
    </style>
</head>

                <button class="run-btn" onclick="runExperiment()" data-zh="開始實驗！🚀" data-en="Run experiment! 🚀">開始實驗！🚀</button>

            <div class="display-area">

    <script>
        let LANG = 'zh';
        const L = (o) => (o && typeof o === 'object') ? (o[LANG] ?? o.zh) : o;
        const NR = {zh:'無反應', en:'No reaction'};

        const metalInfo = {
            'K':  {name:{zh:'鉀 (K)',en:'Potassium (K)'}, color:'#bdc3c7'},
            'Na': {name:{zh:'鈉 (Na)',en:'Sodium (Na)'}, color:'#bdc3c7'},
            'Ca': {name:{zh:'鈣 (Ca)',en:'Calcium (Ca)'}, color:'#95a5a6'},
            'Mg': {name:{zh:'鎂 (Mg)',en:'Magnesium (Mg)'}, color:'#95a5a6'},
            'Al': {name:{zh:'鋁 (Al)',en:'Aluminium (Al)'}, color:'#ecf0f1'},
            'Fe': {name:{zh:'鐵 (Fe)',en:'Iron (Fe)'}, color:'#555'},
            'Pb': {name:{zh:'鉛 (Pb)',en:'Lead (Pb)'}, color:'#7f8c8d'},
            'Cu': {name:{zh:'銅 (Cu)',en:'Copper (Cu)'}, color:'#d35400'}
        };
        const reactantInfo = {
            'O2': {name:{zh:'氧氣 (加熱)',en:'Oxygen (heat)'}, type:'gas'},
            'H2O_l': {name:{zh:'冷水',en:'Cold water'}, type:'liquid'},
            'H2O_g': {name:{zh:'水蒸汽 (加熱)',en:'Steam (heat)'}, type:'gas'},
            'HCl': {name:{zh:'稀氫氯酸',en:'Dilute HCl'}, type:'liquid'},
            'H2SO4_dil': {name:{zh:'稀硫酸',en:'Dilute H₂SO₄'}, type:'liquid'},
            'H2SO4_conc': {name:{zh:'濃硫酸',en:'Conc. H₂SO₄'}, type:'liquid'},
            'HNO3_v_dil': {name:{zh:'極稀硝酸',en:'Very dilute HNO₃'}, type:'liquid'}
        };

        const reactions = {
            'K': {
                'O2': { obs:{zh:'燃燒產生淡紫色火焰 (Lilac flame)，生成氧化鉀。',en:'Burns with a lilac flame, forming potassium oxide.'}, eq:'4K + O₂ → 2K₂O', anim:'burn-lilac' },
                'H2O_l': { obs:{zh:'反應極度劇烈，金屬在水面快速移動並燃燒（淡紫色火焰），產生氫氧化鉀和氫氣。',en:'Extremely vigorous; the metal darts across the water and burns (lilac flame), giving potassium hydroxide and hydrogen.'}, eq:'2K + 2H₂O → 2KOH + H₂', anim:'vigorous-float-lilac' },
                'H2O_g': { obs:{zh:'危險爆炸性反應！生成氧化鉀和氫氣。',en:'Dangerous explosive reaction! Forms potassium oxide and hydrogen.'}, eq:'2K + H₂O(g) → K₂O + H₂', anim:'explosion' },
                'HCl': { obs:{zh:'危險爆炸性反應！生成鹽和氫氣。',en:'Dangerous explosive reaction! Forms a salt and hydrogen.'}, eq:'2K + 2HCl → 2KCl + H₂', anim:'explosion' },
                'H2SO4_dil': { obs:{zh:'危險爆炸性反應！生成鹽和氫氣。',en:'Dangerous explosive reaction! Forms a salt and hydrogen.'}, eq:'2K + H₂SO₄ → K₂SO₄ + H₂', anim:'explosion' },
                'H2SO4_conc': { obs:{zh:'極度危險反應。',en:'Extremely dangerous reaction.'}, eq:{zh:'複雜氧化反應',en:'Complex oxidation'}, anim:'explosion' },
                'HNO3_v_dil': { obs:{zh:'危險爆炸性反應！生成鹽和氫氣。',en:'Dangerous explosive reaction! Forms a salt and hydrogen.'}, eq:'2K + 2HNO₃ → 2KNO₃ + H₂', anim:'explosion' }
            },
            'Na': {
                'O2': { obs:{zh:'燃燒產生金黃色火焰，生成白色粉末 (Na₂O)。',en:'Burns with a golden-yellow flame, forming a white powder (Na₂O).'}, eq:'4Na + O₂ → 2Na₂O', anim:'burn-yellow' },
                'H2O_l': { obs:{zh:'劇烈反應，金屬浮在水面並熔成小球，發出嘶嘶聲，生成氫氧化鈉和氫氣。',en:'Vigorous; the metal floats and melts into a ball, hissing, forming sodium hydroxide and hydrogen.'}, eq:'2Na + 2H₂O → 2NaOH + H₂', anim:'vigorous-float' },
                'H2O_g': { obs:{zh:'極度劇烈反應 (危險)。生成氧化鈉和氫氣。',en:'Extremely vigorous (dangerous). Forms sodium oxide and hydrogen.'}, eq:'2Na + H₂O(g) → Na₂O + H₂', anim:'explosion' },
                'HCl': { obs:{zh:'極度危險的爆炸性反應！生成鹽和氫氣。',en:'Extremely dangerous explosive reaction! Forms a salt and hydrogen.'}, eq:'2Na + 2HCl → 2NaCl + H₂', anim:'explosion' },
                'H2SO4_dil': { obs:{zh:'極度危險的爆炸性反應！生成鹽和氫氣。',en:'Extremely dangerous explosive reaction! Forms a salt and hydrogen.'}, eq:'2Na + H₂SO₄ → Na₂SO₄ + H₂', anim:'explosion' },
                'H2SO4_conc': { obs:{zh:'劇烈反應，具危險性。',en:'Vigorous, hazardous reaction.'}, eq:{zh:'複雜反應 (主要氧化作用)',en:'Complex reaction (mainly oxidation)'}, anim:'vigorous' },
                'HNO3_v_dil': { obs:{zh:'劇烈反應，生成鹽和氫氣。',en:'Vigorous; forms a salt and hydrogen.'}, eq:'2Na + 2HNO₃ → 2NaNO₃ + H₂', anim:'vigorous' }

        // --- 狀態 ---

        function switchTab(tab) {
            document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');

            if(tab === 'lab') buttons[0].classList.add('active');
            else buttons[1].classList.add('active');
        }

        function selectMetal(symbol, btn) {
            currentMetal = symbol;
            document.querySelectorAll('#metal-options .chem-btn').forEach(b => b.classList.remove('selected'));
            if(btn) btn.classList.add('selected');
            updateStatus();
            resetVisuals();
        }
        function selectReactant(code, btn) {
            currentReactant = code;
            currentReactantType = reactantInfo[code].type;
            document.querySelectorAll('#reactant-options .chem-btn').forEach(b => b.classList.remove('selected'));
            if(btn) btn.classList.add('selected');
            updateStatus();
            resetVisuals();
        }

        function updateStatus() {
            const m = currentMetal ? L(metalInfo[currentMetal].name) : "___";
            const r = currentReactant ? L(reactantInfo[currentReactant].name) : "___";
            if(!currentMetal && !currentReactant){
                document.getElementById('status-text').innerText = L(UI.selectBoth);
                return;
            }
            document.getElementById('status-text').innerHTML = `${L(UI.current)}<span style="color:var(--primary);">${m}</span> + <span style="color:var(--danger);">${r}</span>`;
        }

        function resetVisuals() {
            const liquid = document.getElementById('liquid');
            const metal = document.getElementById('metal-piece');
            const bubbles = document.getElementById('bubbles-container');
            const fire = document.getElementById('fire');
            const heat = document.getElementById('heat-source');
            const gas = document.getElementById('gas-cloud');
            liquid.style.height = '0%';
            liquid.style.backgroundColor = '#74b9ff';
            metal.style.display = 'none';
            metal.style.backgroundColor = currentMetal ? metalInfo[currentMetal].color : '#95a5a6';
            metal.style.bottom = '10px'; metal.style.left = '50%'; metal.style.opacity = '1';
            metal.style.transform = 'translateX(-50%)';
            bubbles.innerHTML = '';
            fire.style.display = 'none';
            heat.style.display = 'none';
            gas.classList.remove('gas-active');
            gas.innerText = '💨';
            _lastData = null;
            document.getElementById('observation-text').innerText = L(UI.ready);
            document.getElementById('equation-text').innerText = '? + ? → ?';
        }

        function runExperiment() {
            if (!currentMetal || !currentReactant) {
                document.getElementById('status-text').innerHTML = `<span style="color:var(--danger)">${L(UI.warnSelect)}</span>`;
                return;
            }
            let data = reactions[currentMetal] && reactions[currentMetal][currentReactant];
            if (!data) { data = { obs: UI.noObs, eq: NR, anim: 'none' }; }
            _lastData = data;
            document.getElementById('observation-text').innerText = L(data.obs);
            document.getElementById('equation-text').innerText = L(data.eq);

            const liquid = document.getElementById('liquid');
            const metal = document.getElementById('metal-piece');
            const heat = document.getElementById('heat-source');
            if (currentReactantType === 'liquid') {
                liquid.style.height = '60%';
                if (currentReactant === 'H2SO4_conc') liquid.style.backgroundColor = '#dfe6e9';
            } else { liquid.style.height = '0%'; }
            metal.style.display = 'block';
            if (currentReactant === 'O2' || currentReactant === 'H2O_g' || currentReactant === 'H2SO4_conc') { heat.style.display = 'block'; }
            setTimeout(() => { triggerAnimation(data.anim); }, 800);
        }

        function triggerAnimation(type) {
            const bubblesContainer = document.getElementById('bubbles-container');
            const metal = document.getElementById('metal-piece');
            const liquid = document.getElementById('liquid');
            const gas = document.getElementById('gas-cloud');
            const fire = document.getElementById('fire');
            bubblesContainer.innerHTML = '';
            if (type === 'none') return;
            const createBubbles = (amount) => {
                for(let i=0; i<amount; i++) {
                    let b = document.createElement('div');
                    b.className = 'bubble';
                    b.style.left = Math.random() * 80 + 10 + '%';
                    b.style.width = Math.random() * 10 + 5 + 'px';
                    b.style.height = b.style.width;
                    b.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                    bubblesContainer.appendChild(b);
                }
                gas.innerText = 'H₂'; gas.classList.add('gas-active');
            };
            switch (type) {
                case 'vigorous': case 'fast':
                    createBubbles(30); metal.style.transform = 'translateX(-50%) rotate(5deg)';
                    setTimeout(() => { metal.style.opacity = 0; }, 2000); break;
                case 'vigorous-float':
                    liquid.style.backgroundColor = '#e17055'; createBubbles(30); metal.style.bottom = '60%';
                    let dance = setInterval(() => { metal.style.left = Math.random() * 80 + 10 + '%'; }, 200);
                    setTimeout(() => clearInterval(dance), 2000); setTimeout(() => { metal.style.opacity = 0; }, 2000); break;
                case 'vigorous-float-lilac':
                    liquid.style.backgroundColor = '#e17055'; createBubbles(40); metal.style.bottom = '60%';
                    fire.style.display = 'block'; fire.style.color = '#cfa7ff'; fire.style.textShadow = '0 0 10px #a29bfe'; fire.style.bottom = '65%';
                    let danceK = setInterval(() => { let nl = Math.random()*80+10; metal.style.left = nl + '%'; fire.style.left = (nl-5) + '%'; }, 150);
                    setTimeout(() => { clearInterval(danceK); fire.style.display = 'none'; }, 2000); setTimeout(() => { metal.style.opacity = 0; }, 2000); break;
                case 'sinks-bubbles':
                    createBubbles(20); liquid.style.backgroundColor = '#ecf0f1'; break;
                case 'explosion':
                    fire.style.display = 'block'; fire.style.left = '40%'; fire.style.bottom = '50%'; fire.style.fontSize = '5rem'; fire.innerText = '💥'; metal.style.display = 'none'; break;
                case 'moderate':
                    createBubbles(15); setTimeout(() => { metal.style.opacity = 0.5; }, 2000); break;
                case 'slow-green':
                    createBubbles(5); liquid.style.backgroundColor = '#b8e994'; break;
                case 'blue-gas':
                    liquid.style.backgroundColor = '#0984e3'; gas.innerText = 'SO₂'; gas.classList.add('gas-active'); metal.style.opacity = 0.5; break;
                case 'burn-white':
                    fire.style.display = 'block'; fire.style.color = 'white'; fire.style.textShadow = '0 0 20px white'; metal.style.backgroundColor = '#fff'; break;
                case 'burn-yellow':
                    fire.style.display = 'block'; fire.style.color = 'gold'; metal.style.backgroundColor = '#fff'; break;
                case 'burn-lilac':
                    fire.style.display = 'block'; fire.style.color = '#cfa7ff'; metal.style.backgroundColor = '#eee'; break;
                case 'burn-red':
                    fire.style.display = 'block'; fire.style.color = '#e74c3c'; metal.style.backgroundColor = '#eee'; break;
                case 'blacken':
                    fire.style.display = 'block'; setTimeout(() => { metal.style.backgroundColor = '#000'; }, 1000); break;
                case 'gas-toxic':
                    gas.innerText = '☠️'; gas.classList.add('gas-active'); createBubbles(10); break;
                case 'slow-then-fast':
                    setTimeout(() => { createBubbles(25); }, 1500); break;
                case 'very-slow-stop':
                    createBubbles(3); setTimeout(() => { bubblesContainer.innerHTML = ''; }, 1500); break;
            }
        }

            let score = 0;
            let allAnswered = true;
            const warning = document.getElementById('submit-warning');
            quizQuestions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (!selected) { allAnswered = false; }
                else if (parseInt(selected.value) === q.ans) { score += 10; }
            });
            if (!allAnswered) { warning.style.display = 'block'; return; }
            warning.style.display = 'none';
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-result').style.display = 'block';
            const name = document.getElementById('student-name').value;
            document.getElementById('result-student-name').innerText = name + L(UI.resultOf);
            let currentScore = 0;
            const scoreElement = document.getElementById('final-score');
            const scoreInterval = setInterval(() => {
                if (currentScore >= score) { clearInterval(scoreInterval); scoreElement.innerText = score; showBadges(score); }
                else { currentScore++; scoreElement.innerText = currentScore; }
            }, 20);
        }

        function showBadges(score) {
            const passBadge = document.getElementById('pass-badge');
            const failBadge = document.getElementById('fail-badge');
            const feedback = document.getElementById('feedback-msg');
            if (score >= 80) {
                passBadge.style.display = 'inline-block';
                feedback.innerText = L(UI.passMsg); feedback.style.color = 'var(--success)';
            } else {
                failBadge.style.display = 'inline-block';
                feedback.innerText = L(UI.failMsg); feedback.style.color = 'var(--danger)';
            }
        }

        // --- 主題 / 語言切換 ---
        function toggleTheme(){
            const dark = !document.body.classList.contains('dark');
            document.body.classList.toggle('dark', dark);
            document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="15" height="15"></i>`;
            if(window.lucide) lucide.createIcons();
        }
        function toggleLang(){
            LANG = LANG==='zh' ? 'en' : 'zh';
            document.getElementById('lang-label').textContent = LANG==='zh' ? 'EN' : '中';
            document.querySelectorAll('[data-zh][data-en]').forEach(el=>{
                el.textContent = el.getAttribute(LANG==='zh'?'data-zh':'data-en');
            });
            document.querySelectorAll('[data-ph-zh][data-ph-en]').forEach(el=>{
                el.placeholder = el.getAttribute(LANG==='zh'?'data-ph-zh':'data-ph-en');
            });
            updateStatus();
            if(_lastData){
                document.getElementById('observation-text').innerText = L(_lastData.obs);
                document.getElementById('equation-text').innerText = L(_lastData.eq);
            } else {
                document.getElementById('observation-text').innerText = L(UI.ready);
            }
            if(document.getElementById('quiz-content').style.display !== 'none') renderQuestions();
            if(document.getElementById('quiz-result').style.display !== 'none'){
                const name = document.getElementById('student-name').value;
                document.getElementById('result-student-name').innerText = name + L(UI.resultOf);
                const fb = document.getElementById('feedback-msg');
                if(fb.innerText){ fb.innerText = (document.getElementById('pass-badge').style.display!=='none') ? L(UI.passMsg) : L(UI.failMsg); }
            }
        }

        // 初始
        updateStatus();
        document.getElementById('observation-text').innerText = L(UI.waiting);
        if(window.lucide) lucide.createIcons();
    </script>
</body>
</html>
