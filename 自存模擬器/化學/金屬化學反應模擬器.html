<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金屬化學實驗室</title>
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #F5A623;
            --success: #7ED321;
            --danger: #D0021B;
            --bg-color: #f0f8ff;
            --panel-bg: #ffffff;
            --border-radius: 20px;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 {
            color: #444;
            text-align: center;
            text-shadow: 2px 2px 0px #fff;
        }

        /* 導航切換 */
        .nav-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #ddd;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 0 #999;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 0 #2a5c96;
            transform: translateY(2px);
        }

        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 主要容器 */
        .container {
            display: none;
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
            border: 5px solid #444;
            box-sizing: border-box;
        }

        .container.active {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 實驗室佈局 */
        .lab-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .lab-layout {
                grid-template-columns: 1fr;
            }
            .nav-tabs {
                flex-direction: column;
                gap: 10px;
            }
        }

        .controls {
            background: #ffeaa7;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #fdcb6e;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            font-size: 1.1rem;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
        }

        .chem-btn {
            padding: 8px;
            border: 2px solid #333;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .chem-btn:hover {
            transform: scale(1.05);
            background: #eef;
        }

        .chem-btn.selected {
            background: var(--secondary);
            color: white;
            border-color: #d35400;
            box-shadow: 0 0 10px rgba(245, 166, 35, 0.5);
        }

        /* 顯示區域 */
        .display-area {
            background: #dfe6e9;
            border-radius: 15px;
            border: 3px solid #b2bec3;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-height: 450px;
        }

        /* 卡通燒杯與實驗裝置 */
        .beaker-container {
            position: relative;
            width: 200px;
            height: 250px;
            margin-top: 50px;
        }

        .beaker {
            width: 150px;
            height: 200px;
            border-left: 5px solid #333;
            border-right: 5px solid #333;
            border-bottom: 5px solid #333;
            border-radius: 0 0 20px 20px;
            position: absolute;
            bottom: 0;
            left: 25px;
            background: rgba(255, 255, 255, 0.2);
            overflow: hidden;
            z-index: 2;
        }

        .liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: #74b9ff;
            transition: height 1s, background-color 1s;
            z-index: 1;
        }

        .metal-piece {
            width: 40px;
            height: 40px;
            background: #95a5a6;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
            border: 2px solid #333;
            display: none;
            z-index: 3;
            transition: all 0.5s;
        }

        /* 動畫效果 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            border: 1px solid #fff;
            z-index: 2;
            animation: rise 2s infinite ease-in;
        }

        @keyframes rise {
            0% { bottom: 0; transform: translateX(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { bottom: 100%; transform: translateX(10px) scale(1.2); opacity: 0; }
        }

        .gas-cloud {
            position: absolute;
            top: -60px;
            left: 20px;
            font-size: 2rem;
            opacity: 0;
        }

        .gas-active {
            animation: floatUp 2s forwards;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(20px); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .fire-effect {
            font-size: 3rem;
            position: absolute;
            bottom: 10px;
            left: 35%;
            display: none;
            animation: flicker 0.5s infinite;
        }

        @keyframes flicker {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 結果面板 */
        .result-panel {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid #333;
        }

        .equation-box {
            font-family: "Courier New", monospace;
            background: #333;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 1.1rem;
            text-align: center;
            overflow-wrap: break-word;
        }

        .run-btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            border-bottom: 5px solid #5c9c16;
            transition: all 0.1s;
        }

        .run-btn:active {
            transform: translateY(4px);
            border-bottom: 0px;
        }

        /* 考核區樣式 */
        .quiz-start {
            text-align: center;
            padding: 40px;
        }

        .input-name {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 5px;
            border: 2px solid #ccc;
            margin-right: 10px;
            max-width: 200px;
            margin-bottom: 10px;
        }

        .question-card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .option-label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            transition: background 0.2s;
            background: #f8f9fa;
            border: 1px solid #ddd;
        }

        .option-label:hover {
            background: #e9ecef;
        }

        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
        }

        .pass-stamp {
            color: var(--success);
            border: 5px solid var(--success);
            display: inline-block;
            padding: 10px 30px;
            transform: rotate(-10deg);
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .fail-stamp {
            color: var(--danger);
            border: 5px solid var(--danger);
            display: inline-block;
            padding: 10px 30px;
            transform: rotate(-10deg);
            margin-top: 20px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* 溫度計與其他圖示 */
        .heat-icon {
            position: absolute;
            bottom: -40px;
            left: 50px;
            font-size: 2rem;
            display: none;
        }

    </style>
</head>
<body>

    <h1>⚗️ 金屬化學實驗室 🧪</h1>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('lab')">實驗區</button>
        <button class="nav-btn" onclick="switchTab('quiz')">挑戰區</button>
    </div>

    <!-- 實驗區 -->
    <div id="lab-tab" class="container active">
        <div class="lab-layout">
            <!-- 左側控制 -->
            <div class="controls">
                <div class="control-group">
                    <span class="control-title">1. 選擇金屬 (Metal)</span>
                    <div class="btn-grid" id="metal-options">
                        <button class="chem-btn" onclick="selectMetal('K', '鉀 (K)', '#bdc3c7')">鉀 (K)</button>
                        <button class="chem-btn" onclick="selectMetal('Na', '鈉 (Na)', '#bdc3c7')">鈉 (Na)</button>
                        <button class="chem-btn" onclick="selectMetal('Ca', '鈣 (Ca)', '#95a5a6')">鈣 (Ca)</button>
                        <button class="chem-btn" onclick="selectMetal('Mg', '鎂 (Mg)', '#95a5a6')">鎂 (Mg)</button>
                        <button class="chem-btn" onclick="selectMetal('Al', '鋁 (Al)', '#ecf0f1')">鋁 (Al)</button>
                        <button class="chem-btn" onclick="selectMetal('Fe', '鐵 (Fe)', '#555')">鐵 (Fe)</button>
                        <button class="chem-btn" onclick="selectMetal('Pb', '鉛 (Pb)', '#7f8c8d')">鉛 (Pb)</button>
                        <button class="chem-btn" onclick="selectMetal('Cu', '銅 (Cu)', '#d35400')">銅 (Cu)</button>
                    </div>
                </div>

                <div class="control-group">
                    <span class="control-title">2. 選擇反應物 (Reactant)</span>
                    <div class="btn-grid" id="reactant-options">
                        <button class="chem-btn" onclick="selectReactant('O2', '氧氣 (加熱)', 'gas')">氧氣 (加熱)</button>
                        <button class="chem-btn" onclick="selectReactant('H2O_l', '冷水', 'liquid')">冷水</button>
                        <button class="chem-btn" onclick="selectReactant('H2O_g', '水蒸汽 (加熱)', 'gas')">水蒸汽</button>
                        <button class="chem-btn" onclick="selectReactant('HCl', '稀氫氯酸', 'liquid')">稀氫氯酸</button>
                        <button class="chem-btn" onclick="selectReactant('H2SO4_dil', '稀硫酸', 'liquid')">稀硫酸</button>
                        <button class="chem-btn" onclick="selectReactant('H2SO4_conc', '濃硫酸', 'liquid')">濃硫酸</button>
                        <button class="chem-btn" onclick="selectReactant('HNO3_v_dil', '極稀硝酸', 'liquid')">極稀硝酸</button>
                    </div>
                </div>

                <button class="run-btn" onclick="runExperiment()">開始實驗！🚀</button>
            </div>

            <!-- 右側顯示 -->
            <div class="display-area">
                <div id="status-text" style="font-weight:bold; margin-bottom:10px;">請選擇金屬和反應物</div>
                
                <div class="beaker-container">
                    <!-- 氣體雲 -->
                    <div id="gas-cloud" class="gas-cloud">💨</div>
                    
                    <div class="beaker">
                        <div id="liquid" class="liquid"></div>
                        <!-- 氣泡容器 -->
                        <div id="bubbles-container"></div>
                        <div id="metal-piece" class="metal-piece"></div>
                    </div>
                    
                    <!-- 火焰特效 -->
                    <div id="fire" class="fire-effect">🔥</div>
                    <div id="heat-source" class="heat-icon">🔥</div>
                </div>

                <div class="result-panel">
                    <strong>觀察結果：</strong>
                    <div id="observation-text">等待實驗開始...</div>
                    <div class="equation-box" id="equation-text">? + ? → ?</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 考核區 -->
    <div id="quiz-tab" class="container">
        <div id="quiz-intro" class="quiz-start">
            <h2>🎓 金屬化學知識挑戰</h2>
            <p>準備好測試你的知識了嗎？滿分 100 分，80 分及格！</p>
            <br>
            <p style="font-size: 1.2rem; margin-bottom: 10px; font-weight: bold;">請輸入你的名稱：</p>
            <input type="text" id="student-name" class="input-name" placeholder="請輸入名字">
            <button class="nav-btn" style="background:var(--success); color:white;" onclick="startQuiz()">開始測驗</button>
            <p id="name-warning" style="color:var(--danger); display:none; margin-top:10px;">請務必輸入你的名字喔！</p>
        </div>

        <div id="quiz-content" style="display:none;">
            <h3>挑戰者：<span id="display-name" style="color: var(--primary);"></span></h3>
            <div id="questions-container"></div>
            <div id="submit-warning" style="color:var(--danger); font-weight:bold; text-align:center; display:none; margin-top: 10px;">請完成所有題目後再提交！</div>
            <button class="run-btn" onclick="submitQuiz()">提交答案 📝</button>
        </div>

        <div id="quiz-result" style="display:none; text-align:center;">
            <h2>挑戰結果</h2>
            <h3 id="result-student-name" style="color:#555; margin: 10px 0;"></h3>
            <div class="score-display">得分：<span id="final-score" style="color: var(--primary);">0</span> / 100</div>
            <div id="pass-badge" class="pass-stamp" style="display:none;">挑戰成功！🎉</div>
            <div id="fail-badge" class="fail-stamp" style="display:none;">未達標 😢</div>
            <p id="feedback-msg" style="margin-top: 20px; font-size: 1.2rem; font-weight: bold;"></p>
            <button class="nav-btn" style="margin-top:20px;" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script>
        // --- 實驗數據庫 ---
        // 格式: Metal -> Reactant -> { obs: 觀察, eq: 方程式, anim: 動畫類型 }
        
        const reactions = {
            'K': {
                'O2': { obs: '燃燒產生淡紫色火焰 (Lilac flame)，生成氧化鉀。', eq: '4K + O₂ → 2K₂O', anim: 'burn-lilac' },
                'H2O_l': { obs: '反應極度劇烈，金屬在水面快速移動並燃燒（淡紫色火焰），產生氫氧化鉀和氫氣。', eq: '2K + 2H₂O → 2KOH + H₂', anim: 'vigorous-float-lilac' },
                'H2O_g': { obs: '危險爆炸性反應！生成氧化鉀和氫氣。', eq: '2K + H₂O(g) → K₂O + H₂', anim: 'explosion' },
                'HCl': { obs: '危險爆炸性反應！生成鹽和氫氣。', eq: '2K + 2HCl → 2KCl + H₂', anim: 'explosion' },
                'H2SO4_dil': { obs: '危險爆炸性反應！生成鹽和氫氣。', eq: '2K + H₂SO₄ → K₂SO₄ + H₂', anim: 'explosion' },
                'H2SO4_conc': { obs: '極度危險反應。', eq: '複雜氧化反應', anim: 'explosion' },
                'HNO3_v_dil': { obs: '危險爆炸性反應！生成鹽和氫氣。', eq: '2K + 2HNO₃ → 2KNO₃ + H₂', anim: 'explosion' }
            },
            'Na': {
                'O2': { obs: '燃燒產生金黃色火焰，生成白色粉末 (Na₂O)。', eq: '4Na + O₂ → 2Na₂O', anim: 'burn-yellow' },
                'H2O_l': { obs: '劇烈反應，金屬浮在水面並熔成小球，發出嘶嘶聲，生成氫氧化鈉和氫氣。', eq: '2Na + 2H₂O → 2NaOH + H₂', anim: 'vigorous-float' },
                'H2O_g': { obs: '極度劇烈反應 (危險)。生成氧化鈉和氫氣。', eq: '2Na + H₂O(g) → Na₂O + H₂', anim: 'explosion' },
                'HCl': { obs: '極度危險的爆炸性反應！生成鹽和氫氣。', eq: '2Na + 2HCl → 2NaCl + H₂', anim: 'explosion' },
                'H2SO4_dil': { obs: '極度危險的爆炸性反應！生成鹽和氫氣。', eq: '2Na + H₂SO₄ → Na₂SO₄ + H₂', anim: 'explosion' },
                'H2SO4_conc': { obs: '劇烈反應，具危險性。', eq: '複雜反應 (主要氧化作用)', anim: 'vigorous' },
                'HNO3_v_dil': { obs: '劇烈反應，生成鹽和氫氣。', eq: '2Na + 2HNO₃ → 2NaNO₃ + H₂', anim: 'vigorous' }
            },
            'Ca': {
                'O2': { obs: '燃燒產生磚紅色火焰 (Brick-red flame)，生成白色氧化鈣。', eq: '2Ca + O₂ → 2CaO', anim: 'burn-red' },
                'H2O_l': { obs: '反應平穩但隨後變快，產生氣泡，生成白色混濁的氫氧化鈣 (微溶)。', eq: 'Ca + 2H₂O → Ca(OH)₂ + H₂', anim: 'sinks-bubbles' },
                'H2O_g': { obs: '劇烈反應，生成氧化鈣和氫氣。', eq: 'Ca + H₂O(g) → CaO + H₂', anim: 'burn-red' },
                'HCl': { obs: '反應非常劇烈，產生鹽和氫氣。', eq: 'Ca + 2HCl → CaCl₂ + H₂', anim: 'vigorous' },
                'H2SO4_dil': { obs: '反應開始劇烈，但因生成微溶的 CaSO₄ 覆蓋而減慢。', eq: 'Ca + H₂SO₄ → CaSO₄ + H₂', anim: 'fast-then-slow' },
                'H2SO4_conc': { obs: '劇烈反應。', eq: '複雜反應', anim: 'vigorous' },
                'HNO3_v_dil': { obs: '反應非常劇烈，產生鹽和氫氣。', eq: 'Ca + 2HNO₃ → Ca(NO₃)₂ + H₂', anim: 'vigorous' }
            },
            'Mg': {
                'O2': { obs: '劇烈燃燒，發出耀眼白光，生成白色粉末 (MgO)。', eq: '2Mg + O₂ → 2MgO', anim: 'burn-white' },
                'H2O_l': { obs: '幾乎無反應 (極慢)。', eq: 'Mg + 2H₂O → Mg(OH)₂ + H₂', anim: 'very-slow' },
                'H2O_g': { obs: '劇烈反應，發出耀眼白光，生成氧化鎂 (MgO) 和氫氣。', eq: 'Mg + H₂O(g) → MgO + H₂', anim: 'burn-white' },
                'HCl': { obs: '反應迅速，產生大量氣泡 (H₂)，試管發熱。', eq: 'Mg + 2HCl → MgCl₂ + H₂', anim: 'fast' },
                'H2SO4_dil': { obs: '反應迅速，產生大量氣泡 (H₂)。', eq: 'Mg + H₂SO₄ → MgSO₄ + H₂', anim: 'fast' },
                'H2SO4_conc': { obs: '產生氣泡，有刺激性氣體 (SO₂)。', eq: 'Mg + 2H₂SO₄ → MgSO₄ + SO₂ + 2H₂O', anim: 'gas-toxic' },
                'HNO3_v_dil': { obs: '反應產生氫氣 (這是鎂和錳的特性)。', eq: 'Mg + 2HNO₃ → Mg(NO₃)₂ + H₂', anim: 'fast' }
            },
            'Al': {
                'O2': { obs: '鋁粉可燃燒生成白色氧化鋁 (Al₂O₃)，鋁片表面會生成緻密氧化層。', eq: '4Al + 3O₂ → 2Al₂O₃', anim: 'slow-heat' },
                'H2O_l': { obs: '無反應 (受氧化層保護)。', eq: '無反應', anim: 'none' },
                'H2O_g': { obs: '去除氧化層後反應，生成氧化鋁 (Al₂O₃) 和氫氣。', eq: '2Al + 3H₂O(g) → Al₂O₃ + 3H₂', anim: 'slow-heat' },
                'HCl': { obs: '反應開始較慢 (去氧化層)，隨後變快，產生 AlCl₃ 和 H₂。', eq: '2Al + 6HCl → 2AlCl₃ + 3H₂', anim: 'slow-then-fast' },
                'H2SO4_dil': { obs: '反應產生硫酸鋁和氫氣。', eq: '2Al + 3H₂SO₄ → Al₂(SO₄)₃ + 3H₂', anim: 'slow-then-fast' },
                'H2SO4_conc': { obs: '產生 SO₂。', eq: '2Al + 6H₂SO₄ → Al₂(SO₄)₃ + 3SO₂ + 6H₂O', anim: 'gas-toxic' },
                'HNO3_v_dil': { obs: '無明顯反應 (鋁在硝酸中會鈍化 Passivation)。', eq: '無反應 (鈍化)', anim: 'none' }
            },
            'Fe': {
                'O2': { obs: '劇烈燃燒會有火星，生成黑色固體 (Fe₃O₄)。', eq: '3Fe + 2O₂ → Fe₃O₄', anim: 'sparks' },
                'H2O_l': { obs: '生鏽 (需要氧氣和水，過程緩慢)。', eq: '4Fe + 3O₂ + xH₂O → 2Fe₂O₃·xH₂O', anim: 'rust' },
                'H2O_g': { obs: '加熱時反應，生成黑色磁性氧化物 (Fe₃O₄) 和氫氣。', eq: '3Fe + 4H₂O(g) ⇌ Fe₃O₄ + 4H₂', anim: 'slow-heat' },
                'HCl': { obs: '反應緩慢，產生氣泡，溶液變淺綠色 (Fe²⁺)。', eq: 'Fe + 2HCl → FeCl₂ + H₂', anim: 'slow-green' },
                'H2SO4_dil': { obs: '反應緩慢，產生氣泡，溶液變淺綠色 (Fe²⁺)。', eq: 'Fe + H₂SO₄ → FeSO₄ + H₂', anim: 'slow-green' },
                'H2SO4_conc': { obs: '鐵會鈍化 (Passivation)，反應停止。', eq: '表面形成氧化層，阻止反應', anim: 'none' },
                'HNO3_v_dil': { obs: '反應非常緩慢或無反應。', eq: '複雜', anim: 'very-slow' }
            },
            'Pb': {
                'O2': { obs: '熔化成光亮小珠，生成黃色粉末 (PbO)。', eq: '2Pb + O₂ → 2PbO', anim: 'melt-yellow' },
                'H2O_l': { obs: '無反應。', eq: '無反應', anim: 'none' },
                'H2O_g': { obs: '無明顯反應。', eq: '無反應', anim: 'none' },
                'HCl': { obs: '反應極慢或停止 (生成不溶的 PbCl₂ 覆蓋表面)。', eq: 'Pb + 2HCl → PbCl₂ + H₂', anim: 'very-slow-stop' },
                'H2SO4_dil': { obs: '反應極慢或停止 (生成不溶的 PbSO₄ 覆蓋表面)。', eq: 'Pb + H₂SO₄ → PbSO₄ + H₂', anim: 'very-slow-stop' },
                'H2SO4_conc': { obs: '反應生成 SO₂。', eq: 'Pb + 2H₂SO₄ → PbSO₄ + SO₂ + 2H₂O', anim: 'slow-gas' },
                'HNO3_v_dil': { obs: '反應產生鹽和氫氣 (Pb(NO₃)₂ 可溶)。', eq: 'Pb + 2HNO₃ → Pb(NO₃)₂ + H₂', anim: 'moderate' }
            },
            'Cu': {
                'O2': { obs: '表面變黑 (CuO)。', eq: '2Cu + O₂ → 2CuO', anim: 'blacken' },
                'H2O_l': { obs: '無反應。', eq: '無反應', anim: 'none' },
                'H2O_g': { obs: '無反應。', eq: '無反應', anim: 'none' },
                'HCl': { obs: '無反應。', eq: '無反應', anim: 'none' },
                'H2SO4_dil': { obs: '無反應。', eq: '無反應', anim: 'none' },
                'H2SO4_conc': { obs: '加熱後反應，產生藍色溶液和刺激性氣體 (SO₂)。', eq: 'Cu + 2H₂SO₄ → CuSO₄ + SO₂ + 2H₂O', anim: 'blue-gas' },
                'HNO3_v_dil': { obs: '無反應。', eq: '無反應', anim: 'none' }
            }
        };

        // --- 狀態變數 ---
        let currentMetal = null;
        let currentMetalName = "";
        let currentMetalColor = "";
        let currentReactant = null;
        let currentReactantName = "";
        let currentReactantType = ""; // liquid, gas

        // --- 實驗邏輯 ---

        function switchTab(tab) {
            document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('active');
            const buttons = document.querySelectorAll('.nav-btn');
            if(tab === 'lab') buttons[0].classList.add('active');
            else buttons[1].classList.add('active');
        }

        function selectMetal(symbol, name, color) {
            currentMetal = symbol;
            currentMetalName = name;
            currentMetalColor = color;
            
            document.querySelectorAll('#metal-options .chem-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            
            updateStatus();
            resetVisuals();
        }

        function selectReactant(code, name, type) {
            currentReactant = code;
            currentReactantName = name;
            currentReactantType = type;

            document.querySelectorAll('#reactant-options .chem-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');

            updateStatus();
            resetVisuals();
        }

        function updateStatus() {
            const m = currentMetalName || "___";
            const r = currentReactantName || "___";
            document.getElementById('status-text').innerHTML = `目前選擇：<span style="color:var(--primary);">${m}</span> + <span style="color:var(--danger);">${r}</span>`;
        }

        function resetVisuals() {
            const liquid = document.getElementById('liquid');
            const metal = document.getElementById('metal-piece');
            const bubbles = document.getElementById('bubbles-container');
            const fire = document.getElementById('fire');
            const heat = document.getElementById('heat-source');
            const gas = document.getElementById('gas-cloud');
            
            liquid.style.height = '0%';
            liquid.style.backgroundColor = '#74b9ff';
            metal.style.display = 'none';
            metal.style.backgroundColor = currentMetalColor;
            metal.style.bottom = '10px';
            metal.style.left = '50%';
            metal.style.opacity = '1';
            metal.style.transform = 'translateX(-50%)';
            bubbles.innerHTML = '';
            fire.style.display = 'none';
            heat.style.display = 'none';
            gas.classList.remove('gas-active');
            gas.innerText = '💨';

            document.getElementById('observation-text').innerText = '準備就緒，按下開始按鈕。';
            document.getElementById('equation-text').innerText = '? + ? → ?';
        }

        function runExperiment() {
            if (!currentMetal || !currentReactant) {
                document.getElementById('status-text').innerHTML = '<span style="color:var(--danger)">⚠️ 請先選擇金屬和反應物！</span>';
                return;
            }

            let data = reactions[currentMetal] && reactions[currentMetal][currentReactant];
            
            if (!data) {
                data = { obs: '無明顯反應。', eq: '無反應', anim: 'none' };
            }

            document.getElementById('observation-text').innerText = data.obs;
            document.getElementById('equation-text').innerText = data.eq;

            const liquid = document.getElementById('liquid');
            const metal = document.getElementById('metal-piece');
            const heat = document.getElementById('heat-source');

            if (currentReactantType === 'liquid') {
                liquid.style.height = '60%';
                if (currentReactant === 'H2SO4_conc') liquid.style.backgroundColor = '#dfe6e9'; 
            } else {
                liquid.style.height = '0%';
            }

            metal.style.display = 'block';

            if (currentReactant === 'O2' || currentReactant === 'H2O_g' || currentReactant === 'H2SO4_conc') {
                heat.style.display = 'block';
            }

            setTimeout(() => {
                triggerAnimation(data.anim);
            }, 800);
        }

        function triggerAnimation(type) {
            const bubblesContainer = document.getElementById('bubbles-container');
            const metal = document.getElementById('metal-piece');
            const liquid = document.getElementById('liquid');
            const gas = document.getElementById('gas-cloud');
            const fire = document.getElementById('fire');

            bubblesContainer.innerHTML = '';
            if (type === 'none') return;

            const createBubbles = (amount, speed) => {
                for(let i=0; i<amount; i++) {
                    let b = document.createElement('div');
                    b.className = 'bubble';
                    b.style.left = Math.random() * 80 + 10 + '%';
                    b.style.width = Math.random() * 10 + 5 + 'px';
                    b.style.height = b.style.width;
                    b.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                    bubblesContainer.appendChild(b);
                }
                gas.innerText = 'H₂';
                gas.classList.add('gas-active');
            };

            switch (type) {
                case 'vigorous':
                case 'fast':
                    createBubbles(30, 'fast');
                    metal.style.transform = 'translateX(-50%) rotate(5deg)';
                    setTimeout(() => { metal.style.opacity = 0; }, 2000); 
                    break;
                case 'vigorous-float': // Na
                    liquid.style.backgroundColor = '#e17055'; 
                    createBubbles(30, 'fast');
                    metal.style.bottom = '60%';
                    let dance = setInterval(() => {
                        metal.style.left = Math.random() * 80 + 10 + '%';
                    }, 200);
                    setTimeout(() => clearInterval(dance), 2000);
                    setTimeout(() => { metal.style.opacity = 0; }, 2000);
                    break;
                case 'vigorous-float-lilac': // K
                    liquid.style.backgroundColor = '#e17055'; 
                    createBubbles(40, 'fast');
                    metal.style.bottom = '60%';
                    fire.style.display = 'block';
                    fire.style.color = '#cfa7ff'; // Lilac
                    fire.style.textShadow = '0 0 10px #a29bfe';
                    fire.style.bottom = '65%';
                    let danceK = setInterval(() => {
                        let newLeft = Math.random() * 80 + 10;
                        metal.style.left = newLeft + '%';
                        fire.style.left = (newLeft - 5) + '%';
                    }, 150);
                    setTimeout(() => { clearInterval(danceK); fire.style.display = 'none'; }, 2000);
                    setTimeout(() => { metal.style.opacity = 0; }, 2000);
                    break;
                case 'sinks-bubbles': // Ca
                    createBubbles(20, 'normal');
                    liquid.style.backgroundColor = '#ecf0f1'; // Milky
                    break;
                case 'explosion':
                    fire.style.display = 'block';
                    fire.style.left = '40%';
                    fire.style.bottom = '50%';
                    fire.style.fontSize = '5rem';
                    fire.innerText = '💥';
                    metal.style.display = 'none';
                    break;
                case 'moderate':
                    createBubbles(15, 'normal');
                    setTimeout(() => { metal.style.opacity = 0.5; }, 2000);
                    break;
                case 'slow-green':
                    createBubbles(5, 'slow');
                    liquid.style.backgroundColor = '#b8e994'; 
                    break;
                case 'blue-gas':
                    liquid.style.backgroundColor = '#0984e3'; 
                    gas.innerText = 'SO₂';
                    gas.classList.add('gas-active');
                    metal.style.opacity = 0.5;
                    break;
                case 'burn-white':
                    fire.style.display = 'block';
                    fire.style.color = 'white';
                    fire.style.textShadow = '0 0 20px white';
                    metal.style.backgroundColor = '#fff';
                    break;
                case 'burn-yellow':
                    fire.style.display = 'block';
                    fire.style.color = 'gold';
                    metal.style.backgroundColor = '#fff';
                    break;
                case 'burn-lilac':
                    fire.style.display = 'block';
                    fire.style.color = '#cfa7ff'; // Lilac
                    metal.style.backgroundColor = '#eee';
                    break;
                case 'burn-red':
                    fire.style.display = 'block';
                    fire.style.color = '#e74c3c'; // Brick red
                    metal.style.backgroundColor = '#eee';
                    break;
                case 'blacken':
                    fire.style.display = 'block';
                    setTimeout(() => { metal.style.backgroundColor = '#000'; }, 1000);
                    break;
                case 'gas-toxic':
                     gas.innerText = '☠️';
                     gas.classList.add('gas-active');
                     createBubbles(10, 'normal');
                     break;
                case 'slow-then-fast': // Al + Acid
                     setTimeout(() => { createBubbles(25, 'fast'); }, 1500);
                     break;
                case 'very-slow-stop': // Pb + HCl
                     createBubbles(3, 'slow');
                     setTimeout(() => { bubblesContainer.innerHTML = ''; }, 1500);
                     break;
            }
        }

        // --- 考核系統 ---

        const quizQuestions = [
            {
                q: "鉀 (K) 與冷水反應時，會觀察到什麼顏色的火焰？",
                options: ["金黃色", "磚紅色", "淡紫色", "藍綠色"],
                ans: 2 
            },
            {
                q: "以下哪種金屬與水蒸汽反應會生成氧化物而不是氫氧化物？",
                options: ["鎂 (Mg)", "銅 (Cu)", "銀 (Ag)", "金 (Au)"],
                ans: 0
            },
            {
                q: "鋁 (Al) 放入稀氫氯酸初期反應緩慢，是因為表面有什麼物質？",
                options: ["油脂", "氧化鋁層", "氯化鋁", "氫氣泡"],
                ans: 1
            },
            {
                q: "鉛 (Pb) 與稀硫酸反應會迅速停止，是因為生成了什麼？",
                options: ["可溶的硫酸鉛", "不溶的硫酸鉛", "可溶的氫氧化鉛", "不溶的氧化鉛"],
                ans: 1
            },
            {
                q: "鈣 (Ca) 與冷水反應後的溶液呈現什麼狀態？",
                options: ["藍色澄清", "綠色澄清", "白色混濁", "無色透明"],
                ans: 2
            },
            {
                q: "鐵 (Fe) 與水蒸汽反應生成的黑色磁性固體是什麼？",
                options: ["FeO", "Fe₂O₃", "Fe₃O₄", "Fe(OH)₂"],
                ans: 2
            },
            {
                q: "哪種金屬加入濃硫酸 (H₂SO₄) 或濃硝酸中會產生鈍化現象 (Passivation)？",
                options: ["鐵 (Fe)", "鎂 (Mg)", "銅 (Cu)", "鉀 (K)"],
                ans: 0
            },
            {
                q: "銅 (Cu) 在空氣中加熱與氧氣反應後，表面會生成什麼顏色的物質？",
                options: ["白色", "紅色", "綠色", "黑色"],
                ans: 3
            },
            {
                q: "下列哪一種反應物與鎂 (Mg) 劇烈反應時，會發出耀眼的白光？",
                options: ["冷水", "稀氫氯酸", "水蒸汽", "極稀硝酸"],
                ans: 2
            },
            {
                q: "將鈉 (Na) 放入水中，下列哪項觀察是 **錯誤** 的？",
                options: ["金屬熔化成小球", "發出嘶嘶聲", "產生淡紫色火焰", "金屬浮在水面上"],
                ans: 2 // 鈉著火會是金黃色，淡紫色是鉀
            }
        ];

        function startQuiz() {
            const nameInput = document.getElementById('student-name').value.trim();
            const warning = document.getElementById('name-warning');
            
            if (!nameInput) {
                warning.style.display = 'block';
                return;
            }
            warning.style.display = 'none';
            
            document.getElementById('quiz-intro').style.display = 'none';
            document.getElementById('quiz-content').style.display = 'block';
            document.getElementById('display-name').innerText = nameInput;
            
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = ''; // 清空容器
            
            quizQuestions.forEach((q, index) => {
                let html = `
                    <div class="question-card">
                        <h4 style="margin-top: 0; font-size: 1.1rem; color: #333;">Q${index + 1}. ${q.q}</h4>
                `;
                q.options.forEach((opt, optIndex) => {
                    html += `
                        <label class="option-label">
                            <input type="radio" name="q${index}" value="${optIndex}">
                            ${opt}
                        </label>
                    `;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function submitQuiz() {
            let score = 0;
            let allAnswered = true;
            const warning = document.getElementById('submit-warning');
            
            // 檢查作答與計分
            quizQuestions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (!selected) {
                    allAnswered = false;
                } else if (parseInt(selected.value) === q.ans) {
                    score += 10; // 每題 10 分
                }
            });

            if (!allAnswered) {
                warning.style.display = 'block';
                return;
            }
            warning.style.display = 'none';

            // 切換到結果畫面
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-result').style.display = 'block';
            
            const name = document.getElementById('student-name').value;
            document.getElementById('result-student-name').innerText = name + ' 的測驗結果';
            
            // 分數跳動動畫
            let currentScore = 0;
            const scoreElement = document.getElementById('final-score');
            const scoreInterval = setInterval(() => {
                if (currentScore >= score) {
                    clearInterval(scoreInterval);
                    scoreElement.innerText = score;
                    showBadges(score);
                } else {
                    currentScore++;
                    scoreElement.innerText = currentScore;
                }
            }, 20); // 數字跳動速度

            // 將成績自動發送到 Google Spreadsheet
            sendDataToGoogleSheet(name, score);
        }

        // 新增：傳送資料到 Google Apps Script 的函數
        function sendDataToGoogleSheet(name, score) {
            // 替換為你的 Web App URL
            const scriptUrl = 'DISABLED';
        function __noSend(){return Promise.resolve({ok:true,status:200,json:function(){return Promise.resolve({status:'success'});},text:function(){return Promise.resolve('');}});}
            
            // 獲取當前時間作為登入/完成時間
            const currentTime = new Date().toLocaleString('zh-TW', { hour12: false });

            const formData = new FormData();
            formData.append('loginTime', currentTime);
            formData.append('name', name);
            formData.append('score', score);

            // 發送 POST 請求
            __noSend(0, { 
                method: 'POST', 
                body: formData 
            })
            .then(response => response.json())
            .then(data => {
                console.log('成績已成功上傳至 Google Sheet:', data);
            })
            .catch(error => {
                console.error('成績上傳失敗:', error);
            });
        }

        function showBadges(score) {
            const passBadge = document.getElementById('pass-badge');
            const failBadge = document.getElementById('fail-badge');
            const feedback = document.getElementById('feedback-msg');
            
            if (score >= 80) {
                passBadge.style.display = 'inline-block';
                feedback.innerText = '太棒了！你對金屬的化學性質掌握得非常出色！👏';
                feedback.style.color = 'var(--success)';
            } else {
                failBadge.style.display = 'inline-block';
                feedback.innerText = '還差一點點，回實驗區多做幾次實驗複習一下吧！💪';
                feedback.style.color = 'var(--danger)';
            }
        }
    </script>
