        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
        }
        
        /* 玻璃擬態效果 */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 分餾塔背景溫度漸變 (下熱上冷) */
        .tower-bg { 
            background: linear-gradient(to top, 
                #7f1d1d 0%,    /* 深紅 (極高溫) */
                #b91c1c 15%,   /* 紅 */
                #ea580c 35%,   /* 橙 */
                #ca8a04 55%,   /* 黃 */
                #0284c7 80%,   /* 藍 */
                #1e3a8a 100%   /* 深藍 (低溫) */
            ); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 按鈕特效 */
        .fraction-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .fraction-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); transition: all 0.5s ease;
        }
        .fraction-btn:hover::after { left: 150%; }
        .fraction-btn.active { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
    </style>
</head>

                                <div class="flex-1 relative"><div id="pipe-4" class="absolute bottom-0 translate-y-1/2 left-[-8px] w-[calc(100%+8px)] h-5 md:h-7 bg-gradient-to-b from-slate-400 via-slate-300 to-slate-500 border-y-2 border-r-2 border-slate-600 rounded-r-lg shadow-lg flex items-center pr-2"><div class="w-1.5 md:w-2 h-full bg-slate-800/40 ml-1 md:ml-2 border-r border-slate-300/50"></div><div class="w-2 h-2 rounded-full bg-red-500 ml-auto animate-pulse shadow-[0_0_8px_currentColor]"></div></div></div>
                                <div class="flex-1 relative"><div id="pipe-5" class="absolute bottom-0 translate-y-1/2 left-[-8px] w-[calc(100%+8px)] h-5 md:h-7 bg-gradient-to-b from-slate-400 via-slate-300 to-slate-500 border-y-2 border-r-2 border-slate-600 rounded-r-lg shadow-lg flex items-center pr-2"><div class="w-1.5 md:w-2 h-full bg-slate-800/40 ml-1 md:ml-2 border-r border-slate-300/50"></div><div class="w-2 h-2 rounded-full bg-red-400 ml-auto animate-pulse shadow-[0_0_8px_currentColor]"></div></div></div>
                                <div class="flex-1 relative"><div id="pipe-6" class="absolute bottom-2 md:bottom-4 left-[-8px] w-[calc(100%+8px)] h-5 md:h-7 bg-gradient-to-b from-slate-400 via-slate-300 to-slate-500 border-y-2 border-r-2 border-slate-600 rounded-r-lg shadow-lg flex items-center pr-2"><div class="w-1.5 md:w-2 h-full bg-slate-800/40 ml-1 md:ml-2 border-r border-slate-300/50"></div><div class="w-2 h-2 rounded-full bg-slate-400 ml-auto animate-pulse shadow-[0_0_8px_currentColor]"></div></div></div>
                            </div>

                            <!-- 原油入口 -->
                            <div class="absolute -left-10 md:-left-16 bottom-2 md:bottom-4 flex flex-col items-center z-40">
                                <div class="bg-slate-800 border border-slate-600 text-orange-400 text-[10px] md:text-xs px-2 py-1 rounded shadow-lg font-bold whitespace-nowrap mb-1">加熱爐 (~400°C)</div>
                                <div class="w-16 md:w-20 h-6 md:h-8 bg-gradient-to-b from-slate-600 via-slate-800 to-slate-900 border-y-2 border-l-2 border-slate-500 relative flex items-center justify-end rounded-l-lg shadow-lg">
                                    <div class="w-1.5 md:w-2 h-full bg-slate-800/50 border-r border-slate-600 mr-2"></div>
                                    <div class="absolute inset-0 bg-gradient-to-r from-red-600/40 to-transparent animate-pulse rounded-l-lg"></div>
                                    <svg class="w-4 h-4 md:w-5 md:h-5 text-orange-500 mr-1 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右側：控制板與資訊 -->
                    <div class="w-full md:w-1/2 lg:w-5/12 flex flex-col gap-4 h-[500px] md:h-[600px]">
                        
                        <!-- 資訊顯示螢幕 -->
                        <div id="info-panel" class="w-full bg-black/60 border-2 border-slate-600 p-5 rounded-xl shadow-inner min-h-[160px] flex flex-col justify-center relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-2 opacity-30"><svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg></div>
                            <div id="info-content" class="z-10">
                                <p class="text-slate-400 text-center flex flex-col items-center gap-2 animate-pulse">
                                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                    請點擊下方餾分按鈕以啟動分析
                                </p>
                            </div>
                        </div>

                        <!-- 餾分按鈕 (由上至下) -->
                        <div class="flex-grow flex flex-col justify-between bg-slate-800/50 p-4 rounded-xl border border-slate-700 overflow-y-auto gap-2" id="fraction-buttons">
                            <!-- JS 生成按鈕 -->
                        </div>

                        <!-- 進入測驗按鈕 -->
                        <button onclick="startChallenge()" class="mt-2 w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-4 px-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all duration-300 flex items-center justify-center gap-2">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            進入知識考核
                        </button>
                    </div>
                </div>
            </div>

            <!-- 視圖 3: 挑戰區 -->
            <div id="view-quiz" class="w-full hidden fade-in flex-col items-center max-w-2xl mx-auto py-8">
                <div class="w-full flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-blue-400 flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        知識考核
                    </h2>
                    <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-600 font-bold text-emerald-400 shadow-inner">
                        <span id="quiz-progress">1 / 10</span>
                    </div>
                </div>

                <!-- 進度條 -->
                <div class="w-full h-2 bg-slate-800 rounded-full mb-8 overflow-hidden">
                    <div id="progress-bar-fill" class="h-full bg-blue-500 transition-all duration-300" style="width: 10%;"></div>
                </div>

                <div class="w-full glass-panel p-6 md:p-8 rounded-2xl">
                    <p id="question-text" class="text-xl md:text-2xl font-semibold text-white mb-8 leading-relaxed"></p>
                    
                    <div id="options-container" class="flex flex-col space-y-4">
                        <!-- 選項會透過 JS 動態生成 -->
                    </div>
                </div>
            </div>

            <!-- 視圖 4: 結果畫面 -->
            <div id="view-result" class="w-full hidden fade-in flex-col items-center justify-center flex-grow">
                <div class="glass-panel p-8 rounded-3xl border border-slate-600 text-center w-full max-w-lg relative overflow-hidden">
                    <!-- 裝飾光暈 -->
                    <div class="absolute -top-20 -left-20 w-40 h-40 bg-blue-500 rounded-full mix-blend-screen filter blur-[50px] opacity-20"></div>
                    <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-emerald-500 rounded-full mix-blend-screen filter blur-[50px] opacity-20"></div>

                    <h2 id="result-title" class="text-3xl font-black mb-2 tracking-widest"></h2>
                    <p id="result-name" class="text-slate-300 mb-6 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                        <span></span>
                    </p>
                    
                    <div class="flex justify-center items-center my-8 relative">
                        <!-- 圓形進度圖背景 -->
                        <svg class="w-40 h-40 transform -rotate-90" viewBox="0 0 36 36">
                            <path class="text-slate-700" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3"></path>
                            <path id="score-ring" class="text-emerald-500 transition-all duration-1000 ease-out" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <span id="result-score" class="text-5xl font-black text-white"></span>
                            <span class="text-xs text-slate-400 mt-1">分</span>
                        </div>
                    </div>
                    
                    <div id="result-message-box" class="p-4 rounded-xl mb-6 bg-slate-800/80 border">
                        <p id="result-message" class="text-lg font-medium"></p>
                    </div>

                    <div id="upload-status" class="flex items-center justify-center gap-2 text-sm text-slate-400 mb-8 bg-slate-900/50 py-2 px-4 rounded-full inline-flex">
                        <svg class="animate-spin w-4 h-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span>正在同步數據至伺服器...</span>
                    </div>
                    
                    <button onclick="location.reload()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 px-4 rounded-xl border border-slate-500 transition duration-300">
                        登出並重新開始
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- 設定區 ---
        const GOOGLE_APP_SCRIPT_URL = 'DISABLED';
        function __noSend(){return Promise.resolve({ok:true,status:200,json:function(){return Promise.resolve({status:'success'});},text:function(){return Promise.resolve('');}});} 

        // 餾分資料與視覺設定
        const fractionData = [
            { name: "煉油氣", en: "Refinery Gas", bp: "< 20°C", carbons: "1-4", uses: "瓶裝石油氣 (LPG)、燃料", color: "#60a5fa", tailwind: "border-blue-400 text-blue-400" },
            { name: "汽油", en: "Petrol", bp: "20-70°C", carbons: "5-10", uses: "汽車燃料", color: "#fde047", tailwind: "border-yellow-400 text-yellow-400" },
            { name: "石腦油", en: "Naphtha", bp: "70-160°C", carbons: "8-12", uses: "化工原料、製造塑膠", color: "#fbbf24", tailwind: "border-amber-400 text-amber-400" },
            { name: "煤油", en: "Kerosene", bp: "160-250°C", carbons: "10-16", uses: "飛機燃料、火爐", color: "#f97316", tailwind: "border-orange-500 text-orange-500" },
            { name: "柴油", en: "Diesel", bp: "250-350°C", carbons: "14-20", uses: "重型車輛 (貨車/巴士) 燃料", color: "#ef4444", tailwind: "border-red-500 text-red-500" },
            { name: "潤滑油", en: "Lubricating Oil", bp: "350-500°C", carbons: "20-50", uses: "機器潤滑劑、蠟燭", color: "#991b1b", tailwind: "border-red-800 text-red-400" },
            { name: "瀝青", en: "Bitumen", bp: "> 500°C", carbons: "> 50", uses: "鋪設公路、防水材料", color: "#475569", tailwind: "border-slate-500 text-slate-400" }
        ];

        const quizData = [
            { q: "1. 分餾出的碳氫化合物中，碳鏈最短的通常是？", options: ["煉油氣", "汽油", "柴油", "瀝青"], answer: 0 },
            { q: "2. 原油分餾的原理是基於各成分的？", options: ["密度不同", "沸點不同", "熔點不同", "溶解度不同"], answer: 1 },
            { q: "3. 分餾塔中，溫度最高的位置在？", options: ["塔頂", "塔的中央", "塔底", "加熱爐內"], answer: 2 },
            { q: "4. 主要用作鋪路材料的是？", options: ["煤油", "潤滑油", "柴油", "瀝青"], answer: 3 },
            { q: "5. 碳原子數目越多的烴類，其揮發性通常？", options: ["越低", "越高", "不變", "視乎情況"], answer: 0 },
            { q: "6. 哪一種餾分是製造石化產品（如塑膠）的主要原料？", options: ["汽油", "煤油", "石腦油", "潤滑油"], answer: 2 },
            { q: "7. 飛機的主要燃料是來自哪一種餾分？", options: ["汽油", "煤油", "柴油", "瀝青"], answer: 1 },
            { q: "8. 下列哪一項餾分的沸點最高？", options: ["汽油", "石腦油", "柴油", "潤滑油"], answer: 3 },
            { q: "9. 從塔頂收集到的氣體（煉油氣）主要用作？", options: ["家用燃料", "飛機燃料", "汽車燃料", "潤滑劑"], answer: 0 },
            { q: "10. 餾分的顏色由上至下（沸點由低至高）會如何變化？", options: ["逐漸變淺", "逐漸變深", "皆為無色", "皆為黑色"], answer: 1 }
        ];

        let studentName = "";
        let currentQuestionIndex = 0;
        let score = 0;
        let activeFractionIndex = null; // 記錄當前查看的餾分層

        // --- 介面邏輯 ---
        function switchView(viewId) {
            ['view-login', 'view-learn', 'view-quiz', 'view-result'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById(viewId).classList.add('flex');
        }

        function startLearning() {
            const nameInput = document.getElementById('student-name').value.trim();
            if (nameInput === "") {
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }
            studentName = nameInput;
            const displayName = document.getElementById('display-name');
            displayName.innerText = `實驗員: ${studentName}`;
            displayName.classList.remove('hidden');
            
            initFractionButtons();
            switchView('view-learn');
            initCanvasEngine(); // 啟動粒子動畫
        }

        function initFractionButtons() {
            const container = document.getElementById('fraction-buttons');
            container.innerHTML = '';
            fractionData.forEach((data, index) => {
                const btn = document.createElement('button');
                btn.className = `fraction-btn w-full text-left bg-slate-900/60 border-l-4 ${data.tailwind} hover:bg-slate-700/80 p-2 md:p-3 rounded text-sm md:text-base font-bold shadow flex justify-between items-center`;
                btn.innerHTML = `<span>${data.name} <span class="text-xs text-slate-400 block md:inline">${data.bp}</span></span> 
                                 <div class="w-3 h-3 rounded-full shadow-[0_0_8px_currentColor]" style="background-color: ${data.color}"></div>`;
                btn.onclick = () => showInfo(index, btn);
                container.appendChild(btn);
            });
        }

        function showInfo(index, btnElement) {
            activeFractionIndex = index; // 更新 Canvas 對焦目標
            
            // 更新按鈕樣式
            document.querySelectorAll('.fraction-btn').forEach(b => b.classList.remove('active', 'bg-slate-700'));
            btnElement.classList.add('active', 'bg-slate-700');

            const data = fractionData[index];
            const content = document.getElementById('info-content');
            
            content.innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-4 h-8 rounded border border-white/30" style="background-color: ${data.color}; box-shadow: 0 0 15px ${data.color}"></div>
                    <div>
                        <h3 class="text-2xl font-bold text-white tracking-wide" style="text-shadow: 0 0 10px ${data.color}80">${data.name}</h3>
                        <p class="text-xs text-slate-400 uppercase tracking-widest">${data.en}</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-sm bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                    <div>
                        <span class="text-slate-400 block mb-1 text-xs"><svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>沸點範圍</span> 
                        <span class="font-bold text-white text-base">${data.bp}</span>
                    </div>
                    <div>
                        <span class="text-slate-400 block mb-1 text-xs"><svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>碳原子數</span> 
                        <span class="font-bold text-white text-base">${data.carbons}</span>
                    </div>
                    <div class="col-span-2 pt-2 border-t border-slate-700">
                        <span class="text-slate-400 block mb-1 text-xs"><svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>主要用途</span> 
                        <span class="font-medium text-white">${data.uses}</span>
                    </div>
                </div>
            `;
            
            content.parentElement.classList.remove('fade-in');
            void content.parentElement.offsetWidth; // trigger reflow
            content.parentElement.classList.add('fade-in');
        }

        // --- 考核系統邏輯 ---
        function startChallenge() {
            currentQuestionIndex = 0;
            score = 0;
            switchView('view-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const qData = quizData[currentQuestionIndex];
            document.getElementById('quiz-progress').innerText = `${currentQuestionIndex + 1} / 10`;
            
            // 更新進度條
            const progressPercent = ((currentQuestionIndex) / 10) * 100;
            document.getElementById('progress-bar-fill').style.width = `${progressPercent}%`;

            document.getElementById('question-text').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; 
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl bg-slate-800/80 border-2 border-slate-600 hover:border-blue-500 hover:bg-slate-700 font-medium text-slate-200 transition-all duration-200 flex items-center group";
                btn.innerHTML = `<span class="w-8 h-8 rounded bg-slate-900 border border-slate-600 flex items-center justify-center mr-4 group-hover:bg-blue-600 group-hover:border-blue-400 group-hover:text-white transition-colors">${String.fromCharCode(65 + index)}</span> <span class="text-lg">${opt}</span>`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            const correctIndex = quizData[currentQuestionIndex].answer;
            
            // 防止重複點擊
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => b.onclick = null);

            if (selectedIndex === correctIndex) {
                score++;
                btnElement.classList.replace('border-slate-600', 'border-emerald-500');
                btnElement.classList.replace('hover:border-blue-500', 'border-emerald-500');
                btnElement.classList.add('bg-emerald-900/40');
                btnElement.querySelector('span').classList.add('bg-emerald-500', 'text-white', 'border-emerald-400');
            } else {
                btnElement.classList.replace('border-slate-600', 'border-red-500');
                btnElement.classList.add('bg-red-900/40');
                btnElement.querySelector('span').classList.add('bg-red-500', 'text-white', 'border-red-400');
                
                // 標示正確答案
                const correctBtn = allBtns[correctIndex];
                correctBtn.classList.replace('border-slate-600', 'border-emerald-500');
                correctBtn.classList.add('bg-emerald-900/20');
            }
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    document.getElementById('progress-bar-fill').style.width = `100%`;
                    setTimeout(showResult, 500);
                }
            }, 1000); // 延遲1秒讓學生看結果
        }

        function showResult() {
            switchView('view-result');
            document.getElementById('result-name').querySelector('span').innerText = `受測者：${studentName}`;
            
            // 分數動畫
            let finalScore = score * 10;
            let currentDisplayScore = 0;
            const scoreDisplay = document.getElementById('result-score');
            const scoreRing = document.getElementById('score-ring');
            
            const timer = setInterval(() => {
                if (currentDisplayScore >= finalScore) {
                    clearInterval(timer);
                    scoreDisplay.innerText = finalScore;
                } else {
                    currentDisplayScore += 1;
                    scoreDisplay.innerText = currentDisplayScore;
                }
            }, 20);

            // 環形進度條動畫
            setTimeout(() => {
                scoreRing.setAttribute('stroke-dasharray', `${finalScore}, 100`);
            }, 100);

            const title = document.getElementById('result-title');
            const msgBox = document.getElementById('result-message-box');
            const msg = document.getElementById('result-message');
            
            if (score >= 8) {
                title.innerText = "考核通過 🏅";
                title.className = "text-3xl font-black mb-2 tracking-widest text-emerald-400";
                scoreRing.classList.replace('text-emerald-500', 'text-emerald-400');
                msgBox.className = "p-4 rounded-xl mb-6 bg-emerald-900/30 border border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.2)]";
                msg.innerText = "表現優異！你已成功掌握原油分餾的核心原理與產物特性。";
                msg.className = "text-lg font-medium text-emerald-300";
            } else {
                title.innerText = "需重新培訓 ⚠️";
                title.className = "text-3xl font-black mb-2 tracking-widest text-amber-500";
                scoreRing.classList.replace('text-emerald-500', 'text-amber-500');
                msgBox.className = "p-4 rounded-xl mb-6 bg-amber-900/30 border border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]";
                msg.innerText = "成績未達合格標準(80分)，請返回控制中心重新觀察蒸發與凝結過程。";
                msg.className = "text-lg font-medium text-amber-300";
            }

            uploadToGoogleSheet();
        }

        function uploadToGoogleSheet() {
            const statusDiv = document.getElementById('upload-status');
            
            // 使用 URLSearchParams 確保 Google Apps Script 能正確解析 e.parameter
            const params = new URLSearchParams();
            params.append('name', studentName);
            params.append('score', score * 10);

            __noSend(0, {
                method: 'POST',
                body: params, 
                mode: 'no-cors', // 忽略跨域錯誤
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(() => {
                // 因為使用 no-cors，fetch 不會拋出網路以外的錯誤，只要請求發出就會到這裡
                statusDiv.innerHTML = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                       <span class="text-emerald-400">成績已成功同步至伺服器</span>`;
                statusDiv.classList.replace('bg-slate-900/50', 'bg-emerald-900/30');
            })
            .catch(error => {
                statusDiv.innerHTML = `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                       <span class="text-red-400">網路異常，資料同步失敗</span>`;
                statusDiv.classList.replace('bg-slate-900/50', 'bg-red-900/30');
                console.error("Upload error:", error);
            });
        }

        // ==========================================
        // === Canvas 粒子引擎 (蒸發與凝結物理) ===
        // ==========================================
        let canvas, ctx;
        let particlesArray = [];
        let animationFrameId;
        let targetYArray = []; // 新增：儲存各出口管道的精確 Y 座標

        function updateTargetY() {
            if (!canvas) return;
            const canvasRect = canvas.getBoundingClientRect();
            targetYArray = [];
            for (let i = 0; i < 7; i++) {
                const pipe = document.getElementById(`pipe-${i}`);
                if (pipe) {
                    const pipeRect = pipe.getBoundingClientRect();
                    // 取得管道中心點相對於 Canvas 的 Y 座標
                    targetYArray[i] = pipeRect.top - canvasRect.top + (pipeRect.height / 2);
                } else {
                    targetYArray[i] = 0;
                }
            }
        }

        class Particle {
            constructor(cw, ch) {
                this.fraction = Math.floor(Math.random() * 7); // 0 (Gas, top) to 6 (Bitumen, bottom)
                
                // 根據餾分設定不同的分子大小及物理特性
                // 碳鏈越長 (fraction 越大) -> 分子半徑越大, 運動與擴散速度越慢
                const physicsData = [
                    { minR: 2.0, maxR: 3.0, speed: 2.0 },   // 0. 煉油氣 (C1-4) - 極輕極快
                    { minR: 3.0, maxR: 4.5, speed: 1.7 },   // 1. 汽油 (C5-10)
                    { minR: 4.5, maxR: 6.0, speed: 1.4 },   // 2. 石腦油 (C8-12)
                    { minR: 6.0, maxR: 8.0, speed: 1.1 },   // 3. 煤油 (C10-16)
                    { minR: 8.0, maxR: 11.0, speed: 0.8 },  // 4. 柴油 (C14-20)
                    { minR: 11.0, maxR: 15.0, speed: 0.5 }, // 5. 潤滑油 (C20-50)
                    { minR: 15.0, maxR: 20.0, speed: 0.3 }  // 6. 瀝青 (>C50) - 巨大且黏稠
                ];

                const pData = physicsData[this.fraction];
                this.radius = Math.random() * (pData.maxR - pData.minR) + pData.minR;
                
                // 初始位置：塔底左側 (對應加熱爐入口)
                let towerWidth = cw * 0.75;
                this.x = towerWidth * 0.15 + (Math.random() * towerWidth * 0.2);
                this.y = ch - this.radius - 2; 
                
                // 運動參數 (套用物理速度基數)
                this.speedY = -(Math.random() * pData.speed + pData.speed * 0.5); 
                this.speedX = (Math.random() * 1 - 0.5) * pData.speed;    
                this.baseFlowSpeed = pData.speed; // 紀錄基礎流速以供液態時使用
                
                // 增添分子抖動頻率，輕分子布朗運動(抖動)大，重分子幾乎不抖
                this.jitter = pData.speed * 0.4;

                this.state = 'gas'; // gas -> condensing -> liquid
                this.color = fractionData[this.fraction].color;
                this.opacity = 1;
            }

            update(cw) {
                // 如果有選擇特定餾分，非目標粒子變暗
                let targetOpacity = (activeFractionIndex === null || activeFractionIndex === this.fraction) ? 1 : 0.15;
                this.opacity += (targetOpacity - this.opacity) * 0.1;

                let targetY = targetYArray[this.fraction];

                if (this.state === 'gas') {
                    // 氣態：向上運動 + 布朗運動
                    this.y += this.speedY;
                    this.x += this.speedX;
                    
                    // 碰壁反彈 (保持在金屬塔內, 塔佔 canvas 75%)
                    let towerWidth = cw * 0.75;
                    // 加入邊距防止超出金屬邊框
                    if (this.x - this.radius < 6) this.speedX *= -1;
                    if (this.x + this.radius > towerWidth - 6) this.speedX *= -1;

                    // 到達對應沸點的管道高度 -> 開始凝結並準備流出
                    if (this.y <= targetY) {
                        this.state = 'condensing';
                        this.speedY = 0; // 停止上升
                        this.y = targetY; // 對齊管道中心
                    }
                } else if (this.state === 'condensing') {
                    // 凝結態：轉向液體流出方向 (向右進入管道)，重分子流速較慢
                    this.speedX = Math.random() * this.baseFlowSpeed * 0.5 + this.baseFlowSpeed * 0.5;
                    this.state = 'liquid';
                } else if (this.state === 'liquid') {
                    // 液態：向右流出塔外
                    this.x += this.speedX;
                    // 液體在管道內根據抖動值輕微波動
                    this.y += (Math.random() * this.jitter - this.jitter / 2); 
                }
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                // 發光效果 (氣態較亮，液態較實)
                ctx.shadowBlur = this.state === 'gas' ? 8 : 2;
                ctx.shadowColor = this.color;
                
                // 轉換 HEX 為 RGBA 處理透明度
                const hex = this.color.replace('#', '');
                const r = parseInt(hex.substring(0,2), 16);
                const g = parseInt(hex.substring(2,4), 16);
                const b = parseInt(hex.substring(4,6), 16);
                
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.opacity})`;
                ctx.fill();
                ctx.shadowBlur = 0; // 重置

                // 為半徑較大 (代表重質油) 的分子加入立體高光 (Specular Highlight) 讓其具有液滴的視覺質感
                if (this.radius > 4 && this.opacity > 0.5) {
                    ctx.beginPath();
                    // 在左上方加上高光
                    ctx.arc(this.x - this.radius * 0.35, this.y - this.radius * 0.35, this.radius * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.5})`;
                    ctx.fill();
                }
            }
        }

        function initCanvasEngine() {
            canvas = document.getElementById('tower-canvas');
            ctx = canvas.getContext('2d');
            
            // 設定正確的內部解析度
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                updateTargetY(); // 更新管道對齊座標
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            particlesArray = [];
            animate();
        }

        function animate() {
            // 清除畫布，帶點殘影效果 (拖尾)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 持續產生新粒子 (模擬原油不斷注入)
            if (particlesArray.length < 300) {
                // 每次新增 1-2 顆
                for(let i=0; i<2; i++){
                    particlesArray.push(new Particle(canvas.width, canvas.height));
                }
            }

            // 更新與繪製粒子
            for (let i = 0; i < particlesArray.length; i++) {
                let p = particlesArray[i];
                p.update(canvas.width);
                p.draw(ctx);

                // 如果液體粒子流出塔外 (超出右側)，將其移除
                if (p.x > canvas.width + p.radius) {
                    particlesArray.splice(i, 1);
                    i--;
                }
            }

            // 確保動畫只在學習視圖中運行 (節省效能)
            if (!document.getElementById('view-learn').classList.contains('hidden')) {
                animationFrameId = requestAnimationFrame(animate);
            }
        }

    </script>
</body>
