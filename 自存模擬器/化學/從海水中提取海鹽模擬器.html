<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>從海水中提取海鹽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Noto+Sans+TC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #E0F7FA;
            overflow-x: hidden;
        }

        .cartoon-font {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
        }

        /* 自定義可愛動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes drip {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(60px) scale(0.5); opacity: 0; }
        }

        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-40px) scale(2); opacity: 0; }
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-drip { animation: drip 1.5s infinite; }
        .animate-steam { animation: steam 2s infinite; }
        .animate-fire { animation: flicker 0.2s infinite; }

        /* 玻璃器皿樣式 */
        .glass-ware {
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid #4A5568;
            backdrop-filter: blur(2px);
            position: relative;
        }

        /* 液體樣式 */
        .liquid-muddy {
            background: #8D6E63; /* 泥土色 */
            transition: height 1s;
        }
        .liquid-clear {
            background: #E0F2F1; /* 清水色 */
            transition: height 1s;
        }

        .btn-cartoon {
            transition: all 0.2s;
            box-shadow: 0 4px 0 #2D3748;
        }
        .btn-cartoon:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #2D3748;
        }
        .btn-cartoon:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hidden-step { display: none; }
        .active-step { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
<a id="__backlink" href="../../chemistry.html" style="position:fixed;top:12px;left:12px;z-index:2147483647;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(15,23,42,.82);color:#fff;font:500 14px/1 system-ui,'Noto Sans HK',sans-serif;text-decoration:none;border-radius:9999px;box-shadow:0 2px 10px rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)">← 返回</a>

    <!-- 遊戲容器 -->
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden border-8 border-blue-200">
        
        <!-- 頂部標題列 -->
        <div class="bg-blue-400 p-4 text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-4xl">⚗️</div>
                <div>
                    <h1 class="text-2xl font-bold cartoon-font">從海水中提取海鹽</h1>
                    <p class="text-xs opacity-90">中四化學科 - 混合物的分離</p>
                </div>
            </div>
            <div class="text-right">
                <span id="score-display" class="font-bold text-yellow-300 text-xl">LV 1</span>
            </div>
        </div>

        <!-- 導師對話框 -->
        <div class="p-6 bg-yellow-50 border-b-4 border-yellow-100 flex items-start gap-4">
            <div class="w-16 h-16 bg-white rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl shadow-sm flex-shrink-0 animate-float">
                👨‍🔬
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-gray-700 mb-1">石老師</h3>
                <p id="instruction-text" class="text-gray-600 leading-relaxed">
                    歡迎來到化學實驗室！我們今天有一杯混有泥沙的海水。你的任務是從中提取食鹽。準備好了嗎？
                </p>
            </div>
        </div>

        <!-- 遊戲主畫面 -->
        <div id="game-stage" class="h-96 bg-gray-50 relative flex items-center justify-center overflow-hidden">
            
            <!-- 初始場景：渾濁海水 -->
            <div id="scene-intro" class="active-step text-center">
                <div class="relative w-32 h-40 mx-auto glass-ware rounded-b-xl border-t-0 mb-4">
                    <div class="absolute bottom-0 left-0 w-full h-3/4 liquid-muddy rounded-b-lg opacity-80 flex items-end justify-center">
                        <span class="text-xs text-white mb-2 font-bold opacity-70">泥沙+海水</span>
                    </div>
                    <!-- 浮動的泥粒 -->
                    <div class="absolute top-1/2 left-1/4 w-2 h-2 bg-amber-800 rounded-full animate-pulse"></div>
                    <div class="absolute top-2/3 left-1/2 w-3 h-3 bg-amber-900 rounded-full animate-pulse delay-75"></div>
                    <div class="absolute top-1/3 left-3/4 w-2 h-2 bg-amber-700 rounded-full animate-pulse delay-150"></div>
                </div>
                <button onclick="startGame()" class="btn-cartoon bg-green-400 hover:bg-green-500 text-white font-bold py-3 px-8 rounded-xl text-lg">
                    戴上安全眼鏡，開始實驗！🥽
                </button>
            </div>

            <!-- 場景 1：過濾 -->
            <div id="scene-filter" class="hidden-step w-full h-full relative">
                <!-- 鐵架 -->
                <div class="absolute left-1/2 top-10 w-2 h-64 bg-gray-400 -translate-x-24"></div> <!-- 柱 -->
                <div class="absolute left-1/2 bottom-10 w-32 h-4 bg-gray-600 -translate-x-40 rounded"></div> <!-- 底座 -->
                <div class="absolute left-1/2 top-32 w-16 h-2 bg-gray-400 -translate-x-24"></div> <!-- 夾 -->
                <div class="absolute left-1/2 top-32 w-2 h-2 bg-gray-600 -translate-x-10 rounded-full"></div> <!-- 螺絲 -->

                <!-- 漏斗 (Funnel) -->
                <div class="absolute left-1/2 top-32 -translate-x-4">
                    <!-- 漏斗本體 -->
                    <div class="w-0 h-0 border-l-[30px] border-l-transparent border-r-[30px] border-r-transparent border-t-[50px] border-t-gray-300 opacity-90 relative">
                        <!-- 濾紙 (Filter Paper) -->
                        <div id="filter-paper" class="absolute -top-[50px] -left-[26px] w-0 h-0 border-l-[26px] border-l-transparent border-r-[26px] border-r-transparent border-t-[44px] border-t-white opacity-0 transition-opacity duration-500">
                             <!-- 殘餘物 (Residue) - Mud -->
                             <div id="residue" class="absolute -top-[40px] -left-[10px] w-5 h-5 bg-amber-800 rounded-full opacity-0 transition-opacity duration-1000 blur-sm"></div>
                        </div>
                    </div>
                    <!-- 漏斗管 -->
                    <div class="w-2 h-16 bg-gray-300 mx-auto -mt-1 opacity-90"></div>
                    
                    <!-- 水滴動畫 -->
                    <div id="drops" class="hidden absolute top-16 left-1/2 -translate-x-1/2">
                        <div class="w-2 h-2 bg-blue-200 rounded-full animate-drip"></div>
                    </div>
                </div>

                <!-- 燒杯 (Beaker) 接收濾液 -->
                <div class="absolute left-1/2 bottom-12 -translate-x-4 w-24 h-32 glass-ware rounded-b-xl border-t-0">
                    <div id="filtrate-liquid" class="absolute bottom-0 w-full bg-blue-100 rounded-b-lg transition-all duration-3000 h-0 flex items-center justify-center">
                         <span class="text-xs text-blue-800 font-bold opacity-0 transition-opacity duration-1000" id="filtrate-label">濾液 (鹽水)</span>
                    </div>
                </div>

                <!-- 手持燒杯 (倒水用) -->
                <div id="pouring-beaker" class="absolute top-10 right-10 w-20 h-24 glass-ware rounded-b-lg border-t-0 rotate-0 transition-all duration-1000 cursor-pointer hover:scale-105 z-10" onclick="performPour()">
                    <div class="absolute bottom-0 w-full h-3/4 liquid-muddy rounded-b-md transition-all duration-1000"></div>
                    <div class="absolute -left-8 top-10 text-4xl transform -rotate-45 pointer-events-none">🤚</div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white font-bold text-xs pointer-events-none">點擊倒水</div>
                </div>
            </div>

            <!-- 場景 2：蒸發 -->
            <div id="scene-evaporate" class="hidden-step w-full h-full relative flex flex-col items-center justify-end pb-10">
                
                <!-- 蒸汽動畫 -->
                <div id="steam-container" class="absolute top-20 opacity-0 transition-opacity duration-500">
                    <div class="w-4 h-4 bg-gray-200 rounded-full absolute -left-4 animate-steam"></div>
                    <div class="w-6 h-6 bg-gray-200 rounded-full absolute left-0 animate-steam" style="animation-delay: 0.5s"></div>
                    <div class="w-4 h-4 bg-gray-200 rounded-full absolute left-4 animate-steam" style="animation-delay: 1s"></div>
                </div>

                <!-- 蒸發皿 (Evaporating Dish) -->
                <div class="relative z-10 w-40 h-12 bg-white border-b-4 border-l-2 border-r-2 border-gray-400 rounded-b-full mb-2 overflow-hidden">
                    <div id="evap-liquid" class="absolute bottom-0 w-full h-3/4 bg-blue-100 transition-all duration-5000"></div>
                    <!-- 鹽結晶 -->
                    <div id="salt-crystals" class="absolute bottom-1 w-full flex justify-center gap-1 opacity-0 transition-opacity duration-1000 flex-wrap px-4">
                        <div class="w-2 h-2 bg-white border border-gray-200"></div>
                        <div class="w-3 h-3 bg-white border border-gray-200"></div>
                        <div class="w-2 h-2 bg-white border border-gray-200"></div>
                        <div class="w-3 h-2 bg-white border border-gray-200"></div>
                        <div class="w-2 h-3 bg-white border border-gray-200"></div>
                    </div>
                </div>

                <!-- 鐵絲網 (Wire Gauze) -->
                <div class="w-48 h-2 bg-gray-500 opacity-80 mb-0 z-10"></div>

                <!-- 三腳架 (Tripod) -->
                <div class="w-40 h-32 relative mb-0">
                    <div class="absolute left-0 top-0 w-2 h-full bg-gray-700 transform skew-x-12"></div>
                    <div class="absolute right-0 top-0 w-2 h-full bg-gray-700 transform -skew-x-12"></div>
                    <div class="absolute left-1/2 top-0 w-2 h-full bg-gray-700 -translate-x-1/2"></div>
                
                    <!-- 本生燈 (Bunsen Burner) -->
                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 flex flex-col items-center">
                        <!-- 火焰 -->
                        <div id="flame" class="w-8 h-12 bg-gradient-to-t from-blue-500 to-yellow-300 rounded-t-full rounded-b-lg opacity-0 transition-opacity duration-300 animate-fire mb-1 origin-bottom scale-0"></div>
                        <!-- 燈管 -->
                        <div class="w-4 h-16 bg-gray-600"></div>
                        <!-- 底座 -->
                        <div class="w-16 h-4 bg-gray-800 rounded-t-lg"></div>
                    </div>
                </div>

                <!-- 控制按鈕 -->
                <div class="absolute right-8 bottom-20 flex flex-col gap-2">
                    <button id="btn-fire" onclick="toggleFire()" class="btn-cartoon bg-red-400 hover:bg-red-500 text-white p-4 rounded-full w-16 h-16 flex items-center justify-center text-2xl" disabled>
                        🔥
                    </button>
                    <span class="text-xs text-center font-bold text-gray-500">點火開關</span>
                </div>
            </div>

            <!-- 場景 3：完成 -->
            <div id="scene-finish" class="hidden-step text-center">
                <div class="text-6xl mb-4 animate-bounce">🧂</div>
                <h2 class="text-3xl font-bold text-blue-600 mb-2">實驗成功！</h2>
                <div class="bg-blue-50 p-4 rounded-xl text-left text-sm text-gray-700 mb-4">
                    <p class="font-bold mb-1">📝 實驗總結：</p>
                    <ul class="list-disc list-inside space-y-1">
                        <li><span class="text-amber-700 font-bold">過濾法</span> 成功移除了不溶於水的泥沙（殘餘物）。</li>
                        <li><span class="text-red-500 font-bold">蒸發法</span> 移除了水分，留下了潔白的食鹽（結晶）。</li>
                    </ul>
                </div>
                <button onclick="location.reload()" class="btn-cartoon bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg">
                    再玩一次 🔄
                </button>
            </div>

        </div>

        <!-- 底部進度條 -->
        <div class="bg-gray-100 p-4 border-t-2 border-gray-200">
            <div class="flex justify-between mb-2 text-xs font-bold text-gray-500">
                <span id="step-1-label" class="text-blue-500">1. 準備</span>
                <span id="step-2-label">2. 過濾</span>
                <span id="step-3-label">3. 蒸發</span>
                <span id="step-4-label">4. 完成</span>
            </div>
            <div class="w-full bg-gray-300 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-400 h-full w-1/4 transition-all duration-500"></div>
            </div>
        </div>

    </div>

    <script>
        // 遊戲狀態變量
        let currentStep = 0;
        let isPouring = false;
        let isHeating = false;
        let heatProgress = 0;
        let heatInterval;

        // DOM 元素引用
        const scenes = {
            intro: document.getElementById('scene-intro'),
            filter: document.getElementById('scene-filter'),
            evaporate: document.getElementById('scene-evaporate'),
            finish: document.getElementById('scene-finish')
        };
        const instructionText = document.getElementById('instruction-text');
        const progressBar = document.getElementById('progress-bar');
        const scoreDisplay = document.getElementById('score-display');
        const labels = [
            document.getElementById('step-1-label'),
            document.getElementById('step-2-label'),
            document.getElementById('step-3-label'),
            document.getElementById('step-4-label')
        ];

        // 更新導師對話
        function setInstruction(text) {
            instructionText.innerText = text;
        }

        // 更新進度條
        function updateProgress(stepIndex) {
            progressBar.style.width = `${(stepIndex + 1) * 25}%`;
            labels.forEach((label, idx) => {
                if (idx <= stepIndex) {
                    label.classList.add('text-blue-500');
                    label.classList.remove('text-gray-500');
                } else {
                    label.classList.remove('text-blue-500');
                    label.classList.add('text-gray-500');
                }
            });
        }

        // 切換場景
        function switchScene(sceneName) {
            Object.values(scenes).forEach(s => s.classList.add('hidden-step'));
            Object.values(scenes).forEach(s => s.classList.remove('active-step'));
            
            scenes[sceneName].classList.remove('hidden-step');
            scenes[sceneName].classList.add('active-step');
        }

        // --- 遊戲邏輯 ---

        function startGame() {
            currentStep = 1;
            updateProgress(1);
            scoreDisplay.innerText = "LV 2";
            switchScene('filter');
            
            // 步驟 2.1: 放置濾紙
            setInstruction("現在我們要進行過濾。首先，我們需要在漏斗上放置什麼？\n(提示：點擊漏斗放置濾紙)");
            
            // 給漏斗添加點擊事件以放置濾紙
            const funnel = document.querySelector('.border-t-gray-300'); // 選擇漏斗
            funnel.style.cursor = "pointer";
            funnel.onclick = placeFilterPaper;
        }

        function placeFilterPaper() {
            const paper = document.getElementById('filter-paper');
            if (paper.style.opacity === '1') return; // 已經放置

            paper.style.opacity = '1';
            setInstruction("做得好！濾紙已經放好了。\n現在，請點擊右上角的燒杯，將渾濁的海水倒入漏斗中。");
            
            // 移除漏斗點擊事件，避免重複
            const funnel = document.querySelector('.border-t-gray-300');
            funnel.onclick = null;
            funnel.style.cursor = "default";
        }

        function performPour() {
            const paper = document.getElementById('filter-paper');
            if (paper.style.opacity !== '1') {
                setInstruction("等等！你還沒放濾紙呢！泥沙會直接流下去的！\n(請先點擊漏斗放置濾紙)");
                return;
            }

            if (isPouring) return;
            isPouring = true;

            const beaker = document.getElementById('pouring-beaker');
            const drops = document.getElementById('drops');
            const filtrate = document.getElementById('filtrate-liquid');
            const residue = document.getElementById('residue');
            const label = document.getElementById('filtrate-label');

            // 1. 倒水動畫
            beaker.style.transform = "rotate(-45deg) translate(-20px, 10px)";
            beaker.querySelector('.liquid-muddy').style.height = "0%"; // 水倒光
            
            setInstruction("正在過濾中... 觀察發生了什麼事？\n泥沙顆粒太大，無法通過濾紙微孔，這就是「殘餘物」。");

            // 2. 開始滴水
            setTimeout(() => {
                drops.classList.remove('hidden');
                residue.style.opacity = '1'; // 顯示泥沙
            }, 500);

            // 3. 濾液上升
            setTimeout(() => {
                filtrate.style.height = "60%";
                label.style.opacity = "1";
            }, 1000);

            // 4. 完成過濾
            setTimeout(() => {
                drops.classList.add('hidden');
                beaker.style.opacity = '0'; // 隱藏空燒杯
                
                setInstruction("過濾完成！你看，燒杯裡的是透明的「濾液」(鹽水)。\n泥沙被留在了濾紙上。點擊按鈕進入下一步！");
                
                // 添加下一步按鈕
                const btn = document.createElement('button');
                btn.className = "absolute bottom-4 right-4 btn-cartoon bg-blue-500 text-white px-4 py-2 rounded-lg z-20";
                btn.innerText = "前往蒸發步驟 ➡️";
                btn.onclick = startEvaporationStep;
                document.getElementById('scene-filter').appendChild(btn);

            }, 4000);
        }

        function startEvaporationStep() {
            currentStep = 2;
            updateProgress(2);
            scoreDisplay.innerText = "LV 3";
            switchScene('evaporate');
            setInstruction("現在我們有乾淨的鹽水。為了得到食鹽，我們需要移除水分。\n請點擊紅色的按鈕點燃本生燈。");
            
            // 啟用點火按鈕
            document.getElementById('btn-fire').disabled = false;
        }

        function toggleFire() {
            const btn = document.getElementById('btn-fire');
            const flame = document.getElementById('flame');
            
            if (!isHeating) {
                // 開始加熱
                isHeating = true;
                btn.innerHTML = "🛑"; // 停止圖標
                btn.classList.replace('bg-red-400', 'bg-gray-400');
                flame.style.transform = "scale(1)"; // 顯示火焰
                flame.style.opacity = "1";
                
                setInstruction("正在加熱... 水分受熱變成水蒸氣逃逸到空氣中。\n請注意看蒸發皿！");
                document.getElementById('steam-container').style.opacity = "1";

                // 開始蒸發邏輯
                heatInterval = setInterval(processEvaporation, 100);
            } else {
                // 停止加熱
                stopHeating();
            }
        }

        function stopHeating() {
            isHeating = false;
            clearInterval(heatInterval);
            const btn = document.getElementById('btn-fire');
            const flame = document.getElementById('flame');
            
            btn.innerHTML = "🔥";
            btn.classList.replace('bg-gray-400', 'bg-red-400');
            flame.style.transform = "scale(0)";
            flame.style.opacity = "0";
            document.getElementById('steam-container').style.opacity = "0";
        }

        function processEvaporation() {
            if (heatProgress >= 100) return;

            heatProgress += 1;
            const liquid = document.getElementById('evap-liquid');
            const crystals = document.getElementById('salt-crystals');

            // 液體減少
            liquid.style.height = `${75 - (heatProgress * 0.75)}%`;

            // 提示變化
            if (heatProgress === 50) {
                setInstruction("水快要煮乾了！你有看到白色的固體出現嗎？\n那個就是食鹽晶體！");
                crystals.style.opacity = "0.5";
            }

            if (heatProgress >= 90) {
                crystals.style.opacity = "1";
            }

            if (heatProgress >= 100) {
                stopHeating();
                document.getElementById('btn-fire').disabled = true; // 禁止再點火
                setInstruction("太棒了！所有的水都蒸發了，留下了白色的食鹽。\n我們成功完成了任務！");
                
                setTimeout(() => {
                    finishGame();
                }, 2000);
            }
        }

        function finishGame() {
            currentStep = 3;
            updateProgress(3);
            scoreDisplay.innerText = "WIN!";
            switchScene('finish');
            setInstruction("恭喜你！你已經掌握了從混有泥沙的海水中提取食鹽的方法！");
            
            // 撒花特效 (簡單版)
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#FFC0CB', '#87CEEB', '#98FB98', '#FFD700'];
            for(let i=0; i<30; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.top = '-10px';
                conf.style.width = '10px';
                conf.style.height = '10px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animation = `drip ${1 + Math.random()}s linear infinite`;
                document.getElementById('scene-finish').appendChild(conf);
            }
        }

    </script>
</body>
</html>
