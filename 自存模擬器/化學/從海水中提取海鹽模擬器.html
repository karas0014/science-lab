<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>從海水中提取海鹽 · Extracting Salt from Seawater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&family=Noto+Serif+HK:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root{ --ac:#3b82f6; }
        body { font-family: 'Noto Sans HK', sans-serif; overflow-x: hidden; transition:background-color .3s; }
        .cartoon-font { font-family: 'Fredoka', 'Noto Sans HK', sans-serif; }
        .serif-font{ font-family:'Noto Serif HK',serif; }
        .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; }
        .bp-surface{
            background-color:#eaeef3;
            background-image:linear-gradient(rgba(37,99,235,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.05) 1px,transparent 1px),linear-gradient(rgba(37,99,235,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.10) 1px,transparent 1px);
            background-size:26px 26px,26px 26px,130px 130px,130px 130px;
        }
        body.dark .bp-surface{
            background-color:#0a1626;
            background-image:linear-gradient(rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.06) 1px,transparent 1px),linear-gradient(rgba(56,189,248,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.11) 1px,transparent 1px);
            background-size:26px 26px,26px 26px,130px 130px,130px 130px;
        }
        .bp-btn{ display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:6px;border:1px solid #c3ccd8;background:rgba(255,255,255,.85);color:#334155;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;font-weight:600;letter-spacing:.06em;text-decoration:none;cursor:pointer;transition:border-color .2s,color .2s; }
        .bp-btn:hover{ border-color:var(--ac);color:#0f172a; }
        body.dark .bp-btn{ background:rgba(10,22,38,.85);border-color:#2c3e57;color:#cbd5e1; }
        body.dark .bp-btn:hover{ border-color:var(--ac);color:#fff; }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes drip { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60px) scale(0.5); opacity: 0; } }
        @keyframes steam { 0% { transform: translateY(0) scale(1); opacity: 0.6; } 100% { transform: translateY(-40px) scale(2); opacity: 0; } }
        @keyframes flicker { 0% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.9; } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-drip { animation: drip 1.5s infinite; }
        .animate-steam { animation: steam 2s infinite; }
        .animate-fire { animation: flicker 0.2s infinite; }

        .glass-ware { background: rgba(255, 255, 255, 0.3); border: 3px solid #4A5568; backdrop-filter: blur(2px); position: relative; }
        .liquid-muddy { background: #8D6E63; transition: height 1s; }
        .liquid-clear { background: #E0F2F1; transition: height 1s; }

        .btn-cartoon { transition: all 0.2s; box-shadow: 0 4px 0 #2D3748; }
        .btn-cartoon:active { transform: translateY(4px); box-shadow: 0 0 0 #2D3748; }
        .btn-cartoon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .hidden-step { display: none; }
        .active-step { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 深色結構覆蓋 */
        body.dark #game-card{ background:#0d192b; border-color:#334155; }
        body.dark #tutor-box{ background:#172033; border-color:#334155; }
        body.dark #tutor-box h3{ color:#e2e8f0; }
        body.dark #tutor-box p{ color:#cbd5e1; }
        body.dark #tutor-box .bg-white{ background:#1e293b; border-color:#334155; }
        body.dark #game-stage{ background:#0f1a2e; }
        body.dark #scene-finish .bg-blue-50{ background:#172033; color:#cbd5e1; }
        body.dark #progress-track{ background:#172033; border-color:#334155; }
        body.dark #progress-track .bg-gray-300{ background:#334155; }
    </style>
</head>
<body class="dark bp-surface min-h-screen flex flex-col items-center justify-center p-4">

    <a href="../../chemistry.html" class="bp-btn" style="position:fixed;top:12px;left:12px;z-index:60" aria-label="返回索引 / Back to index">
        <i data-lucide="home" width="14" height="14"></i><span>INDEX</span>
    </a>
    <div style="position:fixed;top:12px;right:12px;z-index:60" class="flex items-center gap-2">
        <button onclick="toggleTheme()" class="bp-btn" title="切換深淺色模式 / Toggle theme" aria-label="切換深淺色模式"><span id="theme-ic"><i data-lucide="sun" width="15" height="15"></i></span></button>
        <button onclick="toggleLang()" class="bp-btn" aria-label="切換語言 / Switch language"><i data-lucide="languages" width="14" height="14"></i><span id="lang-label">EN</span></button>
    </div>

    <!-- 遊戲容器 -->
    <div id="game-card" class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden border-8 border-blue-200 mt-10">

        <!-- 頂部標題列 -->
        <div class="bg-blue-400 p-4 text-white flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-4xl">⚗️</div>
                <div>
                    <h1 class="serif-font text-2xl font-bold" data-zh="從海水中提取海鹽" data-en="Extracting Salt from Seawater">從海水中提取海鹽</h1>
                    <p class="text-xs opacity-90" data-zh="中四化學科 - 混合物的分離" data-en="S4 Chemistry — Separating mixtures">中四化學科 - 混合物的分離</p>
                </div>
            </div>
            <div class="text-right">
                <span id="score-display" class="font-bold text-yellow-300 text-xl">LV 1</span>
            </div>
        </div>

        <!-- 導師對話框 -->
        <div id="tutor-box" class="p-6 bg-yellow-50 border-b-4 border-yellow-100 flex items-start gap-4">
            <div class="w-16 h-16 bg-white rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl shadow-sm flex-shrink-0 animate-float">
                👨‍🔬
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-gray-700 mb-1" data-zh="石老師" data-en="Mr. Stone">石老師</h3>
                <p id="instruction-text" class="text-gray-600 leading-relaxed" style="white-space:pre-line"></p>
            </div>
        </div>

        <!-- 遊戲主畫面 -->
        <div id="game-stage" class="h-96 bg-gray-50 relative flex items-center justify-center overflow-hidden">

            <!-- 初始場景：渾濁海水 -->
            <div id="scene-intro" class="active-step text-center">
                <div class="relative w-32 h-40 mx-auto glass-ware rounded-b-xl border-t-0 mb-4">
                    <div class="absolute bottom-0 left-0 w-full h-3/4 liquid-muddy rounded-b-lg opacity-80 flex items-end justify-center">
                        <span class="text-xs text-white mb-2 font-bold opacity-70" data-zh="泥沙+海水" data-en="Sand + seawater">泥沙+海水</span>
                    </div>
                    <div class="absolute top-1/2 left-1/4 w-2 h-2 bg-amber-800 rounded-full animate-pulse"></div>
                    <div class="absolute top-2/3 left-1/2 w-3 h-3 bg-amber-900 rounded-full animate-pulse delay-75"></div>
                    <div class="absolute top-1/3 left-3/4 w-2 h-2 bg-amber-700 rounded-full animate-pulse delay-150"></div>
                </div>
                <button onclick="startGame()" class="btn-cartoon bg-green-400 hover:bg-green-500 text-white font-bold py-3 px-8 rounded-xl text-lg" data-zh="戴上安全眼鏡，開始實驗！🥽" data-en="Put on goggles, start the experiment! 🥽">
                    戴上安全眼鏡，開始實驗！🥽
                </button>
            </div>

            <!-- 場景 1：過濾 -->
            <div id="scene-filter" class="hidden-step w-full h-full relative">
                <div class="absolute left-1/2 top-10 w-2 h-64 bg-gray-400 -translate-x-24"></div>
                <div class="absolute left-1/2 bottom-10 w-32 h-4 bg-gray-600 -translate-x-40 rounded"></div>
                <div class="absolute left-1/2 top-32 w-16 h-2 bg-gray-400 -translate-x-24"></div>
                <div class="absolute left-1/2 top-32 w-2 h-2 bg-gray-600 -translate-x-10 rounded-full"></div>

                <!-- 漏斗 (Funnel) -->
                <div class="absolute left-1/2 top-32 -translate-x-4">
                    <div class="w-0 h-0 border-l-[30px] border-l-transparent border-r-[30px] border-r-transparent border-t-[50px] border-t-gray-300 opacity-90 relative">
                        <div id="filter-paper" class="absolute -top-[50px] -left-[26px] w-0 h-0 border-l-[26px] border-l-transparent border-r-[26px] border-r-transparent border-t-[44px] border-t-white opacity-0 transition-opacity duration-500">
                             <div id="residue" class="absolute -top-[40px] -left-[10px] w-5 h-5 bg-amber-800 rounded-full opacity-0 transition-opacity duration-1000 blur-sm"></div>
                        </div>
                    </div>
                    <div class="w-2 h-16 bg-gray-300 mx-auto -mt-1 opacity-90"></div>
                    <div id="drops" class="hidden absolute top-16 left-1/2 -translate-x-1/2">
                        <div class="w-2 h-2 bg-blue-200 rounded-full animate-drip"></div>
                    </div>
                </div>

                <!-- 燒杯 (Beaker) 接收濾液 -->
                <div class="absolute left-1/2 bottom-12 -translate-x-4 w-24 h-32 glass-ware rounded-b-xl border-t-0">
                    <div id="filtrate-liquid" class="absolute bottom-0 w-full bg-blue-100 rounded-b-lg transition-all duration-3000 h-0 flex items-center justify-center">
                         <span class="text-xs text-blue-800 font-bold opacity-0 transition-opacity duration-1000" id="filtrate-label" data-zh="濾液 (鹽水)" data-en="Filtrate (salt water)">濾液 (鹽水)</span>
                    </div>
                </div>

                <!-- 手持燒杯 (倒水用) -->
                <div id="pouring-beaker" class="absolute top-10 right-10 w-20 h-24 glass-ware rounded-b-lg border-t-0 rotate-0 transition-all duration-1000 cursor-pointer hover:scale-105 z-10" onclick="performPour()">
                    <div class="absolute bottom-0 w-full h-3/4 liquid-muddy rounded-b-md transition-all duration-1000"></div>
                    <div class="absolute -left-8 top-10 text-4xl transform -rotate-45 pointer-events-none">🤚</div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white font-bold text-xs pointer-events-none" data-zh="點擊倒水" data-en="Tap to pour">點擊倒水</div>
                </div>
            </div>

            <!-- 場景 2：蒸發 -->
            <div id="scene-evaporate" class="hidden-step w-full h-full relative flex flex-col items-center justify-end pb-10">

                <div id="steam-container" class="absolute top-20 opacity-0 transition-opacity duration-500">
                    <div class="w-4 h-4 bg-gray-200 rounded-full absolute -left-4 animate-steam"></div>
                    <div class="w-6 h-6 bg-gray-200 rounded-full absolute left-0 animate-steam" style="animation-delay: 0.5s"></div>
                    <div class="w-4 h-4 bg-gray-200 rounded-full absolute left-4 animate-steam" style="animation-delay: 1s"></div>
                </div>

                <div class="relative z-10 w-40 h-12 bg-white border-b-4 border-l-2 border-r-2 border-gray-400 rounded-b-full mb-2 overflow-hidden">
                    <div id="evap-liquid" class="absolute bottom-0 w-full h-3/4 bg-blue-100 transition-all duration-5000"></div>
                    <div id="salt-crystals" class="absolute bottom-1 w-full flex justify-center gap-1 opacity-0 transition-opacity duration-1000 flex-wrap px-4">
                        <div class="w-2 h-2 bg-white border border-gray-200"></div>
                        <div class="w-3 h-3 bg-white border border-gray-200"></div>
                        <div class="w-2 h-2 bg-white border border-gray-200"></div>
                        <div class="w-3 h-2 bg-white border border-gray-200"></div>
                        <div class="w-2 h-3 bg-white border border-gray-200"></div>
                    </div>
                </div>

                <div class="w-48 h-2 bg-gray-500 opacity-80 mb-0 z-10"></div>

                <div class="w-40 h-32 relative mb-0">
                    <div class="absolute left-0 top-0 w-2 h-full bg-gray-700 transform skew-x-12"></div>
                    <div class="absolute right-0 top-0 w-2 h-full bg-gray-700 transform -skew-x-12"></div>
                    <div class="absolute left-1/2 top-0 w-2 h-full bg-gray-700 -translate-x-1/2"></div>

                    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 flex flex-col items-center">
                        <div id="flame" class="w-8 h-12 bg-gradient-to-t from-blue-500 to-yellow-300 rounded-t-full rounded-b-lg opacity-0 transition-opacity duration-300 animate-fire mb-1 origin-bottom scale-0"></div>
                        <div class="w-4 h-16 bg-gray-600"></div>
                        <div class="w-16 h-4 bg-gray-800 rounded-t-lg"></div>
                    </div>
                </div>

                <div class="absolute right-8 bottom-20 flex flex-col gap-2">
                    <button id="btn-fire" onclick="toggleFire()" class="btn-cartoon bg-red-400 hover:bg-red-500 text-white p-4 rounded-full w-16 h-16 flex items-center justify-center text-2xl" disabled>
                        🔥
                    </button>
                    <span class="text-xs text-center font-bold text-gray-500 dark:text-slate-400" data-zh="點火開關" data-en="Ignition">點火開關</span>
                </div>
            </div>

            <!-- 場景 3：完成 -->
            <div id="scene-finish" class="hidden-step text-center">
                <div class="text-6xl mb-4 animate-bounce">🧂</div>
                <h2 class="serif-font text-3xl font-bold text-blue-600 mb-2" data-zh="實驗成功！" data-en="Experiment complete!">實驗成功！</h2>
                <div class="bg-blue-50 p-4 rounded-xl text-left text-sm text-gray-700 mb-4">
                    <p class="font-bold mb-1" data-zh="📝 實驗總結：" data-en="📝 Summary:">📝 實驗總結：</p>
                    <ul class="list-disc list-inside space-y-1">
                        <li><span class="text-amber-700 font-bold" data-zh="過濾法" data-en="Filtration">過濾法</span><span data-zh=" 成功移除了不溶於水的泥沙（殘餘物）。" data-en=" removed the insoluble sand (the residue)."> 成功移除了不溶於水的泥沙（殘餘物）。</span></li>
                        <li><span class="text-red-500 font-bold" data-zh="蒸發法" data-en="Evaporation">蒸發法</span><span data-zh=" 移除了水分，留下了潔白的食鹽（結晶）。" data-en=" drove off the water, leaving pure white salt (crystals)."> 移除了水分，留下了潔白的食鹽（結晶）。</span></li>
                    </ul>
                </div>
                <button onclick="location.reload()" class="btn-cartoon bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg" data-zh="再玩一次 🔄" data-en="Play again 🔄">
                    再玩一次 🔄
                </button>
            </div>

        </div>

        <!-- 底部進度條 -->
        <div id="progress-track" class="bg-gray-100 p-4 border-t-2 border-gray-200">
            <div class="flex justify-between mb-2 text-xs font-bold text-gray-500">
                <span id="step-1-label" class="text-blue-500" data-zh="1. 準備" data-en="1. Prepare">1. 準備</span>
                <span id="step-2-label" data-zh="2. 過濾" data-en="2. Filter">2. 過濾</span>
                <span id="step-3-label" data-zh="3. 蒸發" data-en="3. Evaporate">3. 蒸發</span>
                <span id="step-4-label" data-zh="4. 完成" data-en="4. Done">4. 完成</span>
            </div>
            <div class="w-full bg-gray-300 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-400 h-full w-1/4 transition-all duration-500"></div>
            </div>
        </div>

    </div>

    <script>
        let LANG = 'zh';
        const L = (o) => (o && typeof o === 'object') ? (o[LANG] ?? o.zh) : o;

        // 對話字串（雙語）
        const T = {
            intro: {zh:'歡迎來到化學實驗室！我們今天有一杯混有泥沙的海水。你的任務是從中提取食鹽。準備好了嗎？', en:'Welcome to the chemistry lab! Today we have a beaker of muddy seawater. Your task is to extract table salt from it. Ready?'},
            placePaper: {zh:'現在我們要進行過濾。首先，我們需要在漏斗上放置什麼？\n(提示：點擊漏斗放置濾紙)', en:'Now we filter. First, what do we place on the funnel?\n(Hint: click the funnel to add filter paper)'},
            paperDone: {zh:'做得好！濾紙已經放好了。\n現在，請點擊右上角的燒杯，將渾濁的海水倒入漏斗中。', en:'Well done! The filter paper is in place.\nNow click the beaker at the top right to pour the muddy seawater into the funnel.'},
            noPaper: {zh:'等等！你還沒放濾紙呢！泥沙會直接流下去的！\n(請先點擊漏斗放置濾紙)', en:"Wait! You haven't added the filter paper — the sand would flow straight through!\n(Click the funnel to add filter paper first)"},
            filtering: {zh:'正在過濾中... 觀察發生了什麼事？\n泥沙顆粒太大，無法通過濾紙微孔，這就是「殘餘物」。', en:'Filtering... watch what happens.\nThe sand grains are too big to pass through the pores of the filter paper — that is the "residue".'},
            filterDone: {zh:'過濾完成！你看，燒杯裡的是透明的「濾液」(鹽水)。\n泥沙被留在了濾紙上。點擊按鈕進入下一步！', en:'Filtration done! See — the beaker holds the clear "filtrate" (salt water).\nThe sand stays on the filter paper. Click the button for the next step!'},
            evapStart: {zh:'現在我們有乾淨的鹽水。為了得到食鹽，我們需要移除水分。\n請點擊紅色的按鈕點燃本生燈。', en:'Now we have clean salt water. To get the salt, we must remove the water.\nClick the red button to light the Bunsen burner.'},
            heating: {zh:'正在加熱... 水分受熱變成水蒸氣逃逸到空氣中。\n請注意看蒸發皿！', en:'Heating... the water turns to steam and escapes into the air.\nKeep an eye on the evaporating dish!'},
            halfway: {zh:'水快要煮乾了！你有看到白色的固體出現嗎？\n那個就是食鹽晶體！', en:'The water is almost gone! Can you see the white solid appearing?\nThose are the salt crystals!'},
            evapDone: {zh:'太棒了！所有的水都蒸發了，留下了白色的食鹽。\n我們成功完成了任務！', en:'Excellent! All the water has evaporated, leaving white salt behind.\nWe completed the task!'},
            win: {zh:'恭喜你！你已經掌握了從混有泥沙的海水中提取食鹽的方法！', en:'Congratulations! You have learned how to extract salt from muddy seawater!'},
            toEvap: {zh:'前往蒸發步驟 ➡️', en:'Go to evaporation ➡️'}
        };

        // 遊戲狀態變量
        let currentStep = 0;
        let isPouring = false;
        let isHeating = false;
        let heatProgress = 0;
        let heatInterval;
        let _instr = T.intro;

        // DOM 元素引用
        const scenes = {
            intro: document.getElementById('scene-intro'),
            filter: document.getElementById('scene-filter'),
            evaporate: document.getElementById('scene-evaporate'),
            finish: document.getElementById('scene-finish')
        };
        const instructionText = document.getElementById('instruction-text');
        const progressBar = document.getElementById('progress-bar');
        const scoreDisplay = document.getElementById('score-display');
        const labels = [
            document.getElementById('step-1-label'),
            document.getElementById('step-2-label'),
            document.getElementById('step-3-label'),
            document.getElementById('step-4-label')
        ];

        function setInstruction(o) {
            _instr = o;
            instructionText.innerText = L(o);
        }

        function updateProgress(stepIndex) {
            progressBar.style.width = `${(stepIndex + 1) * 25}%`;
            labels.forEach((label, idx) => {
                if (idx <= stepIndex) {
                    label.classList.add('text-blue-500');
                    label.classList.remove('text-gray-500');
                } else {
                    label.classList.remove('text-blue-500');
                    label.classList.add('text-gray-500');
                }
            });
        }

        function switchScene(sceneName) {
            Object.values(scenes).forEach(s => s.classList.add('hidden-step'));
            Object.values(scenes).forEach(s => s.classList.remove('active-step'));
            scenes[sceneName].classList.remove('hidden-step');
            scenes[sceneName].classList.add('active-step');
        }

        // --- 遊戲邏輯 ---
        function startGame() {
            currentStep = 1;
            updateProgress(1);
            scoreDisplay.innerText = "LV 2";
            switchScene('filter');
            setInstruction(T.placePaper);
            const funnel = document.querySelector('.border-t-gray-300');
            funnel.style.cursor = "pointer";
            funnel.onclick = placeFilterPaper;
        }

        function placeFilterPaper() {
            const paper = document.getElementById('filter-paper');
            if (paper.style.opacity === '1') return;
            paper.style.opacity = '1';
            setInstruction(T.paperDone);
            const funnel = document.querySelector('.border-t-gray-300');
            funnel.onclick = null;
            funnel.style.cursor = "default";
        }

        function performPour() {
            const paper = document.getElementById('filter-paper');
            if (paper.style.opacity !== '1') {
                setInstruction(T.noPaper);
                return;
            }
            if (isPouring) return;
            isPouring = true;

            const beaker = document.getElementById('pouring-beaker');
            const drops = document.getElementById('drops');
            const filtrate = document.getElementById('filtrate-liquid');
            const residue = document.getElementById('residue');
            const label = document.getElementById('filtrate-label');

            beaker.style.transform = "rotate(-45deg) translate(-20px, 10px)";
            beaker.querySelector('.liquid-muddy').style.height = "0%";
            setInstruction(T.filtering);

            setTimeout(() => { drops.classList.remove('hidden'); residue.style.opacity = '1'; }, 500);
            setTimeout(() => { filtrate.style.height = "60%"; label.style.opacity = "1"; }, 1000);
            setTimeout(() => {
                drops.classList.add('hidden');
                beaker.style.opacity = '0';
                setInstruction(T.filterDone);
                const btn = document.createElement('button');
                btn.id = 'btn-to-evap';
                btn.className = "absolute bottom-4 right-4 btn-cartoon bg-blue-500 text-white px-4 py-2 rounded-lg z-20";
                btn.innerText = L(T.toEvap);
                btn.onclick = startEvaporationStep;
                document.getElementById('scene-filter').appendChild(btn);
            }, 4000);
        }

        function startEvaporationStep() {
            currentStep = 2;
            updateProgress(2);
            scoreDisplay.innerText = "LV 3";
            switchScene('evaporate');
            setInstruction(T.evapStart);
            document.getElementById('btn-fire').disabled = false;
        }

        function toggleFire() {
            const btn = document.getElementById('btn-fire');
            const flame = document.getElementById('flame');
            if (!isHeating) {
                isHeating = true;
                btn.innerHTML = "🛑";
                btn.classList.replace('bg-red-400', 'bg-gray-400');
                flame.style.transform = "scale(1)";
                flame.style.opacity = "1";
                setInstruction(T.heating);
                document.getElementById('steam-container').style.opacity = "1";
                heatInterval = setInterval(processEvaporation, 100);
            } else {
                stopHeating();
            }
        }

        function stopHeating() {
            isHeating = false;
            clearInterval(heatInterval);
            const btn = document.getElementById('btn-fire');
            const flame = document.getElementById('flame');
            btn.innerHTML = "🔥";
            btn.classList.replace('bg-gray-400', 'bg-red-400');
            flame.style.transform = "scale(0)";
            flame.style.opacity = "0";
            document.getElementById('steam-container').style.opacity = "0";
        }

        function processEvaporation() {
            if (heatProgress >= 100) return;
            heatProgress += 1;
            const liquid = document.getElementById('evap-liquid');
            const crystals = document.getElementById('salt-crystals');
            liquid.style.height = `${75 - (heatProgress * 0.75)}%`;
            if (heatProgress === 50) { setInstruction(T.halfway); crystals.style.opacity = "0.5"; }
            if (heatProgress >= 90) { crystals.style.opacity = "1"; }
            if (heatProgress >= 100) {
                stopHeating();
                document.getElementById('btn-fire').disabled = true;
                setInstruction(T.evapDone);
                setTimeout(() => { finishGame(); }, 2000);
            }
        }

        function finishGame() {
            currentStep = 3;
            updateProgress(3);
            scoreDisplay.innerText = "WIN!";
            switchScene('finish');
            setInstruction(T.win);
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#FFC0CB', '#87CEEB', '#98FB98', '#FFD700'];
            for(let i=0; i<30; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.top = '-10px';
                conf.style.width = '10px';
                conf.style.height = '10px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animation = `drip ${1 + Math.random()}s linear infinite`;
                document.getElementById('scene-finish').appendChild(conf);
            }
        }

        // --- 主題 / 語言切換 ---
        function toggleTheme(){
            const dark = !document.body.classList.contains('dark');
            document.body.classList.toggle('dark', dark);
            document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="15" height="15"></i>`;
            if(window.lucide) lucide.createIcons();
        }
        function toggleLang(){
            LANG = LANG==='zh' ? 'en' : 'zh';
            document.getElementById('lang-label').textContent = LANG==='zh' ? 'EN' : '中';
            document.querySelectorAll('[data-zh][data-en]').forEach(el=>{
                el.textContent = el.getAttribute(LANG==='zh'?'data-zh':'data-en');
            });
            instructionText.innerText = L(_instr);
            const be = document.getElementById('btn-to-evap');
            if(be) be.innerText = L(T.toEvap);
        }

        // 初始化
        instructionText.innerText = L(_instr);
        if(window.lucide) lucide.createIcons();
    </script>
</body>
</html>
