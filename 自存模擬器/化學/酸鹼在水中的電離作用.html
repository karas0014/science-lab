    // 狀態變數

    let score = 0;
    let challengeState = 'start';

        initUI();

        updateText();
        updateSimulation();

    function initUI() {
        document.getElementById('tab-sim').addEventListener('click', () => switchTab('sim'));
        document.getElementById('tab-challenge').addEventListener('click', () => switchTab('challenge'));
        
        document.getElementById('lang-btn').addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateText();
            if(currentTab === 'challenge' && challengeState === 'playing') {
                renderQuestion(); 
            }
        });

        document.getElementById('btn-acid').addEventListener('click', () => { currentType = 'acid'; updateControlUI(); updateSimulation(); });
        document.getElementById('btn-base').addEventListener('click', () => { currentType = 'base'; updateControlUI(); updateSimulation(); });
        document.getElementById('btn-strong').addEventListener('click', () => { currentStrength = 'strong'; updateControlUI(); updateSimulation(); });
        document.getElementById('btn-weak').addEventListener('click', () => { currentStrength = 'weak'; updateControlUI(); updateSimulation(); });

        document.getElementById('btn-start-challenge').addEventListener('click', startChallenge);
        document.getElementById('btn-next-q').addEventListener('click', nextQuestion);
        document.getElementById('btn-restart').addEventListener('click', resetChallenge);
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-sim').classList.toggle('tab-active', tab === 'sim');
        document.getElementById('tab-challenge').classList.toggle('tab-active', tab === 'challenge');
        document.getElementById('tab-sim').classList.toggle('text-gray-500', tab !== 'sim');
        document.getElementById('tab-challenge').classList.toggle('text-gray-500', tab !== 'challenge');

        document.getElementById('view-sim').classList.toggle('hidden', tab !== 'sim');
        document.getElementById('view-challenge').classList.toggle('hidden', tab !== 'challenge');

        if(tab === 'sim') {
            updateSimulation();
        } else {
            cancelAnimationFrame(animationId);
        }
    }

    function updateControlUI() {
        const setBtnActive = (id, isActive, colorClass) => {
            const el = document.getElementById(id);
            if(isActive) {
                el.className = `flex-1 py-2 rounded-lg font-bold text-white shadow transition-all ${colorClass}`;
            } else {
                el.className = `flex-1 py-2 rounded-lg font-bold bg-white text-gray-600 border border-gray-300 hover:bg-gray-100 transition-all`;
            }
        };

        setBtnActive('btn-acid', currentType === 'acid', 'bg-red-500 hover:bg-red-600');
        setBtnActive('btn-base', currentType === 'base', 'bg-blue-500 hover:bg-blue-600');
        setBtnActive('btn-strong', currentStrength === 'strong', 'bg-purple-600 hover:bg-purple-700');
        setBtnActive('btn-weak', currentStrength === 'weak', 'bg-green-500 hover:bg-green-600');

        updateText();
    }

    function updateText() {
        const t = i18n[currentLang];
        document.getElementById('app-title').innerText = t.title;
        document.getElementById('tab-sim').innerText = t.simTab;
        document.getElementById('tab-challenge').innerText = t.challengeTab;
        document.getElementById('lang-btn').innerText = t.langBtn;

        document.getElementById('lbl-type').innerText = t.typeLabel;
        document.getElementById('btn-acid').innerText = t.acid;
        document.getElementById('btn-base').innerText = t.base;
        
        document.getElementById('lbl-strength').innerText = t.strengthLabel;
        document.getElementById('btn-strong').innerText = t.strong;
        document.getElementById('btn-weak').innerText = t.weak;

        document.getElementById('lbl-legend').innerText = t.legendParticles;
        document.getElementById('btn-start-challenge').innerText = t.startChallenge;
        document.getElementById('lbl-enter-name').innerText = t.enterName;
        document.getElementById('player-name').placeholder = t.namePlaceholder;
        document.getElementById('lbl-result-title').innerText = t.resultTitle;
        document.getElementById('btn-restart').innerText = t.restartBtn;
        
        const errorMsgEl = document.getElementById('name-error');
        if(!errorMsgEl.classList.contains('hidden')) {
            errorMsgEl.innerText = t.nameError;
        }

        let descKey = 'simDesc' + currentStrength.charAt(0).toUpperCase() + currentStrength.slice(1) + currentType.charAt(0).toUpperCase() + currentType.slice(1);
        document.getElementById('sim-description').innerText = t[descKey];

        updateLegend();
    }

    function updateLegend() {
        const legendDiv = document.getElementById('legend-container');
        legendDiv.innerHTML = '';
        
        let particleTypes = [];
        if (currentType === 'acid') {
            if (currentStrength === 'strong') {
                particleTypes = [
                    { color: '#ef4444', text: 'H⁺' },
                    { color: '#f472b6', text: 'A⁻' }
                ];
            } else {
                particleTypes = [
                    { color: '#9ca3af', text: 'HA' },
                    { color: '#ef4444', text: 'H⁺' },
                    { color: '#f472b6', text: 'A⁻' }
                ];
            }
        } else {
            if (currentStrength === 'strong') {
                particleTypes = [
                    { color: '#38bdf8', text: 'M⁺' },
                    { color: '#3b82f6', text: 'OH⁻' }
                ];
            } else {
                particleTypes = [
                    { color: '#9ca3af', text: 'B' },
                    { color: '#a855f7', text: 'BH⁺' },
                    { color: '#3b82f6', text: 'OH⁻' }
                ];
            }
        }

        particleTypes.forEach(p => {
            const span = document.createElement('span');
            span.className = 'particle-legend';
            span.innerHTML = `<span class="particle-dot" style="background-color: ${p.color};"></span> ${p.text}`;
            legendDiv.appendChild(span);
        });
    }

    function initCanvas() {
        canvas = document.getElementById('sim-canvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = 300; 
    }

    class Particle {
        constructor(x, y, radius, color, text) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.text = text;
            this.vx = (Math.random() - 0.5) * 2; 
            this.vy = (Math.random() - 0.5) * 2; 
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) this.vx *= -1;
            const waterTop = canvas.height * 0.2;
            if (this.y - this.radius < waterTop || this.y + this.radius > canvas.height) this.vy *= -1;

            this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
            this.y = Math.max(waterTop + this.radius, Math.min(canvas.height - this.radius, this.y));
        }

        draw(ctx) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.text, this.x, this.y);
        }
    }

    function updateSimulation() {
        cancelAnimationFrame(animationId);
        particles = [];
        
        const totalParticles = 40;
        const colors = {
            H: '#ef4444', A: '#f472b6', HA: '#9ca3af',
            OH: '#3b82f6', M: '#38bdf8', B: '#9ca3af', BH: '#a855f7'
        };

        const waterTop = 300 * 0.2;
        
        for (let i = 0; i < totalParticles; i++) {
            let x = Math.random() * (canvas.width - 30) + 15;
            let y = Math.random() * (300 - waterTop - 30) + waterTop + 15;
            
            if (currentType === 'acid') {
                if (currentStrength === 'strong') {
                    if (i % 2 === 0) particles.push(new Particle(x, y, 14, colors.H, 'H⁺'));
                    else particles.push(new Particle(x, y, 14, colors.A, 'A⁻'));
                } else {
                    if (i < totalParticles * 0.8) particles.push(new Particle(x, y, 16, colors.HA, 'HA'));
                    else if (i % 2 === 0) particles.push(new Particle(x, y, 12, colors.H, 'H⁺'));
                    else particles.push(new Particle(x, y, 12, colors.A, 'A⁻'));
                }
            } else {
                if (currentStrength === 'strong') {
                    if (i % 2 === 0) particles.push(new Particle(x, y, 14, colors.M, 'M⁺'));
                    else particles.push(new Particle(x, y, 14, colors.OH, 'OH⁻'));
                } else {
                    if (i < totalParticles * 0.8) particles.push(new Particle(x, y, 16, colors.B, 'B'));
                    else if (i % 2 === 0) particles.push(new Particle(x, y, 14, colors.BH, 'BH⁺'));
                    else particles.push(new Particle(x, y, 12, colors.OH, 'OH⁻'));
                }
            }
        }
        animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const waterTop = canvas.height * 0.2;
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.fillRect(0, waterTop, canvas.width, canvas.height - waterTop);
        
        ctx.beginPath();
        ctx.moveTo(0, waterTop);
        ctx.lineTo(canvas.width, waterTop);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
        ctx.lineWidth = 2;
        ctx.stroke();

        particles.forEach(p => {
            p.update();
            p.draw(ctx);
        });
        animationId = requestAnimationFrame(animate);
    }

    function startChallenge() {
        const nameInput = document.getElementById('player-name').value.trim();
        const errorMsg = document.getElementById('name-error');
        
        if (!nameInput) {
            errorMsg.innerText = i18n[currentLang].nameError;
            errorMsg.classList.remove('hidden');
            return;
        }
        
        errorMsg.classList.add('hidden');
        playerName = nameInput;
        score = 0;
        currentQIndex = 0;
        challengeState = 'playing';
        
        document.getElementById('chal-start-screen').classList.add('hidden');
        document.getElementById('chal-play-screen').classList.remove('hidden');
        document.getElementById('chal-result-screen').classList.add('hidden');
        
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questionsData[currentQIndex];
        const t = i18n[currentLang];
        
        document.getElementById('q-progress').innerText = `${t.qNum} ${currentQIndex + 1} / 20`;
        document.getElementById('q-score').innerText = `${t.score} ${score}`;
        
        const progressPct = ((currentQIndex) / 20) * 100;
        document.getElementById('progress-bar').style.width = `${progressPct}%`;

        document.getElementById('q-text').innerText = qData[currentLang].q;
        
        const optionsContainer = document.getElementById('q-options');
        optionsContainer.innerHTML = '';
        
        qData[currentLang].options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left p-4 rounded-xl border-2 border-gray-200 bg-white hover:border-blue-500 hover:bg-blue-50 transition-all font-medium";
            btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
            btn.onclick = () => selectOption(index, btn);
            optionsContainer.appendChild(btn);
        });

        document.getElementById('btn-next-q').classList.add('hidden');
        document.getElementById('btn-next-q').innerText = (currentQIndex === 19) ? t.finishBtn : t.nextBtn;
    }

    let selectedAnswerIndex = -1;
    function selectOption(index, btnElement) {
        if (selectedAnswerIndex !== -1) return; 
        
        selectedAnswerIndex = index;
        const qData = questionsData[currentQIndex];
        const isCorrect = (index === qData.ans);
        const allBtns = document.getElementById('q-options').children;
        
        for(let i=0; i<allBtns.length; i++) {
            allBtns[i].disabled = true;
            if (i === qData.ans) {
                allBtns[i].classList.replace('border-gray-200', 'border-green-500');
                allBtns[i].classList.replace('hover:bg-blue-50', 'bg-green-100');
                allBtns[i].classList.add('text-green-800');
            } else if (i === index && !isCorrect) {
                allBtns[i].classList.replace('border-gray-200', 'border-red-500');
                allBtns[i].classList.replace('hover:bg-blue-50', 'bg-red-100');
                allBtns[i].classList.add('text-red-800');
            } else {
                allBtns[i].classList.add('opacity-50');
            }
        }

        if (isCorrect) score++;
        document.getElementById('q-score').innerText = `${i18n[currentLang].score} ${score}`;
        document.getElementById('btn-next-q').classList.remove('hidden');
    }

    function nextQuestion() {
        selectedAnswerIndex = -1;
        currentQIndex++;
        
        if (currentQIndex < 20) {
            renderQuestion();
        } else {
            finishChallenge();
        }
    }

    function finishChallenge() {
        challengeState = 'result';
        document.getElementById('chal-play-screen').classList.add('hidden');
        document.getElementById('chal-result-screen').classList.remove('hidden');
        
        const t = i18n[currentLang];
        document.getElementById('final-score').innerText = `${score} / 20`;
        
        const isPass = score >= 8;
        const msgEl = document.getElementById('final-msg');
        msgEl.innerText = isPass ? t.passMsg : t.failMsg;
        msgEl.className = `text-xl font-bold mt-4 text-center ${isPass ? 'text-green-600' : 'text-red-600'}`;

        submitToGoogleSheets();
    }

    function submitToGoogleSheets() {
        const t = i18n[currentLang];
        const statusEl = document.getElementById('submit-status');
        statusEl.innerText = t.submitting;
        statusEl.className = "mt-4 text-sm text-blue-600 text-center flex items-center justify-center gap-2";
        statusEl.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i> ${t.submitting}`;

        // 【更新】使用 URLSearchParams 將資料轉為 form 表單格式，這可以避開瀏覽器的 OPTIONS 預檢與 CORS 錯誤
        const payload = new URLSearchParams({
            name: playerName,
            score: score
        });

        __noSend(0, {
            method: 'POST',
            mode: 'no-cors', // 加入 no-cors 以解決 Failed to fetch (CORS 阻擋) 的問題
            body: payload,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
        .then(() => {
            // 在 no-cors 模式下無法讀取伺服器的 response，因此只要沒有網路錯誤就視為成功
            statusEl.innerHTML = `<i class="ph ph-check-circle text-xl text-green-500"></i> <span class="text-green-600 font-bold">${t.submitSuccess}</span>`;
        })
        .catch(err => {
            statusEl.innerHTML = `<i class="ph ph-x-circle text-xl text-red-500"></i> <span class="text-red-600">${t.submitFail}</span>`;
            console.error('Submission Error:', err);
        });
    }

    function resetChallenge() {
        challengeState = 'start';
        document.getElementById('chal-result-screen').classList.add('hidden');
        document.getElementById('chal-start-screen').classList.remove('hidden');
        document.getElementById('player-name').value = '';
        document.getElementById('submit-status').innerHTML = '';
    }

    // --- 主題切換 ---
    function toggleTheme(){
        const dark = !document.body.classList.contains('dark');
        document.body.classList.toggle('dark', dark);
        document.getElementById('theme-ic').innerHTML = `<i data-lucide="${dark?'sun':'moon'}" width="15" height="15"></i>`;
        if(window.lucide) lucide.createIcons();
    }
    window.addEventListener('load', () => { if(window.lucide) lucide.createIcons(); });

</script>

<div class="flex flex-col h-full">

            <i class="ph-fill ph-flask text-blue-500"></i> 酸鹼電離模擬器
        </h1>
        <button id="lang-btn" class="px-4 py-1.5 rounded-full border border-gray-300 text-sm font-medium hover:bg-gray-100 transition-colors">
            English
        </button>
    </header>

    <!-- Navigation Tabs -->
    <nav class="flex bg-white border-b border-gray-200">

        <div id="view-sim" class="max-w-4xl mx-auto h-full flex flex-col gap-4">

            <div class="glass-panel p-4 rounded-xl shadow-sm">

                        </div>
                    </div>
                    <div class="flex-1">
                        <p id="lbl-strength" class="text-sm text-gray-500 mb-2 font-semibold">強度：</p>
                        <div class="flex gap-2">
                            <button id="btn-strong" class="flex-1 py-2 rounded-lg font-bold text-white bg-purple-600 hover:bg-purple-700 shadow transition-all">強 (Strong)</button>
                            <button id="btn-weak" class="flex-1 py-2 rounded-lg font-bold bg-white text-gray-600 border border-gray-300 hover:bg-gray-100 transition-all">弱 (Weak)</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 動畫區域 -->
            <div class="relative flex-1 min-h-[300px] w-full bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                <canvas id="sim-canvas" class="w-full h-[300px] block"></canvas>
                <!-- 解說文字 -->
                <div class="p-4 bg-white border-t border-gray-100 flex-1">
                    <p id="sim-description" class="text-gray-700 leading-relaxed font-medium"></p>
                    <div class="mt-4 pt-3 border-t border-gray-100">
                        <span id="lbl-legend" class="font-bold text-gray-600 mr-2 text-sm">粒子圖例：</span>

        </div>

        <!-- View 2: 挑戰區 Challenge Area -->

            <!-- 登入畫面 -->

                <div class="mb-6">
                    <i class="ph-fill ph-student text-6xl text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-6">酸鹼知識挑戰區</h2>
                <div class="mb-6 text-left">
                    <label id="lbl-enter-name" class="block text-gray-700 font-bold mb-2">請輸入你的名字：</label>
                    <input type="text" id="player-name" class="w-full px-4 py-3 rounded-lg border-2 border-gray-300 focus:border-blue-500 focus:outline-none transition-colors" placeholder="例如：陳小明">
                    <p id="name-error" class="text-red-500 text-sm mt-2 hidden font-bold">請先輸入名字！</p>
                </div>
                <button id="btn-start-challenge" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all text-lg">
                    開始挑戰
                </button>
            </div>

            <!-- 答題畫面 -->
            <div id="chal-play-screen" class="hidden flex flex-col h-full gap-4 pb-10">
                <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm">
                    <span id="q-progress" class="font-bold text-blue-600">題號： 1 / 20</span>
                    <span id="q-score" class="font-bold text-green-600">得分： 0</span>
                </div>
                
                <!-- 進度條 -->
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all" style="width: 0%"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm flex-1 flex flex-col">
                    <h3 id="q-text" class="text-lg md:text-xl font-bold text-gray-800 mb-6">題目文字</h3>
                    <div id="q-options" class="flex flex-col gap-3 flex-1">
                        <!-- 選項按鈕會透過 JS 動態產生在此 -->
                    </div>
                    <button id="btn-next-q" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow transition-all hidden">
                        下一題
                    </button>
                </div>
            </div>

            <!-- 結果畫面 -->

                <h2 id="lbl-result-title" class="text-3xl font-bold text-gray-800 mb-6">挑戰結果</h2>
                <div class="text-6xl font-black text-blue-600 mb-4" id="final-score">10 / 20</div>
                <p id="final-msg" class="text-xl font-bold"></p>
                
                <div id="submit-status" class="mt-6 p-4 bg-blue-50 rounded-lg"></div>

                <button id="btn-restart" class="mt-8 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-xl shadow transition-all">
                    重新挑戰
                </button>
            </div>

        </div>
    </main>
</div>
