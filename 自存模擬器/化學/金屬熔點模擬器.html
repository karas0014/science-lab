<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金屬熔點百科</title>
    <!-- Google Fonts for a cute rounded look -->
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --kawaii-pink: #FFB7B2;
            --kawaii-blue: #A2E1DB;
            --kawaii-yellow: #FFFFB5;
            --kawaii-purple: #E2F0CB;
            --text-color: #555;
        }

        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: #FFF5F7; /* Pale Pink Background */
            background-image: radial-gradient(#FFDEE9 2px, transparent 2px);
            background-size: 20px 20px;
            color: var(--text-color);
        }

        h1, h2, h3, .title-font {
            font-family: 'Mochiy Pop One', sans-serif;
        }

        /* Cute Button Styling */
        .btn-kawaii {
            background-color: white;
            border: 3px solid var(--kawaii-pink);
            color: var(--kawaii-pink);
            border-radius: 9999px;
            padding: 0.5rem 1.5rem;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 4px 0 var(--kawaii-pink);
            cursor: pointer;
        }

        .btn-kawaii:hover {
            transform: translateY(-2px);
            background-color: #FFF0F5;
        }

        .btn-kawaii:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 var(--kawaii-pink);
        }

        .btn-kawaii.active {
            background-color: var(--kawaii-pink);
            color: white;
            box-shadow: 0 2px 0 #E08E89;
            transform: translateY(2px);
        }

        /* Simulation Container */
        #sim-container {
            background: white;
            border: 4px solid var(--kawaii-blue);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 8px 8px 0px rgba(162, 225, 219, 0.4);
        }

        /* Metal Ion Styling */
        .metal-ion {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            position: absolute;
            transition: transform 0.1s;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.1);
            user-select: none;
            z-index: 10;
        }

        .ion-face {
            font-size: 0.8em;
            pointer-events: none;
        }

        /* Electron Styling */
        .electron {
            width: 6px;
            height: 6px;
            background-color: #FFD700; /* Gold */
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 4px #FFD700;
            z-index: 5;
            pointer-events: none;
            transition: all 0.5s ease-out;
        }

        /* Animations */
        @keyframes vibrate {
            0% { transform: translate(0, 0); }
            25% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            75% { transform: translate(-1px, 1px); }
            100% { transform: translate(1px, -1px); }
        }

        @keyframes vibrate-heavy {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(3px, 3px) rotate(2deg); }
            50% { transform: translate(-3px, -3px) rotate(-2deg); }
            75% { transform: translate(-3px, 3px) rotate(2deg); }
            100% { transform: translate(3px, -3px) rotate(-2deg); }
        }

        .vibrating {
            animation: vibrate 0.5s infinite linear;
        }
        
        .vibrating-heavy {
            animation: vibrate-heavy 0.2s infinite linear;
        }

        /* Mascot Speech Bubble */
        .speech-bubble {
            position: relative;
            background: #ffffff;
            border-radius: .4em;
            padding: 15px;
            border: 3px solid var(--kawaii-purple);
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 0;
            height: 0;
            border: 20px solid transparent;
            border-top-color: var(--kawaii-purple);
            border-bottom: 0;
            border-left: 0;
            margin-left: -10px;
            margin-bottom: -20px;
        }

        /* Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            margin: 10px 0;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #FF6B6B;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 0 3px white, 0 0 0 6px #FF6B6B;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #FFD3D3;
            border-radius: 5px;
        }
        
        .state-solid { color: #4A90E2; font-weight: bold; }
        .state-liquid { color: #FF6B6B; font-weight: bold; }

    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
<a id="__backlink" href="../../chemistry.html" style="position:fixed;top:12px;left:12px;z-index:2147483647;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(15,23,42,.82);color:#fff;font:500 14px/1 system-ui,'Noto Sans HK',sans-serif;text-decoration:none;border-radius:9999px;box-shadow:0 2px 10px rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)">← 返回</a>

    <!-- Header -->
    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-5xl text-pink-500 mb-2 drop-shadow-sm">✨ 金屬熔點・可愛大百科 ✨</h1>
        <p class="text-gray-500 text-lg">觀察金屬離子大小與電子海，探索熔點的秘密！</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Control Panel -->
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-6 rounded-3xl border-4 border-pink-200 shadow-lg">
                <h2 class="text-xl text-center text-pink-400 mb-4 title-font">選擇金屬選手</h2>
                <div class="flex flex-col gap-3">
                    <button class="btn-kawaii active" onclick="selectMetal('K')">鉀 (K) - 第1族</button>
                    <button class="btn-kawaii" onclick="selectMetal('Mg')">鎂 (Mg) - 第2族</button>
                    <button class="btn-kawaii" onclick="selectMetal('Al')">鋁 (Al) - 第3族</button>
                    <button class="btn-kawaii" onclick="selectMetal('W')">鎢 (W) - 過渡金屬</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border-4 border-yellow-200 shadow-lg">
                <h2 class="text-xl text-center text-yellow-400 mb-4 title-font">加熱實驗室 🔥</h2>
                <div class="mb-2 flex justify-between text-sm font-bold">
                    <span>0°C</span>
                    <span id="temp-display" class="text-red-500 text-lg">25°C</span>
                    <span>4000°C</span>
                </div>
                <input type="range" id="temp-slider" min="0" max="4000" value="25" step="10">
                <div class="text-center mt-2">
                    狀態: <span id="state-display" class="state-solid">固體 (Solid)</span>
                </div>
                <button onclick="resetTemp()" class="mt-4 w-full text-sm text-gray-400 underline hover:text-gray-600">重置溫度</button>
            </div>
        </div>

        <!-- Center Simulation Area -->
        <div class="lg:col-span-6">
            <div id="sim-container" class="h-96 w-full relative bg-gray-50">
                <!-- Ions and Electrons will be injected here -->
                <div class="absolute top-2 right-2 bg-white/80 px-3 py-1 rounded-lg text-xs text-gray-500 z-20 pointer-events-none">
                    視窗倍率: x10,000,000
                </div>
            </div>
            
            <!-- Legend -->
            <div class="flex justify-center gap-6 mt-4 text-sm text-gray-600">
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 rounded-full bg-blue-400 border-2 border-white shadow"></div>
                    <span>金屬陽離子</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-yellow-400 shadow"></div>
                    <span>離域電子 (電子海)</span>
                </div>
            </div>
        </div>

        <!-- Right Info Panel -->
        <div class="lg:col-span-3 space-y-6">
            <!-- Stats Card -->
            <div class="bg-white p-5 rounded-3xl border-4 border-blue-200 shadow-lg relative overflow-hidden">
                <div class="absolute -right-4 -top-4 bg-blue-100 w-20 h-20 rounded-full opacity-50"></div>
                <h2 class="text-xl text-blue-400 mb-3 title-font border-b-2 border-blue-100 pb-2">📊 選手數值</h2>
                
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-400">熔點 (M.P.):</span>
                        <span id="info-mp" class="font-bold text-pink-500 text-lg">63 °C</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">離子電荷:</span>
                        <span id="info-charge" class="font-bold text-blue-500">+1</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">離域電子數:</span>
                        <span id="info-electrons" class="font-bold text-yellow-500">少 (1個/原子)</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">離子半徑:</span>
                        <span id="info-radius" class="font-bold text-green-500">大 (227 pm)</span>
                    </div>
                    <div class="mt-2 pt-2 border-t border-gray-100">
                        <span class="text-gray-400 block mb-1">金屬鍵強度:</span>
                        <div class="w-full bg-gray-200 rounded-full h-2.5">
                            <div id="strength-bar" class="bg-gradient-to-r from-blue-300 to-pink-400 h-2.5 rounded-full" style="width: 10%"></div>
                        </div>
                        <p id="strength-text" class="text-right text-xs mt-1 text-gray-500">非常弱</p>
                    </div>
                </div>
            </div>

            <!-- Mascot Explanation -->
            <div class="flex flex-col items-center">
                <div class="speech-bubble w-full mb-4 shadow-sm text-sm leading-relaxed text-gray-600">
                    <span id="mascot-text">
                        歡迎！我是化學醬 (Chem-chan)！<br>
                        請點擊左邊的金屬按鈕，我們來看看它們的原子有什麼不同吧！(◕‿◕)
                    </span>
                </div>
                <!-- Mascot Image (CSS Art / Emoji placeholder) -->
                <div class="w-24 h-24 bg-pink-100 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-5xl relative overflow-hidden">
                    <span id="mascot-face">👩‍🔬</span>
                </div>
                <div class="bg-white px-4 py-1 rounded-full text-xs font-bold text-pink-400 -mt-3 z-10 shadow border border-pink-100">
                    化學醬
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data for metals
        // Radius values are relative pixels for visualization, not exact pm scaling but proportional
        const metalData = {
            'K': {
                name: '鉀 (Potassium)',
                symbol: 'K',
                mp: 63,
                charge: 1,
                radius: 45, // Large
                electronCount: 1,
                color: '#A29BFE', // Purple-ish
                strength: 10,
                desc: '鉀離子很大(胖胖的)，而且每個原子只貢獻1個電子。正負電荷吸引力很弱，所以稍微加熱就熔化囉！(>_<)'
            },
            'Mg': {
                name: '鎂 (Magnesium)',
                symbol: 'Mg',
                mp: 650,
                charge: 2,
                radius: 35, // Medium
                electronCount: 2,
                color: '#74B9FF', // Blue-ish
                strength: 40,
                desc: '鎂離子變小了，而且帶+2電荷！電子海的電子變多了，吸力變強，熔點比鉀高很多呢！(•̀ᴗ•́)و'
            },
            'Al': {
                name: '鋁 (Aluminum)',
                symbol: 'Al',
                mp: 660,
                charge: 3,
                radius: 30, // Small-ish
                electronCount: 3,
                color: '#81ECEC', // Cyan-ish
                strength: 55,
                desc: '鋁有+3電荷和3個離域電子！雖然比鎂強，但因為結構排列關係，熔點跟鎂差不多。還算是強壯的金屬喔！'
            },
            'W': {
                name: '鎢 (Tungsten)',
                symbol: 'W',
                mp: 3422,
                charge: 6, // Simplified for high charge density
                radius: 28, // Small
                electronCount: 6, // Representing many d-electrons
                color: '#636E72', // Grey
                strength: 100,
                desc: '哇！鎢是過渡金屬，有非常多離域電子參與鍵結，離子又小又密。這可是超級強的金屬鍵，超難熔化！(🔥Д🔥)'
            }
        };

        let currentMetal = 'K';
        let currentTemp = 25;
        let ions = [];
        let electrons = [];
        let animationFrameId;

        const container = document.getElementById('sim-container');
        const tempSlider = document.getElementById('temp-slider');
        const tempDisplay = document.getElementById('temp-display');
        const stateDisplay = document.getElementById('state-display');

        // Init
        window.onload = () => {
            selectMetal('K');
            animate();
        };

        // Event Listeners
        tempSlider.addEventListener('input', (e) => {
            currentTemp = parseInt(e.target.value);
            updateTemperatureEffects();
        });

        function resetTemp() {
            currentTemp = 25;
            tempSlider.value = 25;
            updateTemperatureEffects();
        }

        function selectMetal(metalKey) {
            currentMetal = metalKey;
            const data = metalData[metalKey];

            // Update UI Buttons
            document.querySelectorAll('.btn-kawaii').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.includes(data.symbol)) btn.classList.add('active');
            });

            // Update Info Panel
            document.getElementById('info-mp').innerText = `${data.mp} °C`;
            document.getElementById('info-charge').innerText = `+${data.charge}`;
            document.getElementById('info-electrons').innerText = data.electronCount > 3 ? "超多 (d電子參與)" : `${data.electronCount}個/原子`;
            document.getElementById('info-radius').innerText = data.radius > 40 ? "大 (胖胖的)" : (data.radius < 30 ? "小 (緊密的)" : "中等");
            document.getElementById('strength-bar').style.width = `${data.strength}%`;
            
            let strengthText = "弱";
            if(data.strength > 30) strengthText = "中等";
            if(data.strength > 50) strengthText = "強";
            if(data.strength > 80) strengthText = "超級強";
            document.getElementById('strength-text').innerText = strengthText;

            // Mascot Text
            document.getElementById('mascot-text').innerText = data.desc;
            document.getElementById('mascot-face').innerText = data.strength > 80 ? '😎' : (data.strength < 20 ? '🥺' : '👩‍🔬');

            resetTemp();
            createSimulation(data);
        }

        function createSimulation(data) {
            container.innerHTML = ''; // Clear
            // Add zoom label back
            const zoomLabel = document.createElement('div');
            zoomLabel.className = 'absolute top-2 right-2 bg-white/80 px-3 py-1 rounded-lg text-xs text-gray-500 z-20 pointer-events-none';
            zoomLabel.innerText = '視窗倍率: x10,000,000';
            container.appendChild(zoomLabel);

            ions = [];
            electrons = [];

            const rows = 4;
            const cols = 6;
            const startX = 50;
            const startY = 50;
            const gap = data.radius * 2 + 10; // Spacing based on size

            // Create Ions
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const ion = document.createElement('div');
                    ion.className = 'metal-ion shadow-md';
                    ion.style.width = `${data.radius * 2}px`;
                    ion.style.height = `${data.radius * 2}px`;
                    ion.style.backgroundColor = data.color;
                    ion.innerHTML = `<span class="ion-face text-white opacity-80">${getFace(data.charge)}</span><span class="absolute text-xs bottom-1 font-mono opacity-50">${data.charge}+</span>`;
                    
                    // Initial Grid Position
                    const posX = startX + c * gap;
                    const posY = startY + r * gap;
                    
                    ion.style.left = `${posX}px`;
                    ion.style.top = `${posY}px`;

                    container.appendChild(ion);
                    
                    ions.push({
                        element: ion,
                        baseX: posX,
                        baseY: posY,
                        x: posX,
                        y: posY,
                        vx: 0,
                        vy: 0,
                        isLiquid: false
                    });

                    // Create Electrons for this ion
                    for(let e=0; e<data.electronCount; e++) {
                        createElectron(posX, posY, data.radius);
                    }
                }
            }
        }

        function createElectron(x, y, radius) {
            const el = document.createElement('div');
            el.className = 'electron';
            // Random start pos near the ion
            const offsetX = (Math.random() - 0.5) * radius * 2.5;
            const offsetY = (Math.random() - 0.5) * radius * 2.5;
            
            el.style.left = `${x + radius + offsetX}px`;
            el.style.top = `${y + radius + offsetY}px`;
            
            container.appendChild(el);
            
            electrons.push({
                element: el,
                x: x + radius + offsetX,
                y: y + radius + offsetY,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4
            });
        }

        function getFace(charge) {
            if(charge >= 4) return '(`皿´)';
            if(charge === 3) return '(•̀ᴗ•́)';
            if(charge === 2) return '(・ω・)';
            return '(^o^)';
        }

        function updateTemperatureEffects() {
            const data = metalData[currentMetal];
            tempDisplay.innerText = `${currentTemp}°C`;

            const isMelting = currentTemp >= data.mp;

            // UI Update
            if (isMelting) {
                stateDisplay.innerText = "液體 (Liquid)";
                stateDisplay.className = "state-liquid";
                document.getElementById('mascot-face').innerText = '🫠';
                document.getElementById('mascot-text').innerText = `哎呀！溫度達到 ${currentTemp}°C，超過熔點了！金屬鍵斷裂，離子開始自由流動變成液體了！`;
                
                // Add red tint to background based on temp
                const heatIntensity = Math.min((currentTemp - data.mp) / 1000, 0.5);
                container.style.backgroundColor = `rgba(255, 100, 100, ${heatIntensity})`;
            } else {
                stateDisplay.innerText = "固體 (Solid)";
                stateDisplay.className = "state-solid";
                container.style.backgroundColor = '#f9fafb'; // Reset
                
                // Restore mascot if temp drops
                if(document.getElementById('mascot-face').innerText === '🫠') {
                    document.getElementById('mascot-face').innerText = '👩‍🔬';
                    document.getElementById('mascot-text').innerText = data.desc;
                }
            }
        }

        function animate() {
            const data = metalData[currentMetal];
            const isMelting = currentTemp >= data.mp;
            
            // Calculate vibration/movement speed based on temperature
            // Base vibration
            let vibration = (currentTemp / 4000) * 3; 
            if (vibration < 0.5) vibration = 0.5;

            // 1. Animate Ions
            ions.forEach(ion => {
                if (isMelting) {
                    // Liquid State: Random walk logic (Brownian motion-ish)
                    // Move away from base grid slightly
                    ion.vx += (Math.random() - 0.5) * 0.5;
                    ion.vy += (Math.random() - 0.5) * 0.5;
                    
                    // Dampening
                    ion.vx *= 0.95;
                    ion.vy *= 0.95;
                    
                    // Gravity-ish (sink to bottom slightly if very hot liquid)
                    if(currentTemp > data.mp + 500) ion.vy += 0.05;

                    ion.x += ion.vx;
                    ion.y += ion.vy;

                    // Boundaries
                    if(ion.x < 0 || ion.x > container.offsetWidth - 60) ion.vx *= -1;
                    if(ion.y < 0 || ion.y > container.offsetHeight - 60) ion.vy *= -1;

                } else {
                    // Solid State: Vibrate around base position
                    // Higher temp = larger vibration radius
                    const shakeX = (Math.random() - 0.5) * vibration * 5;
                    const shakeY = (Math.random() - 0.5) * vibration * 5;
                    
                    // Lerp back to grid position
                    ion.x = ion.baseX + shakeX;
                    ion.y = ion.baseY + shakeY;
                }

                ion.element.style.transform = `translate(${ion.x - ion.baseX}px, ${ion.y - ion.baseY}px)`;
            });

            // 2. Animate Electrons (Sea of electrons)
            // They always move, but move faster at higher temps
            const electronSpeed = 2 + (currentTemp / 1000);

            electrons.forEach(e => {
                e.x += e.vx * (electronSpeed/2);
                e.y += e.vy * (electronSpeed/2);

                // Boundaries (bounce)
                if(e.x < 0 || e.x > container.offsetWidth) e.vx *= -1;
                if(e.y < 0 || e.y > container.offsetHeight) e.vy *= -1;

                // Random direction change occasionally
                if(Math.random() < 0.05) {
                    e.vx = (Math.random() - 0.5) * 4;
                    e.vy = (Math.random() - 0.5) * 4;
                }

                e.element.style.left = `${e.x}px`;
                e.element.style.top = `${e.y}px`;
            });

            requestAnimationFrame(animate);
        }

    </script>
</body>
