<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->

    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #fff0f5; /* Lavender Blush */
            background-image: radial-gradient(#ffc1e3 20%, transparent 20%),
                              radial-gradient(#ffc1e3 20%, transparent 20%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            color: #4a4a4a;
        }

        .kawaii-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            border: 4px solid #ffb7b2;
            box-shadow: 8px 8px 0px #ffdac1;
            transition: transform 0.2s;
        }

        .kawaii-btn {
            background-color: #ff9aa2;
            color: white;
            border-radius: 50px;
            border: 3px solid white;
            box-shadow: 4px 4px 0px #e2f0cb;
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
        }

        .kawaii-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #e2f0cb;
            background-color: #ffb7b2;
        }

        .kawaii-btn:active {
            transform: translateY(2px);
            box-shadow: 0px 0px 0px #e2f0cb;
        }

        .kawaii-btn:disabled {
            background-color: #e5e7eb;
            border-color: #d1d5db;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .input-kawaii {
            border: 2px solid #b5ead7;
            border-radius: 15px;
            padding: 8px 15px;
            outline: none;
            color: #555;
            transition: border-color 0.3s;
        }

        .input-kawaii:focus {
            border-color: #ff9aa2;
        }

        .input-kawaii:disabled {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }

        .liquid {
            transition: height 1s ease-in-out, background-color 0.5s;
        }

        .thermometer-inner {
            transition: height 0.5s ease-out; /* Smoother transition for loop */
        }

        /* Speech Bubble */
        .speech-bubble {
            position: relative;
            background: #ffffff;
            border-radius: .4em;
            border: 3px solid #ff9aa2;
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-right-color: #ff9aa2;
            border-left: 0;
            border-top: 0;
            margin-top: -5px;
            margin-left: -10px;
        }
        
        .result-step {
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.5s forwards;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            border: 1px dashed #b5ead7;
            margin-bottom: 8px;
        }

        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Superscript and Subscript styling fixes */
        sub, sup {
            font-size: 75%;
            line-height: 0;
            position: relative;
            vertical-align: baseline;
        }
        sup { top: -0.5em; }
        sub { bottom: -0.25em; }
    </style>
</head>

                    </label>
                    <select id="base-type" class="w-full input-kawaii mb-2 bg-white setup-input">
                        <option value="NaOH">NaOH (氫氧化鈉)</option>
                        <option value="KOH">KOH (氫氧化鉀)</option>
                    </select>
                    <div class="flex gap-2">
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">濃度 (M)</label>
                            <input type="number" id="base-conc" value="1.0" min="0.5" max="2.0" step="0.1" class="w-full input-kawaii text-center setup-input">
                        </div>
                        <div class="w-1/2">
                            <label class="text-xs text-gray-500">體積 (cm³)</label>
                            <input type="number" id="base-vol" value="50" min="20" max="100" step="10" class="w-full input-kawaii text-center setup-input">

                <button onclick="resetExperiment()" id="reset-btn" class="kawaii-btn w-full py-3 text-lg mt-2 hidden bg-blue-300">

        <!-- Right Panel: Visualization & Results -->
        <div class="w-full md:w-2/3 flex flex-col gap-4">
            
            <!-- Visualization Card -->
            <div class="kawaii-card p-6 min-h-[300px] flex flex-col justify-center items-center relative overflow-hidden bg-white">

                        <div class="absolute top-12 left-0 w-full border-b border-gray-300 h-1"></div>
                        <div class="absolute top-20 left-0 w-full border-b border-gray-300 h-1"></div>
                        
                        <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-4 bg-red-500 rounded-b-full thermometer-inner" style="height: 20%;" id="thermometer-level"></div>
                        <div class="absolute -right-24 bottom-1/2 text-2xl font-bold text-red-500 bg-white px-2 py-1 rounded border-2 border-red-100" id="temp-display">25.0°C</div>
                    </div>

                    <!-- Beaker -->
                    <div class="relative w-40 h-40 border-b-4 border-l-4 border-r-4 border-gray-400 rounded-b-xl flex justify-center items-end bg-white">
                        <!-- Stirrer -->
                        <div id="stirrer" class="hidden absolute h-32 w-2 bg-gray-300 rounded top-[-20px] left-1/2 origin-top animate-spin" style="animation-duration: 0.5s; animation-direction: alternate; transform-origin: top center;"></div>
                        
                        <div id="liquid" class="w-full bg-blue-300 opacity-50 rounded-b-lg liquid" style="height: 0%;"></div>

            <!-- Analysis Section (Hidden initially) -->
            <div id="analysis-section" class="kawaii-card p-5 hidden">
                <h2 class="text-xl font-bold text-purple-500 mb-3 border-b border-purple-100 pb-2">
                    <i class="fa-solid fa-calculator"></i> 數據記錄
                </h2>
                
                <div class="grid grid-cols-3 gap-2 text-center mb-6">

                        <div class="text-lg font-bold text-blue-600">25.0°C</div>
                    </div>
                    <div class="bg-red-50 p-2 rounded-lg border border-red-100">

                    </div>
                    <div class="bg-green-50 p-2 rounded-lg border border-green-100">
                        <div class="text-xs text-gray-500 font-bold">溫升 (ΔT)</div>
                        <div class="text-lg font-bold text-green-600" id="delta-temp-val">--</div>

                </div>

                <div class="bg-yellow-50 p-4 rounded-xl border-2 border-yellow-200 mb-4">
                    <p class="text-sm text-gray-600 mb-3 leading-relaxed">
                        <i class="fa-regular fa-lightbulb text-yellow-500"></i> 
                        請計算中和焓變 (Enthalpy Change of Neutralization)。<br>
                        <span class="text-xs text-gray-500 bg-white px-1 rounded border border-gray-200 inline-block mt-1">
                            提示: c = 4.2 J g⁻¹ K⁻¹, 密度 = 1.0 g cm⁻³
                        </span>
                    </p>
                    <div class="flex flex-wrap items-center gap-2 justify-center bg-white p-3 rounded-lg shadow-sm">
                        <label class="font-bold text-gray-700 text-lg">ΔH = </label>

                        <span class="font-bold text-gray-700">kJ mol⁻¹</span>
                        <button onclick="checkAnswer()" class="kawaii-btn px-6 py-2 text-sm ml-2">檢查答案</button>

            </div>

             <!-- Tutorial Section (Hidden initially) -->
             <div id="tutorial-section" class="hidden">
                <!-- Content injected via JS -->
             </div>

        </div>
    </div>

    <script>
        // Game State
        let experimentState = {
            acid: { type: 'HCl', c: 1, v: 50 },
            base: { type: 'NaOH', c: 1, v: 50 },
            finalTemp: 0,
            deltaT: 0,
            molesWater: 0,
            heatQ: 0, // In Joules, rounded
            totalMass: 0,
            correctDeltaH: 0 // In kJ/mol, calculated from rounded T
        };

        const mascot = document.getElementById('mascot-text');

        function updateMascot(text) {
            mascot.innerHTML = text;
        }

        function startExperiment() {
            // Get inputs
            const acidType = document.getElementById('acid-type').value;
            const acidC = parseFloat(document.getElementById('acid-conc').value);
            const acidV = parseFloat(document.getElementById('acid-vol').value);
            
            const baseType = document.getElementById('base-type').value;
            const baseC = parseFloat(document.getElementById('base-conc').value);
            const baseV = parseFloat(document.getElementById('base-vol').value);

            // Validation
            if(acidV <= 0 || baseV <= 0 || acidC <= 0 || baseC <= 0 || isNaN(acidV) || isNaN(baseV) || isNaN(acidC) || isNaN(baseC)) {
                updateMascot("哎呀！數值不能是零、負數或空白喔！<br>請檢查一下設定。");
                return;
            }

            // Lock ONLY Setup inputs, NOT the answer input
            // 修正：只鎖定有 setup-input class 的元素
            document.querySelectorAll('.setup-input').forEach(el => el.disabled = true);
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('reset-btn').classList.remove('hidden');
            
            // Clear previous results
            document.getElementById('student-answer').value = "";
            document.getElementById('feedback-msg').innerHTML = "";
            document.getElementById('tutorial-section').classList.add('hidden');

            // --- Chemistry Logic ---
            
            // 1. Calculate Moles
            const molAcid = acidC * (acidV / 1000);
            const molBase = baseC * (baseV / 1000);
            
            // Assuming monobasic strong acid/base reaction (1:1 stoichiometry)
            // H+ + OH- -> H2O
            const molWater = Math.min(molAcid, molBase);
            
            // 2. Theoretical Heat (Q)
            // Standard Enthalpy of Neutralization approx -57.3 kJ/mol
            // We use 57300 J/mol.
            const standardEnthalpyJ = 57300; 
            const theoreticalQ = molWater * standardEnthalpyJ; // Joules

            // 3. Total Mass (assume density = 1 g/cm3)
            const totalMass = acidV + baseV; // grams
            const c = 4.2; // J g-1 K-1

            // 4. Calculate Delta T (Theoretical)
            // Q = mcΔT  => ΔT = Q / mc
            let rawDeltaT = theoreticalQ / (totalMass * c);
            
            // 5. Simulate "Measured" Data (Round to 1 decimal place like a real thermometer)
            // IMPORTANT: Students must calculate based on the DISPLAYED temperature.
            const displayDeltaT = parseFloat(rawDeltaT.toFixed(1));
            const displayFinalTemp = 25.0 + displayDeltaT;

            // 6. Back-calculate "Correct Answer" based on the displayed (rounded) Delta T
            // This ensures if student follows formula, they get it "Right".
            const calculatedQ = totalMass * c * displayDeltaT; // Joules
            const calculatedDeltaH = -(calculatedQ / molWater) / 1000; // kJ/mol (Negative for Exothermic)

            // Store state
            experimentState = {
                acid: { type: acidType, c: acidC, v: acidV },
                base: { type: baseType, c: baseC, v: baseV },
                finalTemp: displayFinalTemp,
                deltaT: displayDeltaT,
                molesWater: molWater,
                heatQ: calculatedQ,
                totalMass: totalMass,
                correctDeltaH: calculatedDeltaH
            };

            // --- Animation Sequence ---
            updateMascot("實驗開始！混合酸和鹼...<br>觀察溫度計的變化！");
            
            // 1. Pouring animation (Liquid rises)
            const liquid = document.getElementById('liquid');
            liquid.style.height = "80%";
            liquid.style.backgroundColor = "#d8b4fe"; // Light Purple for mixture
            document.getElementById('beaker-label').innerText = "混合溶液";

            // 2. Add sparkles
            createSparkles();

            // 3. Temp rise animation
            setTimeout(() => {
                // Visual height logic (20% is base, max 95%)
                // Scale: let's say 20 deg rise = max height
                const tempHeightPercent = 20 + (displayDeltaT * 3); 
                document.getElementById('thermometer-level').style.height = `${Math.min(tempHeightPercent, 95)}%`;
                
                // Count up text
                let currentT = 25.0;
                const interval = setInterval(() => {
                    currentT += 0.1;
                    if(currentT >= experimentState.finalTemp) {
                        currentT = experimentState.finalTemp;
                        clearInterval(interval);
                        finishExperiment();
                    }
                    document.getElementById('temp-display').innerText = currentT.toFixed(1) + "°C";
                }, 40); // speed of counting

            }, 800);
        }

        function createSparkles() {
            const container = document.getElementById('sparkles');
            container.innerHTML = '';
            for(let i=0; i<8; i++) {
                const span = document.createElement('span');
                span.innerHTML = '<i class="fa-solid fa-star text-yellow-300"></i>';
                span.style.position = 'absolute';
                span.style.left = Math.random() * 80 + 10 + '%';
                span.style.top = Math.random() * 80 + 10 + '%';
                span.style.fontSize = Math.random() * 10 + 10 + 'px';
                span.style.opacity = 0;
                span.style.animation = `popIn 0.5s ${Math.random()}s forwards`;
                container.appendChild(span);
            }
        }

        function finishExperiment() {
            updateMascot("反應完成！<br>溫度明顯上升了呢！是放熱反應喔。");
            
            const analysis = document.getElementById('analysis-section');
            analysis.classList.remove('hidden');
            
            // Update Data Display
            document.getElementById('final-temp-val').innerText = experimentState.finalTemp.toFixed(1) + "°C";
            document.getElementById('delta-temp-val').innerText = experimentState.deltaT.toFixed(1) + "°C";

            // Scroll to analysis
            analysis.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Ensure answer input is NOT disabled
            document.getElementById('student-answer').disabled = false;
        }

        function checkAnswer() {
            const studentInput = document.getElementById('student-answer');
            const studentVal = parseFloat(studentInput.value);
            const correctVal = experimentState.correctDeltaH;
            const feedback = document.getElementById('feedback-msg');
            
            if(isNaN(studentVal)) {
                feedback.innerHTML = "<span class='text-red-500 bg-red-100 px-2 py-1 rounded'>請輸入數字喔！</span>";
                return;
            }

            // Margin of error: +/- 2 kJ/mol (generous for student inputs)
            const margin = 2.0; 
            const isCorrect = Math.abs(studentVal - correctVal) <= margin;

            document.getElementById('tutorial-section').classList.remove('hidden');
            
            if (isCorrect) {
                updateMascot("太棒了！答對了！<br>你已經掌握了中和焓變的計算！✨");
                feedback.innerHTML = `<span class='text-green-600 bg-green-100 px-3 py-1 rounded shadow-sm text-lg'><i class="fa-solid fa-circle-check"></i> 很好！標準答案約為 ${correctVal.toFixed(1)} kJ mol⁻¹</span>`;
                studentInput.style.borderColor = "#4ade80";
                confettiEffect();
                renderTutorial(true);
            } else {
                updateMascot("嗯...好像有點差距。<br>看看下面的計算步驟，再試一次吧！💪");
                feedback.innerHTML = `<span class='text-orange-500 bg-orange-100 px-3 py-1 rounded shadow-sm'><i class="fa-solid fa-circle-xmark"></i> 差了一點點。正確答案約為 ${correctVal.toFixed(1)} kJ mol⁻¹</span>`;
                studentInput.style.borderColor = "#fb923c";
                renderTutorial(false);
            }
        }

        function renderTutorial(isCorrect) {
            const acidV = experimentState.acid.v;
            const baseV = experimentState.base.v;
            const totalV = acidV + baseV;
            const moles = experimentState.molesWater;
            const heatQ = experimentState.heatQ; // Rounded J based on rounded T
            
            const html = `
                <div class="kawaii-card p-5 mt-4 bg-white border-dashed border-4 border-pink-200">
                    <h3 class="text-lg font-bold text-pink-500 mb-3 text-center">🎓 燒杯醬的計算小教室</h3>
                    
                    <div class="space-y-4 text-gray-700 text-sm md:text-base">
                        
                        <div class="result-step" style="animation-delay: 0.1s">
                            <h4 class="font-bold text-blue-500 mb-1"><i class="fa-solid fa-1"></i> 計算釋放的能量 (Q)</h4>
                            <div class="pl-2 border-l-4 border-blue-200">
                                <p>公式：Q = m × c × ΔT</p>
                                <p>• m (總質量) ≈ 體積總和 = ${acidV} + ${baseV} = ${totalV} g</p>
                                <p>• c (比熱容量) = 4.2 J g⁻¹ K⁻¹</p>
                                <p>• ΔT (溫升) = ${experimentState.deltaT.toFixed(1)} °C</p>
                                <p class="mt-1 font-bold bg-blue-50 p-1 rounded">
                                    Q = ${totalV} × 4.2 × ${experimentState.deltaT.toFixed(1)} = ${heatQ.toFixed(0)} J
                                </p>
                            </div>
                        </div>

                        <div class="result-step" style="animation-delay: 0.3s">
                            <h4 class="font-bold text-purple-500 mb-1"><i class="fa-solid fa-2"></i> 計算生成水的摩爾數 (n)</h4>
                            <div class="pl-2 border-l-4 border-purple-200">
                                <p>• 酸摩爾數 = ${experimentState.acid.c} × (${acidV}/1000) = ${(experimentState.acid.c * acidV/1000).toFixed(3)} mol</p>
                                <p>• 鹼摩爾數 = ${experimentState.base.c} × (${baseV}/1000) = ${(experimentState.base.c * baseV/1000).toFixed(3)} mol</p>
                                <p class="text-xs text-gray-500 mt-1">* 兩者反應比例為 1:1，取較小值為限量試劑。</p>
                                <p class="mt-1 font-bold bg-purple-50 p-1 rounded">
                                    n = ${moles.toFixed(3)} mol
                                </p>
                            </div>
                        </div>

                        <div class="result-step" style="animation-delay: 0.5s">
                            <h4 class="font-bold text-pink-500 mb-1"><i class="fa-solid fa-3"></i> 計算中和焓變 (ΔH)</h4>
                            <div class="pl-2 border-l-4 border-pink-200">
                                <p>公式：ΔH = -Q / n <span class="text-xs text-red-400">(放熱反應加負號)</span></p>
                                <p>• 將 Q 換算為 kJ: ${heatQ.toFixed(0)} J = ${(heatQ/1000).toFixed(3)} kJ</p>
                                <p>• ΔH = -${(heatQ/1000).toFixed(3)} / ${moles.toFixed(3)}</p>
                                <p class="mt-2 text-xl font-bold text-pink-600 bg-pink-50 p-2 rounded text-center shadow">
                                    ΔH ≈ ${experimentState.correctDeltaH.toFixed(1)} kJ mol⁻¹
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            const tutorialSection = document.getElementById('tutorial-section');
            tutorialSection.innerHTML = html;
            tutorialSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetExperiment() {
            // Reset UI Visuals
            document.getElementById('liquid').style.height = "0%";
            document.getElementById('temp-display').innerText = "25.0°C";
            document.getElementById('thermometer-level').style.height = "20%";
            document.getElementById('beaker-label').innerText = "空量熱器";
            
            // Reset Buttons & Sections
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('reset-btn').classList.add('hidden');
            document.getElementById('analysis-section').classList.add('hidden');
            document.getElementById('tutorial-section').classList.add('hidden');
            
            // Clear Inputs
            document.getElementById('student-answer').value = "";
            document.getElementById('student-answer').style.borderColor = "#b5ead7";
            document.getElementById('feedback-msg').innerHTML = "";

            // Unlock Setup Inputs
            document.querySelectorAll('.setup-input').forEach(el => el.disabled = false);
            
            updateMascot("實驗已重置！<br>試試看不同的濃度或體積吧？");
        }

        function confettiEffect() {
            const colors = ['#ff9aa2', '#b5ead7', '#c7ceea', '#ffdac1'];
            for(let i=0; i<40; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.width = Math.random() * 10 + 5 + 'px';
                conf.style.height = Math.random() * 10 + 5 + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.transition = 'top 3s ease-in, transform 3s linear';
                conf.style.zIndex = 9999;
                conf.style.borderRadius = '50%'; // round confetti
                document.body.appendChild(conf);

                // Trigger animation next frame
                requestAnimationFrame(() => {
                    conf.style.top = '110vh';
                    conf.style.transform = `rotate(${Math.random()*720}deg) translateX(${Math.random()*100 - 50}px)`;
                });

                setTimeout(() => conf.remove(), 3000);
            }
        }
    </script>
</body>
</html>
