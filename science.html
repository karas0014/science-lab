<style>
 :root{color-scheme:light dark}
 html{scroll-behavior:smooth}
 body{font-family:'Noto Sans HK',sans-serif;background:#f8fafc;line-height:1.6;-webkit-font-smoothing:antialiased}
 body.dark{background:#0b1120}
 .serif-font{font-family:'Noto Serif HK',serif}
 .page-bg{background-image:radial-gradient(55rem 55rem at 12% -10%, rgba(79,70,229,.10), transparent 60%),radial-gradient(45rem 45rem at 100% 0%, rgba(15,23,42,.05), transparent 55%)}
 .dark .page-bg{background-image:radial-gradient(55rem 55rem at 12% -10%, rgba(99,102,241,.16), transparent 60%),radial-gradient(45rem 45rem at 100% 0%, rgba(255,255,255,.04), transparent 55%)}
 @media (prefers-reduced-motion: no-preference){
   #grid>*{opacity:0;animation:tileIn .5s cubic-bezier(.22,.68,.28,1) both}
   #grid>*:nth-child(1){animation-delay:.04s}#grid>*:nth-child(2){animation-delay:.08s}
   #grid>*:nth-child(3){animation-delay:.12s}#grid>*:nth-child(4){animation-delay:.16s}
   #grid>*:nth-child(5){animation-delay:.20s}#grid>*:nth-child(6){animation-delay:.24s}
   #grid>*:nth-child(7){animation-delay:.28s}#grid>*:nth-child(8){animation-delay:.32s}
 }
 @keyframes tileIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
 ::-webkit-scrollbar{width:10px}
 ::-webkit-scrollbar-track{background:#eef2f7}.dark ::-webkit-scrollbar-track{background:#0f172a}
 ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px;border:2px solid #eef2f7}.dark ::-webkit-scrollbar-thumb{background:#475569;border-color:#0f172a}

<script>

 const pages = [
            { t: '串聯與並聯電路設計', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E4%B8%B2%E8%81%AF%E8%88%87%E4%B8%A6%E8%81%AF%E9%9B%BB%E8%B7%AF%E8%A8%AD%E8%A8%88.html' },
            { t: '物質的三態變化', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E7%89%A9%E8%B3%AA%E7%9A%84%E4%B8%89%E6%85%8B%E8%AE%8A%E5%8C%96.html' },
            { t: '進階電路實驗台', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E9%80%B2%E9%9A%8E%E9%9B%BB%E8%B7%AF%E5%AF%A6%E9%A9%97%E5%8F%B0.html' },
            { t: '天體運行與四季成因模型', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E5%A4%A9%E9%AB%94%E9%81%8B%E8%A1%8C%E8%88%87%E5%9B%9B%E5%AD%A3%E6%88%90%E5%9B%A0%E6%A8%A1%E5%9E%8B.html' },
            { t: '蝕相觀測模擬器', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E8%9D%95%E7%9B%B8%E8%A7%80%E6%B8%AC%E6%A8%A1%E6%93%AC%E5%99%A8.html' },
            { t: '過山車能量守恆', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E9%81%8E%E5%B1%B1%E8%BB%8A%E8%83%BD%E9%87%8F%E5%AE%88%E6%81%86.html' },
            { t: '探究電路模擬器', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E6%8E%A2%E7%A9%B6%E9%9B%BB%E8%B7%AF%E6%A8%A1%E6%93%AC%E5%99%A8.html' },
            { t: '反射與全內反射模擬器', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E5%8F%8D%E5%B0%84%E8%88%87%E5%85%A8%E5%85%A7%E5%8F%8D%E5%B0%84%E6%A8%A1%E6%93%AC%E5%99%A8.html' },
 ];
</script>

<div class="min-h-screen page-bg flex flex-col text-slate-800 dark:text-slate-200 transition-colors duration-300">
  <nav class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50 border-b border-slate-200/80 dark:border-slate-800/80">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16">
      <div class="flex items-center gap-3">
        <span style="display:inline-flex;background:#fff;border-radius:10px;padding:4px 6px;box-shadow:0 1px 4px rgba(0,0,0,.15)"><img src="assets/logo.png" alt="曾璧山(崇蘭)中學校徽" style="height:38px;width:auto;display:block"></span>
        <div class="flex flex-col">
          <h1 class="text-sm sm:text-base font-bold text-slate-900 dark:text-white leading-tight">曾璧山(崇蘭)中學</h1>
          <span class="text-xs text-indigo-600 dark:text-indigo-400 font-semibold tracking-wide">綜合科學探究實驗室</span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <a href="index.html" aria-label="返回主頁" class="inline-flex items-center gap-1.5 px-3 py-2 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 text-sm font-medium text-slate-700 dark:text-slate-200 transition-colors">
          <i data-lucide="home" width="16" height="16"></i><span>主頁</span>

        <button onclick="toggleTheme()" aria-label="切換深淺色模式" class="p-2.5 rounded-full text-slate-500 hover:text-slate-900 hover:bg-slate-100 dark:text-slate-400 dark:hover:text-white dark:hover:bg-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 transition-colors" title="切換深淺色模式">
          <span id="tw"><i data-lucide="sun" width="20" height="20"></i></span>
        </button>
      </div>
    </div></div>
  </nav>

  <header class="relative overflow-hidden pt-12 pb-10 px-4 text-center">
    <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 -top-24 -z-10 flex justify-center">
      <div class="h-72 w-[42rem] max-w-full rounded-full bg-indigo-400/20 dark:bg-indigo-500/12 blur-3xl"></div>
    </div>
    <div class="max-w-3xl mx-auto">
      <div class="inline-flex items-center gap-2 mb-5 px-3 py-1.5 rounded-full border border-indigo-200/70 dark:border-indigo-800/60 bg-white/70 dark:bg-indigo-900/20 backdrop-blur-sm text-indigo-700 dark:text-indigo-300 text-xs font-bold tracking-wider uppercase shadow-sm">
        <i data-lucide="rocket" width="15" height="15"></i>Integrated Science Inquiry Lab
      </div>
      <h2 class="text-3xl sm:text-5xl font-bold text-slate-900 dark:text-white serif-font mb-4 tracking-tight leading-[1.15]">綜合科學探究實驗室</h2>
      <p class="text-slate-600 dark:text-slate-300 text-sm sm:text-base" id="subtitle"></p>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16 w-full">
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <footer class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-sm border-t border-slate-200 dark:border-slate-800 mt-auto py-6">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-slate-500 dark:text-slate-400 text-sm">&copy; <span id="yr"></span> 曾璧山(崇蘭)中學 &nbsp;·&nbsp; Designed with cntang</p>
    </div>
  </footer>
</div>

<script>
 let isDark=true;
 const A=SUBJECT.accent;
 const DEFAULT_ICON = SUBJECT.icon;
 function pickIcon(t){
   const map=[
     // ---- 物理：電磁 ----
     ['電磁感應','radio'],['電磁波','radio'],['螺線管','magnet'],['磁棒','magnet'],['磁場','magnet'],['磁','magnet'],
     ['電路','circuit-board'],['電動機','cog'],['電解','plug-zap'],['燃料電池','battery-charging'],['電池','battery-charging'],
     ['導電','zap'],['直流電','zap'],['電子流動','zap'],['電場','zap'],['庫倫','zap'],['電','zap'],
     // ---- 波動與光學 ----
     ['干涉','waves'],['疊加','waves'],['縱波','waves'],['橫波','waves'],['波','waves'],
     ['透鏡','glasses'],['折射','glasses'],['全內反射','glasses'],['反射','glasses'],['矯視','glasses'],['衍射','glasses'],['雙縫','glasses'],
     ['光電','sun-medium'],['發光','lightbulb'],['led','lightbulb'],['光學','glasses'],['光','sun'],
     // ---- 力學與能量 ----
     ['摩擦','move'],['牛頓','move'],['碰撞','move'],['拋體','move'],['升降機','move'],['直升機','plane'],
     ['能量守恆','battery-charging'],['過山車','activity'],['單擺','activity'],['能量','battery-charging'],['力','move'],
     ['萬有引力','orbit'],['圓周','orbit'],['太陽系','orbit'],['天體','globe'],['四季','globe'],
     ['火箭','rocket'],['升空','rocket'],['太陽能','sun'],['冷氣','snowflake'],
     ['放射性','radiation'],['衰變','radiation'],['量子','atom'],
     ['距離','ruler'],['位移','ruler'],['運動線圖','trending-up'],['弗林明','hand'],['定則','hand'],
     // ---- 物態與氣體 ----
     ['三態','droplets'],['氣體','wind'],['分子','wind'],['物質','droplets'],
     // ---- 化學 ----
     ['滴定','test-tube-diagonal'],['中和焓','thermometer'],['中和','test-tube-diagonal'],['酸鹼','test-tube'],
     ['焰色','flame'],['原油','fuel'],['分餾','fuel'],['碳酸','flask-conical'],['石墨','hexagon'],
     ['離子鍵','link'],['共價鍵','link'],['對映異構','flip-horizontal'],['碘時鐘','timer'],
     ['金屬','gem'],['熔點','thermometer'],['海鹽','droplets'],['海水','waves'],['反應','flask-conical'],
     // ---- 生物 ----
     ['細胞膜','circle-dot'],['細胞','circle-dot'],['光合','sprout'],['蒸騰','droplets'],
     ['遺傳','dna'],['dna','dna'],['顯微鏡','microscope'],['食物','utensils'],['熱量','flame'],
     ['自然選擇','bird'],['植物','leaf'],['摘星','sprout'],
     // ---- 綜合科學 ----
     ['串聯','circuit-board'],['並聯','circuit-board'],['蝕相','moon'],
     // ---- ICT ----
     ['程式','code'],['scratch','code'],['數據','database'],['計算','cpu'],['多媒體','clapperboard'],['網頁','globe']
   ];
   map.sort((a,b)=>b[0].length-a[0].length); // 最長（最具體）關鍵字優先
   const s=(t||'').toLowerCase();
   for(const [k,ic] of map){ if(s.includes(k.toLowerCase())) return ic; }
   return DEFAULT_ICON;
 }
 const grid=document.getElementById('grid');
 const done=pages.filter(p=>p.url && p.url.trim()).length;
 document.getElementById('subtitle').textContent=`共 ${pages.length} 個互動模擬器 · 已設定 ${done} 個`;
 grid.innerHTML=pages.map(p=>{
   const has=p.url && p.url.trim();
   const t=p.t.replace(/</g,'&lt;');
   if(has){
     return `<a href="${p.url}" class="group relative flex items-center gap-4 rounded-2xl p-4 min-h-[4.25rem] bg-white dark:bg-slate-800/90 border border-slate-200 dark:border-slate-700/70 shadow-sm hover:shadow-lg hover:-translate-y-0.5 hover:border-${A}-400 dark:hover:border-${A}-500 active:translate-y-0 active:opacity-90 focus:outline-none focus-visible:ring-2 focus-visible:ring-${A}-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:focus-visible:ring-offset-slate-900 transition duration-300 cursor-pointer">
       <span class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-xl bg-${A}-50 dark:bg-${A}-900/40 text-${A}-600 dark:text-${A}-300 ring-1 ring-inset ring-${A}-500/10 group-hover:scale-105 transition-transform duration-300"><i data-lucide="${pickIcon(p.t)}" width="22" height="22"></i></span>
       <span class="flex-grow text-sm sm:text-[15px] font-semibold text-slate-800 dark:text-slate-100 leading-snug">${t}</span>
       <i data-lucide="arrow-right" width="18" height="18" class="flex-shrink-0 text-slate-300 dark:text-slate-500 group-hover:text-${A}-500 dark:group-hover:text-${A}-400 group-hover:translate-x-0.5 transition duration-300"></i></a>`;
   }
   return `<div class="relative flex items-center gap-4 rounded-2xl p-4 min-h-[4.25rem] bg-slate-50 dark:bg-slate-800/40 border border-dashed border-slate-300 dark:border-slate-700 opacity-70">
       <span class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-700 text-slate-400"><i data-lucide="link-2-off" width="20" height="20"></i></span>
       <span class="flex-grow text-sm font-medium text-slate-500 dark:text-slate-400 leading-snug">${t}</span>
       <span class="flex-shrink-0 text-[11px] font-medium text-slate-500 dark:text-slate-400 px-2 py-1 rounded-full bg-slate-200/80 dark:bg-slate-700/80">尚未設定連結</span></div>`;
 }).join('');
 document.getElementById('yr').textContent=new Date().getFullYear();
 lucide.createIcons();
 function toggleTheme(){isDark=!isDark;document.body.classList.toggle('dark',isDark);
   document.getElementById('tw').innerHTML=`<i data-lucide="${isDark?'sun':'moon'}" width="20" height="20"></i>`;lucide.createIcons();}
</script>
</body>
