            { t: '蝕相觀測模擬器', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E8%9D%95%E7%9B%B8%E8%A7%80%E6%B8%AC%E6%A8%A1%E6%93%AC%E5%99%A8.html' },
            { t: '過山車能量守恆', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E9%81%8E%E5%B1%B1%E8%BB%8A%E8%83%BD%E9%87%8F%E5%AE%88%E6%81%86.html' },
            { t: '探究電路模擬器', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E6%8E%A2%E7%A9%B6%E9%9B%BB%E8%B7%AF%E6%A8%A1%E6%93%AC%E5%99%A8.html' },
            { t: '反射與全內反射模擬器', url: '%E8%87%AA%E5%AD%98%E6%A8%A1%E6%93%AC%E5%99%A8/%E7%B6%9C%E5%90%88%E7%A7%91%E5%AD%B8/%E5%8F%8D%E5%B0%84%E8%88%87%E5%85%A8%E5%85%A7%E5%8F%8D%E5%B0%84%E6%A8%A1%E6%93%AC%E5%99%A8.html' },

<div class="min-h-screen flex flex-col text-slate-800 dark:text-slate-200">
  <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16">
      <div class="flex items-center space-x-3">
        <div class="text-indigo-600 dark:text-indigo-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="6" fill="currentColor"/>

        <div class="flex flex-col">
          <h1 class="text-sm sm:text-base font-bold text-slate-900 dark:text-white leading-tight">曾璧山(崇蘭)中學</h1>

      <div class="flex items-center gap-2">

        <a href="index.html" class="hidden sm:inline-flex items-center gap-1 px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-medium text-slate-700 dark:text-slate-300">
          <i data-lucide="home" width="16" height="16"></i><span>主頁</span>
        </a>
        <button onclick="toggleTheme()" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800" title="切換深淺色模式">
          <span id="tw"><i data-lucide="sun" width="20" height="20"></i></span>

  <header class="pt-10 pb-8 px-4 text-center"><div class="max-w-3xl mx-auto">
    <div class="inline-flex items-center gap-2 mb-4 px-3 py-1 rounded-full bg-indigo-100 dark:bg-indigo-900/40 text-indigo-800 dark:text-indigo-300 text-xs font-bold tracking-wider uppercase">
      <i data-lucide="rocket" width="15" height="15"></i>Integrated Science Inquiry Lab
    </div>
    <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 dark:text-white serif-font mb-3">綜合科學探究實驗室</h2>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16 w-full">
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
  </main>

  <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-auto py-6">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-slate-500 dark:text-slate-400 text-sm">&copy; <span id="yr"></span> 曾璧山(崇蘭)中學 科學組</p>
    </div>
  </footer>
</div>

<script>
 let isDark=true;
 const A=SUBJECT.accent;
 const DEFAULT_ICON = SUBJECT.icon;
 function pickIcon(t){
   const map=[
     // ---- 物理：電磁 ----
     ['電磁感應','radio'],['電磁波','radio'],['螺線管','magnet'],['磁棒','magnet'],['磁場','magnet'],['磁','magnet'],
     ['電路','circuit-board'],['電動機','cog'],['電解','plug-zap'],['燃料電池','battery-charging'],['電池','battery-charging'],
     ['導電','zap'],['直流電','zap'],['電子流動','zap'],['電場','zap'],['庫倫','zap'],['電','zap'],
     // ---- 波動與光學 ----
     ['干涉','waves'],['疊加','waves'],['縱波','waves'],['橫波','waves'],['波','waves'],
     ['透鏡','glasses'],['折射','glasses'],['全內反射','glasses'],['反射','glasses'],['矯視','glasses'],['衍射','glasses'],['雙縫','glasses'],
     ['光電','sun-medium'],['發光','lightbulb'],['led','lightbulb'],['光學','glasses'],['光','sun'],
     // ---- 力學與能量 ----
     ['摩擦','move'],['牛頓','move'],['碰撞','move'],['拋體','move'],['升降機','move'],['直升機','plane'],
     ['能量守恆','battery-charging'],['過山車','activity'],['單擺','activity'],['能量','battery-charging'],['力','move'],
     ['萬有引力','orbit'],['圓周','orbit'],['太陽系','orbit'],['天體','globe'],['四季','globe'],
     ['火箭','rocket'],['升空','rocket'],['太陽能','sun'],['冷氣','snowflake'],
     ['放射性','radiation'],['衰變','radiation'],['量子','atom'],
     ['距離','ruler'],['位移','ruler'],['運動線圖','trending-up'],['弗林明','hand'],['定則','hand'],
     // ---- 物態與氣體 ----
     ['三態','droplets'],['氣體','wind'],['分子','wind'],['物質','droplets'],
     // ---- 化學 ----
     ['滴定','test-tube-diagonal'],['中和焓','thermometer'],['中和','test-tube-diagonal'],['酸鹼','test-tube'],
     ['焰色','flame'],['原油','fuel'],['分餾','fuel'],['碳酸','flask-conical'],['石墨','hexagon'],
     ['離子鍵','link'],['共價鍵','link'],['對映異構','flip-horizontal'],['碘時鐘','timer'],
     ['金屬','gem'],['熔點','thermometer'],['海鹽','droplets'],['海水','waves'],['反應','flask-conical'],
     // ---- 生物 ----
     ['細胞膜','circle-dot'],['細胞','circle-dot'],['光合','sprout'],['蒸騰','droplets'],
     ['遺傳','dna'],['dna','dna'],['顯微鏡','microscope'],['食物','utensils'],['熱量','flame'],
     ['自然選擇','bird'],['植物','leaf'],['摘星','sprout'],
     // ---- 綜合科學 ----
     ['串聯','circuit-board'],['並聯','circuit-board'],['蝕相','moon'],
     // ---- ICT ----
     ['程式','code'],['scratch','code'],['數據','database'],['計算','cpu'],['多媒體','clapperboard'],['網頁','globe']
   ];
   map.sort((a,b)=>b[0].length-a[0].length); // 最長（最具體）關鍵字優先
   const s=(t||'').toLowerCase();
   for(const [k,ic] of map){ if(s.includes(k.toLowerCase())) return ic; }
   return DEFAULT_ICON;
 }
 const grid=document.getElementById('grid');
 const done=pages.filter(p=>p.url && p.url.trim()).length;
 document.getElementById('subtitle').textContent=`共 ${pages.length} 個互動模擬器 · 已設定 ${done} 個`;
 grid.innerHTML=pages.map(p=>{
   const has=p.url && p.url.trim();
   const t=p.t.replace(/</g,'&lt;');
   if(has){
     return `<a href="${p.url}" class="group relative bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm hover:shadow-lg border border-slate-200 dark:border-slate-700 hover:border-${A}-500 dark:hover:border-${A}-400 transition-all flex items-center gap-3 active:scale-[0.98]">
       <div class="w-10 h-10 flex-shrink-0 rounded-lg bg-${A}-50 dark:bg-${A}-900/30 text-${A}-600 dark:text-${A}-400 flex items-center justify-center"><i data-lucide="${pickIcon(p.t)}" width="20" height="20"></i></div>
       <span class="flex-grow text-sm font-medium text-slate-800 dark:text-slate-200 leading-snug">${t}</span>
       <i data-lucide="arrow-right" width="16" height="16" class="flex-shrink-0 text-slate-400 group-hover:text-${A}-500 transition-colors"></i></a>`;
   }
   return `<div class="relative bg-slate-50 dark:bg-slate-800/40 rounded-xl p-4 border border-dashed border-slate-300 dark:border-slate-700 flex items-center gap-3 opacity-60">
       <div class="w-10 h-10 flex-shrink-0 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-400 flex items-center justify-center"><i data-lucide="link-2-off" width="18" height="18"></i></div>
       <span class="flex-grow text-sm font-medium text-slate-500 dark:text-slate-400 leading-snug">${t}</span>
       <span class="text-xs text-slate-400">尚未設定連結</span></div>`;
 }).join('');
 document.getElementById('yr').textContent=new Date().getFullYear();
 lucide.createIcons();
 function toggleTheme(){isDark=!isDark;document.body.classList.toggle('dark',isDark);
   document.getElementById('tw').innerHTML=`<i data-lucide="${isDark?'sun':'moon'}" width="20" height="20"></i>`;lucide.createIcons();}
</script>
